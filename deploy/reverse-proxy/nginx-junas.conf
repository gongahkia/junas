upstream junas_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

log_format junas_no_body '$remote_addr $request_id $status $request_time "$request" $body_bytes_sent';

server {
    listen 443 ssl http2;
    server_name junas.internal.example;

    ssl_certificate     /etc/nginx/certs/junas.crt;
    ssl_certificate_key /etc/nginx/certs/junas.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 25m;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_request_buffering on;

    access_log /var/log/nginx/junas_access.log junas_no_body;
    error_log  /var/log/nginx/junas_error.log warn;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Connection "";

    location = /health {
        proxy_pass http://junas_backend;
    }

    location = /ready {
        proxy_pass http://junas_backend;
    }

    location = /metrics {
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://junas_backend;
    }

    location = /diagnostics {
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://junas_backend;
    }

    location ~ ^/(review|classify|classify/batch|safe-rewrite|redact-pii|hold-until-public|cite-public-source|request-approval|pseudonymize|anonymize|redact|documents/scrub|reidentify)$ {
        proxy_pass http://junas_backend;
    }

    location ~ ^/review/[^/]+(/decision)?$ {
        proxy_pass http://junas_backend;
    }

    location ^~ /local/ {
        return 404;
    }

    location / {
        return 404;
    }
}

apiVersion: v1
kind: Secret
metadata:
  name: junas-secrets
  namespace: junas
type: Opaque
stringData:
  tenant-credentials-json: '{"replace-api-key":{"tenant_id":"tenant-a","subject":"pilot-service","roles":["reviewer","maker","checker","auditor","admin"]}}'
  mapping-store-key: "replace-with-fernet-key"
  subject-index-key: "replace-with-random-hmac-key"
  journal-keys.toml: |
    active = "v1"

    [keys.v1]
    secret = "replace-with-customer-held-journal-hmac-secret"

code = "CN"
label = "China"
pii_rules = ["CN_PIPL_PERSONAL_DATA", "CN_PIPL_SENSITIVE_CONTEXT"]
mnpi_rules = ["CN_SECURITIES_LAW_INSIDER"]
references = [
    "Personal Information Protection Law 2021 (PIPL) Articles 4, 28, 31, 38",
    "Cybersecurity Law 2016 (CSL) Articles 37-41",
    "Data Security Law 2021 (DSL) Article 31",
    "China Securities Law Articles 50-54 (insider trading)",
    "GB 11643-1999 (Resident Identity Card)",
    "GB 32100-2015 (Unified Social Credit Code)",
]
aliases = ["CN", "CHINA", "PRC"]

# China Resident ID (居民身份证号). 18-digit identifier with ISO 7064 MOD 11-2
# checksum. Statutory anchor: PIPL Art 4 + Art 28 (sensitive PI category).
[[recognizers]]
name = "China Resident ID"
rule_name = "cn_resident_id"
pattern = '(?:身份证(?:号(?:码)?)?|Resident\s+(?:Identity\s+)?(?:Card|ID))[\s:.#-]*(\d{17}[\dXx])\b'
severity = "high"
reason = "China Resident Identity Card number — ISO 7064 MOD 11-2 validated"
capture_group = 1
validator = "cn_resident_id"

# China Unified Social Credit Code (统一社会信用代码). 18-char alphanumeric
# (excludes I/O/Z/S/V). ISO 7064 MOD 31-3 checksum. Per GB 32100-2015.
[[recognizers]]
name = "China Unified Social Credit Code"
rule_name = "cn_uscc"
pattern = '(?:统一社会信用代码|Unified\s+Social\s+Credit\s+(?:Code|Identifier)|USCC|USCI)[\s:.#-]*([0-9A-HJ-NP-RT-UW-Y]{18})\b'
severity = "medium"
reason = "China Unified Social Credit Code — corporate identifier (GB 32100-2015)"
capture_group = 1
validator = "cn_uscc"

# China mobile phone — 11-digit pattern starting 1[3-9]. Anchored on common context
# markers to defend against generic 11-digit collisions. Format-only.
[[recognizers]]
name = "China Mobile Phone"
rule_name = "cn_phone"
pattern = '(?:手机(?:号(?:码)?)?|电话|Mobile|Phone|Tel)[\s:.#-]*(1[3-9]\d{9})\b'
severity = "medium"
reason = "China mobile phone number — personal contact identifier"
capture_group = 1

# China Passport — ordinary (E + 8 digits) or diplomatic (D + 8 digits) or
# official (G + 8 digits). Format-only.
[[recognizers]]
name = "China Passport"
rule_name = "cn_passport"
pattern = '(?:护照(?:号(?:码)?)?|Passport(?:\s+No\.?|\s+Number)?)[\s:.#-]*([EGD]\d{8})\b'
severity = "high"
reason = "China passport number — travel-document identifier"
capture_group = 1

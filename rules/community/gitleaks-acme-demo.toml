title = "Junas community demo Gitleaks pack"

[[allowlists]]
description = "allow documented demo placeholder lines"
regexTarget = "line"
targetRules = ["acme-api-token"]
regexes = ['''DO-NOT-FLAG-ACME-DEMO''']

[[rules]]
id = "acme-api-token"
description = "ACME API token"
regex = '''(?i)acme[_-]?api[_-]?key\s*[:=]\s*([a-z0-9]{20,})'''
secretGroup = 1
entropy = 3.0
keywords = ["acme", "api"]
tags = ["secret", "community", "demo"]

[[rules.allowlists]]
description = "allow common non-secret placeholder"
regexTarget = "secret"
regexes = ['''^clientexampletokenx7y8z9$''']

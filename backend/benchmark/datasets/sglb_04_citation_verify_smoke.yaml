# SGLB-04 Citation-Verify smoke dataset (v0.1)
#
# 30 cases stratified across:
#   - well-formed neutral case, SLR(R), SLR (12 cases)
#   - well-formed statute Cap. + Rev Ed, statute section refs (6 cases)
#   - well-formed short forms: Ibid, Id, supra (3 cases)
#   - perturbed forms covering the seven SGLB-11 perturbation classes (9 cases)
#
# All citations are constructed (no real-case ground truth required) since
# SGLB-04 is a grammar conformance task, not a citation-existence task.
# SGLB-11 covers existence/hallucination.
cases:
  # === Well-formed neutral case citations ===
  - name: well_formed_sgca
    inputs:
      citation: "[2023] SGCA 5"
    expected_output:
      labels: ["valid"]
    metadata: {jurisdiction: SG, kind: neutral_case, split: dev}

  - name: well_formed_sghc
    inputs:
      citation: "[2019] SGHC 12"
    expected_output:
      labels: ["valid"]
    metadata: {jurisdiction: SG, kind: neutral_case, split: dev}

  - name: well_formed_sgdc
    inputs:
      citation: "[2021] SGDC 99"
    expected_output:
      labels: ["valid"]
    metadata: {jurisdiction: SG, kind: neutral_case, split: dev}

  - name: well_formed_sgmc

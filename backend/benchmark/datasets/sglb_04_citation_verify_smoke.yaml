  # === Well-formed statute citations ===
  - name: well_formed_statute_cap_rev_ed
    inputs:
      citation: "Penal Code (Cap. 224, 2008 Rev Ed)"
    expected_output:
      labels: ["valid"]
    metadata: {jurisdiction: SG, kind: statute_cap, split: dev}

  - name: well_formed_statute_cap_no_rev

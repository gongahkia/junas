  inputs:
    question: Under the PDPA, what does the section on "Duty to notify occurrence of notifiable data breach" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 26D of the Personal Data Protection Act 2012

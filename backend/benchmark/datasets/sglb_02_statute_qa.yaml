- name: sglb_02_PDPA2012_2020_58
  inputs:
    question: Under the PDPA, what does the section on "Evidence in proceedings" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 58 of the Personal Data Protection Act 2012
    answer_span: (1) The Commission, the Appeal Panel, an Appeal Committee, their members and anyone acting for or under the
      direction of the Commission must not give or be compelled to give evidence in a court or in any other proceedings in
      respect of any information obtained in performing their duties or exercising their powers or functions under this Act,
      except — ( a ) in a prosecution for perjury or for the provision of false information; ( b ) in a prosecution for an
      offence under this Act; or ( c ) in an application for judicial review or an appeal from a decision with respect to
      such an application.

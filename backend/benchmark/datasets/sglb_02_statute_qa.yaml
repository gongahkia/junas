cases:
- name: sglb_02_PDPA2012_2020_10
  inputs:
    question: Under the PDPA, what does the section on "Cooperation agreements" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 10 of the Personal Data Protection Act 2012
    answer_span: (1) For the purposes of section 59, a cooperation agreement is an agreement for the purposes of — ( a ) facilitating
      cooperation between the Commission and another regulatory authority in the performance of their respective functions
      in so far as those functions relate to data protection; and ( b ) avoiding duplication of activities by the Commission
      and another regulatory authority, being activities involving the enforcement of data protection laws.
  metadata:

- name: sglb_02_PDPA2012_2020_15
  inputs:
    question: Under the PDPA, what does the section on "Deemed consent" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 15 of the Personal Data Protection Act 2012
    answer_span: (1) An individual is deemed to consent to the collection, use or disclosure of personal data about the individual
      by an organisation for a purpose if — ( a ) the individual, without actually giving consent mentioned in section 14,
      voluntarily provides the personal data to the organisation for that purpose; and ( b ) it is reasonable that the individual
      would voluntarily provide the data.

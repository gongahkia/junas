- name: sglb_02_PDPA2012_2020_12
  inputs:
    question: Under the PDPA, what does the section on "Policies and practices" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 12 of the Personal Data Protection Act 2012
    answer_span: An organisation must — ( a ) develop and implement policies and practices that are necessary for the organisation
      to meet the obligations of the organisation under this Act; ( b ) develop a process to receive and respond to complaints
      that may arise with respect to the application of this Act; ( c ) communicate to its staff information about the organisation’s
      policies and practices mentioned in paragraph ( a ); and ( d ) make information available on request about — (i) the
      policies and practices mentioned in paragraph ( a ); and (ii) the complaint process mentioned in paragraph ( b ).
  metadata:
    task: SGLB-02
    split: dev
    jurisdiction: SG
    chapter_number: PDPA2012
    section_number: '12'
    section_heading: Policies and practices
    source_url: https://sso.agc.gov.sg/Act/PDPA2012?WholeDoc=1#pr12-

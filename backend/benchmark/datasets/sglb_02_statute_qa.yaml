- name: sglb_02_PDPA2012_2020_14
  inputs:
    question: Under the PDPA, what does the section on "Provision of consent" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 14 of the Personal Data Protection Act 2012
    answer_span: (1) An individual has not given consent under this Act for the collection, use or disclosure of personal
      data about the individual by an organisation for a purpose unless — ( a ) the individual has been provided with the
      information required under section 20; and ( b ) the individual provided his or her consent for that purpose in accordance
      with this Act.

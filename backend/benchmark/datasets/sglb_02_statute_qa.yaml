- name: sglb_02_PDPA2012_2020_19
  inputs:
    question: Under the PDPA, what does the section on "Personal data collected before 2 July 2014" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 19 of the Personal Data Protection Act 2012
    answer_span: Despite the other provisions in this Part, an organisation may use personal data about an individual collected
      before 2 July 2014 for the purposes for which the personal data was collected unless — ( a ) consent for such use is
      withdrawn in accordance with section 16; or ( b ) the individual, whether before, on or after 2 July 2014, has otherwise
      indicated to the organisation that he or she does not consent to the use of the personal data.

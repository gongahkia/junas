  inputs:
    question: Under the PDPA, what does the section on "Accuracy of personal data" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 23 of the Personal Data Protection Act 2012
    answer_span: An organisation must make a reasonable effort to ensure that personal data collected by or on behalf of the
      organisation is accurate and complete, if the personal data — ( a ) is likely to be used by the organisation to make
      a decision that affects the individual to whom the personal data relates; or ( b ) is likely to be disclosed by the
      organisation to another organisation.

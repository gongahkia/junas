- name: sglb_02_PDPA2012_2020_61
  inputs:
    question: Under the PDPA, what does the section on "Symbol of Commission" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 61 of the Personal Data Protection Act 2012
    answer_span: (1) The Commission has the exclusive right to the use of such symbol or representation as may be prescribed
      in connection with its activities or affairs. (2) A person who, without the authority of the Commission, uses a symbol
      or representation identical with that of the Commission, or which so resembles the symbol or representation of the Commission
      as to deceive or cause confusion, or to be likely to deceive or to cause confusion, shall be guilty of an offence and
      shall be liable on conviction to a fine not exceeding $2,000 or to imprisonment for a term not exceeding 6 months or
      to both.

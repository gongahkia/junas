  inputs:
    question: Under the PDPA, what does the section on "Access to personal data" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 21 of the Personal Data Protection Act 2012
    answer_span: (1) Subject to subsections (2), (3) and (4), on request of an individual, an organisation must, as soon as
      reasonably possible, provide the individual with — ( a ) personal data about the individual that is in the possession
      or under the control of the organisation; and ( b ) information about the ways in which the personal data mentioned
      in paragraph ( a ) has been or may have been used or disclosed by the organisation within a year before the date of
      the request.

  inputs:
    question: Under the PDPA, what does the section on "Preservation of copies of personal data" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 22A of the Personal Data Protection Act 2012
    answer_span: (1) Where — ( a ) an individual, on or after 1 February 2021, makes a request under section 21(1)( a ) to
      an organisation to provide personal data about the individual that is in the possession or under the control of the
      organisation; and ( b ) the organisation refuses to provide that personal data, the organisation must preserve, for
      not less than the prescribed period, a copy of the personal data concerned.

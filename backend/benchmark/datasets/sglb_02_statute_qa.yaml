    question: Under the PDPA, what does the section on "Retention of personal data" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 25 of the Personal Data Protection Act 2012
    answer_span: An organisation must cease to retain its documents containing personal data, or remove the means by which

- name: sglb_02_PDPA2012_2020_26B
  inputs:
    question: Under the PDPA, what does the section on "Notifiable data breaches" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 26B of the Personal Data Protection Act 2012
    answer_span: (1) A data breach is a notifiable data breach if the data breach — ( a ) results in, or is likely to result
      in, significant harm to an affected individual; or ( b ) is, or is likely to be, of a significant scale. [40/2020] (2)
      Without limiting subsection (1)( a ), a data breach is deemed to result in significant harm to an individual — ( a )
      if the data breach is in relation to any prescribed personal data or class of personal data relating to the individual;
      or ( b ) in other prescribed circumstances.

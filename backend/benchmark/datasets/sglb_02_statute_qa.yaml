- name: sglb_02_PDPA2012_2020_26C
  inputs:
    question: Under the PDPA, what does the section on "Duty to conduct assessment of data breach" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 26C of the Personal Data Protection Act 2012
    answer_span: (1) This section applies to a data breach that occurs on or after 1 February 2021. [40/2020] (2) Subject
      to subsection (3), where an organisation has reason to believe that a data breach affecting personal data in its possession
      or under its control has occurred, the organisation must conduct, in a reasonable and expeditious manner, an assessment
      of whether the data breach is a notifiable data breach.

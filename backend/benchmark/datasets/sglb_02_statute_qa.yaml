  inputs:
    question: Under the PDPA, what does the section on "Protection of personal data" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 24 of the Personal Data Protection Act 2012
    answer_span: An organisation must protect personal data in its possession or under its control by making reasonable security
      arrangements to prevent — ( a ) unauthorised access, collection, use, disclosure, copying, modification or disposal,
      or similar risks; and ( b ) the loss of any storage medium or device on which personal data is stored. [40/2020]

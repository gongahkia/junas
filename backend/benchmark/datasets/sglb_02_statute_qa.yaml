- name: sglb_02_PDPA2012_2020_16
  inputs:
    question: Under the PDPA, what does the section on "Withdrawal of consent" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 16 of the Personal Data Protection Act 2012
    answer_span: (1) On giving reasonable notice to the organisation, an individual may at any time withdraw any consent given,
      or deemed to have been given under this Act, in respect of the collection, use or disclosure by that organisation of
      personal data about the individual for any purpose. (2) On receipt of the notice mentioned in subsection (1), the organisation
      concerned must inform the individual of the likely consequences of withdrawing his or her consent.

- name: sglb_02_PDPA2012_2020_13
  inputs:
    question: Under the PDPA, what does the section on "Consent required" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 13 of the Personal Data Protection Act 2012
    answer_span: An organisation must not, on or after 2 July 2014, collect, use or disclose personal data about an individual
      unless — ( a ) the individual gives, or is deemed to have given, his or her consent under this Act to the collection,
      use or disclosure, as the case may be; or ( b ) the collection, use or disclosure (as the case may be) without the individual’s
      consent is required or authorised under this Act or any other written law.
  metadata:
    task: SGLB-02
    split: test
    jurisdiction: SG
    chapter_number: PDPA2012
    section_number: '13'
    section_heading: Consent required
    source_url: https://sso.agc.gov.sg/Act/PDPA2012?WholeDoc=1#pr13-

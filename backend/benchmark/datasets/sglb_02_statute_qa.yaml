- name: sglb_02_PDPA2012_2020_11
  inputs:
    question: Under the PDPA, what does the section on "Compliance with Act" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 11 of the Personal Data Protection Act 2012
    answer_span: (1) In meeting its responsibilities under this Act, an organisation must consider what a reasonable person
      would consider appropriate in the circumstances. (2) An organisation is responsible for personal data in its possession
      or under its control. (3) An organisation must designate one or more individuals to be responsible for ensuring that
      the organisation complies with this Act. (4) An individual designated under subsection (3) may delegate to another individual
      the responsibility conferred by that designation.
  metadata:
    task: SGLB-02
    split: train
    jurisdiction: SG
    chapter_number: PDPA2012
    section_number: '11'
    section_heading: Compliance with Act
    source_url: https://sso.agc.gov.sg/Act/PDPA2012?WholeDoc=1#pr11-

  inputs:
    question: Under the PDPA, what does the section on "Transfer of personal data outside Singapore" provide?
    act_short_name: PDPA
    act_full_name: Personal Data Protection Act 2012
  expected_output:
    citation: s 26 of the Personal Data Protection Act 2012
    answer_span: (1) An organisation must not transfer any personal data to a country or territory outside Singapore except
      in accordance with requirements prescribed under this Act to ensure that organisations provide a standard of protection
      to personal data so transferred that is comparable to the protection under this Act. (2) The Commission may, on the
      application of any organisation, by written notice exempt the organisation from any requirement prescribed pursuant
      to subsection (1) in respect of any transfer of personal data by that organisation.

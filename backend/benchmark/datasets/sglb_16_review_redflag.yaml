- name: sglb_16_0a0f5ac0e3e0
  extraction_rule_sha: fc74d64ba453
  inputs:
    contract_text: '# EMPLOYMENT AGREEMENT


      **Date:** 2026-01-01


      **Between:**

      1. **ABC Pte Ltd** (UEN: ___________) ("Employer")

      2. **John Tan** (NRIC: ___________) ("Employee")


      ## 1. POSITION AND DUTIES

      The Employer agrees to employ the Employee as **Software Engineer**. The Employee
      shall perform such duties as reasonably assigned by the Employer.


      ## 2. COMMENCEMENT AND PROBATION

      Employment commences on **2026-01-01** with a probation period of **3 months**.
      During probation, either Party may terminate with 1 week''s notice.


      ## 3. REMUNERATION

      The Employee shall receive a gross monthly salary of **SGD 5000**, payable by
      the last working day of each month. Salary is subject to applicable CPF contributions
      and tax deductions.


      ## 4. WORKING HOURS

      Standard working hours are 44 hours per week (Monday to Friday, 9:00 AM to 6:00
      PM). Overtime shall be compensated in accordance with the Employment Act (Cap.
      91).


      ## 5. LEAVE ENTITLEMENTS

      - **Annual Leave:** 14 days per calendar year (pro-rated)

      - **Sick Leave:** 14 days outpatient, 60 days hospitalization per year

      - **Public Holidays:** As gazetted by the Ministry of Manpower


      ## 6. TERMINATION

      After probation, either Party may terminate this Agreement by giving **1 month(s)**
      written notice or salary in lieu thereof.


      ## 7. CONFIDENTIALITY

      The Employee shall not disclose any confidential information of the Employer
      during or after employment.


      ## 8. GOVERNING LAW

      This Agreement is governed by the laws of the Republic of Singapore, including
      the Employment Act (Cap. 91, 2009 Rev Ed).


      ---

      **ABC Pte Ltd**

      Authorised Signatory: ___________________


      **John Tan**

      Signature: ___________________


      # SG REVIEW CLAUSES


      ## LIMITATION OF LIABILITY

      Each Party''s total aggregate liability under this Agreement shall not exceed

      the total fees paid or payable in the 12 months before the claim. Neither

      Party excludes liability where exclusion is not permitted under Singapore law.


      ## TERMINATION

      Either Party may terminate this Agreement for material breach if the breach
      is

      not remedied within 14 days after written notice. Termination does not affect

      accrued rights or surviving confidentiality, payment, and data-protection

      obligations.


      ## GOVERNING LAW

      This Agreement is governed by and construed in accordance with the laws of the

      State of New York. The Parties submit to the non-exclusive jurisdiction of

      the Singapore courts.

      '

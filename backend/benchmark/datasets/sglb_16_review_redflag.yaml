- name: sglb_16_83401beb338f
  extraction_rule_sha: fc74d64ba453
  inputs:
    contract_text: '# NON-DISCLOSURE AGREEMENT


      **Date:** 2026-01-01


      **Between:**

      1. **ABC Pte Ltd** ("Disclosing Party")

      2. **XYZ Pte Ltd** ("Receiving Party")


      (collectively the "Parties")


      ## 1. PURPOSE

      The Parties wish to explore potential business collaboration (the "Purpose")
      and in connection therewith, may disclose Confidential Information to each other.


      ## 2. CONFIDENTIAL INFORMATION

      "Confidential Information" means all information disclosed by either Party to
      the other, whether orally, in writing, or by any other means, that is designated
      as confidential or that reasonably should be understood to be confidential given
      the nature of the information and circumstances of disclosure.


      ## 3. OBLIGATIONS

      The Receiving Party shall:

      (a) hold Confidential Information in strict confidence;

      (b) not disclose Confidential Information to any third party without prior written
      consent;

      (c) use Confidential Information solely for the Purpose;

      (d) protect Confidential Information with at least the same degree of care as
      its own confidential information, but no less than reasonable care.


      ## 4. EXCLUSIONS

      This Agreement does not apply to information that:

      (a) is or becomes publicly available through no fault of the Receiving Party;

      (b) was known to the Receiving Party before disclosure;

      (c) is independently developed without use of Confidential Information;

      (d) is received from a third party without restriction.


      ## 5. TERM

      This Agreement shall remain in effect for 2 years from the date hereof.


      ## 6. GOVERNING LAW

      This Agreement shall be governed by and construed in accordance with the laws
      of the Republic of Singapore.


      ## 7. DISPUTE RESOLUTION

      Any dispute arising out of this Agreement shall be referred to and resolved
      by arbitration administered by the Singapore International Arbitration Centre
      ("SIAC") in accordance with the SIAC Rules.


      ---

      **ABC Pte Ltd**

      Name: ___________________

      Signature: ___________________


      **XYZ Pte Ltd**

      Name: ___________________

      Signature: ___________________


      # SG REVIEW CLAUSES


      ## NOTICE PERIOD

      Either Party may terminate this Agreement by giving 30 days'' written notice,

      unless a longer minimum notice period is required by applicable Singapore law.


      ## DISPUTE RESOLUTION

      The Parties shall first attempt to resolve disputes by good-faith negotiation.

      If unresolved after 14 days, the dispute shall be referred to mediation in

      Singapore, and then to the courts of Singapore unless the Parties agree to

      SIAC arbitration.


      ## TERMINATION

      Either Party may terminate this Agreement for material breach if the breach
      is

      not remedied within 14 days after written notice. Termination does not affect

      accrued rights or surviving confidentiality, payment, and data-protection

      obligations.


      ## GOVERNING LAW

      This Agreement is governed by and construed in accordance with the laws of the

      State of New York. The Parties submit to the non-exclusive jurisdiction of

      the Singapore courts.

      '
  expected_output:
    defects:
    - defect_type: missing_limitation_of_liability
      span_start: 2020
      span_end: 2020
    - defect_type: governing_law_non_singapore
      span_start: 3137
      span_end: 3154
    - defect_type: missing_pdpa_data_protection_clause
      span_start: 2020
      span_end: 2020

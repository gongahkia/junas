  inputs:
    clause_text: "The Recipient must keep strictly confidential all Confidential Information (being any information of or\
      \ relating to the Disclosing Party or its Related Corporations, whether disclosed directly or indirectly, in any form,\
      \ including the existence and terms of this Agreement and all notes, analyses and derivatives) and shall: (a) use it\
      \ only for the Purpose; (b) disclose it solely to personnel and professional advisers with a strict need to know who\
      \ are bound by written obligations no less stringent, for whom the Recipient is jointly and severally responsible; (c)\
      \ maintain safeguards at least equivalent to industry best practice; and (d) make no copies, reverse engineering or\
      \ decompilation except as strictly necessary. Compelled disclosure is permitted only to the minimum extent required\
      \ by law or a competent authority, after prompt written notice and full cooperation to seek protective measures. Upon\
      \ demand or termination, the Recipient must, within three days, return or irretrievably destroy all Confidential Information\
      \ and certify compliance; residual backup media must be overwritten as soon as technically feasible. The Disclosing\
      \ Party may audit compliance on two Business Days\u2019 notice (costs borne by the Recipient if any breach is found).\
      \ The Recipient acknowledges that damages are inadequate; the Disclosing Party is entitled to injunctive relief, specific\
      \ performance, account of profits and full indemnity for all losses, with no cap or exclusion applying. Obligations\
      \ endure for the longer of seven years or while information remains non-public, and indefinitely for trade secrets,\
      \ without prejudice to duties at law or in equity, including Singapore\u2019s equitable doctrine of breach of confidence."
    clause_type: Confidentiality

    clause_text: "Non-Compete and Non-Dealing. In consideration of the Company\u2019s confidential information and customer\
      \ connections to which the Employee has had access, the Employee covenants that for 12 months from termination of employment\
      \ (Restricted Period), the Employee shall not, within Singapore or within a 5km radius of any Company premises at which\
      \ the Employee materially worked in the 12 months prior to termination: (a) be engaged, concerned or interested (whether\
      \ as employee, consultant, principal, partner or shareholder) in any business which competes with the Company\u2019\
      s business as carried on in the 12 months prior to termination (Restricted Business); (b) solicit, canvass, deal with\
      \ or accept the custom of any client or prospective client of the Company with whom the Employee had material contact\
      \ in the 12 months prior to termination; or (c) solicit or employ any key employee of the Company. Passive holdings\
      \ of up to 5% of a listed company are permitted. The Restricted Period shall be extended by any period of breach and\
      \ any period during which the Company seeks interim relief. The Employee must provide any prospective employer with\
      \ a copy of this clause and procure its written acknowledgement. The Company may seek injunctive relief (without proof\
      \ of special damage), damages and/or an account of profits, and the Employee shall indemnify the Company\u2019s reasonable\
      \ enforcement costs. If 12 months is unenforceable, it shall be 9 months, or failing that, 6 months."
    clause_type: Non-Compete / Restraint of Trade

  inputs:
    clause_text: "Post-Termination Non-Compete (Singapore). For a period of six (6) months from the Termination Date, the\
      \ Employee must not, without the Company\u2019s prior written consent, within Singapore and within a 5-kilometre radius\
      \ of any office or facility at which the Employee principally worked in the 12 months before termination, be employed,\
      \ engaged, or otherwise concerned in a Similar Capacity in the Restricted Business, but only where such role would reasonably\
      \ be likely to involve the use or disclosure of the Company\u2019s Confidential Information or material influence over\
      \ Key Accounts. \u201CRestricted Business\u201D means the business segment of the Company in which the Employee worked\
      \ in the 12 months prior to termination. \u201CSimilar Capacity\u201D means a role involving materially similar duties\
      \ to those performed by the Employee in that segment. \u201CKey Accounts\u201D are customers or prospective customers\
      \ with whom the Employee had material personal dealings in that 12\u2011month period. This clause does not prohibit\
      \ passive investment of up to 5% in a listed entity, general advertising not directed at Company clients, or roles wholly\
      \ unrelated to the Restricted Business. Any period of paid garden leave shall reduce the restricted period day\u2011\
      for\u2011day. The Employee must promptly notify any prospective employer of this restraint and provide the Company reasonable\
      \ details of the proposed role; failure by the Company to respond does not constitute consent. The parties intend this\
      \ clause to be no more than reasonably necessary to protect legitimate interests and agree it may be read down or severed\
      \ to the extent required by law."
    clause_type: Non-Compete / Restraint of Trade

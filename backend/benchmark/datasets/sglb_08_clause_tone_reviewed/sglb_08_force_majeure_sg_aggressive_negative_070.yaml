    clause_text: "Force Majeure. (a) In respect of the Company only, a \u201CForce Majeure Event\u201D means any event beyond\
      \ the Company\u2019s reasonable control, including: acts of God; fire, flood, earthquake or other natural disaster;\
      \ epidemic or pandemic and related quarantine restrictions; war, civil commotion, acts of terrorism, sabotage or malicious\
      \ damage; lawful or unlawful industrial action; embargoes, export or import restrictions, sanctions or other governmental\
      \ action; failure of utilities, telecommunications or transport networks (including widespread internet outages, denial-of-service\
      \ or other cyberattacks not caused by the Company); or any analogous event that materially impedes performance. During\
      \ any Force Majeure Event, the Company may suspend, defer, re-sequence or reduce performance without liability, and\
      \ all time and performance milestones shall be extended accordingly; the Counterparty\u2019s payment obligations (including\
      \ minimum or fixed fees) remain due. (b) For the Counterparty, only the following events qualify as force majeure: nationwide\
      \ power grid failure, declared national emergency, or government order prohibiting performance; shortages of funds,\
      \ staff absences, supplier failures, or market changes do not. (c) The Company may terminate immediately if its Force\
      \ Majeure Event persists beyond 30 days; if the Counterparty\u2019s event persists beyond 5 days, the Company may terminate\
      \ and recover cover costs. (d) The Company\u2019s determination of a Force Majeure Event is conclusive absent manifest\
      \ error; the Counterparty must implement and fund all reasonable mitigation and contingency measures. The parties acknowledge\
      \ Singapore law\u2019s strict construction; paragraph (b) is exhaustive, while paragraph (a) is illustrative."
    clause_type: Force Majeure

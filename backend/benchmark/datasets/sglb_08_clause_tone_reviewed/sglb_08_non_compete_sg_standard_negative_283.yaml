    clause_text: "Non-Compete. For a period of nine (9) months following the Termination Date, the Employee shall not, in\
      \ the Republic of Singapore and in any other city or territory where the Employee had material responsibilities for\
      \ the Company in the twelve (12) months prior to the Termination Date, directly or indirectly engage in, be employed\
      \ by, or provide services to any business that competes with the Restricted Business, being those products or services\
      \ of the Company with which the Employee was materially involved or about which the Employee had Confidential Information\
      \ during that period. Nothing in this clause prohibits: (a) passive investments of up to 5% in securities of a listed\
      \ company; (b) general advertising not targeted at the Company; or (c) employment in a role that is demonstrably not\
      \ competitive with the Restricted Business. Any period of garden leave shall be set off against this restraint period.\
      \ The parties intend this clause to be no wider than reasonably necessary to protect the Company\u2019s legitimate interests;\
      \ each restriction is separate and severable and may be blue-pencilled to the extent permitted by law. This clause operates\
      \ without prejudice to the Employee\u2019s continuing obligations relating to Confidential Information."

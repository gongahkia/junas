      \ teaching, pro bono work, or public tenders and generic advertising not targeted at Restricted Customers; or (d) use\
      \ of general skills and experience. For clarity, untargeted mass communications (including \u201Cspam\u201D) do not\
      \ constitute solicitation of Restricted Customers, and the Employee shall not access the Employer\u2019s systems post-termination.\n\
      \nAt least ten (10) business days before commencing a prospective role, the Employee shall notify the Employer in writing\
      \ with reasonable particulars; any written consent given is role-specific and may be withheld where reasonably necessary\
      \ to protect legitimate interests. If any part of this clause is unenforceable, it shall be severed by the blue-pencil\
      \ rule without affecting the remainder. This clause is without prejudice to confidentiality and non-solicitation obligations."

    clause_text: "Non-Compete (Balanced). For six (6) months following the Termination Date, and only within Singapore, the\
      \ Employee shall not, in a capacity substantially similar to the role held in the twelve (12) months prior to termination,\
      \ be employed by or engaged with any business that competes with the Company\u2019s products or services in which the\
      \ Employee had material involvement during that period (Restricted Business). This restraint applies only to duties\
      \ that would reasonably be expected to result in competition with the Restricted Business. As consideration, the Company\
      \ shall pay the Employee a restraint payment equal to fifty percent (50%) of the Employee\u2019s last-drawn monthly\
      \ base salary for each month of the restraint; if the Company fails to pay when due and does not cure within seven (7)\
      \ days of notice, the restraint is suspended during the period of non-payment. The Employee may seek the Company\u2019\
      s written consent for a proposed role; consent shall not be unreasonably withheld and shall be deemed granted if no\
      \ written decision is given within ten (10) business days. Carve\u2011outs: passive investments up to 5% in a listed\
      \ entity, academic/charitable work, and roles outside the Restricted Business or excluding Singapore. Inadvertent breach\
      \ must be cured within seven (7) days of notice. If termination is due to redundancy, the restraint period reduces to\
      \ three (3) months. Nothing restricts the Employee\u2019s use of general skills and experience."
    clause_type: Non-Compete / Restraint of Trade

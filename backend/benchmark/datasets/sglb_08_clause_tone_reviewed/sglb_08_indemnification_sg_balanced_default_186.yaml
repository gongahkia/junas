  inputs:
    clause_text: "Indemnification. Each Party (Indemnifying Party) shall indemnify, defend and hold harmless the other Party\
      \ and its Affiliates from third-party claims, demands and proceedings, and all reasonable damages, costs and expenses\
      \ (including reasonable legal fees) finally awarded or agreed in settlement with consent, arising from: (a) bodily injury,\
      \ death, or tangible property damage caused by the Indemnifying Party\u2019s negligence; (b) infringement of intellectual\
      \ property rights by the Indemnifying Party\u2019s materials or services (excluding infringements caused by the Indemnified\
      \ Party\u2019s specifications or combinations); or (c) the Indemnifying Party\u2019s breach of law or confidentiality\
      \ obligations. The Indemnifying Party shall control the defence and settlement with counsel reasonably acceptable to\
      \ the Indemnified Party, who may participate at its own cost; no settlement may admit fault or impose non-monetary obligations\
      \ on the Indemnified Party without its prior written consent (not unreasonably withheld). The Indemnified Party must\
      \ give prompt written notice and reasonable assistance; delay relieves indemnity only to the extent prejudiced. For\
      \ alleged breaches giving rise to first-party Losses, the Indemnifying Party has 30 days from notice to cure before\
      \ indemnity applies (not applicable to third-party claims). Each Party\u2019s aggregate liability under this clause\
      \ is capped at 125% of Fees paid or payable in the 12 months preceding the claim, excluding fraud, wilful misconduct,\
      \ and liabilities for death/personal injury caused by negligence or third-party IP awards. Indemnities survive termination\
      \ for 24 months (five years for IP claims). Each Party shall mitigate Losses."
    clause_type: Indemnification

  inputs:
    clause_text: "Force Majeure. The Parties agree this clause shall be interpreted strictly, and only the following events\
      \ qualify as a \u201CForce Majeure Event\u201D: act of God (including earthquake, flood, or cyclone), fire, epidemic\
      \ or pandemic and related governmental measures, war, terrorism, riots, civil commotion, sabotage, embargo, industry-wide\
      \ strike or lockout (but not a strike limited to a Party\u2019s own workforce), nationwide or regionally\u2011wide failure\
      \ of utilities or telecommunications, or governmental act or order rendering performance unlawful. Upon a Force Majeure\
      \ Event, the affected Party must: (a) give written notice within five Business Days describing the event, expected impact,\
      \ and mitigation steps; (b) use commercially reasonable efforts, including any documented business continuity measures,\
      \ to mitigate and resume performance; and (c) perform partially where possible, with relief only to the extent performance\
      \ is prevented, hindered, or delayed. Payment obligations are not excused, except where a Force Majeure Event causes\
      \ a systemic banking outage. The Parties shall meet within seven Business Days of notice to agree a mitigation plan\
      \ and allocate limited resources fairly. If the Force Majeure Event continues for 45 consecutive days, the Parties will\
      \ in good faith consider temporary adjustments; if it continues for 90 consecutive days, either Party may terminate\
      \ the affected obligations on 10 Business Days\u2019 notice without liability, save for amounts due for goods or services\
      \ delivered. The following do not constitute Force Majeure: changes in market prices, failure to obtain financing, or\
      \ failures caused by a Party\u2019s negligence."
    clause_type: Force Majeure

  inputs:
    clause_text: "Confidentiality. Each party (as \u201CReceiving Party\u201D) shall use commercially reasonable (and in no\
      \ event extraordinary) safeguards to protect the other\u2019s Confidential Information that is (a) clearly marked \u201C\
      Confidential\u201D at disclosure or (b) if oral/visual, identified as confidential and confirmed in writing within 10\
      \ days. Confidential Information excludes information that is or becomes public without breach, was known without restriction,\
      \ is independently developed without use of the information, or is rightfully received from a third party. Limited compelled\
      \ disclosure is permitted upon prompt written notice and reasonable cooperation to seek protective orders. Residuals\
      \ in unaided memory may be used for general skills/ideas (but not verbatim code, customer lists, or pricing matrices).\
      \ Return or destruction shall occur on request, save for legally required, regulatorily\u2011mandated or automatic back\u2011\
      up copies; such retained copies remain confidential.\n\nThe Parties acknowledge Singapore has no standalone trade secrets\
      \ statute and protection also arises under the equitable doctrine of breach of confidence; nothing herein enlarges remedies\
      \ beyond law, and injunctive relief shall be subject to balance\u2011of\u2011convenience considerations. Without prejudice,\
      \ Receiving Party has 10 business days to cure any inadvertent disclosure after notice. To the maximum extent permitted\
      \ by law, aggregate liability under this clause shall not exceed the lower of S$50,000 or fees paid in the 12 months\
      \ prior; no indirect or consequential damages. Obligations survive 2 years (or, for bona fide trade\u2011secret\u2011\
      level information, while it remains secret)."
    clause_type: Confidentiality
  expected_output:
    labels: &id001
    - protective

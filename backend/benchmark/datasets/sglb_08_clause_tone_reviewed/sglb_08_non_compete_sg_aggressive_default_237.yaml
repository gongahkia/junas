      \ Date, in the Republic of Singapore and any other jurisdiction in which the Employee performed duties for the Company\
      \ in the 12 months prior to the Cessation Date: (a) engage, whether directly or indirectly and in any capacity, in any\
      \ business that competes with the Company in products or services with which the Employee was materially concerned;\
      \ (b) solicit, canvass, or deal with any client or prospective client to whom the Employee provided services or about\
      \ whom the Employee had Confidential Information in the 12 months prior to the Cessation Date; or (c) induce or attempt\
      \ to induce any employee, consultant, or supplier of the Company to cease or reduce their relationship with the Company.\
      \ Each restriction applies in addition to any notice or garden leave. The Restricted Period shall be extended by any\
      \ period of breach or non-compliance. The Employee shall promptly disclose to the Company details of any post-termination\
      \ engagement and provide this clause to any prospective employer. The Company may seek injunctions, specific performance,\
      \ account of profits, and indemnity costs. Each covenant is separate; if any part is unenforceable, it shall be severed\
      \ or read down to the extent permitted by law."

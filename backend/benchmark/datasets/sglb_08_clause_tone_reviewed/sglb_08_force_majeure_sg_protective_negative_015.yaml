  inputs:
    clause_text: "Force Majeure. A \u201CForce Majeure Event\u201D excuses performance only to the extent strictly caused\
      \ by, and only during, the occurrence of: (a) earthquakes, cyclones, or floods of at least a 1-in-100-year severity;\
      \ (b) nationwide power grid failure or national internet backbone outage; (c) war, terrorism, or widespread civil commotion;\
      \ (d) general laws or binding orders of a governmental authority that render performance illegal; or (e) quarantine\
      \ measures of general applicability. The foregoing is exhaustive (ejusdem generis excluded). Excluded are: changes in\
      \ cost or demand, strikes or lockouts of the Affected Party or its subcontractors, targeted cyberattacks or malware\
      \ infections of the Affected Party\u2019s systems, supplier or carrier failures, insolvency, unavailability of funds,\
      \ epidemics reasonably foreseeable at signing, and biological contamination arising from the Affected Party\u2019s operations.\
      \ The Affected Party must give written notice within 3 days with particulars and supporting evidence, provide 48-hour\
      \ updates, and use diligent efforts and commercially reasonable alternatives (including alternate sourcing) to mitigate,\
      \ prioritising the Beneficiary\u2019s requirements. Payment, confidentiality, and data/security obligations are not\
      \ excused. During suspension, the Beneficiary may withhold payment for undelivered performance, procure alternatives\
      \ and set off reasonable incremental costs. If a Force Majeure Event continues beyond 15 business days or notice requirements\
      \ are not met and the Beneficiary is prejudiced, the Beneficiary may terminate the affected services immediately without\
      \ liability."
    clause_type: Force Majeure

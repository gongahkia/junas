  inputs:
    clause_text: "Confidentiality. Each party (Recipient) shall protect the other party\u2019s (Discloser\u2019s) Confidential\
      \ Information using at least the same degree of care it uses for its own similar information, and no less than reasonable\
      \ care, and shall use it solely for the purposes of this Agreement on a need-to-know basis. \u201CConfidential Information\u201D\
      \ means non-public information disclosed by a party and marked \u201CConfidential\u201D (or, if disclosed orally, confirmed\
      \ in writing within 10 business days), including technical, commercial, pricing, security and roadmap information. It\
      \ excludes information that: (a) is or becomes public through no breach by Recipient; (b) was lawfully known to Recipient\
      \ without restriction; (c) is independently developed without use of the Discloser\u2019s information; (d) is rightfully\
      \ received from a third party without restriction; or (e) comprises benign public facts such as published office locations,\
      \ product brochures, publicly listed phone numbers, cafeteria menus, or issued press releases. If disclosure is required\
      \ by law or regulator, Recipient will give prompt notice (where lawful) and cooperate to limit disclosure. Inadvertent\
      \ disclosure triggers prompt notice and a 10-business-day cure period before termination-for-cause may be pursued. Each\
      \ party\u2019s aggregate liability for breach of this clause is capped at fees paid or payable in the 12 months before\
      \ the breach, excluding willful misconduct; equitable relief for breach of confidence remains available under Singapore\
      \ law. Obligations survive for three years, or for so long as information remains confidential in fact."
    clause_type: Confidentiality

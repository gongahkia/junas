  inputs:
    clause_text: 'Intellectual Property Ownership

      (a) Each Party retains all right, title and interest in and to any intellectual property and materials owned or controlled
      by it before the Effective Date or developed independently of this Agreement (Background IPR). Nothing in this Agreement
      transfers Background IPR except as expressly stated.

      (b) All intellectual property rights in any reports, software, specifications, data, or other materials created specifically
      for and delivered to the other Party in the course of performing this Agreement (Developed IPR) shall, upon creation
      and subject to full payment of any applicable Fees, vest in the receiving Party. To give effect to this, the creating
      Party hereby assigns, by way of present assignment of future rights, all Developed IPR to the receiving Party and shall
      procure written assignments signed by its employees, contractors and agents as necessary.

      (c) To the extent any Developed IPR incorporates Background IPR of the creating Party or third-party materials, such
      Background IPR and third-party materials are not assigned; instead, the receiving Party is granted a non-exclusive,
      worldwide, perpetual, royalty-free licence (with the right to sub-license to its Affiliates and service providers) to
      use, copy, modify and exploit them as embedded in, or necessary to use, the Developed IPR and Deliverables.

      (d) Where any assignment in (b) is not effective by law, the creating Party grants the receiving Party an irrevocable
      licence of equivalent scope. Each Party will provide reasonable assistance to perfect the foregoing.'
    clause_type: Intellectual Property Ownership

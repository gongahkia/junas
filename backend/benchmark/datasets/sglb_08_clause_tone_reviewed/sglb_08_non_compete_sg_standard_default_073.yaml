  inputs:
    clause_text: "Non-Compete. For a period of 6 months following the date the Employee ceases employment for any reason (Restricted\
      \ Period), and within Singapore (Restricted Territory), the Employee shall not, without the prior written consent of\
      \ the Company, whether alone or jointly with any other person, directly or indirectly, be employed, engaged, concerned\
      \ or interested in, or provide services to, any business that competes with any part of the business carried on by the\
      \ Company in the 12 months prior to the Termination Date (Restricted Business), in any capacity: (a) similar to any\
      \ capacity in which the Employee worked for the Company during that 12-month period; or (b) in which the Employee could\
      \ reasonably be expected to use Confidential Information or material trade connections of the Company. This clause does\
      \ not prohibit the Employee from holding for investment up to 5% of the securities of a company listed on a recognised\
      \ securities exchange. Each restriction is intended to be separate and no wider than reasonably necessary to protect\
      \ the Company\u2019s legitimate interests in its Confidential Information and trade connections. If any part of this\
      \ clause is unenforceable, the parties intend it to be severed to the minimum extent required, without affecting the\
      \ remainder."
    clause_type: Non-Compete / Restraint of Trade

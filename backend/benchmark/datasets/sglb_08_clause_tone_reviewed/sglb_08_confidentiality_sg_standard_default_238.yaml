- name: sglb_08_confidentiality_sg_standard_default_238
  inputs:
    clause_text: Confidentiality. Each party receiving information (Receiving Party) shall keep confidential and not disclose
      to any third party any non-public information of the other party (Disclosing Party) disclosed in connection with this
      Agreement that is marked or reasonably understood to be confidential (Confidential Information). The Receiving Party
      shall use Confidential Information only to perform this Agreement and shall protect it with no less than reasonable
      care and at least the safeguards it applies to its own similar information. The Receiving Party may disclose Confidential
      Information to its Affiliates, employees, contractors and professional advisers on a need-to-know basis, provided they
      are bound by confidentiality obligations no less protective. The foregoing does not apply to information that the Receiving
      Party can demonstrate is public through no breach, was lawfully known before receipt, is independently developed without
      use of the Confidential Information, or is rightfully received from a third party without duty of confidence. If legally
      required to disclose, the Receiving Party may do so after giving prompt notice where lawful and cooperating to seek
      protective measures. No licence is granted. On request or termination, the Receiving Party shall return or destroy Confidential
      Information, save for backup copies and to comply with law. Obligations survive for three years from disclosure, and
      for trade secrets, for so long as they remain confidential. These obligations are in addition to duties arising under
      Singapore law, including the equitable doctrine of confidence.
    clause_type: Confidentiality
  expected_output:

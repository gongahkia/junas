  inputs:
    clause_text: "Confidentiality (Singapore). The Recipient shall keep strictly confidential all Confidential Information\
      \ disclosed by the Discloser, including the existence and terms of this Agreement, business plans, pricing, datasets,\
      \ algorithms, and any analyses, outputs, models, or aggregates derived from or reflecting such information. Benign facts\
      \ that are truly public (for example, information in open government registries or public holiday dates) are excluded,\
      \ and information independently developed without use of the Confidential Information may be excluded, but the Recipient\
      \ bears the burden of strict proof; no exclusion applies to compilations, inferences, or aggregated or anonymised metrics\
      \ derived from the Discloser\u2019s materials. The Recipient shall use Confidential Information solely for the agreed\
      \ Purpose, restrict access to need-to-know persons under written obligations at least as protective as this clause,\
      \ implement industry-leading safeguards, and notify the Discloser within 12 hours of any suspected breach. No reverse\
      \ engineering, text/data mining, or \u201Cresiduals\u201D use is permitted. On demand, the Recipient shall certify deletion/return\
      \ within two days and permit verification. Compelled disclosure requires the Discloser\u2019s prior written consent\
      \ and full control of protective measures. The Discloser may designate information as confidential at any time. Breach\
      \ will cause irreparable harm: the Discloser may seek injunctive relief, account of profits, damages and indemnity costs,\
      \ without proof of inadequacy of damages, and without prejudice to rights under Singapore law, including the equitable\
      \ doctrine of breach of confidence. Obligations survive indefinitely until lawful public domain through no fault of\
      \ the Recipient."
    clause_type: Confidentiality

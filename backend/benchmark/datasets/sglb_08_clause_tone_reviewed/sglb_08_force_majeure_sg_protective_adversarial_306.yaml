    clause_text: "Force Majeure. No failure or delay shall be excused except to the extent directly, solely and demonstrably\
      \ caused by a Force Majeure Event expressly listed herein and not otherwise. A \u201CForce Majeure Event\u201D means:\
      \ (a) earthquake, fire, flood or typhoon occurring in the place of performance; (b) declared war or acts of terrorism\
      \ causing closure of the specific facility; (c) a binding order of a Singapore governmental authority rendering performance\
      \ unlawful; and (d) an epidemic formally declared by MOH where performance is illegal (and only while such illegality\
      \ subsists). For the avoidance of doubt, the following are excluded: shortage of labour or materials, price increases,\
      \ exchange\u2011rate movements, cyber incidents (save for a nationwide infrastructure outage formally acknowledged by\
      \ IMDA), strikes other than a nationwide general strike, and failures of subcontractors. The affected party must give\
      \ written notice within 2 Business Days (with particulars, contemporaneous evidence and an estimated duration) and provide\
      \ updates every 48 hours; failure to comply voids relief ab initio. The affected party shall implement disaster\u2011\
      recovery, alternate sourcing, expedited logistics and work\u2011around measures at its own cost. Payment, confidentiality,\
      \ data\u2011security and IP obligations are never excused. Beneficiary may procure alternatives, suspend affected obligations,\
      \ or terminate on 10 consecutive or 20 aggregate days\u2019 impact, without liability, exclusivity constraint, or waiver.\
      \ Relief is limited to the period actually prevented and is the sole and exclusive remedy, without prejudice to Beneficiary\u2019\
      s audit and step\u2011in rights."

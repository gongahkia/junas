  inputs:
    clause_text: 'Confidentiality. Each party (Recipient) shall keep confidential all non-public information of the other
      party (Discloser) disclosed in connection with this Agreement, whether oral, written or in any form, that is marked
      or reasonably understood to be confidential (Confidential Information). The Recipient shall: (a) use Confidential Information
      solely to perform this Agreement; (b) not disclose it to any person except its employees, officers, Affiliates and professional
      advisers who have a need to know and are bound by confidentiality obligations no less stringent than those herein; and
      (c) protect it with at least the same care it uses for its own similar information, and no less than a reasonable standard
      of care. The foregoing does not apply to information that the Recipient can demonstrate: (i) is or becomes public through
      no breach; (ii) was lawfully known to the Recipient without duty of confidence; (iii) is independently developed without
      reference to the Confidential Information; or (iv) is rightfully received from a third party without restriction. If
      legally required to disclose, the Recipient shall give prompt notice (where lawful) and reasonably cooperate to seek
      protective measures. Upon request or termination, the Recipient shall return or destroy Confidential Information, save
      for archival copies required by law or bona fide backup systems. Obligations endure during the Term and for three years
      thereafter, and for as long as information remains a trade secret. No licence is granted. Without prejudice to other
      rights and remedies (including the equitable doctrine of breach of confidence), injunctive relief may be sought.'
    clause_type: Confidentiality

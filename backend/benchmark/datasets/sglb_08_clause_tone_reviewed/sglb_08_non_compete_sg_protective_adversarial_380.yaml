  inputs:
    clause_text: "Non\u2011Compete (Protective).    For the avoidance of doubt and subject always to Singapore law on restraint\
      \ of trade, the Employee shall not, during the Restraint Period, within the Restricted Area, engage (whether as employee,\
      \ consultant, partner and/or owner) in the Restricted Business in any role materially similar to, or leveraging confidential\
      \ know\u2011how from, the role the Employee performed for the Company in the 12 months immediately prior to termination.\
      \ \u201CRestricted Business\u201D means only those product/service lines of the Company in which the Employee had Material\
      \ Involvement and which are identified in Schedule 1 and/or overlap with any Specified Competitor listed in Schedule\
      \ 2. \u201CRestricted Area\u201D means the Republic of Singapore, limited to any location within 10km of any site to\
      \ which the Employee was regularly assigned in the last 12 months. The Restraint Period is 6 months; provided that (i)\
      \ if the Company does not elect in writing within 7 days of termination to pay a monthly restraint stipend equal to\
      \ 30% of base salary, the Restraint Period shall be deemed 4 months; and (ii) if termination is without cause, the Restraint\
      \ Period shall not exceed 3 months. This clause does not restrict passive investments <5% or employment in a non\u2011\
      competing function (e.g., internal finance/HR/IT), provided the Employee gives at least 10 Business Days\u2019 written\
      \ notice of the proposed role; the Company may reasonably object (with reasons) within that period, failing which consent\
      \ is deemed. Without prejudice to severance, any invalid scope, area and/or period shall be read down to the minimum\
      \ extent necessary (including step\u2011downs to 5km and/or 2 months)."
    clause_type: Non-Compete / Restraint of Trade

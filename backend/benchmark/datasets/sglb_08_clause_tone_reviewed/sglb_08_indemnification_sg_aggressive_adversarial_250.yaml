      \ contingent or prospective, however caused and whether in contract, tort (including negligence), statute or otherwise.\
      \ Amounts are due on demand as a continuing, separate obligation, without set\u2011off, deduction or counterclaim; no\
      \ duty to mitigate; recovery shall not be contingent on proof of actual loss. The Company may, at its sole and unfettered\
      \ discretion, assume exclusive conduct of any claim; if the Supplier is permitted to defend, it shall do so only with\
      \ counsel and strategy approved in writing by the Company, shall advance costs as incurred, and shall not settle or\
      \ admit liability without the Company\u2019s express written consent. The Company may settle in its discretion. This\
      \ indemnity survives termination or expiry indefinitely and is in addition to, and not in substitution for, any other\
      \ rights, except to the extent Losses are finally determined by a Singapore court to arise solely from an Indemnified\

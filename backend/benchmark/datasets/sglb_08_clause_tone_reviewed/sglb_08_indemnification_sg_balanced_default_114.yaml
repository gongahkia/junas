  inputs:
    clause_text: "Indemnification. To the extent permitted by law, each Party (Indemnifying Party) shall indemnify, defend\
      \ and hold harmless the other Party and its Affiliates and Personnel (Indemnified Parties) from third\u2011party claims,\
      \ demands, losses, damages, penalties and reasonable legal fees arising from: (a) the Indemnifying Party\u2019s breach\
      \ of this Agreement or applicable law (including confidentiality and data protection obligations); (b) the Indemnifying\
      \ Party\u2019s negligence or wilful misconduct; or (c) allegations that the Indemnifying Party\u2019s materials or deliverables\
      \ infringe intellectual property rights, except to the extent such claim arises from the Indemnified Parties\u2019 instructions,\
      \ combinations not contemplated by the Agreement, or unauthorised or modified use. The Indemnified Party shall give\
      \ prompt written notice (within 10 days where practicable); failure to notify relieves the Indemnifying Party only to\
      \ the extent prejudiced. The Indemnifying Party shall control the defence and settlement, provided no settlement imposes\
      \ liability, admission of fault, or non\u2011monetary obligations on the Indemnified Party without prior written consent\
      \ (not to be unreasonably withheld); the Indemnified Party may participate at its own cost. For breach\u2011based claims\
      \ that are curable, a 30\u2011day cure period applies after notice, without delaying the defence of any third\u2011\
      party claim. Indemnity is reduced proportionately to the extent caused by the Indemnified Parties and subject to a duty\
      \ to mitigate. The Indemnifying Party\u2019s aggregate liability under this clause is capped at the greater of fees\
      \ paid or payable in the 12 months preceding the claim and SGD 250,000, excluding fraud, wilful misconduct, and liability\
      \ that cannot be limited by law. This clause survives termination or expiry for six years."
    clause_type: Indemnification

    clause_text: "Each Party (Indemnifying Party) shall indemnify and hold harmless the other Party and its Affiliates (Indemnified\
      \ Party) from third\u2011party claims, losses, and reasonable, actually incurred defence costs arising from (a) infringement\
      \ of intellectual property rights by materials the Indemnifying Party provides; (b) death, personal injury, or tangible\
      \ property damage caused by the Indemnifying Party\u2019s negligence or wilful misconduct; or (c) breach of confidentiality\
      \ or data protection obligations by the Indemnifying Party, including claims alleging transmission of a computer virus,\
      \ worm, or similar code not introduced by the Indemnified Party. The indemnity excludes amounts to the extent caused\
      \ by combinations not supplied by the Indemnifying Party, use contrary to Documentation or law, failure to implement\
      \ updates provided to avoid a security vulnerability or malware, or modifications not made by the Indemnifying Party.\
      \ The Indemnified Party shall give prompt written notice (delay only relieving to the extent prejudicial); the Indemnifying\
      \ Party controls the defence with counsel reasonably acceptable to the Indemnified Party; no settlement may admit fault\
      \ or impose non\u2011monetary obligations without prior written consent. Aggregate liability under this clause is capped\
      \ at the greater of S$600,000 or 120% of Fees paid/payable in the 12 months before the claim; IP indemnity is capped\
      \ at 200% of such Fees; nothing limits liability for fraud or death/personal injury caused by negligence to the extent\
      \ prohibited by Singapore law. For IP claims, the Indemnifying Party may procure rights, modify, or replace; if not\
      \ feasible within 30 days, it may suspend/terminate the affected item with a pro\u2011rata refund. Parties shall cooperate\
      \ and mitigate; this clause survives termination for 24 months."

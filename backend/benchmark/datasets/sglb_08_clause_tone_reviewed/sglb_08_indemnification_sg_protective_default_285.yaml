  inputs:
    clause_text: "Indemnity and Defence. The Indemnifying Party shall indemnify, defend and hold harmless the Indemnified\
      \ Party, its Affiliates, and their officers, employees and agents from and against all losses, liabilities, claims,\
      \ demands, damages, fines, penalties, interest, and costs and expenses (including legal fees on a full indemnity basis)\
      \ arising from any third\u2011party claim to the extent caused by the Indemnifying Party\u2019s breach of this Agreement,\
      \ negligence, wilful misconduct or contravention of law. The Indemnified Party shall give prompt written notice of any\
      \ claim with reasonable particulars; any failure to notify shall not relieve the Indemnifying Party except to the extent\
      \ prejudiced thereby. The Indemnifying Party shall promptly assume and control the defence with counsel acceptable to\
      \ the Indemnified Party, advance defence costs as incurred, and keep the Indemnified Party reasonably informed; the\
      \ Indemnified Party may participate at its own cost, and if a conflict of interest arises, the Indemnifying Party shall\
      \ fund separate counsel. No settlement may be made without the Indemnified Party\u2019s prior written consent if it\
      \ imposes any obligation, admission of liability, or non\u2011monetary relief upon the Indemnified Party. This indemnity\
      \ is primary and non\u2011contributory with any insurance maintained by the Indemnified Party, shall be paid without\
      \ set\u2011off or counterclaim, and survives termination for six years. This clause does not apply to the extent a claim\
      \ is finally determined to result from the Indemnified Party\u2019s breach, gross negligence or wilful misconduct."
    clause_type: Indemnification

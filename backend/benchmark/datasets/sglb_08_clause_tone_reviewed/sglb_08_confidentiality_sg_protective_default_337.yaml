  inputs:
    clause_text: 'Confidential Information means all non-public information disclosed by one party (Discloser) to the other
      (Recipient), whether oral, written, electronic or otherwise, that is identified as confidential or would reasonably
      be regarded as confidential. The Recipient shall: (a) use the Confidential Information solely for the agreed purpose;
      (b) restrict access to its personnel and advisers with a strict need-to-know who are bound by obligations no less protective
      than this clause; (c) safeguard it with at least reasonable care; and (d) promptly notify the Discloser in writing of
      any suspected or actual unauthorised use, loss or disclosure and cooperate to mitigate harm. The Recipient may disclose
      to the extent required by law or a competent authority, provided it (to the extent lawful) gives prior written notice
      and discloses only the minimum necessary while seeking protective treatment. Exceptions apply to information the Recipient
      can demonstrate was public through no fault of the Recipient, already known, independently developed, or lawfully received
      from a third party. On request, the Recipient shall return or securely destroy Confidential Information, save for archival
      copies retained for compliance that remain protected. No licence is granted. The Discloser may seek injunctive relief
      without proof of damage, in addition to remedies at law or in equity (including breach of confidence under Singapore
      law). Obligations survive for five years, and indefinitely for trade secrets.'
    clause_type: Confidentiality
  expected_output:

    clause_text: "Non-Compete (Protective). The Employee shall not, for six (6) months after Termination, within a 5-kilometre\
      \ radius of any office or site at which the Employee principally worked in the 12 months prior to Termination, engage\
      \ in or be employed in a Restricted Capacity by any Competing Business that materially overlaps with the Business of\
      \ the Company as carried on during that period. \u201CRestricted Capacity\u201D means performing substantially similar\
      \ duties to those performed for the Company in the 12 months prior to Termination. This clause does not prohibit: (i)\
      \ passive investments of up to 5% in a listed entity; (ii) roles that do not involve competing products or services;\
      \ or (iii) employment outside the Restricted Area. If the Company terminates without Cause, the restraint period is\
      \ reduced to three (3) months. Any Garden Leave shall count toward the restraint. The Employee must promptly disclose\
      \ prospective employment details reasonably required to assess compliance, and consents to the Company informing such\
      \ prospective employer of these obligations. Each restriction is separate and severable. If any part is held unenforceable,\
      \ it shall be severed, and, as a fallback, the Employee shall not, for the same period and area, solicit or deal with\
      \ clients with whom the Employee had material contact in the 12 months prior to Termination."
    clause_type: Non-Compete / Restraint of Trade

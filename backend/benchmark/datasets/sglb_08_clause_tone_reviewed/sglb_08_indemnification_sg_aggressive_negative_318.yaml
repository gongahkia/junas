      \ sanctions, export control or anti-bribery compliance; and (e) personal injury or property damage, including allegations\
      \ later withdrawn or found to be unfounded. The Indemnifying Party shall assume sole control of the defence, subject\
      \ to the Indemnified Party\u2019s right, at its discretion, to participate with separate counsel at the Indemnifying\
      \ Party\u2019s cost and to veto any settlement, admission, injunction or remedy. On written demand, the Indemnifying\
      \ Party shall promptly (within 7 days) advance defence costs and provide security. Failure to notify does not bar recovery\
      \ except to the extent of actual prejudice. This indemnity applies notwithstanding concurrent negligence of any Indemnified\
      \ Party (but not its fraud or wilful misconduct), is uncapped, without duty to mitigate, in addition to other remedies,\
      \ and survives termination indefinitely. The Indemnified Party may set off any indemnity amounts against sums otherwise\

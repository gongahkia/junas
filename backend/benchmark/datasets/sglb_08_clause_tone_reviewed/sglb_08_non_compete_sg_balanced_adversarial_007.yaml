    clause_text: "Non\u2011Compete / Reasonable Restraint. For 6 months after the Termination Date (or 3 months if the Employer\
      \ terminates without cause, unless the Support Payment below is maintained for the longer period), and within the Republic\
      \ of Sing apore, the Employee shall not, in a substantially similar role or with responsibility for the same or materially\
      \ similar product lines, directly or indirectly engage with any Restricted Business that competes for Customers or markets\
      \ with which the Employee was materially concerned in the 12 months preceding termination. \u201CRestricted Business\u201D\
      \ means any business unit/division offering goods or services substitutable for the Employer\u2019s relevant products\
      \ then marketed. Carve\u2011outs: passive investments \u22645%; purely administrative/back\u2011office roles; general\
      \ (non\u2011targeted) advertising; compliance or audit functions; and bona fide academic/teaching, provided no Confidential\
      \ Information is used. A pre\u2011clearance process shall apply: the Employee may submit proposed role particulars;\
      \ the Employer must respond within 7 business days, failing which consent is deemed (consent not to be unreasonably\
      \ withheld/conditioned). Inadvertent contact or public postings may be cured within 10 days of written notice, without\
      \ breach if promptly ceased and no material harm occurs. As consideration, the Employer will pay a monthly re straint\
      \ support payment equal to 30% of base salary during the restraint, net of garden leave/severance, conditional on compliance.\
      \ Without prejudice to injunctive relief, any contractual damages are capped at 3 months\u2019 base salary. Nothing\
      \ herein restricts use of general skill and knowledge; provisions shall be read down to the minimum reasonably necessary."

    clause_text: "Force\u2011Majeure. For purposes hereof, a \u201CForce\u2011Majeure   Event\u201D means any event beyond\
      \ the Protected Party\u2019s reasonable control, specifically including: act of God; flood, storm, haze, epidemic or\
      \ pandemic (including quarantine and consular or port closures); act or order of any government, regulator or court;\
      \ war, embargo, terrorism, civil commotion; strike or labour shortage not solely caused by the Protected Party; breakdown\
      \ or unavailability of transport, utilities or data\u2011centres; cyber\u2011attack; supply\u2011chain disruption (including\
      \ failure of upstream vendors or carriers); sanctions, change in law or policy; and any episodic or cascading event\
      \ arising therefrom, whether or not foreseeable. If a Force\u2011Majeure Event affects the Protected Party, its affected\
      \ obligations shall be suspended, deadlines extended, and it may re\u2011prioritise, ration or cancel performance, and/or\
      \ terminate affected obligations on 10 days\u2019 notice, in each case without liability; all fees, minimums and committed\
      \ charges remain payable to the extent incurred or allocated. The Other Party shall not claim force majeure absent the\
      \ Protected Party\u2019s prior written consent (which may be withheld in its absolute discretion); for the Other Party,\
      \ increases in cost, cash\u2011flow constraints, personnel unavailability, equipment failure, or vendor default shall\
      \ not constitute force majeure unless expressly agreed in writing (see 8.3(b)(ii), if any). Notice must be given within\
      \ 24 hours with reasonable particulars and contemporaneous evidence, failing which relief is forfeited unless the Protected\
      \ Party elects otherwise. Each Party shall mitigate, provided that the Other Party must procure alternatives at its\
      \ own cost; the Protected Party\u2019s good\u2011faith determination of impact is conclusive, absent manifest error."

  inputs:
    clause_text: "Confidentiality. Each party (Receiving Party) must keep confidential all non-public, proprietary or sensitive\
      \ information disclosed by the other (Disclosing Party) in connection with this Agreement, use it only to perform this\
      \ Agreement, and disclose it only to its Affiliates, employees, professional advisers and subcontractors who have a\
      \ need to know and are bound by obligations no less strict. The Receiving Party will apply safeguards no less protective\
      \ than those it applies to its own similar information. This clause does not apply to information that is or becomes\
      \ public through no breach, was lawfully known to the Receiving Party without restriction, is independently developed\
      \ without use of the Disclosing Party\u2019s information, or is received lawfully from a third party without breach.\
      \ If legally compelled to disclose, the Receiving Party will give prompt notice and cooperate to limit disclosure. On\
      \ request or termination, the Receiving Party will return or destroy Confidential Information, save for one archival\
      \ copy and as required by law. For inadvertent breaches not involving wilful default or systemic control failure, the\
      \ Receiving Party has 10 Business Days to cure and mitigate, without limiting urgent injunctive relief. Without prejudice\
      \ to rights at law or equity (including the Singapore doctrine of breach of confidence), each party may seek injunctive\
      \ relief. Each party\u2019s aggregate liability for breach of this clause is capped at 150% of fees paid or payable\
      \ under this Agreement in the 12 months preceding the event, except for fraud or wilful misconduct. Obligations survive\
      \ for three years, and for trade secrets, for so long as they remain confidential."
    clause_type: Confidentiality

  inputs:
    clause_text: "Subject to this Clause, the party receiving (Recipient) agrees to keep in confidence information disclosed\
      \ by the other (Discloser) that is: (i) marked \u201CConfidential\u201D at disclosure; or (ii) if oral, identified as\
      \ confidential and confirmed in writing within fifteen (15) days (failing which, save for manifest error, such information\
      \ shall not be treated as Con-fi-dential unless and to the extent later so-confirmed, prospectively only). Recipient\
      \ shall use such information solely for the parties\u2019 agreed purpose, exercising no less than reasonable care. The\
      \ foregoing does not apply to information that is or becomes public (other than through Recipient\u2019s breach), is\
      \ independently developed without use of Discloser\u2019s data, is lawfully obtained from a third party, or must be\
      \ disclosed by law/regulator/court; provided Recipient gives prompt written notice where practicable and discloses only\
      \ the minimum legally required, co\u2011operating at Discloser\u2019s cost. Residuals in unaided memory may be used,\
      \ without copying. Return/destruction shall occur upon written request, except archival/back\u2011up copies retained\
      \ for compliance, insurance, or audit (which remain subject hereto). No fiduciary duty is created; no warranty is given\
      \ as to accuracy. As between the parties, this Clause supplements Singapore\u2019s equitable doctrine of breach of confidence,\
      \ but the agreed standards/exceptions herein govern. To the maximum extent permitted, Recipient\u2019s liability is\
      \ limited to proven direct loss, excluding special/indirect damages; equitable relief, if any, shall be proportionate\
      \ and subject to balance\u2011of\u2011convenience."
    clause_type: Confidentiality

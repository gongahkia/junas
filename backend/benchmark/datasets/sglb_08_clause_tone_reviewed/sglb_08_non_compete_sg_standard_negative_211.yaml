    clause_text: "For the 6 months following termination of employment (Restricted Period), within the Republic of Singapore\
      \ (Restricted Territory), the Employee shall not, without the Company\u2019s prior written consent, directly or indirectly\
      \ engage, be employed, or otherwise be concerned in any business which competes with the Restricted Business in a role\
      \ similar to, or materially overlapping with, the functions performed by the Employee in the 12 months preceding termination.\
      \ Restricted Business means the business carried on by the Company during that period, including, by way of illustration\
      \ only, the Company\u2019s OrchidNet platform and Echelon Pacific service lines. This clause does not restrict passive\
      \ investment of up to 5% of the shares of any company listed on a recognised stock exchange, or bona fide academic,\
      \ charitable or pro bono activities that do not compete. The Restricted Period shall be reduced by any time the Employee\
      \ spends on garden leave. The Employee shall promptly inform any prospective employer of this clause and, upon reasonable\
      \ request, provide the Company with the prospective employer\u2019s contact for compliance purposes. Each restriction\
      \ is separate and severable; if any part is invalid, the remainder applies. The parties agree these restraints are no\
      \ wider than reasonably necessary to protect the Company\u2019s legitimate interests."

  inputs:
    clause_text: "Each party undertakes to keep confidential all Confidential Information received from the other. \u201C\
      Confidential Information\u201D means information of a technical, commercial or financial nature disclosed in any form,\
      \ including specifications, source code, pricing, customer or supplier details, security information (e.g., passwords,\
      \ encryption keys and access tokens), business plans, and Personal Data, but excludes information that: (a) is or becomes\
      \ public other than through breach of this clause (for clarity, information in press releases, public registers, stock\
      \ exchange announcements, weather forecasts, public tender notices or cafeteria menus is not confidential); (b) was\
      \ lawfully known to the recipient without restriction before disclosure; (c) is independently developed without use\
      \ of the disclosing party\u2019s information; or (d) is lawfully received from a third party without restriction. The\
      \ recipient shall use at least reasonable care, use Confidential Information only for the purposes of this Contract,\
      \ and disclose it only to its personnel and contractors with a need to know and obligations no less stringent. If legally\
      \ required to disclose, the recipient shall give prompt notice (where lawful), cooperate to limit disclosure, and seek\
      \ protective treatment. On request or termination, Confidential Information must be returned or destroyed, save for\
      \ archival copies retained for compliance. Obligations continue for three years, or as long as permitted by law for\
      \ trade secrets and Personal Data. Remedies include injunctive relief and any relief at law or in equity, including\
      \ for breach of confidence."
    clause_type: Confidentiality

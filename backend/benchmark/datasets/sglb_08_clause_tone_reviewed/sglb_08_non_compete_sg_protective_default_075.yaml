  inputs:
    clause_text: "Non-Compete (Singapore). To protect the Company\u2019s legitimate interests in Confidential Information\
      \ and customer connections, the Employee agrees that, for 6 months after termination of employment, and only within\
      \ Singapore, the Employee will not, in a Similar Capacity, be employed by, engaged in, or otherwise materially interested\
      \ in any business that competes with the Restricted Business. \u201CRestricted Business\u201D means the business conducted\
      \ by the Company in the 12 months before termination in which the Employee had material involvement. \u201CSimilar Capacity\u201D\
      \ means a role substantially similar to the Employee\u2019s last role with the Company and likely to involve the use\
      \ or disclosure of the Company\u2019s Confidential Information or exploitation of the Company\u2019s customer connections.\
      \ This clause does not prevent the Employee from: (a) holding up to 5% of the securities of a listed entity; (b) working\
      \ for a competitor in a role outside a Similar Capacity; or (c) engaging in academic, charitable, or regulatory activities.\
      \ Any paid garden leave served will be set off day-for-day against this period. The Employee shall give the Company\
      \ reasonable details of any proposed new role and provide a copy of this clause to any prospective employer. The Company\
      \ may consent in writing to any engagement (consent not to be unreasonably withheld). If any part is unenforceable,\
      \ it is severed to the minimum extent permitted."
    clause_type: Non-Compete / Restraint of Trade

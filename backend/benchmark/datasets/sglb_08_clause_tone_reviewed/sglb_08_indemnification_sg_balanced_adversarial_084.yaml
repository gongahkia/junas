  inputs:
    clause_text: "Each Party (as indemnifying party, the Indemnifying Party) shall indemnify,   defend and hold harmless the\
      \ other Party and its Affiliates (the Indemnified Party) from third\u2011party claims, demands, fines or proceedings\
      \ (Claims) and related reasonable costs to the extent arising from: (a) bodily injury, death, or tangible property damage\
      \ caused by the Indemnifying Party\u2019s negligence or wilful default; (b) infringement of intellectual property by\
      \ materials furnished by the Indemnifying Party (excluding combinations or modifications not supplied or directed by\
      \ it); or (c) breach of confidentiality or data\u2011protection obligations by the Indemnifying Party. The foregoing\
      \ is reduced proportionately where any Loss is caused by the Indemnified Party\u2019s act, omission, instructions, or\
      \ materials.\n\nThe Indemnified Party shall give prompt written notice (within 14 days, save that delay reduces recovery\
      \ only to the extent of actual prejudice) and shall permit the Indemnifying Party to assume sole control of defence\
      \ and settlement, with the Indemnified Party\u2019s participation at its own cost; any settlement shall include a full\
      \ release and no admission of liability, and non\u2011monetary obligations require prior consent (not unreasonably withheld).\
      \ If the Indemnifying Party fails to defend within a commercially reasonable period (e.g., 30 days), the Indemnified\
      \ Party may assume conduct at the Indemnifying Party\u2019s cost.\n\nWhere curable, the Indemnifying Party shall have\
      \ 30 days to remedy the breach (defence obligations continuing). Aggregate liability under this clause is capped at\
      \ 100% of fees paid or payable in the 12 months preceding notice of the Claim, per Party, excluding IP infringement,\
      \ wilful misconduct, and death/personal injury (uncapped to the extent permitted by Singapore law). No indirect or consequential\
      \ damages are recoverable, save for amounts payable to third parties under a covered Claim. Each Party shall mitigate.\
      \ This clause survives termination for 24 months, except that IP and confidentiality Claims survive for the applicable\
      \ statutory limitation period."

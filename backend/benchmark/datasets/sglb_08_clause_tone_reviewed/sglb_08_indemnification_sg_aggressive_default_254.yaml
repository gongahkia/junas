    clause_text: "Indemnification. The Indemnifying Party shall on demand indemnify, defend and keep indemnified the other\
      \ party and its Affiliates, and their respective directors, officers, employees and agents (together, the Indemnified\
      \ Parties), from and against all losses, liabilities, damages, fines, penalties, claims and costs (including legal fees\
      \ on a full indemnity basis), whether direct, indirect, consequential or loss of profits, arising out of or in connection\
      \ with: (a) any breach of this Agreement; (b) any negligence or wilful misconduct of the Indemnifying Party; (c) any\
      \ third-party claim, including intellectual property infringement; or (d) personal injury, death or property damage.\n\
      \nUpon notice of a claim, the Indemnified Parties may, at their election, assume control of the defence and settlement\
      \ at the Indemnifying Party\u2019s cost; otherwise the Indemnifying Party shall promptly assume control, subject to\
      \ the Indemnified Parties\u2019 right to approve counsel and any settlement. No settlement affecting an Indemnified\
      \ Party may be entered without its prior written consent. The Indemnifying Party shall advance defence costs on demand.\
      \ Amounts payable are due within seven days of demand, with interest at 8% per annum, without set-off or deduction.\
      \ Delay in notice does not relieve liability except to the extent of proven prejudice. The Indemnified Parties have\
      \ no duty to mitigate. This indemnity is primary, uncapped, and survives termination or expiry indefinitely."

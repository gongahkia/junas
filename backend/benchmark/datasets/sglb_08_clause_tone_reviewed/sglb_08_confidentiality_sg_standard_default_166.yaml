  inputs:
    clause_text: 'Confidentiality. Each party (Receiving Party) shall keep confidential all information of the other party
      (Disclosing Party) that is marked or identified as confidential, or which ought reasonably to be treated as confidential
      given its nature and the circumstances of disclosure, including business plans, financial data, pricing, customer and
      supplier information, technology, specifications and trade secrets (Confidential Information). The Receiving Party shall:
      (a) use Confidential Information only to perform its obligations or exercise its rights under this Agreement; (b) disclose
      it only to its Affiliates and professional advisers, and to its and their officers, employees and contractors who have
      a need to know and are bound by confidentiality obligations no less protective than this clause; and (c) implement reasonable
      safeguards to protect it. The above does not apply to information that the Receiving Party can demonstrate is or becomes
      public through no breach, was already known, is independently developed, or is rightfully received from a third party
      without duty of confidence. If required by law, regulation or order of a court or regulator, the Receiving Party may
      disclose Confidential Information, provided it gives prompt notice and cooperates to seek protective measures. On request
      or termination, the Receiving Party will return or delete Confidential Information, save for archival copies retained
      for compliance purposes. Obligations survive for three years, or for trade secrets, for so long as they remain confidential.
      This clause is in addition to any duty of confidence arising at law or in equity.'
    clause_type: Confidentiality

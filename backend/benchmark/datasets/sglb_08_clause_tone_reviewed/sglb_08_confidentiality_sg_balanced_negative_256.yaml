  inputs:
    clause_text: "Confidentiality. Each Party (Recipient) shall: (a) use the other Party\u2019s Confidential Information only\
      \ for the agreed Purpose; (b) protect it with at least the same care it uses for its own confidential information, and\
      \ no less than reasonable care; and (c) disclose it only to personnel, Affiliates, and professional advisers who need\
      \ to know and are bound by duties no less protective than this clause. \u201CConfidential Information\u201D means non\u2011\
      public information disclosed by or on behalf of a Party, whether oral or written and whether or not marked confidential,\
      \ including business plans, technical data, and pricing; but excludes information that: (i) is or becomes public through\
      \ no fault of Recipient; (ii) was lawfully known to Recipient without duty of confidence; (iii) is independently developed;\
      \ (iv) is rightfully received from a third party without breach; or (v) consists of de\u2011identified, aggregated statistics,\
      \ general know\u2011how retained in unaided memory, or publicly available marketing materials (e.g., logos and published\
      \ product names). If legally required to disclose, Recipient will (where lawful) give prompt notice and cooperate to\
      \ seek protective treatment. Recipient will notify within 72 hours of unauthorised access and has 10 business days to\
      \ cure an inadvertent breach before further remedies attach, unless irreparable harm is imminent. Each Party\u2019s\
      \ liability under this clause is capped at fees paid or payable in the 12 months preceding the breach, except for fraud,\
      \ wilful default, or misuse of information qualifying as a trade secret under applicable law. Injunctive and equitable\
      \ relief remain available, including under the Singapore doctrine of breach of confidence. Obligations continue for\
      \ three years from disclosure, or while trade secret status subsists."
    clause_type: Confidentiality

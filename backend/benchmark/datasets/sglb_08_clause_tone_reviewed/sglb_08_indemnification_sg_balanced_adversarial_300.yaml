    clause_text: "Indemnification. Each Party (the Indemnifying Party) shall indemnify, defend and hold harmless the other\
      \ Party and its Affiliates (each, an Indemnitee) from third\u2011party claims, losses, damages, fines and reasonable\
      \ costs (including reasonable   legal fees) arising from (i) the Indemnifying Party\u2019s breach of this Agreement\
      \ or applicable   law, (ii) its negligence or wilful misconduct, or (iii) to the extent alleged, infringement of third\u2011\
      party IP by materials furnished by the Indemnifying Party; provided that no indemnity applies to the extent a Claim\
      \ arises from combinations not provided by the Indemnifying Party, modifications not authorised in writing, compliance\
      \ with the Indemnitee\u2019s   specifications, or the Indemnitee\u2019s breach, negligence or omissions. Prompt written\
      \ notice is required within ten (10) Business Days of awareness (failure relieving obligations only to the extent prejudiced).\
      \ The Indemnifying Party shall control the defence and settlement (consulting in good faith), but may not admit liability\
      \ or impose non\u2011monetary obligations without the Indemnitee\u2019s prior consent (not to be unreasonably withheld);\
      \ if not assumed within ten (10) Business Days, the Indemnitee may defend at the Indemnifying Party\u2019s expense.\
      \ For IP Claims, the Indemnifying Party may procure rights, modify/replace, or suspend the affected use; if commercially\
      \ impracticable, terminate the impacted portion with a pro\u2011rata refund. Indemnities are proportionately reduced\
      \ by comparative fault and capped, in the aggregate, at 120% of Fees paid or payable in the prior 12 months (200% for\
      \ third\u2011party IP or bodily injury), except for fraud or wilful misconduct; survival: two (2) years post\u2011termination\
      \ for Claims first noticed within that period."

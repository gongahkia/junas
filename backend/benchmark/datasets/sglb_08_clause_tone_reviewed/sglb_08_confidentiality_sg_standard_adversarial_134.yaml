  inputs:
    clause_text: "Each party receiving information (Recipient) acknowledges that, in connection with this Agreement, it may\
      \ obtain non\u2011public, proprietary or otherwise sensitive information of the other party (Discloser) (\u201CConfidential\
      \  Information\u201D). Recipient shall (a) keep Confidential Information strictly confidential, using no less than reasonable\
      \ care and at least the measures it applies to its own similar information; (b) use it solely for the purposes of performing\
      \ this Agreement; and (c) disclose it only to its and its Affiliates\u2019 employees, directors and professional advisers\
      \ who have a need to know and are bound by confidentiality obligations no less protective.\n\nConfidential Information\
      \ does not include information that is or becomes public other than through breach, was lawfully known to Recipient\
      \ without restriction, is independently developed without use of the Discloser\u2019s information, or is rightfully\
      \ obtained from a third party without breach. Recipient may disclose to the extent required by law, a court or governmental\
      \ authority (including Singapore regulators and, if applicable, SGX), provided it gives prompt written notice (or as\
      \ soon as practicable) and reasonably cooperates to seek confidential treatment.\n\nUpon request or termination, Recipient\
      \ shall return or securely destroy Confidential Information, save for archival backups or records retained to comply\
      \ with legal or regulatory obligations. Obligations survive for so long as the information remains confidential and,\
      \ in any event, for three (3) years after disclosure. Without prejudice to other rights at law or in equity (including\
      \ for breach of confidence), Discloser may seek injunctive or similar relief."
    clause_type: Confidentiality
  expected_output:
    labels: &id001

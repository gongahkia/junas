  inputs:
    clause_text: 'Neither Party shall be liable for any failure or delay in performing its obligations (other than payment
      obligations) to the extent that such failure or delay is directly caused by a Force Majeure Event and only for so long
      as the Force Majeure Event prevents performance. Force Majeure Event means an event beyond the reasonable control of
      the affected Party that could not reasonably have been foreseen or avoided, including: acts of God (such as earthquake,
      flood, lightning or storm); epidemic or pandemic and related quarantine or travel restrictions; war, armed conflict,
      terrorism, riot or civil commotion; strikes, lockouts or other industrial disputes not involving the workforce of the
      affected Party; fire, explosion, or accidental damage; and interruption or failure of utilities, transportation, or
      telecommunications not caused by the affected Party. The affected Party shall notify the other Party within 5 Business
      Days, provide reasonable particulars, and use reasonable endeavours to mitigate and resume performance. Performance
      of unaffected obligations shall continue. For the avoidance of doubt, changes in market prices, unavailability of funds,
      failure to secure financing, or changes in tax rates do not constitute Force Majeure Events. If a Force Majeure Event
      continues for more than 60 consecutive days, either Party may terminate the affected Order or this Agreement without
      liability.'
    clause_type: Force Majeure

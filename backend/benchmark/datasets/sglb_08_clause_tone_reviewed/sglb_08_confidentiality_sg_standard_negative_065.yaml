- name: sglb_08_confidentiality_sg_standard_negative_065
  inputs:
    clause_text: Confidentiality. Each party (Recipient) shall keep confidential all non-public information disclosed by the
      other (Discloser), whether oral, written, electronic or visual, including business plans, pricing, financials, algorithms,
      source code, customer or supplier lists, NRIC or other identification numbers, bank account details, patient records,
      and other trade secrets, and shall use such information only to perform this Agreement. Recipient shall protect Confidential
      Information with at least the same degree of care it uses for its own similar information, and in any event no less
      than reasonable care, and may disclose it only to its Affiliates and Representatives who need to know and are bound
      by confidentiality obligations no less protective. Confidential Information does not include information that is publicly
      available (such as public registry filings and published anonymised statistics), already known to Recipient without
      breach, independently developed, or rightfully received from a third party without duty of confidence. If required by
      law, regulation or stock exchange rules to disclose, Recipient shall give prompt notice (where lawful) and cooperate
      to seek protective treatment. Upon request or termination, Recipient shall return or destroy Confidential Information,
      except routine archival backups and records retained for compliance. Obligations survive for three years, and indefinitely
      for trade secrets, and are in addition to equitable duties of confidence under Singapore law. Injunctive relief may
      be sought for threatened or actual breach.
    clause_type: Confidentiality
  expected_output:

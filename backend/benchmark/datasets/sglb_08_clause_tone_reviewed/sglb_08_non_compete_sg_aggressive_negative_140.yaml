    clause_text: "Non-Compete; Non-Interference. The Employee acknowledges that VantaStraits Robotics Pte. Ltd. (Company)\
      \ has legitimate proprietary interests in its confidential information, trade connections, and workforce stability.\
      \ Accordingly, during employment and for 12 months following termination for any reason, the Employee shall not, in\
      \ Singapore or any jurisdiction in which the Employee had material responsibility for the Company\u2019s operations,\
      \ clients or prospects in the 12 months preceding termination: (a) engage, be employed by, advise, or have any financial\
      \ or beneficial interest in any business that supplies products or services materially similar to those the Employee\
      \ developed, managed, sold, or supported for the Company (Restricted Business); (b) directly or indirectly solicit,\
      \ entice, divert, poach, or accept the business of any client, prospect, distributor, or vendor with whom the Employee\
      \ had dealings or access to material information; or (c) solicit, hire, or induce any Company employee, consultant,\
      \ or contractor to leave or reduce services. The Company may, by written notice prior to termination, designate specific\
      \ Restricted Counterparties. The restriction period shall be tolled for any period of breach. Breach entitles the Company\
      \ to injunctive relief, liquidated damages equal to 12 months\u2019 base salary plus average annual incentive, clawback\
      \ of variable pay, and full indemnity legal costs. The Employee shall provide prospective employers with this clause\
      \ and notify the Company of such employers\u2019 identities. If any part is unenforceable, it shall be severed to the\
      \ minimum extent permitted under Singapore law."
    clause_type: Non-Compete / Restraint of Trade

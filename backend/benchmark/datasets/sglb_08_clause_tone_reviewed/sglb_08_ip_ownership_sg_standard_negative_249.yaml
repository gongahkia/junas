    clause_text: "Intellectual Property Ownership\n\n(a) Each Party retains all right, title and interest in its pre-existing\
      \ and independently developed intellectual property (Background IPR). No rights are granted by implication.\n\n(b) Subject\
      \ to payment of the applicable Fees, all intellectual property rights in works, materials, software, data and other\
      \ deliverables first created by the Supplier in the course of performing the Services (Foreground IPR) shall vest in\
      \ the Customer on creation; to the extent any such rights do not so vest by operation of law, the Supplier hereby assigns\
      \ (by way of present assignment of future rights) all such Foreground IPR to the Customer. Any assignment must be in\
      \ writing in accordance with the Copyright Act 2021 of Singapore.\n\n(c) The Supplier retains ownership of its tools,\
      \ methodologies, templates and know-how and grants the Customer a non-exclusive, royalty-free, perpetual licence to\
      \ use them to the extent incorporated in the Deliverables and necessary for their intended use. The Supplier may use\
      \ general know-how and non-confidential learnings gained in providing the Services, provided no Confidential Information\
      \ is disclosed.\n\n(d) The Supplier shall obtain moral rights waivers or consents and provide reasonable assistance\
      \ to perfect, record or evidence any transfer.\n\n(e) For clarity, no trade marks, corporate names or domain names are\
      \ transferred unless expressly agreed in writing. This clause does not transfer Personal Data (including NRIC numbers)\
      \ or confer any governmental status, and does not rely on \u201Cwork made for hire\u201D concepts."

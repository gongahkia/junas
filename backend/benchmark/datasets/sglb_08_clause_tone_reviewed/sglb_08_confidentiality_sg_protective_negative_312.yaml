  inputs:
    clause_text: 'Confidential Information means all non-public information disclosed by Discloser to Recipient, in any form,
      that is identified as confidential or that a reasonable person would treat as confidential given its nature and the
      circumstances. Recipient shall (a) use Confidential Information solely for the Permitted Purpose, (b) protect it with
      at least the same care it uses for its own confidential information (and not less than reasonable care), (c) disclose
      it only to personnel and advisers who need to know and are bound by no-less-protective obligations, and (d) promptly
      notify Discloser of any suspected or actual unauthorised access and cooperate to mitigate. Exceptions apply only to
      information that Recipient can demonstrate by contemporaneous records is: (i) already public other than through breach
      (e.g., published ferry timetables, generic directory listings, or widely circulated commodity indices); (ii) already
      known to Recipient without obligation of confidence; (iii) independently developed without reference; or (iv) rightfully
      received from a third party without breach. If compelled by law or a Competent Authority, Recipient shall give prompt
      written notice, disclose only what is legally required, and seek protective treatment. Upon request, Recipient shall
      promptly return or securely destroy Confidential Information and certify completion. Discloser may seek injunctive and
      other equitable relief without proof of special damage. Trade secrets survive indefinitely; all other obligations survive
      five years. Aggregated, de-identified metrics that cannot reasonably identify Discloser are not Confidential Information.'
    clause_type: Confidentiality
  expected_output:

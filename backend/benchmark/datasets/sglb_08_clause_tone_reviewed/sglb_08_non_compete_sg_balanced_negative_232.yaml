      \ will not in the Republic of Singapore carry on, be employed by, or materially advise any business that competes with\
      \ the specific products, services, or client segments of the Company on which the Employee had material involvement\
      \ in the 12 months before the Termination Date (Restricted Business, as identified in Schedule 2). Carve\u2011outs:\
      \ this clause does not restrict passive investments under 5%, academic teaching, industry thought leadership, open\u2011\
      source contributions, lawful union activity, whistleblowing to any authority, or employment in business units unrelated\
      \ to the Restricted Business. In consideration, the Company will pay a restraint payment equal to 50% of the Employee\u2019\
      s monthly base salary for each month of the Restricted Period, ceasing proportionally to any waiver. The Employee may\
      \ submit a prospective role description; the Company must respond within 10 business days, failing which consent is\
      \ deemed. If termination is by redundancy or without cause, or if the Employee resigns for the Company\u2019s material\
      \ breach not cured within 10 days, the Restricted Period reduces to 3 months. Before alleging breach, the alleging party\
      \ must give 7 days\u2019 written notice to cure. The restriction applies only to clients listed in a Confidential Client\
      \ List provided within 14 days of Termination; otherwise, it is limited to clients personally served by the Employee."

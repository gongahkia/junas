  inputs:
    clause_text: "Each party (Recipient) shall keep the other\u2019s Confidential Information strictly confidential, use it\
      \ solely to perform this Agreement, and protect it with at least reasonable care, disclosing only to its and its Affiliates\u2019\
      \ employees, contractors, and professional advisers who need to know and are bound by obligations no less protective.\
      \ Confidential Information excludes information that: (a) is or becomes public through no fault of Recipient; (b) was\
      \ lawfully known to Recipient without duty of confidence; (c) is independently developed without use of the disclosing\
      \ party\u2019s information; or (d) is rightfully received from a third party without breach of confidence. If compelled\
      \ by law, regulation, or a regulatory authority, Recipient may disclose after giving prompt notice and cooperating to\
      \ seek protective measures, and shall disclose only the minimum required.\n\nUpon request or termination, Recipient\
      \ shall return or destroy Confidential Information, save one archival copy for legal or regulatory purposes. Obligations\
      \ survive for five years after termination; information qualifying as a trade secret or confidential under Singapore\u2019\
      s equitable doctrine of confidence survives while it remains so.\n\nIf an inadvertent unauthorised disclosure occurs,\
      \ Recipient shall notify promptly and, within 10 business days, implement corrective steps; if timely remedied and no\
      \ material harm results, it will not constitute a material breach. Each party\u2019s liability for breach of this clause\
      \ is limited to direct losses capped at the Charges paid or payable in the 12 months before the breach, but this cap\
      \ does not apply to wilful misconduct or injunctive relief."
    clause_type: Confidentiality

  inputs:
    clause_text: "Confidentiality. Each party shall keep confidential and not disclose to any third party any non-public information\
      \ of the other party, including business plans, financial data, technical materials, source code, network diagrams,\
      \ security measures (such as encryption keys), customer or supplier information, and Personal Data (as defined under\
      \ the Personal Data Protection Act 2012) disclosed in connection with this Agreement (\u201CConfidential Information\u201D\
      ). Confidential Information excludes information that: (a) is or becomes public other than through breach of this clause;\
      \ (b) was lawfully known to the recipient without duty of confidence; (c) is independently developed without use of\
      \ the discloser\u2019s information; or (d) is lawfully obtained from a third party without duty of confidence. The recipient\
      \ shall use Confidential Information only to perform this Agreement and may disclose it to its affiliates, employees,\
      \ and professional advisers who have a need to know and are bound by confidentiality obligations no less protective.\
      \ If legally required to disclose, the recipient shall (where lawful) give prompt notice and cooperate to seek protective\
      \ treatment. Upon request or termination, the recipient shall return or securely destroy Confidential Information, subject\
      \ to legal retention requirements. Obligations survive for three years from disclosure, and for trade-secret-level information\
      \ and Personal Data, for so long as such information remains confidential or as required by law. Equitable and injunctive\
      \ relief is available for breach."
    clause_type: Confidentiality

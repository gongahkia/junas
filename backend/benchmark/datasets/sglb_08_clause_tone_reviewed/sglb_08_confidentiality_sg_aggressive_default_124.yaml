  inputs:
    clause_text: "The Recipient shall keep strictly confidential all information disclosed by or on behalf of the Disclosing\
      \ Party, whether oral, visual or in any form, including derivatives, analyses and the existence and terms of this arrangement\
      \ (Confidential Information), and shall use it solely for the purpose expressly authorised in writing by the Disclosing\
      \ Party. The Recipient shall not copy, reverse engineer, disassemble or decompile any Confidential Information and shall\
      \ restrict access to those of its personnel and professional advisers who have a strict need to know and are bound by\
      \ written obligations no less onerous; the Recipient remains fully liable for their acts and omissions. Carve\u2011\
      outs apply only where the Recipient proves by contemporaneous written records that information is public (other than\
      \ through breach), lawfully received from a third party, or independently developed without use of Confidential Information;\
      \ combinations remain protected if the combination is not publicly known. On demand, the Recipient shall immediately\
      \ cease use, and within five days return or permanently destroy all Confidential Information (including all copies and\
      \ notes) and certify compliance, and promptly expunge it from backups where technically feasible. The Disclosing Party\
      \ may audit compliance on two Business Days\u2019 notice. The Disclosing Party may seek specific performance, interim\
      \ injunctive relief and other equitable remedies (including for breach of confidence), and recover all losses and costs\
      \ on a full indemnity basis, without proof of damage. Confidentiality survives five years, and indefinitely for trade\
      \ secrets."
    clause_type: Confidentiality

      \ of law or regulation; and/or (e) personal injury, death, property damage or data/security incidents. The Indemnifying\
      \ Party shall assume sole control of the defence and settlement at its cost, provided the Indemnified Persons may participate\
      \ with counsel of their choice at the Indemnifying Party\u2019s expense, and no settlement shall be entered into without\
      \ the Indemnified Persons\u2019 prior written consent (which may be withheld in their absolute discretion). Amounts\
      \ are payable on demand, as incurred, without set\u2011off or deduction and grossed\u2011up for Taxes; the Indemnified\
      \ Persons may set off. No duty to mitigate applies, and all indirect, consequential, special and loss\u2011of\u2011\
      profit heads are included to the extent recoverable at law. This indemnity is uncapped, survives termination/expiry\
      \ indefinitely and is not subject to any limitation or exclusion elsewhere."

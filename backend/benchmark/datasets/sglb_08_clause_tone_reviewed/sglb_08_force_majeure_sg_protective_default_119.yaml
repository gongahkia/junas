  inputs:
    clause_text: "Force Majeure. Force Majeure means only the following events, occurring after the Effective Date, beyond\
      \ the reasonable control of the affected party, not caused by its act, omission or negligence, not reasonably foreseeable\
      \ at signing, and not avoidable or overcome by diligent mitigation: (a) natural disasters of exceptional severity (earthquake,\
      \ flood, volcanic eruption); (b) war, armed conflict or terrorism; (c) government-imposed embargoes or legal prohibitions\
      \ that directly prevent performance; and (d) a nationwide industrial strike not directed at the affected party or its\
      \ subcontractors. Force Majeure expressly excludes: changes in cost or availability of labor, materials or utilities;\
      \ failure of suppliers or subcontractors; epidemics or pandemics except to the limited extent of a legal prohibition\
      \ under item (c); cyber incidents preventable by industry-standard safeguards; and delays in permits or approvals that\
      \ could reasonably have been obtained in time.\n\nThe affected party must give detailed written notice within 3 days\
      \ of becoming aware, with evidence, impact, steps taken, and expected duration, and provide updates at least every 7\
      \ days. Relief applies only to the extent and for the period performance is actually prevented; all other obligations\
      \ (including confidentiality and data security) continue. No charges accrue for undelivered goods or services. If prevention\
      \ continues for 20 consecutive days, the non-affected party may procure alternatives at the affected party\u2019s reasonable\
      \ cost or terminate the affected part on notice without liability. Failure to comply with this clause precludes relief."
    clause_type: Force Majeure
  expected_output:

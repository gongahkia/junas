  inputs:
    clause_text: "Force Majeure. (a) A \u201CForce Majeure Event\u201D means only the following (without limitation): (i)\
      \ earthquake, fire or flood of extraordinary severity; (ii) war, armed conflict or formally declared terrorism; (iii)\
      \ a written law, regulation or binding order of a Singapore Governmental Authority that makes performance illegal (but\
      \ not merely more costly); (iv) an epidemic officially declared by Singapore\u2019s Ministry of Health that, by law\
      \ or order, prohibits the affected performance; or (v) a nationwide outage of electricity or public telecommunications\
      \ not caused by the claiming party. Supplier default, labour disputes of the claiming party, shortages, price changes,\
      \ cyber\u2011incidents limited to the claiming party, and failures of non\u2011approved subcontractors are excluded.\
      \ (b) The claiming party must give written notice within 3 Business Days with reasonable particulars, objective evidence\
      \ and updates every 7 days; failure to comply constitutes waiver. (c) The clause shall be narrowly and strictly construed\
      \ under Singapore law; the foregoing list is exhaustive. (d) Only directly affected obligations are suspended; payment,\
      \ confidentiality and data\u2011protection obligations continue. (e) Mitigation, contingency and substitution (including\
      \ alternative sourcing) shall be pursued at the claiming party\u2019s cost; the Beneficiary may procure substitute performance\
      \ and recover incremental costs. (f) Suspension shall not exceed the minimum necessary and shall not exceed 20 days\
      \ in any rolling 12\u2011month period. (g) If such event continues for 15 consecutive days, the Beneficiary may terminate\
      \ immediately without liability; no other termination right arises."
    clause_type: Force Majeure

  inputs:
    clause_text: 'During the 12 months following the Termination Date, the Employee must not, in Singapore or any ASEAN country
      in which the Employee had management responsibility, client dealings or strategic involvement for the Company or any
      Group Company during the 12 months before termination: (a) be employed or engaged by, provide services to, or otherwise
      be concerned with, any Restricted Business; (b) carry on or invest in any Restricted Business (save for a passive holding
      of less than 5% in a publicly listed company); or (c) solicit, canvass, or accept business from any client or supplier
      of the Company with whom the Employee had material dealings in that period. Restricted Business means any business that
      competes with any line of business of the Company or Group with which the Employee was materially involved in the 12
      months before termination. Any breach suspends and extends the Restricted Period by the duration of breach. The Company
      is entitled to injunctive relief and damages without proof of special loss, and the Employee shall indemnify the Company
      for enforcement costs. The Company may waive or narrow these restrictions by written notice; garden leave does not count
      towards the Restricted Period. The Employee must provide this clause to any prospective employer and authorises the
      Company to inform them of these restrictions.'

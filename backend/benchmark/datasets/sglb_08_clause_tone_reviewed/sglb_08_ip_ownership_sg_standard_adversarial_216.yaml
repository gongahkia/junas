    clause_text: "Intellectual Property Ownership. As between the Parties, each retains all rights, title and interest in\
      \ its pre\u2011existing materials, tools, data and know\u2011how (Back\u2011ground IPR). Where any Back\u2011ground\
      \ IPR is incorporated into a deliverable, the providing Party grants to the other a non\u2011exclusive, royalty\u2011\
      free licence to use that Back\u2011ground IPR solely to receive, use, maintain and support the Deliverables for their\
      \ intended purpose.\n\nProject IPR. Subject to any contrary notation in an applicable Work Order (which may state that\
      \ specified Deliverables are licensed, not assigned), all intel lectual property rights in deliverables, reports, software,\
      \ specifications and other works created by Supplier Personnel specifically for Client in the  course  of this engagement\
      \ shall vest in Client. To the extent vesting does not occur by operation of law (including, as relevant, the Copyright\
      \ Act 2021 (Singapore)), Supplier hereby  assigns (and shall procure that its Personnel assign) to Client, with full\
      \ title\u2011and\u2011interest, such rights upon creation and, if a further act is required, upon receipt of the agreed\
      \ Fees. Supplier shall provide reasonable further assurances and execute documents reasonably requested to perfect such\
      \ assignment.\n\nMoral rights. Supplier shall obtain from its Personnel an irrevocable consent, to the extent permitted\
      \ by law, to do or omit any act in relation to the Deliverables.\n\nExcept as expressly set out above, no IPR is transferred,\
      \ and each Party may use its residual know\u2011how (excluding Confidential Information) in the ordinary course."

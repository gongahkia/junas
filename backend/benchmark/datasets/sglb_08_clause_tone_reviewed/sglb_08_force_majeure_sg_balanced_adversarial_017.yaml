  inputs:
    clause_text: "Force\u2011Majeure. Neither Party shall be liable for delay or non\u2011performance to the extent caused\
      \ by events beyond reasonable control, expressly including: acts of God (fire, flood, earthquake), epidemic or pandemic\
      \ and related governmental measures, war, terrorism, civil commotion, embargo, governmental act or change of law, material\
      \ utility or telecommunications outage not caused by the affected Party, or industry\u2011wide labour disturbance; but\
      \ excluding strikes limited to that Party\u2019s own employees, or delays of that Party\u2019s subcontractors where\
      \ reasonably substitutable. The affected party shall give written notice as soon as reasonably practicable (and in any\
      \ event within 5 Business Day(s), or if not feasible, within 10 Business Days) describing the event and expected duration,\
      \ and shall use reasonable endeavours to mitigate and resume performance. Payment of undisputed amounts for goods or\
      \ services actually delivered is not excused; minimum commitments and service levels are paused pro\u2011rata. Partial\
      \ performance shall be accepted, and any timeline is extended proportionately. If a Force\u2011Majeure event continues\
      \ for 30 consecutive days, the Parties\u2019 steering representatives shall confer in good faith for 10 Business Days\
      \ to agree workarounds; failing agreement, either Party may terminate the affected Order/Statement on 10 days\u2019\
      \ notice, without fault, save for reasonable, evidenced pass\u2011through costs incurred pre\u2011notice. Relief (including\
      \ any fee relief or service credits) is limited to the affected portion and period, and in aggregate shall not exceed\
      \ Charges allocable to the impacted part for the time actually affected."
    clause_type: Force Majeure

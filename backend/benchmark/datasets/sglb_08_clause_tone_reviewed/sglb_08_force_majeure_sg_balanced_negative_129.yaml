    clause_text: "Force Majeure. Neither Party is liable for delay or failure to perform to the extent and for the duration\
      \ performance is prevented by a Force Majeure Event beyond its reasonable control and not caused by its negligence,\
      \ including: acts of God (fire, flood, earthquake, storm), epidemic or pandemic (including quarantine orders), war,\
      \ terrorism, riot, civil commotion, imposition of martial law, governmental action or change in law, sanctions/embargo,\
      \ widespread utility, power or telecom failures, internet backbone outage, or third\u2011party cyber incident (e.g.,\
      \ DDoS or zero\u2011day exploit) not attributable to inadequate security controls; and external labour unrest. This\
      \ clause does not excuse payment obligations, except where banking moratoria or payment\u2011system failures directly\
      \ prevent transfer of funds.\n\nThe affected Party must notify the other within 5 calendar days (Singapore time), give\
      \ particulars, keep records, and provide weekly updates. Both Parties will use reasonable efforts to mitigate, including\
      \ alternative sourcing and partial performance, and will meet promptly to agree a temporary plan. Relief is proportionate\
      \ to the impact and proven by the affected Party.\n\nIf a Force Majeure Event continues for 45 consecutive days, either\
      \ Party may terminate the impacted order with 10 days\u2019 notice, without termination charges, subject to payment\
      \ for services rendered. On request, a 15\u2011day cure/extension applies if mitigation is demonstrably progressing.\
      \ Lack of funds, price changes, supplier insolvency, or scheduled maintenance are not Force Majeure."
    clause_type: Force Majeure

    clause_text: "Force Majeure. To the fullest extent permitted under Singapore law, the Company shall not be liable for,\
      \ and its performance shall be excused, extended and/or adjusted, for any delay, non\u2011performance or partial performance\
      \ arising from or attributable to events beyond its reasonable control, including (without limitation and for the avoidance\
      \ of doubt) acts of God; flood, fire, storm, haze, or lightning; epidemic, pandemic, quarantine or public health advisories;\
      \ war, riot, civil commotion; strikes, lock\u2011outs or industrial action (whether of the Company\u2019s or third parties\u2019\
      \ workforce); breakdown of plant, machinery or IT systems; cyber\u2011attack; shortage, curtailment or unavailability\
      \ of power, utilities, transport, vessels, containers or raw materials; abnormal price spikes in inputs; any act or\
      \ omission of suppliers, carriers or subcontractors; port congestion; changes in law, policy, permits or enforcement;\
      \ or any act/omission of the Customer. Upon such event, the Company may (at its sole discretion) suspend, resequence,\
      \ allocate supply, re\u2011price to reflect increased costs, and/or terminate any affected order if the event persists\
      \ for > 5 consecutive days, without liability; all sums due, standby, storage and demobilisation/remobilisation charges\
      \ shall remain payable. The Customer may assert force majeure only for sudden natural disasters directly disabling its\
      \ relevant facility; financial distress, price increases, labour disputes of affiliates, or delays of its suppliers\
      \ shall not qualify. Notice must be given within 24 hours (with daily updates), failing which the claim is waived."

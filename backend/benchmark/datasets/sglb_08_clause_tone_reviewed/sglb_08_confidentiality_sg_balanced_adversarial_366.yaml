  inputs:
    clause_text: "Confidentiality (Singapore). Each Party, as Discloser and as Recipient, shall use reasonable (and where\
      \ proportionate, best) endeavours to keep confidential all information disclosed in any form that is marked confidential,\
      \ stated as confidential, or ought reasonably to be treated as confidential, and shall use it only for the agreed Purpose\
      \ and share it on a need\u2011to\u2011know basis with Affiliates and Representatives bound by obligations no less protective.\
      \ Carve\u2011outs: information that (a) is or becomes public other than through breach; (b) was lawfully known to the\
      \ Recipient without duty of confidence; (c) is independently developed; or (d) is disclosed under law, court or regulatory\
      \ order, provided prompt notice is given where lawful and reasonable steps to limit disclosure are taken. On request\
      \ or termination the Recipient shall return or irretrievably destroy materials, retaining only archival copies as required\
      \ by law or routine backup (continuing to protect them). If a breach occurs, the Recipient will notify promptly and\
      \ cure/mitigate within ten (10)\u2014fifteen (15) Business Days where curable. Indirect or consequential loss is excluded;\
      \ direct damages for inadvertent, cured breaches are capped at fees paid in the 12 months pre\u2011breach, but nothing\
      \ limits equitable relief (including interim injunctions) available under Singapore law for breach of confidence. Obligations\
      \ last the longer of three (3) years or while information remains confidential."
    clause_type: Confidentiality

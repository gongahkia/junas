  inputs:
    clause_text: "Confidential Information means non-public information disclosed in connection with the Purpose that is marked\
      \ confidential or would reasonably be regarded as confidential, excluding information that: (a) is or becomes public\
      \ through no breach; (b) was lawfully known to the recipient without duty of confidence; (c) is independently developed\
      \ without use of the discloser\u2019s information; (d) is rightfully received from a third party without restriction;\
      \ or (e) comprises benign, non-sensitive items commonly mistaken for secrets, such as published office locations and\
      \ hours, press releases, marketing brochures, publicly announced product roadmaps, calendar invites containing only\
      \ meeting titles, venue maps, hypothetical or \u201Csample\u201D pricing tables, redacted screenshots labelled \u201C\
      illustrative,\u201D or datasets expressly marked \u201Cmock\u201D with dummy entries. The recipient will use reasonable\
      \ safeguards, restrict access to need-to-know personnel under obligations no less protective, and use the information\
      \ solely for the Purpose. If legally compelled to disclose, the recipient will promptly notify, disclose only what is\
      \ required, and seek protective treatment. Residuals retained in unaided memory may be used, without disclosing source\
      \ materials. Upon request, the recipient will return or destroy materials, but may retain archival copies for compliance\
      \ and audit. Obligations last three years from disclosure, without prejudice to equitable rights under Singapore law\
      \ while confidentiality subsists."
    clause_type: Confidentiality
  expected_output:

  inputs:
    clause_text: "Confidentiality. The Recipient shall use Discloser\u2019s Confidential Information solely to perform this\
      \ Agreement and protect it with at least the same degree of care it uses for its own similar information (and no less\
      \ than reasonable care), limiting access to personnel with a need to know under written duties of confidence. Only information\
      \ conspicuously marked as \u201CConfidential\u201D or confirmed in writing within 15 days of disclosure qualifies; oral\
      \ disclosures must be summarised in writing within the same period. Confidential Information excludes information that\
      \ is or becomes public without breach; was known without restriction; is independently developed without use of the\
      \ information; or is rightfully received from a third party. For avoidance of doubt, trivial or benign facts (e.g.,\
      \ public holiday dates, generic job titles, postal codes, sample placeholders like \u201CNRIC: XXXXXXXX\u201D or \u201C\
      AcctNo: 00000000\u201D) and de-identified or aggregated data are not Confidential Information. Recipient may use Residuals\
      \ retained in unaided memory. If compelled by law, Recipient may disclose after prompt notice and will disclose only\
      \ what is legally required. No warranties are given; information is provided \u201Cas is.\u201D To the extent permitted\
      \ under Singapore law (including the equitable doctrine of confidence), obligations apply for three years from disclosure,\
      \ or, for trade secrets, so long as they remain confidential. Recipient\u2019s aggregate liability for breach of this\
      \ clause is limited to fees paid or payable under this Agreement in the 12 months preceding the claim."

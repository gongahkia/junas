    clause_text: "Force Majeure. A party is excused from delay or failure in performing an obligation to the extent caused\
      \ by a Force Majeure Event, being: acts of God (including fire, flood, earthquake), epidemic or pandemic and related\
      \ governmental measures, war, terrorism, riot or civil commotion, strikes, lockouts or other industrial disturbances\
      \ not limited to the affected party\u2019s own workforce (and not caused by its breach), failure or interruption of\
      \ power, telecommunications or internet services, nationwide or regional failure of banking or payment systems, and\
      \ changes in law or directives of a governmental authority. The affected party must notify the other within 5 Business\
      \ Days, give details and a mitigation plan, and provide weekly updates; both parties will in good faith consider temporary\
      \ workarounds and allocate available capacity pro rata. Obligations are suspended only for the duration and scope of\
      \ impact; payment obligations are not excused except where payment is directly prevented by a banking system failure\
      \ or applicable sanctions. Senior representatives will confer if the suspension exceeds 30 days; if it continues for\
      \ 60 consecutive days, either party may terminate the affected order on 10 days\u2019 notice without liability (save\
      \ for accrued amounts). Each party bears its own mitigation costs and must use reasonable endeavours to resume performance."

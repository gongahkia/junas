    clause_text: "Intellectual Property Ownership. (a) Each Party retains all right, title and interest in its Background\
      \ IP; the other Party receives a non\u2011exclusive, royalty\u2011free licence to use such Background IP solely for\
      \ the Project, revocable for material breach not cured within 15 Business Days after written notice. (b) Unless otherwise\
      \ agreed in a SoW (or as required by law), all Intellectual Property created by a Party\u2019s employees in the course\
      \ of their employment for the Project vests in that Party in line with the Singapore Copyright Act 2021; works by independent\
      \ contractors or created outside such course are owned by the author until assigned. Each Party shall use reasonable\
      \ efforts to procure written assignments (signed instruments\u2014assignment must be in writing) from its Personnel\
      \ and contractors; any gap shall be cured within 10 Business Days of notice. (c) Jointly Developed IP is jointly owned;\
      \ each Party may use it for the Project and internal R&D. External exploitation requires mutual written consent (not\
      \ to be unreasonably withheld), failing which the Parties grant each other a non\u2011exclusive, royalty\u2011free licence\
      \ to their respective contributions for Project use only. (d) Open\u2011source components may be used with prior approval\
      \ of the IP   Working  Group (emergency use permitted with prompt notice). (e) Moral rights waivers shall be obtained\
      \ to the extent permitted by law. (f) Aggregate IP\u2011related liability is capped at Fees paid in the 12 months pre\u2011\
      claim, save for wilful infringement or breach of confidentiality. (g) The Parties will maintain a shared IP Register\

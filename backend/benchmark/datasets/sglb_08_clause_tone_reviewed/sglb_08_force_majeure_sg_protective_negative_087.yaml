  inputs:
    clause_text: "Force Majeure. \u201CForce Majeure Event\u201D means only: (a) natural catastrophes (including earthquake,\
      \ flood, typhoon, or wildfire); (b) war, armed conflict, terrorism, or widespread civil disorder; (c) a binding act\
      \ of a competent governmental authority that makes performance unlawful; (d) an epidemic or pandemic solely to the extent\
      \ a binding government order mandates closure of the Affected Party\u2019s relevant facilities; or (e) a nationwide\
      \ outage of essential utilities or the domestic interbank payment system in Singapore, formally declared by a competent\
      \ authority. Relief applies only to the extent and for the duration performance is prevented. Exclusions include: changes\
      \ in market conditions, price increases, currency fluctuations, shortage of funds, supplier failure or insolvency, raw\
      \ material shortages, port congestion, traffic delays, strikes or lockouts limited to the Affected Party\u2019s workforce,\
      \ routine public health advisories, scheduled maintenance, holiday shutdowns, internet or email outages at the Affected\
      \ Party\u2019s premises, and isolated cyber incidents confined to the Affected Party\u2019s systems. The Affected Party\
      \ must notify within 3 days, with evidence and a mitigation plan; failure to do so forfeits relief. Payment obligations\
      \ are not excused, save where transfers are impossible solely due to the Event. The Affected Party must use reasonable\
      \ efforts (including alternative sourcing and expedited logistics). If the Event continues 30 consecutive days, the\
      \ Non-Affected Party may terminate without liability and obtain a refund for undelivered deliverables."
    clause_type: Force Majeure

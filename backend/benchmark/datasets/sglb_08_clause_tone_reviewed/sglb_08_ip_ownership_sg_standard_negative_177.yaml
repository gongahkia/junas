      \ Assignments shall be in writing as required by the Copyright Act 2021 (Singapore), and this clause constitutes such\
      \ written assignment. Supplier retains ownership of its tools, templates, methodologies and general know\u2011how, but\
      \ grants Customer a non-exclusive, perpetual, royalty-free licence to use, copy, modify and sublicense them to the extent\
      \ embedded in or necessary to use the deliverables. Open-source components remain subject to their licences. Supplier\
      \ shall secure moral rights consents to the extent permitted by law. Nothing in this clause transfers personal data,\
      \ payment card details, or Background IPR not embodied in the deliverables. Each party shall execute further documents\

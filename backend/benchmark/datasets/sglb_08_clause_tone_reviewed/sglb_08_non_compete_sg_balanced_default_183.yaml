  inputs:
    clause_text: "Non-Compete (Balanced). For six (6) months following the termination of employment (Restriction Period),\
      \ the Employee shall not, within Singapore and within a 10 km radius of any office or facility at which the Employee\
      \ had primary responsibilities in the preceding 12 months, engage (whether as employee, consultant, or proprietor) in\
      \ any business that competes with those product or service lines of the Company in which the Employee was materially\
      \ involved in that period (Competing Business). This non-compete applies only if the Company elects to enforce it by\
      \ written notice within five (5) business days of termination and pays a monthly restraint payment equal to sixty percent\
      \ (60%) of the Employee\u2019s last-drawn base salary for the Restriction Period; otherwise, this non-compete shall\
      \ not apply, without prejudice to any non-solicitation obligations. Carve-outs: passive investments up to 5% in a listed\
      \ entity; general advertising not directed at Company clients or staff; and use of general skills not for a Competing\
      \ Business. Pre-clearance: the Employee may seek written approval for prospective roles; the Company shall respond within\
      \ five (5) business days, failing which approval is deemed granted. Cure: before seeking injunctive relief, the Company\
      \ shall give seven (7) days\u2019 written notice to cease the alleged breach. Severance applies to the minimum extent\
      \ permitted by Singapore law."
    clause_type: Non-Compete / Restraint of Trade

  inputs:
    clause_text: "Confidentiality. Each Party shall keep confidential any and all information disclosed by the other Party,\
      \ whether in writing, orally or by inspection, that is non\u2011public,   proprietary or sensitive (Confidential   Information),\
      \ and shall: (a) use such information only for the purposes of performing this Agreement; (b) disclose it only to its\
      \ Affiliates, officers, employees and professional advisers who have a need\u2011to\u2011know and are bound by obligations\
      \ of confidentiality no less protective than this clause; and (c) exercise precautions no less protective than those\
      \ it applies to its own similar information, but in any event reasonable care. The foregoing does not apply to information\
      \ that: (i) is or becomes public other than through breach; (ii) was already lawfully known to the receiving Party;\
      \ (iii) is independently developed without use of or reference to the Confidential   Information; or (iv) is received\
      \ from a third party not in breach of any duty of confidence and/ or legal restriction. If disclosure is required by\
      \ law, regulation or a competent authority, the receiving Party may disclose to the minimum extent necessary, giving\
      \ prior notice where lawful and practicable and cooperating to seek protective measures. Upon request, Confidential\
      \   Information shall be returned or destroyed (except routine back\u2011ups), subject to ongoing confidentiality. Obligations\
      \ continue during the Term and for three (3)   years thereafter, except for trade\u2011secret\u2011like information\
      \ which remains protected so long as it is confidential. Nothing herein grants any licence. This clause is without prejudice\
      \ to rights at law or in equity (including the equitable doctrine of breach of confidence) under Singapore law."
    clause_type: Confidentiality

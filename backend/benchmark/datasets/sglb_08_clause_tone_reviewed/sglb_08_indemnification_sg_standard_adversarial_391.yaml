    clause_text: "Indemnification.  Without prejudice to any other rights or remedies, each Party (the \u201CIndemnifying\
      \ Party\u201D) shall indemnify, defend and hold harmless the other Party and its Affiliates, and their respective directors,\
      \ officers and employees (together, the \u201CIndemnified Parties\u201D), from and against any third\u2011party claim,\
      \ demand or action (including reasonable legal fees on a solicitor\u2011and\u2011client basis) arising out of: (a) bodily\
      \ injury or tangible property damage caused by the Indemnifying Party\u2019s negligence or wilful misconduct; (b) an\
      \ allegation that the Indemnifying Party\u2019s materials, data or deliverables, as supplied, infringe any Intellectual\
      \ Property Right in Singapore; or (c) the Indemnifying Party\u2019s breach of applicable law in connection with this\
      \ Agreement, in each case to the extent directly attributable to the Indemnifying Party. The Indemnified Party shall\
      \ give prompt (or, where impracticable, reasonable) written notice of any claim and reasonable  co\u2011operation. Failure\
      \ to notify shall not relieve liability except to the extent actually prejudiced. The Indemnifying Party shall have\
      \ sole conduct and control of the defence and settlement (with counsel acceptable, acting reasonably), provided no settlement\
      \ admits fault of, or imposes non\u2011monetary obligations on, the Indemnified Parties without prior written consent\
      \ (not unreasonably withheld or delayed). The Indemnified Parties may participate at their own cost. This indemnity\
      \ does not apply to the extent the claim arises from combinations not supplied by the Indemnifying Party, modifications\
      \ by others, or the Indemnified Parties\u2019 breach or negligence. Each Party shall mitigate loss where reasonably\
      \ practicable. This Clause survives expiry or termination."

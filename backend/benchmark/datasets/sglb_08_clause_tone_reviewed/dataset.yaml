      \ the Disclosing Party in any form, and any analyses, notes, or derivatives thereof) strictly secret, use it only for\
      \ the Purpose as expressly sanctioned in writing, and disclose it solely to Recipient\u2019s Representatives on a need\u2011\
      to\u2011know basis after imposing written obligations no less onerous (and pre\u2011approved by the Disclosing Party\
      \ where requested). No reverse\u2011engineering, decompiling or data mining is permitted. Exclusions apply only to information\
      \ that becomes public through no fault of the Recipient, or is independently developed without use of Confidential Information,\
      \ provided contemporaneous records satisfactory to the Disclosing Party are produced. If legally compelled, the Recipient\
      \ shall promptly notify, seek protective orders, and disclose only the minimum required. On demand (or upon any termination,\
      \ however arising), the Recipient shall immediately cease use, return or securely destroy all materials and certify\
      \ deletion by an officer; the Disclosing Party may audit (including forensic inspection of systems and third\u2011party\
      \ processors) on 2 Business Days\u2019 notice or without notice where breach is suspected. Remedies are cumulative:\
      \ injunctive and other equitable relief without proof of loss, account of profits, full indemnity for all losses (including\
      \ consequential and loss of profits), and, at the Disclosing Party\u2019s election, liquidated damages not less than\
      \ SGD 250,000 per breach. This Clause supplements and does not limit rights at law or in equity (including breach of\

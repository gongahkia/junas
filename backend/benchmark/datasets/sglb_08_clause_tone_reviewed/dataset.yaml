      \ documents to the Contract Notices Email in Schedule 3 within 3 Singapore business days, and weekly updates thereafter;\
      \ and (ii) uses all commercially reasonable efforts, including business continuity measures, alternative sourcing and\
      \ reallocation, to mitigate. Force Majeure Events are limited to: (a) earthquake, flood, or typhoon of extraordinary\
      \ severity; (b) war, terrorism, or civil commotion of general public impact; (c) binding Singapore governmental prohibition\

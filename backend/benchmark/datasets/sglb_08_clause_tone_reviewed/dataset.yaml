  inputs:
    clause_text: "Confidentiality (Singapore). The Recipient shall hold all Confidential Information (whether marked, unmarked,\
      \ oral, visual, machine\u2011readable or otherwise, and for the avoidance of doubt, including information not ordinarily\
      \ treated as confidential) in strictest confidence, use it solely for the Permitted Purpose, and disclose it only to\
      \ Personnel pre\u2011approved in writing by the Disclosing Party; the Recipient remains strictly liable for all acts/omissions\
      \ of any such Personnel, Affiliates or advisers. No reverse engineering, de\u2011compilation, data mining or derivative\
      \ use is permitted. The Recipient shall implement controls not less than those the Disclosing Party specifies (from\
      \ time to time) and shall promptly\u2014without delay\u2014notify of any suspected breach and cooperate fully in any\
      \ inquiry, including immediate system access, remote inspection and on\u2011site audit (during or outside Business Hours)\
      \ at the Recipient\u2019s cost. On demand (or expiry, whichever earlier), Recipient must return or securely destroy\
      \ all Confidential Information within 2 Business Days and provide a director\u2019s certificate. Carve\u2011outs apply\
      \ only where the Recipient proves by clear and convincing contemporaneous documentary evidence that the information:\
      \ (a) was public other than through breach; or (b) was independently developed by a strictly segregated team notified\
      \ in advance. The Disclosing Party may seek injunctive, equitable and other relief (including ex parte interim relief\
      \ and search orders) for breach of confidence under Singapore law, in addition to liquidated damages of S$500,000 per\
      \ breach or 3x any benefit obtained, plus full indemnity costs on a solicitor\u2011and\u2011client basis. This clause\

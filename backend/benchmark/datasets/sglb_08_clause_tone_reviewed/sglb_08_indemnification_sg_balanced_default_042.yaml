  inputs:
    clause_text: "Indemnification. Each Party (Indemnifying Party) shall indemnify and hold harmless the other Party, and\
      \ its directors, officers and employees (Indemnified Party), from third\u2011party claims, liabilities, damages, fines,\
      \ and reasonable legal costs arising out of: (a) the Indemnifying Party\u2019s breach of this Agreement; (b) its negligence,\
      \ fraud or wilful default; or (c) alleged infringement of intellectual property by materials it provides, except to\
      \ the extent the claim arises from the Indemnified Party\u2019s combination, modification not authorised in writing,\
      \ or instructions. The Indemnified Party shall promptly notify any claim (failure only relieving to the extent prejudiced),\
      \ and the Indemnifying Party shall control the defence and settlement, with the Indemnified Party\u2019s reasonable\
      \ cooperation and the right to participate at its own cost. No settlement may impose admissions or non\u2011monetary\
      \ obligations on the Indemnified Party without its prior written consent (not unreasonably withheld). For direct losses\
      \ arising from a curable breach, the Indemnified Party shall allow a 30\u2011day cure period before seeking indemnity.\
      \ Indemnity is reduced proportionally to the Indemnified Party\u2019s contributory fault. Excluded are indirect, consequential\
      \ or punitive damages, and loss of profit or revenue, except to the extent payable to a third party. Each Party\u2019\
      s aggregate liability under this Clause is capped at Fees paid or payable in the 12 months preceding the event, save\
      \ for liability for fraud or death/personal injury caused by negligence. This Clause survives termination for 24 months\
      \ for claims notified within that period."

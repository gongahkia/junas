  inputs:
    clause_text: "For 12 months after the Employee\u2019s Termination Date (Restricted Period), the Employee shall not, in\
      \ Singapore or any jurisdiction in which the Employee had managerial, sales, marketing or strategic responsibility for\
      \ the Company in the 12 months prior to termination (Territory), directly or indirectly: (a) engage in, be employed\
      \ by, advise, or have any interest in any business that competes with any product or service of the Company with which\
      \ the Employee was materially concerned, or which was under active development or launch, in that period (Restricted\
      \ Business); (b) solicit, canvass, or deal with any customer or prospective customer of the Company for a Restricted\
      \ Business; or (c) solicit or hire any Company employee or induce any supplier to alter terms. Offering online or remote\
      \ services accessible in the Territory is deemed activity in the Territory. The Employee acknowledges these restraints\
      \ are reasonable and necessary to protect the Company\u2019s confidential information, trade connections and workforce\
      \ stability. The Company may seek urgent injunctive relief without proof of special damage, recover damages and an account\
      \ of profits, claw back bonuses/equity awarded in the 12 months pre-termination, and the Restricted Period will be tolled\
      \ during any breach. The Company may, at its sole discretion, pay a restraint amount of S$5,000 per month; such payment\
      \ is not a condition of enforceability. Nothing prevents the Employee from using general skills, working in a non-competing\
      \ division, or holding passive investments up to 3% in a listed company. If any restriction is too broad, it shall be\
      \ modified to the minimum extent necessary to be enforceable under Singapore law."
    clause_type: Non-Compete / Restraint of Trade

  inputs:
    clause_text: "Each party, as Discloser and Recipient, will protect the other\u2019s Confidential Information using at\
      \ least the same care it uses for its own similar information, not less than reasonable care; use it only for the agreed\
      \ Purpose; and disclose it only to personnel and contractors under written duties no less protective. Confidential Information\
      \ does not include information that is (a) publicly available without breach, (b) already known to Recipient without\
      \ duty, (c) independently developed, or (d) rightfully received from a third party. For clarity and to avoid false positives,\
      \ non-sensitive corporate facts such as published office locations, generic marketing brochures, public product announcements,\
      \ aggregated statistics that do not identify a party, or job postings are not Confidential.\n\nDisclosures compelled\
      \ by law are permitted with prompt notice (where lawful) and cooperative steps to narrow disclosure. The parties will\
      \ mark or confirm in writing Confidential Information within 10 days; however, information that is clearly confidential\
      \ by nature remains protected even if not marked. Upon request, Recipient will return or destroy Confidential Information,\
      \ except for secure archival copies required by policy or law.\n\nFor inadvertent breaches, Recipient has five business\
      \ days after notice to cure before equitable relief is sought, except where immediate relief is reasonably necessary.\
      \ Liability for unintentional, non-grossly negligent breaches is limited to direct damages capped at twelve months of\
      \ fees under this Agreement; this cap does not apply to wilful misconduct. Nothing limits equitable remedies under applicable\
      \ law, including the doctrine of confidence."
    clause_type: Confidentiality

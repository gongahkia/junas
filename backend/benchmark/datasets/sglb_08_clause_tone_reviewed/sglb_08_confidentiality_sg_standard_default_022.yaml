- name: sglb_08_confidentiality_sg_standard_default_022
  inputs:
    clause_text: Each party (Recipient) shall keep confidential all non-public information of the other party (Discloser)
      disclosed in connection with this Agreement, whether oral, written or in any form, including technical, business and
      financial information. Recipient shall use the information only to perform this Agreement and may disclose it only to
      its affiliates, employees, contractors and professional advisers who need to know and are bound by confidentiality obligations
      no less protective; Recipient remains responsible for them. Recipient shall protect the information with at least reasonable
      care, no less than it uses for its own similar information. These obligations do not apply to information that is or
      becomes public through no breach, was lawfully known to Recipient, is independently developed without use of the information,
      or is received from a third party not under a duty of confidence. Recipient may disclose to the extent required by law,
      court order or a regulator, giving prompt notice and limiting disclosure to what is required. On request or termination,
      Recipient shall return or delete the information, except for archival copies kept for compliance that remain confidential.
      These obligations survive for three years, or, for trade secrets and information protected in equity under Singapore
      law, while it remains confidential. The parties acknowledge that damages may be inadequate and injunctive or other equitable
      relief may be sought.
    clause_type: Confidentiality

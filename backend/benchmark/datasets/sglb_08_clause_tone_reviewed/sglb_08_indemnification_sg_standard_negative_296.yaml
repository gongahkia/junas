    clause_text: "Indemnification. To the extent permitted by law, each Party (Indemnifying Party) shall indemnify, defend\
      \ and hold harmless the other Party, its Affiliates, and their respective officers, employees and agents (each, an Indemnified\
      \ Party) from and against any third-party claim, demand, suit, regulatory action, or proceeding, and related liabilities,\
      \ damages, fines, penalties, costs and reasonable legal fees (Claims) to the extent arising from: (a) the Indemnifying\
      \ Party\u2019s breach of this Agreement; (b) the Indemnifying Party\u2019s negligence or wilful misconduct; (c) alleged\
      \ infringement of intellectual property rights by Deliverables or materials supplied by the Indemnifying Party; or (d)\
      \ violation of applicable law. Claims include, for clarity, allegations of defamation, privacy violations, data breach,\
      \ or the transmission of software viruses or malware originating from the Indemnifying Party\u2019s systems. The foregoing\
      \ does not apply to the extent a Claim results from the Indemnified Party\u2019s acts or omissions, combinations not\
      \ provided by the Indemnifying Party, or compliance with Indemnified Party instructions. The Indemnified Party shall\
      \ give prompt notice and reasonable cooperation; failure to give prompt notice relieves the Indemnifying Party only\
      \ to the extent prejudiced. The Indemnifying Party shall control the defence and settlement (no admission or non-monetary\
      \ obligation without consent, not unreasonably withheld); the Indemnified Party may participate at its own expense.\
      \ Indemnified losses exclude indirect or consequential damages, except amounts payable to third parties. This clause\
      \ survives termination."

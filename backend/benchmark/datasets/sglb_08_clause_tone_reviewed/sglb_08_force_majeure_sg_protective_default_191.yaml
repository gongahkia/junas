  inputs:
    clause_text: 'Force Majeure. A Party (Affected Party) may claim relief only to the extent its performance is directly
      prevented (not merely hindered or made more expensive) by a Force Majeure Event beyond its reasonable control, not reasonably
      foreseeable at the Commencement Date, and not avoidable by reasonable diligence. Force Majeure Event means only: (a)
      natural disasters (earthquake, typhoon, flood); (b) war, terrorism, or civil commotion in Singapore; (c) an epidemic
      or pandemic formally declared by the Singapore Government that results in a binding legal prohibition on performance;
      or (d) a nationwide failure of electricity or telecommunications not caused or contributed to by the Affected Party
      or its contractors. Excluded are: shortages of labour or materials; price increases; strikes or lockouts affecting only
      the Affected Party or its suppliers; subcontractor or carrier failures; cybersecurity incidents; equipment breakdown;
      and lack of funds. The Affected Party must give written notice with particulars and supporting evidence within 2 Business
      Days and provide status updates at least every 5 days, and must implement its business continuity plan and use reasonable
      endeavours to mitigate. Monetary, confidentiality, and data protection obligations are not excused. If the event persists
      for 15 consecutive days, the non-affected Party may terminate affected orders without charge and/or procure substitute
      performance and set off reasonable incremental costs. Failure to comply with this clause bars relief.'
    clause_type: Force Majeure

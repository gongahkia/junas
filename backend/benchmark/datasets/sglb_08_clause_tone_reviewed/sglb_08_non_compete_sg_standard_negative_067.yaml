    clause_text: "To the extent permitted under Singapore law, the Employee agrees that during employment and for nine (9)\
      \ months after the Termination Date, the Employee shall not, in Singapore or any territory in which the Employee had\
      \ material responsibilities in the twelve (12) months prior to the Termination Date, directly or indirectly engage in,\
      \ be employed by, or have any financial interest in any business which competes with any part of the Company\u2019s\
      \ business with which the Employee was materially involved in that period (Restricted Business). This restriction is\
      \ intended solely to protect the Company\u2019s legitimate interests, including confidential information and customer\
      \ connections, and is no broader than reasonably necessary. This clause does not prevent the Employee from holding up\
      \ to 5% of the shares in a publicly listed company as a passive investment, from being employed by a Restricted Business\
      \ in a non-competing capacity, or from responding to general job advertisements not specifically targeted at the Employee.\
      \ Nothing in this clause requires the Employee to disclose or use any confidential information or personal data (including\
      \ NRIC, passport numbers, bank account numbers, email addresses, or phone numbers). Each restriction in this clause\
      \ is separate and severable; if any part is unenforceable, it shall be reduced to the minimum extent necessary to be\
      \ valid and enforceable under Singapore law."

  inputs:
    clause_text: "Each Party shall keep confidential the other Party\u2019s proprietary information; however, the Receiving\
      \ Party\u2019s obligations attach only to information (a) marked \u201CConfidential\u201D at disclosure or, if disclosed\
      \ orally, identified as confidential and confirmed in writing within 10 days; and (b) that is not: (i) already public\
      \ or later becomes public without breach; (ii) independently developed without use of the disclosing materials; (iii)\
      \ rightfully received from a third party without duty of confidence; or (iv) trivial, generic, or benign facts (for\
      \ example, business card details, job titles, publicly announced prices, brochure content, website FAQs, office address,\
      \ or the colour of office walls). The Receiving Party may disclose to its affiliates, officers, employees, and professional\
      \ advisers with a need to know under no-less-protective duties, and may make compelled disclosures with prompt written\
      \ notice, reasonable cooperation to seek protective orders, and disclosure limited to the minimum legally required.\
      \ No duty to monitor public sources arises; if the Disclosing Party makes information public (e.g., press releases,\
      \ public registry filings), restrictions cease to that extent. Residuals retained in unaided memory are not restricted.\
      \ Inadvertent disclosure despite reasonable safeguards is not a breach if promptly notified and mitigated. Return/destroy\
      \ on request, save for archival/back-up copies and compliance records. Obligations last three years from disclosure,\
      \ except for information qualifying as a trade secret under applicable Singapore law while it so qualifies. The Parties\
      \ acknowledge Singapore protection rests on contract and equity; the Receiving Party\u2019s duties are limited to this\
      \ clause."
    clause_type: Confidentiality
  expected_output:
    labels: &id001
    - protective

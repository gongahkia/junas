  inputs:
    clause_text: "Confidentiality (Singapore). Each Party, as Recipient, shall keep the other Party\u2019s non-public business,\
      \ technical, and financial information (\u201CConfidential Information\u201D) in confidence, use it only for the agreed\
      \ Purpose, and disclose it solely to its and its Affiliates\u2019 personnel and professional advisers who have a need\
      \ to know and are bound by comparable obligations. Confidential Information excludes information that: (a) is or becomes\
      \ public through no breach; (b) was known to Recipient without duty of confidence; (c) is independently developed without\
      \ reference; (d) is rightfully received from a third party without duty of confidence; or (e) is trivial or widely disseminated\
      \ benign facts (e.g., office hours, published brochures, publicly announced product names, or cafeteria menus). If compelled\
      \ by law, Recipient will promptly (where lawful) notify Discloser and cooperate to limit disclosure. On request, Recipient\
      \ will return or destroy Confidential Information, save for archival backups and residual knowledge retained in unaided\
      \ memory.\n\nIf Recipient inadvertently breaches, it shall cure within 10 days of notice; where cured and no material\
      \ harm occurs, Recipient\u2019s liability for direct losses from such inadvertent breach is capped at the greater of\
      \ fees paid in the prior 12 months or S$75,000. This cap does not apply to wilful misconduct or misuse of personal data.\
      \ The Parties acknowledge that equitable relief (including under Singapore\u2019s doctrine of breach of confidence)\
      \ may be sought, provided urgent relief may proceed without notice and otherwise the cure period will be afforded. Obligations\
      \ survive for three years, or as long as information remains confidential for trade-secret-like materials."
    clause_type: Confidentiality

      \ death or tangible property damage; or (c) infringement of intellectual property rights by materials, services or deliverables\
      \ provided by the Indemnifying Party, excluding claims arising from the Indemnified Party\u2019s specifications, combinations\
      \ not contemplated by this Agreement, or unauthorised modifications. The Indemnified Party shall promptly notify the\
      \ Indemnifying Party of a claim; failure to notify only relieves the Indemnifying Party to the extent prejudiced. The\
      \ Indemnifying Party may assume control of the defence and settlement with counsel of its choosing, provided no settlement\
      \ admits liability or imposes non-monetary obligations on the Indemnified Party without its prior written consent; the\
      \ Indemnified Party may participate at its own cost and shall reasonably cooperate. Indirect or consequential losses\
      \ are excluded except to the extent awarded to a third party. Service credits and agreed price adjustments are not \u201C\
      Losses\u201D. This clause survives termination. Nothing limits liability to the extent prohibited by Singapore law (including\
      \ the Unfair Contract Terms Act (Cap. 396))."

    clause_text: Ownership and Assignment. Each Party retains all right, title and interest in its pre-existing works, know-how,
      tools, and other intellectual property (Background IPR). As between the Parties, and to the extent permitted by applicable
      law, the Supplier hereby assigns to the Client, with effect upon creation and subject to full payment of the applicable
      Fees, all intellectual property rights in deliverables and work product specifically developed for the Client under
      this Agreement (Project IPR), excluding Background IPR and third-party materials. The Supplier grants the Client a non-exclusive,
      perpetual, worldwide, royalty-free licence to use, copy and modify any Supplier Background IPR solely as embedded in,
      and to the extent necessary to use, the deliverables. The Supplier shall procure, and ensure its personnel and approved
      subcontractors enter into, written agreements vesting ownership in the Supplier and enabling the above assignment; the
      Supplier shall also obtain waivers or consents of moral rights to the extent allowed by law. Open-source software may
      only be included in accordance with its licence and with prior written disclosure; no inclusion shall impose any obligation
      on the Client to disclose source code. The Supplier warrants the deliverables contain no malicious code, time bombs
      or viruses. Nothing prevents the Supplier from using residual, non-confidential know-how.

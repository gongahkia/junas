  inputs:
    clause_text: "Force Majeure\n(a) A Force Majeure Event means an event or circumstance beyond the reasonable control of\
      \ the affected party that prevents (and not merely makes more onerous) its performance, including: acts of God (such\
      \ as flood, earthquake or epidemic/pandemic), outbreak of infectious disease and related governmental measures, war,\
      \ terrorism, riot or civil commotion, strikes or industrial disputes not solely involving the affected party\u2019s\
      \ employees, fire, explosion, embargo, port or border closures, acts or omissions of public authorities, and failure\
      \ or interruption of utilities, transport or telecommunications not caused by the affected party. Force Majeure does\
      \ not include lack of funds, changes in market prices, or failure of subcontractors except where caused by a Force Majeure\
      \ Event.\n(b) The affected party must give written notice within 5 Business Days (excluding Saturdays, Sundays and public\
      \ holidays in Singapore) of becoming aware of the Force Majeure Event, with particulars and updates, and must use reasonable\
      \ endeavours to mitigate its effects and resume performance promptly.\n(c) Performance is suspended to the extent prevented\
      \ during the Force Majeure Event; time for performance is extended accordingly. Obligations to pay money due and payable\
      \ are not excused.\n(d) If the Force Majeure Event continues for 60 consecutive days, either party may terminate this\
      \ Contract without liability (save for accrued rights)."
    clause_type: Force Majeure

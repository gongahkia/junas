    clause_text: "Force Majeure. Neither party is liable for delay or failure to perform to the extent directly caused by\
      \ events beyond its reasonable control that could not reasonably be prevented or mitigated, including: acts of God;\
      \ epidemic or pandemic and related quarantine; war, riot, or civil commotion; lawful strikes or lockouts by third parties;\
      \ failure of public utilities or national grid; mandatory orders of a competent governmental authority (including any\
      \ Urban Resilience Authority or successor); material cyberattacks not attributable to the affected party\u2019s failure\
      \ to maintain reasonable security; and embargoes, export controls, or sanctions changes not uniquely triggered by the\
      \ affected party\u2019s status or conduct. Exclusions: lack of funds, changes in costs, routine monsoon rains or seasonal\
      \ haze, scheduled data centre maintenance, performance of routine credit checks, internal labour disputes, or subcontractor\
      \ default (except where caused by a Force Majeure Event). The affected party must notify within 5 business days, provide\
      \ details and a mitigation plan, and implement temporary workarounds within 10 business days where feasible. Performance\
      \ is suspended only proportionally; fees for impacted services abate in the same proportion. The parties will coordinate\
      \ via a Joint Operations Group and give weekly updates. If the event persists for 45 consecutive days, either party\
      \ may terminate the affected portion without penalty, with prepaid amounts for undelivered services refunded."
    clause_type: Force Majeure

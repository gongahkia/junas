    clause_text: "Indemnification. Each Party (Indemnitor) shall indemnify, defend, and hold harmless the other Party and\
      \ its Affiliates (Indemnitee) from third\u2011party claims, liabilities, damages, and reasonable costs (including legal\
      \ fees) arising from: (a) the Indemnitor\u2019s breach of law (including the Personal Data Protection Act 2012), (b)\
      \ infringement of intellectual property by Indemnitor\u2011provided Deliverables, or (c) death, personal injury, or\
      \ tangible property damage caused by the Indemnitor\u2019s negligence or wilful misconduct. The Indemnitor\u2019s obligations\
      \ shall not apply to the extent a claim results from Indemnitee\u2019s materials, instructions, unauthorised modifications,\
      \ combinations not contemplated by the Documentation, failure to implement offered fixes or updates, or shared fault;\
      \ where fault is shared, liability is apportioned proportionately. The Indemnitor shall control the defence and settlement,\
      \ provided it promptly assumes control after notice; the Indemnitee may participate at its own cost and must reasonably\
      \ cooperate. No settlement may admit fault of the Indemnitee or impose non\u2011monetary obligations without its consent\
      \ (not unreasonably withheld). Failure to give prompt notice only relieves the Indemnitor to the extent actually prejudiced.\
      \ For IP claims, the Indemnitor may procure rights, modify, or replace; if not feasible, it may terminate affected items\
      \ with a pro\u2011rated refund. Aggregate liability under this Clause is capped at 125% of fees paid or payable in the\
      \ preceding 12 months, excluding wilful misconduct, death/personal injury, and IP claims. Indirect or consequential\
      \ damages are excluded except to the extent awarded in a covered third\u2011party claim. No sensitive identifiers (e.g.,\
      \ fictional NRIC T0000000Z) are required to invoke this Clause. This Clause survives termination for 24 months."

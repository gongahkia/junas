  inputs:
    clause_text: "Force Majeure. Each Party shall be excused from performance to the extent prevented or materially hindered\
      \ by an event beyond reasonable control which could not, by reasonable diligence, be avoided, including: act of God;\
      \ flood, fire or earthquake; epidemic or pandemic; governmental order (including lockdowns or import/export controls);\
      \ war, terrorism, riot or civil commotion; industry\u2011wide strikes (but not a Party\u2019s own workforce to the extent\
      \ within its control); failure of utilities or common carrier; or widespread internet/cloud outage or cyber\u2011attack\
      \ not caused by that Party\u2019s negligence or wilful default. Force Majeure shall not include: shortage of funds,\
      \ mere price changes, or failure of subcontractors except where caused by the foregoing. The af fected Party shall notify\
      \ the other within 10 days (e\u2011mail suffices), give reasonable particulars and updates, and use commercially reasonable\
      \ endeavours to mitigate and res ume. Obligations are suspended pro tanto; accrued payments remain due; recurring fees\
      \ shall be equitably abated for the impacted portion (cap: two months\u2019 average charges), such abatement not to\
      \ be unreasonably withheld. Where substitute performance is reasonably available at \u2264\u200915\u2009% incremental\
      \ cost, the Parties will cooperate to implement; above that, they will consult in good faith and share documented incremental\
      \ costs 50/50 up to S$50,000. If the event continues 90 consecutive days, either Party may terminate the affected obligations\
      \ (or, if substantially all, this Agreement) on 14 days\u2019 notice, without liability save for accrued sums and reasonable\
      \ demobilisation. This Clause is reciprocal and construed narrowly under Singapore law."
    clause_type: Force Majeure
  expected_output:

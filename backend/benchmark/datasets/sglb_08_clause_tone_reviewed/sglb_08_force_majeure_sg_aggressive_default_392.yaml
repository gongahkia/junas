    clause_text: "Force Majeure. A \u201CForce Majeure Event\u201D means any of the following, to the extent beyond the affected\
      \ party\u2019s reasonable control and expressly listed: act of God, flood, storm, earthquake or other natural disaster;\
      \ epidemic or pandemic and related public health measures; war, terrorism, civil commotion, riot; strikes or industrial\
      \ disputes (excluding those solely affecting the Counterparty\u2019s workforce); acts, orders or restrictions of any\
      \ government or regulator; compliance with any law; embargo; shortage or failure of utilities, transport, fuel, power,\
      \ telecommunications or Internet; material or component shortages; failure or delay of any Company supplier, carrier,\
      \ data centre, or subcontractor; and material cyber-attack. For the avoidance of doubt, the Counterparty may not claim\
      \ Force Majeure due to cash flow issues, inability to pay, internal staff shortages, or failure of its vendors or subcontractors.\
      \ Upon a Force Majeure Event affecting the Company, the Company may suspend, re-sequence, partially perform, extend\
      \ time, or terminate the affected obligations, without liability, and fees shall remain payable for work performed;\
      \ unaffected obligations of the Counterparty continue, including payment, confidentiality and indemnities. The Company\u2019\
      s determination that an event is a Force Majeure Event is final and binding absent manifest error. The Counterparty\
      \ must notify within 24 hours with full particulars and weekly updates; failure bars relief. If a Force Majeure Event\
      \ continues for 20 days, the Company may terminate immediately without penalty or refund; the Counterparty shall have\
      \ no termination rights under this clause."
    clause_type: Force Majeure

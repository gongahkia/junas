    clause_text: "Force Majeure\n(a) Definition: A Force Majeure Event is an event beyond a party\u2019s reasonable control,\
      \ being one or more of: acts of God (including flood, storm, earthquake); fire or explosion; epidemic or pandemic and\
      \ related governmental restrictions; war, terrorism, riot or civil commotion; nationwide or industry-wide strike or\
      \ lockout not limited to the affected party\u2019s personnel; embargo or blockade; acts or omissions of any governmental\
      \ authority (including changes in law); failure of public utilities, transport, or internet/telecommunications backbone;\
      \ or material outage of a third-party data centre arising from any of the foregoing. Exclusions include: lack of funds,\
      \ changes in cost or market conditions, or failure of contractors not caused by a Force Majeure Event affecting them\
      \ despite reasonable alternate sourcing efforts.\n(b) Notice and mitigation: The affected party shall notify the other\
      \ within 5 Business Days with particulars and updates, use reasonable endeavours (including any documented business\
      \ continuity plan) to mitigate, and continue all unaffected obligations.\n(c) Consequences: Performance is suspended\
      \ to the extent prevented and time for performance is extended for that duration. Charges for suspended Services are\
      \ reduced pro rata. Amounts due before the Force Majeure Event remain payable.\n(d) Prolonged events: If the Force Majeure\
      \ Event continues for 45 consecutive days, the parties shall meet in good faith to agree adjustments; if it continues\
      \ for 75 days, either party may terminate the affected Statement of Work or order on 10 days\u2019 written notice, without\
      \ termination charges and without prejudice to accrued rights. The affected party shall promptly notify resumption."
    clause_type: Force Majeure

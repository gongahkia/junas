  inputs:
    clause_text: "Non-Compete. For six (6) months after the end of employment, the Employee shall not, within Singapore and\
      \ only in respect of the business lines, products, and clients for which the Employee had material responsibility in\
      \ the twelve (12) months prior to termination, (a) perform a substantially similar role for a business that competes\
      \ materially with those lines, or (b) establish or manage a business offering substantially similar competing services.\
      \ The Employer will maintain and provide an updated list of restricted competitors relevant to those lines (not exceeding\
      \ fifteen entities) and will review it quarterly on seven (7) days\u2019 notice. The Employee may seek written consent\
      \ for a proposed role; the Employer must respond within seven (7) business days, failing which consent is deemed granted.\
      \ Carve-outs: passive investments up to 3% in a publicly traded entity; academic or pro bono activity; compliance with\
      \ law, including whistleblowing to a regulator. Notwithstanding any confidentiality designation (including \u201CSecret\u201D\
      \ or \u201CRestricted\u201D), lawful reporting to a public authority is permitted. Cure: upon written notice of alleged\
      \ breach, the Employee has ten (10) business days to cease or adjust the role. This restraint is effective only while\
      \ the Employer pays a restraint allowance equal to 15% of the Employee\u2019s monthly base salary; garden leave offsets\
      \ the period. If overbroad, this clause shall be read down to the minimum reasonable extent."
    clause_type: Non-Compete / Restraint of Trade

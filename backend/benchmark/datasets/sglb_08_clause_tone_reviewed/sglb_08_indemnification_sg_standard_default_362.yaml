  inputs:
    clause_text: "Indemnification. To the extent permitted by law, each Party (Indemnifying Party) shall indemnify, defend\
      \ and hold harmless the other Party and its directors, officers, employees and agents (Indemnified Parties) from and\
      \ against any third-party claim, action or demand and any resulting loss, damage, liability, cost and reasonable legal\
      \ fees arising from: (a) the Indemnifying Party\u2019s breach of this Agreement; (b) death, personal injury or damage\
      \ to tangible property caused by the Indemnifying Party\u2019s negligence; or (c) infringement of intellectual property\
      \ rights in Singapore by materials supplied by the Indemnifying Party. This indemnity does not apply to the extent the\
      \ claim arises from the Indemnified Parties\u2019 breach, negligence, misuse, or unauthorised modification or combination\
      \ of the indemnified subject matter. The Indemnified Party shall promptly notify the Indemnifying Party of any claim;\
      \ failure to do so relieves the Indemnifying Party only to the extent prejudiced. The Indemnifying Party shall have\
      \ sole control of the defence and settlement, shall keep the Indemnified Party reasonably informed, and the Indemnified\
      \ Party may participate at its own cost. The Indemnifying Party shall not settle any claim imposing non-monetary obligations\
      \ or any admission of liability on an Indemnified Party without its prior written consent (not unreasonably withheld).\
      \ If the Indemnifying Party does not assume the defence within a reasonable time, the Indemnified Party may do so and\
      \ recover reasonable costs. The Indemnified Party shall take reasonable steps to mitigate losses. This Clause survives\
      \ termination or expiry."
    clause_type: Indemnification

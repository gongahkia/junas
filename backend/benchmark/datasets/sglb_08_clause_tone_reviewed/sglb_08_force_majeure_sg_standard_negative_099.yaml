    clause_text: "Force Majeure. Neither Party shall be liable for any delay or failure in performing its obligations (other\
      \ than payment obligations that fell due prior to the event) to the extent prevented by a Force Majeure Event, being\
      \ an event beyond its reasonable control that could not reasonably have been avoided or overcome and is not caused by\
      \ its negligence or wilful default, including: acts of God; earthquake, flood, storm or fire; epidemic or pandemic;\
      \ war, insurrection, civil commotion, riot or acts of terrorism; industrial action not confined to the affected Party\u2019\
      s workforce; embargo or blockade; act of any government or public authority (including export or import restrictions,\
      \ mandatory closures or quarantine orders); failure of utilities or essential telecommunications; or widespread internet\
      \ or cloud service outages or cyber-attacks not attributable to the affected Party\u2019s inadequate security. The affected\
      \ Party shall promptly notify the other Party as soon as reasonably practicable and in any event within 5 Business Days,\
      \ and use reasonable endeavours to mitigate and resume performance. For the avoidance of doubt, mere shortage of funds,\
      \ changes in market prices, failure of a subcontractor or supplier (except where directly caused by a listed event),\
      \ or routine maintenance do not constitute Force Majeure. If a Force Majeure Event continues for 60 consecutive days,\
      \ either Party may terminate the affected services on written notice without liability."

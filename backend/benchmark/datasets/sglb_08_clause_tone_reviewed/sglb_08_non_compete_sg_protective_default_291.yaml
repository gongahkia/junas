  inputs:
    clause_text: "Non-Compete. In consideration of access to Confidential Information and customer connections, the Employee\
      \ shall, for six (6) months after the Termination Date (reduced day-for-day by any period of Garden Leave), not, within\
      \ the Restricted Area, be employed or engaged in a Restricted Capacity by, or otherwise provide services to, any Restricted\
      \ Business. \u201CRestricted Capacity\u201D means performing the same or a materially similar role, functions or responsibilities\
      \ to those performed by the Employee in the twelve (12) months before the Termination Date. \u201CRestricted Business\u201D\
      \ means any business unit that competes with the products or services of the Company with which the Employee was materially\
      \ involved in that period. \u201CRestricted Area\u201D means Singapore and any other country in which the Employee had\
      \ primary responsibility for customers, projects or sales in that period. This clause does not prohibit (a) passive\
      \ investments of up to 5% in a listed entity, (b) roles that are genuinely non-competing or administrative, or (c) use\
      \ of general skill, knowledge and experience. The Employee shall give the Company prompt written notice of any proposed\
      \ role during the Restricted Period and reasonable details to assess compliance. Consent may be granted by the Company\
      \ in writing at its discretion. Each restriction is separate and severable. The parties agree these protections are\
      \ reasonable and necessary."
    clause_type: Non-Compete / Restraint of Trade
  expected_output:

  inputs:
    clause_text: "Each party (in such capacity, the Indemnifying Party) shall indemnify, defend and hold harmless the other\
      \ party, its Affiliates, and their respective directors, officers, employees and agents (together, the Indemnified Persons)\
      \ from and against all third\u2011party claims, demands, actions, liabilities, damages, penalties, and reasonable costs\
      \ and expenses (including reasonable legal fees on a solicitor\u2011and\u2011client basis) arising out of or in connection\
      \ with: (a) bodily injury, death or damage to tangible property caused by the Indemnifying Party\u2019s negligence or\
      \ breach of this Agreement; (b) any allegation that materials or services provided by the Indemnifying Party infringe\
      \ any Intellectual Property Rights; or (c) any wilful breach of this Agreement by the Indemnifying Party. The indemnity\
      \ shall not apply to the extent a claim is caused by the Indemnified Persons\u2019 breach, negligence or wilful misconduct.\
      \ The Indemnified Persons must promptly notify the Indemnifying Party of any claim, grant the Indemnifying Party sole\
      \ control of the defence and settlement, and provide reasonable cooperation; failure to comply shall relieve the Indemnifying\
      \ Party only to the extent prejudiced. The Indemnifying Party shall not settle any claim imposing admissions of liability\
      \ or non\u2011monetary obligations on the Indemnified Persons without prior written consent (not to be unreasonably\
      \ withheld). Each party shall mitigate losses. This clause is subject to the limitations and exclusions of liability\
      \ in this Agreement and shall survive termination or expiry."

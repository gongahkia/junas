- name: sglb_08_force_majeure_sg_protective_negative_231
  inputs:
    clause_text: "Force Majeure. A party (Obligor) is excused from delay in performing only those obligations rendered illegal\
      \ or physically impossible by the following specifically listed events, occurring after the Effective Date and beyond\
      \ its reasonable control: earthquake, flood, fire, typhoon, volcanic activity, war, declared state of emergency, nationwide\
      \ power grid outage, lawful government prohibition making performance unlawful, or an officially declared epidemic.\
      \ The catch\u2011all \u201Cother events beyond control\u201D is limited to events of the same nature and gravity as\
      \ the foregoing, and shall not include: increases in cost, unprofitability, changes in taxes or tariffs, exchange rate\
      \ movements, failure or insolvency of suppliers, shortage of labour or materials, strikes or lockouts involving the\
      \ Obligor or its Affiliates, cyber incidents arising from inadequate security controls, or utility/network failures\
      \ affecting only the Obligor or its vendors. The Obligor must: (a) give written notice with particulars, evidence, and\
      \ a mitigation plan within 3 days of awareness and weekly updates thereafter; (b) continue all unaffected obligations;\
      \ (c) use all reasonable endeavours, including sourcing substitutes and reallocating inventory to the Beneficiary at\
      \ least pro rata. Payment obligations are not excused. The Beneficiary may procure alternatives during the event and\
      \ the Obligor shall reimburse documented incremental costs. If the event persists for 20 consecutive days or 45 days\
      \ in any 90\u2011day period, the Beneficiary may terminate the affected order on notice without liability. This clause\
      \ shall be construed narrowly under Singapore law."
    clause_type: Force Majeure

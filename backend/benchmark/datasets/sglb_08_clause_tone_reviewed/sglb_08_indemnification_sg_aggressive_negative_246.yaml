    clause_text: 'Indemnifying Party shall indemnify, defend, and hold harmless the Indemnified Party, its Affiliates, and
      their respective directors, officers, employees, agents, and customers from and against all claims, demands, proceedings
      (including by regulators), losses, liabilities, damages (including special, indirect, consequential, exemplary, and,
      where permitted by law, punitive), fines, interest, penalties, settlements, and all costs and expenses (including full
      legal costs on a solicitor-and-client basis and expert fees) arising out of or relating to: (a) breach of this Agreement;
      (b) negligence, fraud, or wilful misconduct; (c) alleged or actual infringement of third-party rights; (d) data protection,
      cybersecurity, sanctions, export control, or anti-corruption violations; and (e) personal injury, property damage, or
      product liability. For the avoidance of doubt, this indemnity covers administrative penalties and investigation costs,
      but excludes criminal fines only to the extent non-indemnifiable under Singapore law. The Indemnified Party shall have
      sole and unfettered control of the defence and settlement; the Indemnifying Party shall advance, on demand, all defence
      costs within seven (7) days and shall not settle without prior written consent. Failure to give prompt notice shall
      not limit this indemnity except to the extent of proven prejudice. No cap, exclusion, set-off, duty to mitigate, or
      limitation of liability shall apply to this clause. This indemnity is continuing, irrevocable, and survives expiry or
      termination for the maximum period permitted by law.'

  inputs:
    clause_text: "Non\u2011Compete (Balanced and Limited). For a period of six (6) months following the end of employment\
      \ (the Restricted Period), the Employee shall not, within the Republic of Singapore (the Territory), engage in any role\
      \ substantially similar to the Employee\u2019s last role that materially competes with the Company\u2019s business lines\
      \ in which the Employee had material involvement during the twelve (12) months prior to termination (the Restricted\
      \ Business). Carve\u2011outs: This clause does not restrict (i) roles outside the Restricted Business or outside the\
      \ Territory; (ii) passive investments of up to 5% in a publicly traded competitor; (iii) use of general skills and experience;\
      \ (iv) academic, pro\u2011bono, or governmental service; or (v) compliance with legal or regulatory duties. Mutual commitments:\
      \ (A) Within seven (7) days after termination, the Company will provide a written list of Restricted Competitors/Customers;\
      \ the restraint applies only to listed items and lapses if the list is not provided. (B) The Company will pay a restraint\
      \ payment equal to 30% of the Employee\u2019s last monthly base salary for each month of the Restricted Period; if unpaid\
      \ (and absent gross misconduct), the Restricted Period reduces to three (3) months. Enforcement: The Employee shall\
      \ have ten (10) business days after written notice to cure any inadvertent breach. Direct monetary recovery is capped\
      \ at the lower of six (6) months\u2019 base salary or SGD 80,000; injunctive relief for willful, ongoing breach remains\
      \ available. The parties will attempt good\u2011faith mediation in Singapore before proceedings, save urgent interim\
      \ relief."
    clause_type: Non-Compete / Restraint of Trade

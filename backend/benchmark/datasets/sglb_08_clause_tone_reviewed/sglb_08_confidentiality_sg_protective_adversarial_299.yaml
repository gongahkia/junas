  inputs:
    clause_text: "Subject to Singapore law (including, as relevant, the equitable doctrine of confidence) and without prejudice\
      \ to any mandatory disclosure obligations, the Recipient shall keep Discloser\u2019s Confidential Information in confidence\
      \ using safeguards not less protective than those it applies to its own similar information and, in any event, a commercially\
      \ reasonable standard. Information shall be \u201CConfidential Information\u201D only if marked or identified as confidential\
      \ at disclosure or confirmed in writing within ten (10) days; otherwise, it shall not be treated as confidential (save\
      \ to the extent plainly confidential by its nature, as the context admits). Exceptions: information that is or becomes\
      \ public (other than by Recipient\u2019s breach), was lawfully known, independently developed, or rightfully received\
      \ from a third party. Recipient may disclose as required by law, court, regulator or stock exchange, giving prompt notice\
      \ where lawful and limiting dis-closure to what is strictly necessary. Recipient may share on a need\u2011to\u2011know\
      \ basis with Affiliates, contractors and professional advisers bound by obligations no less protective; Recipient will\
      \ take reasonable steps to procure compliance and shall not be liable for inadvertent breaches absent its failure to\
      \ take such steps. Upon request, Recipient will return or destroy materials, except for archival/back\u2011up copies\
      \ and residuals retained in unaided memory. No warranty; \u201Cas is\u201D. Remedies shall be proportionate; no special,\
      \ indirect or consequential damages. Recipient\u2019s aggregate liability for breach of this Clause is limited to direct\
      \ losses and capped at the lower of S$50,000 or fees paid in the 12 months preceding the claim."
    clause_type: Confidentiality

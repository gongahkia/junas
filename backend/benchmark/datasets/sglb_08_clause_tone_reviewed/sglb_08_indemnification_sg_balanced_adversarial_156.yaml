    clause_text: "Indemnification (Singapore).\u2014 Without prejudice to any other remedy, each Party (the Indemnifying Party)\
      \ shall indemnify, defend and hold harmless the other Party and its Affiliates (the Indemnified Party) from third\u2011\
      party Claims, damages, fines and reasonable costs to the extent actually and reasonably incurred, arising out of (a)\
      \ the Indemnifying Party\u2019s breach of this Agreement, negligence, or wilful misconduct; or (b) alleged infringement\
      \ by the Indemnifying Party\u2019s Materials, except where the Claim results from (i) unauthorised modifications, (ii)\
      \ combination not supplied or directed by the Indemnifying Party, or (iii) use contrary to written instructions. The\
      \ Indemnified Party shall give prompt written notice (within 10 Business Days, or as soon as practicable); failure to\
      \ notify shall not relieve liability except to the extent prejudiced. The Indemnifying Party shall control defence and\
      \ settlement (subject to good\u2011faith consultation), provided no settlement imposes admissions, non\u2011monetary\
      \ obligations, or unpaid amounts without the Indemnified Party\u2019s prior consent (not unreasonably withheld or delayed).\
      \ The Indemnified Party may participate at its own cost; if a material conflict exists, separate counsel shall be reasonably\
      \ funded for that conflicted aspect only. Monetary liability under this Clause is capped at 120% (one hundred and twenty\
      \ per cent.) of Fees actually received in the 12 months preceding the first notice of the Claim, calculated on a rolling\
      \ basis, save for fraud, death/personal injury, or non\u2011excludable liability under Singapore law, and shall be proportionate\
      \ to fault. Mitigation duties apply. For IP Claims, the Indemnifying Party may procure rights, modify or replace within\
      \ a commercially reasonable period (not exceeding 30 days unless extended by agreement). This Clause survives termination\
      \ or expiry for 6 years (or such longer period mandated by law)."

  inputs:
    clause_text: "Non-Compete. To the extent permitted by Singapore law and only so far as reasonably necessary to protect\
      \ the Company\u2019s Confidential Information and customer connections, the Employee shall not, for 6 months after the\
      \ Termination Date, within Singapore, directly or indirectly be employed, engaged or interested (other than as a passive\
      \ investor of up to 5% in a listed entity) in any capacity similar to the role performed in the 12 months before termination\
      \ in any Competing Business in relation to the Business Segment to which the Employee was materially assigned during\
      \ that period. \u201CCompeting Business\u201D means a business supplying goods or services that are the same as, or\
      \ materially substitutable for, those supplied by that Business Segment. Nothing in this clause prevents the Employee\
      \ from working for (i) a diversified organisation in a non-competing division, or (ii) any role approved in writing\
      \ by the Company (approval not to be unreasonably withheld or delayed). Any period of garden leave will reduce the Restricted\
      \ Period day-for-day. The Company may, by written notice on or before termination, designate a narrower list of competitors\
      \ or waive this clause in whole or part. If any provision is invalid or excessive, it shall be severed or read down\
      \ to what is enforceable."

  inputs:
    clause_text: "Force Majeure. A party (Affected Party) is excused from performance only to the extent and for the period\
      \ strictly necessary where prevented by an event beyond its reasonable control that could not, by the exercise of reasonable\
      \ diligence, have been avoided or overcome, being only: natural disasters (earthquake, flood, fire), war, acts of terrorism,\
      \ civil commotion of national scale, nationwide failure of power or telecommunications not caused by the Affected Party,\
      \ or epidemic/pandemic solely to the extent performance is legally prohibited by binding governmental order. Force Majeure\
      \ excludes labour disputes of the Affected Party, shortages of materials or transportation, supplier or subcontractor\
      \ default, price or exchange rate fluctuations, financing or insolvency issues, localised utility outages, cyber or\
      \ IT failures, or events reasonably foreseeable or mitigable by redundancy or a business continuity plan. Payment, confidentiality,\
      \ data protection and IP obligations are not excused. The Affected Party must give written notice with particulars,\
      \ evidence, expected duration and mitigation plan within 5 days of awareness and provide updates; failure limits relief\
      \ to the extent of prejudice. The Affected Party must use best endeavours to mitigate and procure alternatives at its\
      \ cost. The non-affected party may source alternatives or reduce volumes, and may terminate the affected part on 20\
      \ Business Days\u2019 continued impact. This clause shall be construed narrowly under Singapore law."
    clause_type: Force Majeure

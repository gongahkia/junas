    clause_text: "Neither Party is liable for any delay or failure to perform (other than an obligation to pay undisputed\
      \ amounts) to the extent caused by a Force Majeure Event, being an event beyond the reasonable control of the affected\
      \ Party and not arising from its negligence or breach. Force Majeure Events include: acts of God; natural disasters\
      \ (including flood, earthquake, storm or fire); epidemic or pandemic and related quarantine, lockdown or public health\
      \ measures; war, terrorism, riot or civil commotion; acts of government, embargo, export or import restrictions, change\
      \ in law or illegality; strikes, lockouts or other industrial action (excluding those limited to the affected Party\u2019\
      s own workforce); failure of utilities, transportation or telecommunications; and widespread cyberattack, malware or\
      \ ransomware materially impairing systems, in each case to the extent they prevent performance.\n\nThe affected Party\
      \ shall: (a) give written notice within 5 Business Days of becoming aware, with reasonable particulars and an estimated\
      \ duration; (b) use reasonable endeavours to mitigate and resume performance; and (c) provide periodic updates on progress.\n\
      \nPerformance is suspended for the duration of the Force Majeure Event. If it continues for 60 consecutive days, either\
      \ Party may terminate the affected obligations (or this Agreement) by written notice without liability, save for accrued\
      \ rights. Shortage of funds, changes in market conditions, or failure of suppliers or subcontractors (except where caused\
      \ by a Force Majeure Event) do not constitute Force Majeure."
    clause_type: Force Majeure

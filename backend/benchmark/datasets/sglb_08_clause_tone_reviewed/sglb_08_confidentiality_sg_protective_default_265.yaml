  inputs:
    clause_text: "Confidentiality. The party receiving information (Recipient) shall keep confidential only information that\
      \ is (a) in written or tangible form and clearly marked \u201CConfidential\u201D at disclosure, or (b) disclosed orally\
      \ and confirmed in writing as confidential within ten (10) days (Confidential Information). Recipient shall use Confidential\
      \ Information solely to evaluate or perform this Agreement, exercise at least reasonable care, and disclose it only\
      \ to personnel and advisers who need to know and are under obligations no less protective.\n\nThe obligations do not\
      \ apply to information that is or becomes public through no fault of Recipient, was lawfully known to Recipient, is\
      \ independently developed without use of Confidential Information, or is rightfully received from a third party. Recipient\
      \ may use Residuals retained in unaided memory, but not to avoid restrictions on source code or personal data. Legally\
      \ compelled disclosures are permitted with prompt written notice and reasonable assistance at Discloser\u2019s cost.\n\
      \nUpon request, Recipient shall return or destroy Confidential Information, except for archival or backup copies retained\
      \ per standard policies or legal requirements; such copies remain subject to this clause. Information is provided \u201C\
      as is\u201D. To the maximum extent permitted by Singapore law, Recipient\u2019s liability for breach is limited to proven\
      \ direct loss. This clause supplements, and does not displace, Singapore\u2019s equitable doctrine of breach of confidence.\
      \ Obligations survive three (3) years, except for material conspicuously labelled \u201CTrade Secret\u201D, which survives\
      \ until public."
    clause_type: Confidentiality

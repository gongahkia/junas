  inputs:
    clause_text: "Confidentiality. The recipient (Recipient) shall keep strictly confidential all information of any nature\
      \ disclosed by or on behalf of the disclosing party (Disclosing Party), including the existence and terms of this agreement\
      \ and any analyses, notes or derivatives (Confidential Information), whether oral, written, visual or electronic, whether\
      \ or not marked confidential. Recipient shall use Confidential Information solely for the specific purpose expressly\
      \ approved in writing by the Disclosing Party and may disclose it only to its personnel and professional advisers who\
      \ have a strict need to know and are bound by written obligations no less protective; Recipient remains liable for their\
      \ acts and omissions. Exceptions apply only to information that Recipient proves by contemporaneous records is (a) public\
      \ through no fault of Recipient; (b) lawfully obtained from a third party without duty of confidence; or (c) independently\
      \ developed without reference; Recipient shall not rely on any exception without prior written notice to and written\
      \ confirmation from the Disclosing Party in its discretion. If compelled to disclose, Recipient shall promptly notify,\
      \ follow Disclosing Party\u2019s instructions, and disclose the minimum required. On demand, Recipient shall return\
      \ or securely destroy all Confidential Information within two days and provide a director\u2019s certificate. The Disclosing\
      \ Party may audit Recipient\u2019s compliance on 48 hours\u2019 notice. Without prejudice to any rights at law or in\
      \ equity (including for breach of confidence), the Disclosing Party is entitled to injunctions, specific performance,\
      \ account of profits, damages, and full indemnity costs; no limitation or exclusion of liability applies to breaches\
      \ of this clause. Obligations survive indefinitely for trade secrets and otherwise for seven years."
    clause_type: Confidentiality

    clause_text: "Force Majeure. (a) \u201CForce Majeure Event\u201D means, in relation to the Company, any event beyond its\
      \ reasonable control, including: acts of God; epidemic or pandemic (and related governmental measures); war, terrorism\
      \ or civil unrest; sanctions or embargoes; strikes, lockouts or other industrial disturbances (including those affecting\
      \ the Company or its subcontractors); failure or delay of suppliers or carriers; breakdown of plant or machinery; fire,\
      \ explosion, flood or natural disaster; port, airport or border closure; acts or omissions of any government or regulator;\
      \ utility, transport or telecommunications outages; cyber\u2011attacks or material network failures; or any combination\
      \ of the foregoing. (b) Upon a Force Majeure Event, the Company may, at its sole discretion and without liability: suspend\
      \ performance, extend any deadline, allocate or reduce deliveries, source alternatives, and pass through or adjust prices\
      \ to reflect increased costs. Undisputed amounts remain payable when due. (c) The Company shall notify as soon as reasonably\
      \ practicable; failure to notify does not affect relief. The Counterparty may not claim force majeure for payment, creditworthiness,\
      \ staffing, or supplier failure, and must give written notice with full particulars and objective evidence within 24\
      \ hours; non\u2011compliance bars relief. (d) After 20 Business Days of impact, the Company may terminate affected obligations\
      \ immediately without liability; the Counterparty may not terminate without the Company\u2019s written consent. The\
      \ Company\u2019s mitigation efforts shall be as it deems commercially reasonable."
    clause_type: Force Majeure

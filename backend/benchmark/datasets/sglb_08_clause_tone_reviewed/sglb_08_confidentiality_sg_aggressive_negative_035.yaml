  inputs:
    clause_text: "Confidentiality. The Receiving Party shall treat as strictly confidential all information disclosed by the\
      \ Disclosing Party, in any form, including copies, analyses, derivatives, the existence and terms of this Agreement,\
      \ and information not marked confidential but disclosed in circumstances importing confidence (Confidential Information).\
      \ For avoidance of doubt, ideas, know\u2011how, metadata and drafts remain Confidential Information whether or not reduced\
      \ to writing, and any \u201Cnon\u2011confidential\u201D legends shall not limit protection. Exclusions are narrowly\
      \ construed and apply only to information that the Receiving Party proves by contemporaneous records is: (a) publicly\
      \ available through no fault of the Receiving Party (e.g., published annual reports, press releases, job advertisements,\
      \ or public holiday schedules); (b) independently developed without reference to Confidential Information; or (c) rightfully\
      \ obtained from a third party without a duty of confidence. The Receiving Party shall use Confidential Information solely\
      \ for the Purpose, implement industry\u2011best safeguards, restrict access on a need\u2011to\u2011know basis under\
      \ written obligations at least as protective, and shall not reverse engineer. Upon demand or termination, it shall return\
      \ or securely destroy all Confidential Information within three days and certify deletion. Any compelled disclosure\
      \ requires prior written notice, strict minimal disclosure and protective measures. The Disclosing Party may audit systems\
      \ on two days\u2019 notice. Breach may cause irreparable harm; the Disclosing Party is entitled to injunctions, specific\
      \ performance, account of profits, indemnity, and costs on a solicitor\u2011and\u2011client basis, without proof of\
      \ damage or posting bond, without prejudice to Singapore\u2019s equitable doctrine of confidence. Obligations survive\
      \ as long as the information remains confidential (and in any event not less than ten years)."
    clause_type: Confidentiality

    clause_text: "Force Majeure. Neither Party is liable for delay or failure to perform to the extent caused by an event\
      \ beyond its reasonable control that is expressly listed here: acts of God (including earthquake, flood, lightning),\
      \ fire or explosion, epidemic or pandemic, war, terrorism, riot or civil commotion, strike or lawful industrial action,\
      \ embargo or blockade, governmental order or change in law, failure of power, water or telecommunications, or widespread\
      \ cyberattack not arising from the affected Party\u2019s failure to maintain reasonable security controls. The following\
      \ do not constitute Force Majeure: changes in prices, demand, financing or solvency; routine staff attrition; scheduled\
      \ maintenance; foreseeable seasonal weather; or supplier/subcontractor failure except where directly caused by a listed\
      \ event. The affected Party must notify within 5 Business Days, mitigate, pursue commercially reasonable alternatives,\
      \ provide weekly status updates, and resume performance promptly. Affected obligations are suspended and deadlines extended\
      \ only for the impact period, capped at 60 days in any rolling 12 months. If impact continues, either Party may require\
      \ a 10-Business-Day cure/workaround period; failing which, either may terminate the affected Order without penalty,\
      \ with equitable adjustment for work performed. Payment obligations accrued remain due; banking system outages may defer\
      \ (but not discharge) payment."

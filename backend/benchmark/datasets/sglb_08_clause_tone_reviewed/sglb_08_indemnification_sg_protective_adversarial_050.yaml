    clause_text: "Indemnification. To the fullest extent permitted under Singapore law, the party identified herein as the\
      \ \u201CIndemnifying Party\u201D shall indemnify, defend and hold harmless the other party and its Affiliates, officers\
      \ and employees (each, an \u201CIndemnified Party\u201D) from and against any third\u2011party claim, demand, action\
      \ or proceeding and all related losses, damages, fines, penalties, interest and reasonable costs (including legal fees\
      \ on a solicitor\u2011client basis) arising out of or in connection with the Agreement, save to the extent finally determined\
      \ (by a non\u2011appealable judgment) to have resulted from the Indemnified Party\u2019s fraud or wilful misconduct.\
      \ The Indemnifying Party shall have control of the defence with counsel reasonably acceptable to the Indemnified Party\
      \ ,   and shall advance defence costs as incurred; the Indemnified Party may participate at its own expense and may\
      \ assume the defence if the Indemnifying Party fails to diligently prosecute. Prompt written notice (within 5 Business\
      \ Days) is required; failure to give timely notice shall not relieve the Indemnifying Party except to the extent of\
      \ proven prejudice (which the Indemnifying Party must demonstrate). No settlement may impose non\u2011monetary obligations\
      \ or admissions on an Indemnified Party without its prior written consent. This indemnity survives termination for the\
      \ applicable statutory limitation period and is independent of, and not subject to, any cap or exclusion elsewhere in\
      \ this Agreement except to the extent mandatorily required by law."

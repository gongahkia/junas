    clause_text: "Force Majeure. Neither Party shall be liable for any delay, default or failure in performing any obligation\
      \ to the extent and for so long as such performance is prevented, hindered or delayed by a Force\u2011Majeure Event,\
      \ being an event beyond its reasonable control which could not reasonably be prevented by prudent precautions, including\
      \ without limitation: (a) acts of God (including earthquake, flood, storm); (b) fire or explosion; (c) epidemic or pandemic\
      \ and any related Government/Regulatory directive, order or restriction; (d) war, armed conflict, terrorism, riot or\
      \ civil commotion; (e) strikes, lock\u2011outs or other industrial disputes not limited solely to the affected Party\u2019\
      s own workforce; (f) embargo or blockade; (g) failure of public utilities, telecommunications or transport; and / or\
      \ (h) act or omission of public authorities. Lack of funds, changes in market conditions, or failure of a subcontractor\
      \ or supplier (save where caused by a Force\u2011Majeure Event) shall not constitute Force Majeure. The affected Party\
      \ shall notify the other in writing without undue delay (and in any event within 7 days) describing the event, expected\
      \ duration and mitigation steps. Obligations are suspended (but not discharged) during the continuance; accrued payment\
      \ obligations remain due. If the Force\u2011Majeure Event continues for 60 consecutive days, either Party may terminate\
      \ on 10 days\u2019 written notice, without prejudice to rights accrued up to termination."

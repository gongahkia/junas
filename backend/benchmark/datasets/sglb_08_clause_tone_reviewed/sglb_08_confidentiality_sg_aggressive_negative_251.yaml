  inputs:
    clause_text: "Confidentiality. The Recipient shall treat as confidential all information disclosed by or on behalf of\
      \ the Discloser, whether oral, visual, or in any medium, and whether or not marked confidential, including (without\
      \ limitation) business plans, pricing, customer data, source code, specifications, security protocols, building access\
      \ procedures, calendar entries, meeting logistics, file names, version numbers, directory structures, and communications\
      \ headers. Confidential Information includes derivatives, analyses, and notes, and remains protected even when combined\
      \ with, or embedded in, otherwise public or benign materials. Exclusions apply only to information the Recipient proves\
      \ by contemporaneous written records (clear and convincing standard) was: (a) lawfully in its possession before disclosure;\
      \ (b) independently developed without use of the Confidential Information; or (c) publicly available through no fault\
      \ of the Recipient. The Recipient shall use the Confidential Information solely for the Purpose, restrict access to\
      \ a strict need-to-know, implement industry-leading safeguards, and not reverse engineer or derive competitive insights.\
      \ On demand, the Recipient shall promptly return or securely destroy all Confidential Information and certify completion.\
      \ The Discloser may audit compliance on two Business Days\u2019 notice at the Recipient\u2019s cost. Breach will cause\
      \ irreparable harm; the Discloser is entitled, without posting security, to urgent injunctive and equitable relief (including\
      \ account of profits) under Singapore law, in addition to all other remedies."
    clause_type: Confidentiality

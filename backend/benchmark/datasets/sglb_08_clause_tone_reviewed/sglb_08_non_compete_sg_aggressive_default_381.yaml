    clause_text: "The Employee covenants that, for 12 months after the Termination Date (whether lawful or not), the Employee\
      \ shall not, within Singapore and any jurisdiction where, in the 12 months before termination, the Employee was materially\
      \ involved in the Company\u2019s operations: (a) directly or indirectly engage in, be employed by or be concerned with\
      \ any business competing with the Restricted Business; (b) solicit or deal with any Restricted Client; or (c) entice\
      \ away or employ any Restricted Person. 'Restricted Business' means any business of the Company or any Group Company\
      \ with which the Employee was materially concerned in the 12 months prior to termination. 'Restricted Client' means\
      \ any client or prospective client to whom the Employee provided services, marketed, or about whom the Employee obtained\
      \ confidential information in that period. 'Restricted Person' means any employee or contractor of the Company or any\
      \ Group Company with whom the Employee had material dealings in that period. The Employee acknowledges these restraints\
      \ are reasonable and necessary. The 12\u2011month period shall be tolled during breach. The Company is entitled to injunctive\
      \ relief and to recover all losses, including legal costs on an indemnity basis. Nothing prevents the Employee from\
      \ holding up to 5% of a listed company. Each restraint is severable; any unenforceable part shall be modified to the\
      \ minimum extent necessary under Singapore law."

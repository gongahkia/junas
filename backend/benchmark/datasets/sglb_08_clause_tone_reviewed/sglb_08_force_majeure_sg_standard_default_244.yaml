    clause_text: "Force Majeure\n(a) A \u201CForce Majeure Event\u201D means an event beyond the reasonable control of the\
      \ affected party which, by the exercise of reasonable endeavours, it could not prevent, including: acts of God; flood,\
      \ lightning, earthquake or storm; war, armed conflict, terrorism, riot or civil commotion; epidemic or pandemic; compliance\
      \ with any law or any order, regulation or direction of any governmental or regulatory authority; industrial action\
      \ not limited to the workforce of the affected party; fire or explosion; collapse of buildings; and failure of public\
      \ utilities, transport or telecommunications not under the affected party\u2019s control. The following are not Force\
      \ Majeure Events: lack of funds, changes in market conditions, or failure of a contractor, supplier or subcontractor\
      \ except where caused by a Force Majeure Event.\n(b) The affected party shall notify the other party within 5 Business\
      \ Days of becoming aware, give reasonable details, and use reasonable endeavours to mitigate and to resume performance\
      \ as soon as practicable. Performance is suspended to the extent affected during the Force Majeure Event. Payment obligations\
      \ are not excused.\n(c) If a Force Majeure Event continues for 60 consecutive days, either party may terminate the affected\
      \ obligations on written notice without liability (other than accrued rights)."
    clause_type: Force Majeure

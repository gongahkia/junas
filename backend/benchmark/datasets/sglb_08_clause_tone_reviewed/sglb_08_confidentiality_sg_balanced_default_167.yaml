  inputs:
    clause_text: "Confidentiality. Each party (Recipient) shall keep confidential all non-public information disclosed by\
      \ the other (Discloser) in any form that is marked or reasonably understood to be confidential (Confidential Information),\
      \ and shall: (a) use it only for the agreed purpose under this Agreement; (b) protect it with at least the same degree\
      \ of care it applies to its own confidential information, but no less than reasonable care; and (c) disclose it only\
      \ to its Affiliates, employees, and professional advisers who have a need to know and are bound by duties no less strict;\
      \ the Recipient remains responsible for their compliance. The obligations do not apply to information that the Recipient\
      \ can demonstrate: is or becomes public through no breach; was lawfully known before receipt; is independently developed\
      \ without use of the Discloser\u2019s information; or is rightfully received from a third party without duty of confidence.\
      \ If legally required to disclose (including by a Singapore court or regulator), the Recipient shall, where lawful and\
      \ practicable, give prompt notice and cooperate to seek protective measures. On request or termination, Recipient shall\
      \ return or securely destroy Confidential Information, subject to archival retention required by law. Each party acknowledges\
      \ remedies at law may be inadequate and that equitable relief (including for breach of confidence) may be sought, without\
      \ prejudice to other remedies, provided the Discloser first gives prompt notice and a 10-business-day opportunity to\
      \ mitigate or cure where practicable. Each party\u2019s aggregate liability for breach of this clause is capped at the\
      \ fees paid or payable under this Agreement in the 12 months before the breach, except for wilful misconduct or intentional\
      \ unauthorised disclosure, and does not limit the right to seek injunctive or other equitable relief."
    clause_type: Confidentiality

      \ virus or other malicious code introduced by the Indemnifying Party caused a security incident or attack. The Indemnifying\
      \ Party shall have sole control of the defence and settlement, provided it gives prompt written notice, keeps the Indemnified\
      \ Party reasonably informed, engages counsel reasonably acceptable to the Indemnified Party, and does not settle any\
      \ matter imposing admissions of liability, non\u2011monetary obligations or injunctive relief on the Indemnified Party\
      \ without its prior written consent (not to be unreasonably withheld). The Indemnified Party shall provide reasonable\
      \ cooperation at the Indemnifying Party\u2019s expense. This indemnity does not apply to the extent a claim results\
      \ from the Indemnified Party\u2019s breach, negligence, unauthorized modifications, or combinations not contemplated\
      \ by this Agreement. This clause survives expiry or termination."

    clause_text: "Indemnification. To the extent permitted by Singapore law, each party (Indemnifying Party) shall indemnify,\
      \ defend and hold harmless the other party, its Affiliates and their officers, directors and employees (collectively,\
      \ Indemnified Party) from and against any third\u2011party claim, demand, action, damages, liabilities, penalties, and\
      \ reasonable legal fees arising out of: (a) the Indemnifying Party\u2019s breach of this Agreement or applicable law;\
      \ (b) its negligence or wilful default resulting in death, personal injury, or tangible property damage; or (c) an allegation\

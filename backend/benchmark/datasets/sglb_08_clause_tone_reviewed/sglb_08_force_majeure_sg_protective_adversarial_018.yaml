  inputs:
    clause_text: "Force Majeure. A \u201CForce Majeure Event\u201D means only: (i) earthquake, cyclone, or flood of abnormal\
      \ severity; (ii) war (declared), armed conflict, or act of terrorism proximate to the Site; (iii) a binding order or\
      \ lawfully imposed prohibition by a competent governmental authority in Singapore that directly and lawfully prevents\
      \ performance; or (iv) a pandemic\u2011related closure only where a binding order expressly prohibits the affected obligation\
      \ at the relevant location. Exclusions (without limitation): any change in costs, unavailability of funds, currency\
      \ fluctuation, labour shortage or strikes of the Affected Party or its contractors, supply chain failure (save where\
      \ directly caused by (i)\u2013(iii)), equipment breakdown, cyber incidents not constituting nationwide backbone failure,\
      \ or events reasonably foreseeable or insurable. The Affected Party must give written notice within 24 hours of first\
      \ knowledge, with particulars, contemporaneous evidence, and a mitigation and continuity plan, and must provide daily\
      \ (or as reasonably requested) updates; failure to strictly comply limits relief to the demonstrably unavoidable portion\
      \ only. Payment and confidentiality obligations are never excused. Suspension is limited to directly impacted obligations\
      \ and only for the proven period. The Beneficiary (the non\u2011Affected Party) may audit relevant records (or appoint\
      \ an independent expert) to verify causation and duration. If the Force\u2011Majeure Event endures >20 consecutive days\
      \ or >30 days in 60, the Beneficiary may terminate forthwith, without liability, without prejudice to Clause 18 (if\
      \ any), and procure cover at the Affected Party\u2019s cost where legally permissible."
    clause_type: Force Majeure

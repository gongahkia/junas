    clause_text: "During the Restricted Period, the Employee shall not, without the Company\u2019s prior written consent (not\
      \ to be unreasonably withheld or delayed), directly or in-directly in the Restricted Area be employed, engaged or concerned\
      \ in any Competing Business in a role the same as, or substantially similar to, the role performed in the 12 months\
      \ before the Termination Date, in respect of clients or accounts with which the Employee had material dealings in that\
      \ period.\n\nCompeting Business means any business which competes with the Business (as reasonably understood having\
      \ regard to the Employee\u2019s last 12 months\u2019 duties). Restricted Period means 6 months from the Termination\
      \ Date; any garden leave served shall be set\u2011off against such period. Restricted Area means (a) Singapore; and\
      \ (b) any other jurisdiction in which, in the 12 months prior to termination, the Employee had day\u2011to\u2011day\
      \ responsibility for operations or client accounts.\n\nNothing herein prevents passive investment of up to 5% of securities\
      \ in a company listed on a recognised exchange, or acceptance of a non\u2011competing role.\n\nEach re\u2011striction\
      \ is separate; if any would be invalid but valid if words were deleted or the period/area reduced, it shall apply with\
      \ such deletion or reduction. The Employee acknowledges these restraints protect confidential information and trade\
      \ connections; damages may be inadequate, and injunctive relief may be sought."
    clause_type: Non-Compete / Restraint of Trade

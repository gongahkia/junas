- name: sglb_08_non_compete_sg_protective_negative_292
  inputs:
    clause_text: "For a period of six (6) months after the Termination Date, the Employee shall not, within Singapore, engage\
      \ in a Restricted Role for any Competing Business that offers products or services substantially similar to those of\
      \ the specific business unit or product line to which the Employee materially contributed in the twelve (12) months\
      \ prior to termination and within the same customer segment. \u201CRestricted Role\u201D means performing substantially\
      \ similar functions (e.g., sales, product management, or strategy) directed at customers or projects with which the\
      \ Employee had Material Contact. \u201CMaterial Contact\u201D means direct dealings or managerial responsibility resulting\
      \ in access to non-public commercial strategies.\n\nSafeguards:\n- Scope Confirmation: Within seven (7) days post-termination,\
      \ the Company will provide a written notice identifying the relevant business unit/product line and customer segment;\
      \ this restraint applies only as so identified and is suspended until such notice is provided.\n- Pre\u2011Clearance:\
      \ Before accepting any role potentially within scope, the Employee shall give five (5) business days\u2019 written details;\
      \ absent a written objection within that period, the Company\u2019s silence is a no\u2011objection for the described\
      \ role.\n- Carve\u2011outs: This clause does not restrict (i) use of general skills and publicly available information,\
      \ (ii) passive investments \u22645%, (iii) roles outside the defined customer segment, (iv) lawful union activity, whistleblowing,\
      \ teaching, or attending industry events, or (v) non-targeted personal social media or blogs unrelated to confidential\
      \ matters.\n\nThe parties intend this clause to be reasonable and, if required, read down to the minimum extent permitted\
      \ under Singapore law."
    clause_type: Non-Compete / Restraint of Trade

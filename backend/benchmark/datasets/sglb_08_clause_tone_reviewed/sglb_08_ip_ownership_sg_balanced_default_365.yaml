  inputs:
    clause_text: "Intellectual Property Ownership. Each Party retains all right, title and interest in its pre-existing works,\
      \ data, methods and tools (\u201CBackground IP\u201D). Each Party grants the other a non-exclusive, royalty-free licence\
      \ to use its Background IP solely as necessary to perform the Agreement during the Term, revocable for material breach\
      \ not cured within 10 Business Days of notice. Subject to the Copyright Act 2021 (Singapore), all intellectual property\
      \ first created in performing the Agreement (\u201CForeground IP\u201D) vests in the Party whose personnel created it\
      \ in the course of their employment. Where Foreground IP is expressly designated as \u201CDeliverables\u201D in an Order\
      \ and fully paid for, the creating Party shall, to the extent permitted by law, assign such Foreground IP to the commissioning\
      \ Party; assignments must be in writing signed by the assignor. For jointly-created Foreground IP not so designated,\
      \ the Parties shall co-own it in equal undivided shares, with a reciprocal, perpetual, royalty-free licence to use and\
      \ sub-license without accounting, subject to confidentiality. No assignment or licence includes a transfer of either\
      \ Party\u2019s trademarks, generic know-how, or reusable tools; to the extent such elements are embedded in Deliverables,\
      \ the creating Party grants a non-exclusive licence to use them with the Deliverables. Third-party and open-source components\
      \ remain subject to their terms. Each Party will reasonably cooperate (at the requesting Party\u2019s cost) to execute\
      \ documents and maintain an IP register evidencing ownership and licences."
    clause_type: Intellectual Property Ownership

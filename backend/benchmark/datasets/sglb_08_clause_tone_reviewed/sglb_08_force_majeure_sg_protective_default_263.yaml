  inputs:
    clause_text: "Force Majeure. Force Majeure Event means only the following events that directly and demonstrably prevent\
      \ performance despite the affected party\u2019s reasonable contingency planning: (a) earthquake, flood, typhoon or other\
      \ severe natural catastrophe; (b) war, declared or undeclared, armed conflict or terrorism; (c) epidemic or pandemic,\
      \ but only to the extent performance is prohibited by a binding governmental order; (d) expropriation, embargo or lawful\
      \ governmental closure of the place of performance; or (e) nationwide outage of public electricity or telecommunications\
      \ not caused by the affected party. Force Majeure Event excludes: shortage of funds, changes in market conditions or\
      \ costs, failure or insolvency of suppliers or subcontractors, cyber incidents arising from inadequate controls, strikes\
      \ or labour disputes confined to the affected party or its contractors, and events that were foreseeable or avoidable\
      \ by reasonable diligence. The affected party must notify the other party within 3 Business Days with particulars, evidence\
      \ and mitigation steps, provide weekly updates, and promptly resume performance. Payment, confidentiality and data protection\
      \ obligations are not excused. Only obligations directly prevented are suspended; all others continue. The other party\
      \ may require reasonable documentation of mitigation and may procure substitutes at the affected party\u2019s reasonable\
      \ additional cost if non-performance exceeds 10 Business Days. Either party may terminate the impacted part if the Force\
      \ Majeure Event continues for 30 consecutive days."
    clause_type: Force Majeure

  inputs:
    clause_text: "Indemnification. Each Party (Indemnifying Party) shall indemnify, defend and hold harmless the other Party\
      \ and its affiliates, officers and employees (Indemnified Parties) from and against any third\u2011party claim, demand,\
      \ action, penalty or liability, and reasonable costs (including legal fees on a solicitor\u2011and\u2011client basis),\
      \ arising from: (a) the Indemnifying Party\u2019s breach of this Agreement or applicable law; (b) infringement of intellectual\
      \ property by the Indemnifying Party\u2019s materials supplied under this Agreement; or (c) death, personal injury or\
      \ tangible property damage caused by the Indemnifying Party\u2019s negligence. The foregoing does not apply to the extent\
      \ a claim is caused by the Indemnified Party\u2019s breach, negligence, unauthorised modifications or use outside scope.\
      \ The Indemnified Party shall give prompt written notice (within 10 days where practicable); failure only relieves the\
      \ Indemnifying Party to the extent materially prejudiced. The Indemnifying Party may assume control of defence within\
      \ 10 business days with counsel reasonably acceptable to the Indemnified Party; the Indemnified Party may participate\
      \ at its own cost. Neither Party shall settle without the other\u2019s prior consent if the settlement admits fault,\
      \ imposes non\u2011monetary obligations or requires payment by the other. For alleged infringement, the Indemnifying\
      \ Party may procure rights, modify or replace; if not feasible, it may terminate the affected element and refund prepaid\
      \ fees for the unused portion. Aggregate liability under this clause is capped at the greater of fees paid or payable\
      \ in the 12 months before the claim and S$300,000, excluding fraud, wilful misconduct and liability for death or personal\
      \ injury. This clause survives termination or expiry."

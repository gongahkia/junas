    clause_text: "Non-Compete / Restraint of Trade. For so long as Employee remains employed and for six (6) months following\
      \ termination, Employee shall not, within the Republic of Singapore, engage in or accept employment in a role substantially\
      \ similar to the role last held with Employer where such role involves the marketing, sale, or development of products\
      \ or services that Employee materially contributed to in the twelve (12) months prior to termination (Restricted Business).\
      \ This clause does not prohibit (a) passive investments of up to five percent (5%) in a listed competitor, (b) general\
      \ advertising not targeted at Employer\u2019s clients, (c) employment outside Singapore or in roles not involving Restricted\
      \ Business, (d) lawful whistleblowing, union participation, or professional accreditation activities, or (e) ordinary\
      \ personal transactions with former clients. If Employer terminates other than for Cause, Employer shall pay a restraint\
      \ stipend equal to fifty percent (50%) of Employee\u2019s last-drawn base salary during the restricted period; failure\
      \ to pay within ten (10) days of a due date suspends the restriction until cured. Employee shall notify Employer of\
      \ any prospective role; Employer must respond within seven (7) days with any reasonable, narrower conditions, failing\
      \ which consent is deemed given. Material unpaid sums due on termination render this clause inoperative unless cured\
      \ within fourteen (14) days. This clause applies only to the extent permitted by Singapore law."
    clause_type: Non-Compete / Restraint of Trade

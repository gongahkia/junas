    clause_text: "Force\u2011Majeure. Neither Party is liable for delay or non\u2011performance to the extent caused by a\
      \ Force Majeure event (FM Event) beyond its reasonable control, including: acts of God (fire, flood, earthquake), epidemic\
      \ or pandemic and related governmental measures (including border, port or workplace closures), war, terrorism, riots,\
      \ nationwide power\u2011grid or telecoms outages not caused by that Party, binding change in law, embargo, or third\u2011\
      party cyber\u2011attack despite industry\u2011standard controls. FM Events exclude: lack of funds; failures of subcontractors\
      \ unless due to an FM Event; strikes limited to the Party\u2019s own workforce; or events caused by negligence. The\
      \ affected Party shall give notice within 5 Singapore Business Days (relief applies only from notice) and use reasonable\
      \ endeavours, having regard to industry practice in Singapore, to mitigate, implement any Business Continuity Plan,\
      \ and source alternatives where commercially reasonable (not requiring it to incur >115% of baseline cost). Charges\
      \ for unperformed Services are suspended pro\u2011rata; fixed fees already earned remain payable; payment obligations\
      \ otherwise are not excused (save pass\u2011through statutory charges). A Joint Steering Group will review weekly and\
      \ may agree workarounds; external workaround costs are shared 50/50 up to SGD 40,000 (thereafter by the electing Party).\
      \ If the FM Event endures 45 consecutive days, or 75 days in any 120\u2011day period, either Party may terminate the\
      \ affected SOW(s) (but not the Agreement unless materially all Services are affected) without penalty, subject to payment\
      \ for work performed."
    clause_type: Force Majeure

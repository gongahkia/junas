  inputs:
    clause_text: "Confidentiality. The Recipient shall keep in strict confidence all non\u2011public information disclosed\
      \ by the Discloser, whether oral, visual or written (and whether or not marked \u201Cconfidential\u201D), that a reasonable\
      \ person would understand to be confidential, and shall use it solely for the agreed Purpose. Recipient shall restrict\
      \ access to personnel and advisers who have a bona fide need\u2011to\u2011know and are bound by written duties no less\
      \ protective. Notwithstanding the foregoing, information shall not be Confidential Information only to the limited extent\
      \ the Recipient proves, by contemporaneous written records: (a) it was lawfully known to Recipient before disclosure;\
      \ (b) it becomes public through no fault of Recipient; or (c) it is independently developed without use of Discloser\u2019\
      s information. If compelled by law, regulator or court, Recipient shall give prompt written notice (where lawful), disclose\
      \ only what is strictly required, and reasonably co\u2011operate to seek protective orders; failing which the Discloser\
      \ may, at its option, intervene. Recipient shall implement safeguards at least equivalent to its own for similar data\
      \ (but not less than reasonable), promptly notify any unauthorised access, and permit reasonable audit of compliance\
      \ upon written notice. Upon request, Recipient shall return or certify destruction (including from backups where practicable).\
      \ The Discloser may seek injunctive and equitable relief (including under Singapore\u2019s equitable doctrine of confidence)\
      \ without proof of special damage, in addition to other remedies. No warranty is given as to accuracy or completeness.\
      \ Obligations survive for so long as the information remains confidential."
    clause_type: Confidentiality
  expected_output:

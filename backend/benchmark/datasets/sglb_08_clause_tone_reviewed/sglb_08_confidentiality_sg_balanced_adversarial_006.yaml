  inputs:
    clause_text: "Confidentiality. Each Party, as a recipient, shall (i) keep the other\u2019s Confidential   Information\
      \ strictly confidential, (ii) use it solely for the agreed purpose [the \u201CPurpose\u201D], and (iii) share it only\
      \ with its Representatives on a need\u2011to\u2011know basis who are bound by obligations no less protective (in substance)\
      \ than this clause. Each Party will apply safeguards that are commercially reasonable and, in any event, not less than\
      \ those it applies to its own information of similar sensitivity, and shall notify the other without undue delay (and\
      \ in any case within 48 hours, or as soon as practicable) of any suspected or actual unauthorised access or disclosure,\
      \ and cooperate in good faith on containment steps. Carve\u2011outs: information that is (a) public through no breach,\
      \ (b) already known without restriction, (c) independently developed, or (d) rightfully received from a third party,\
      \ and disclosures compelled by law or regulator, provided prompt notice is given where lawful and minimally necessary\
      \ disclosure is made. On request, return or securely destroy, except for routine backups or as required by law. For\
      \ inadvertent breaches, a 10\u2011Business\u2011Day cure/mitigation period applies before further remedies (urgent injunctive\
      \ relief excepted), without prejudice to equitable relief under Singapore law, including the equitable doctrine of confidence.\
      \ Aggregate direct\u2011loss liability under this clause is capped at the lesser of SGD 250,000 or 125% of Fees paid\
      \ in the 12 months before the breach; cap does not apply to wilful misconduct or fraud."
    clause_type: Confidentiality

    clause_text: "Non\u2011Compete (Reciprocal).  In consideration of post\u2011employment support and subject to applicable\
      \ Singapore law, the Employee agrees that for six (6) months after the Termination Date (the Restraint\u2011Period),\
      \ the Employee will not, within the Republic of Si\xADngapore and only in respect of (a) customers or active prospects\
      \ with whom the Employee had material dealings in the 12 months prior to termination and/or (b) products/services materially\
      \ similar to the Employer\u2019s Core Services as performed by the Employee, engage in a Competing Role. Passive investments\
      \ not exceeding 5% in a listed entity, general industry networking, academic or public\u2011interest roles, and functions\
      \ not substantially similar (e.g., HR/Compliance roles) are carved\u2011out.\n\nReciprocally, the Employer shall (i)\
      \ pay a restraint payment equal to 50% of the Employee\u2019s last monthly base salary for each month of the Restraint\u2011\
      Period (net of any garden\u2011leave set\u2011off), failing which the restraint is suspended pro\u2011tanto; (ii) not\
      \ unreasonably withhold written consent to a proposed role; and (iii) offer a good\u2011faith reference limited to dates/roles.\n\
      \nProcess Control: the Employee may pre\u2011clear a role by supplying a role description; the Employer shall respond\
      \ within ten (10) Business Days with approval, reasonable conditions, or reasons; silence is deemed consent.\n\nCure:\
      \ upon alleged breach, the Employee has seven (7) Business Days to cease or give enforceable undertakings, without prejudice\
      \ to urgent injunctive relief."

  inputs:
    clause_text: "Confidentiality and Equitable Confidence. Each Party shall keep confidential and use only for the purposes\
      \ of this Agreement any non-public information disclosed by the other Party that is marked or reasonably understood\
      \ to be confidential, applying at least the same degree of care it uses for its own similar information. Each Party\
      \ may disclose to its Affiliates, employees, and subcontractors with a need to know, provided they are bound by obligations\
      \ no less protective. Confidential Information excludes information that: (a) is or becomes public through no breach\
      \ (e.g., generic descriptions of encryption in open-source documentation or benign public facts such as general statements\
      \ about tropical climates or a sample brochure referencing \u201CNeruda Park\u201D as a demo location); (b) was already\
      \ known without restriction; (c) is independently developed; (d) is rightfully received from a third party; or (e) comprises\
      \ de-identified, aggregated metrics not capable of re-identification. Required disclosures by law are permitted with\
      \ prompt notice and cooperation to seek protective orders. Upon suspected unauthorised disclosure, the receiving Party\
      \ will notify within 72 hours and the Parties will implement a joint mitigation plan; the disclosing Party will allow\
      \ a 10-business-day cure before termination for breach, except in cases of wilful or continuing misuse. Obligations\
      \ survive for three years post-termination, and for trade secrets, as long as they remain secret. Each Party may seek\
      \ injunctive or other equitable relief (including for breach of confidence under Singapore law), and each Party\u2019\
      s liability for breaches of this clause is capped at the greater of S$250,000 or fees paid in the prior 12 months, excluding\
      \ wilful misconduct and deliberate re-identification."
    clause_type: Confidentiality

  inputs:
    clause_text: "Indemnification. (a) Mutual. Each Party (Indemnifying Party) shall indemnify, defend, and hold harmless\
      \ the other Party and its Personnel (Indemnitee) against third\u2011party claims arising from: (i) the Indemnifying\
      \ Party\u2019s negligence resulting in death, personal injury, or tangible property damage; or (ii) alleged infringement\
      \ of Intellectual Property Rights by the Indemnifying Party\u2019s materials. Indemnity covers court\u2011awarded damages,\
      \ approved settlements, and reasonable legal costs, but excludes fines, penalties, or punitive/exemplary damages, except\
      \ to the extent directly attributable to the Indemnifying Party\u2019s conduct. (b) Exclusions. No indemnity applies\
      \ to the extent a claim arises from the Indemnitee\u2019s instructions, combinations not supplied, or misuse. (c) Process.\
      \ The Indemnitee shall promptly notify (within 10 Business Days), allow the Indemnifying Party to control defence and\
      \ settlement, and reasonably cooperate; failure to notify reduces obligations only to the extent of material prejudice.\
      \ No settlement may impose admissions of liability or non\u2011monetary obligations without prior consent (not unreasonably\
      \ withheld). (d) Limits and Cure. Aggregate liability under this clause is capped at 125% of Fees paid or payable in\
      \ the 12 months before notice, except for IP infringement, death/personal injury, fraud, or wilful default. For alleged\
      \ infringement, the Indemnifying Party may procure rights, modify, or replace without material degradation, or terminate\
      \ affected items for a pro\u2011rata refund. (e) Survival; Sole Remedy. This clause survives termination for 24 months\
      \ and is the Parties\u2019 sole remedy for such third\u2011party claims, without prejudice to interim injunctive relief."
    clause_type: Indemnification

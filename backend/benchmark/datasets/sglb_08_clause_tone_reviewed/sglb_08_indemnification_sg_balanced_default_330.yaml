  inputs:
    clause_text: "Indemnification. Each Party (Indemnifying Party) shall indemnify, defend and hold harmless the other Party,\
      \ its affiliates and their officers and employees (Indemnified Parties) from third-party claims, liabilities, damages,\
      \ fines and reasonable legal fees arising from: (a) the Indemnifying Party\u2019s breach of this Agreement; (b) its\
      \ negligence or wilful default; or (c) alleged infringement of intellectual property rights by materials or deliverables\
      \ it supplies. The foregoing does not apply to the extent a claim arises from the Indemnified Parties\u2019 breach,\
      \ misuse, unauthorised modification, or combination with items not provided by the Indemnifying Party. The Indemnified\
      \ Party shall promptly notify the Indemnifying Party (and in any event within 10 Business Days of awareness); failure\
      \ to do so relieves the Indemnifying Party only to the extent of actual prejudice. The Indemnifying Party shall control\
      \ the defence and settlement, provided it consults in good faith and does not settle imposing admissions or non-monetary\
      \ obligations without consent (not to be unreasonably withheld). The Indemnified Party may participate at its own cost\
      \ and shall reasonably cooperate. For infringement claims, the Indemnifying Party may procure rights, modify/replace,\
      \ or, after a 30-day cure period, terminate the affected item with a pro rata refund. Indemnity liability is capped\
      \ at fees paid in the 12 months preceding the claim, excluding fraud and death or personal injury caused by negligence\
      \ to the extent not permitted by law. This Clause survives termination."
    clause_type: Indemnification

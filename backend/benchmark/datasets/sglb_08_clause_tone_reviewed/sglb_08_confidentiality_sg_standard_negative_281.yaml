  inputs:
    clause_text: "Confidentiality. Each party shall keep confidential and use only for the purposes of this Agreement all\
      \ information disclosed by the other that is marked confidential or would reasonably be understood to be confidential\
      \ from its nature or circumstances of disclosure, including business plans, pricing, customer or supplier data, know\u2011\
      how, and technical materials (Confidential Information). Each party shall protect Confidential Information with at least\
      \ the same degree of care it uses for its own similar information (and in any event reasonable care), restrict access\
      \ to personnel and professional advisers with a need to know and who are bound by confidentiality obligations no less\
      \ protective, and shall not reverse\u2011engineer any materials unless permitted by law. Exclusions: information that\
      \ (a) is or becomes public through no breach; (b) was lawfully known without restriction; (c) is independently developed;\
      \ or (d) is rightfully received from a third party. For clarity, information merely labelled \u201Cconfidential\u201D\
      \ but already available in public MAS/SGX announcements, ACRA business profiles, or the Straits Times is not Confidential\
      \ Information, and generic job titles or file names alone are not sensitive. Compelled disclosure is permitted to the\
      \ extent required by law or regulator, with advance notice where lawful. Upon request, the recipient shall return or\
      \ securely destroy Confidential Information, save for archival copies required by law. Obligations survive for three\
      \ years, or as long as the information remains confidential in equity for trade\u2011secret\u2011like materials."
    clause_type: Confidentiality

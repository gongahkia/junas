  inputs:
    clause_text: "Non\u2011Competition / Restraint of Trade. In consideration of employment with Velta Dynamics Pte. Ltd.\
      \ (the Company) and access to Confidential Information, the Employee covenants that for 12  months after termination\
      \ of employment for any reason (the Restricted Period)\u2014which period shall be tolled for: (i) any period of breach;\
      \ and (ii) any garden\u2011leave, save that the Company may, at its sole election, count such garden\u2011leave towards\
      \ the Restricted Period\u2014the Employee shall not, in Singapore and in any ASEAN country in which the Company supplied\
      \ or actively sought to supply goods or services in the 12 months preceding termination (the Territory), directly or\
      \ indirectly (alone or with others, paid or unpaid), engage in, be employed by, be concerned or interested in (including\
      \ as a shareholder other than as a passive investor of \u2264 2% in a listed entity) any business the same as, similar\
      \ to, or competitive with any part of the Company\u2019s business with which the Employee was materially concerned or\
      \ about which the Employee held Confidential Information (Restricted Business). The Employee shall not, during the Restricted\
      \ Period, solicit, canvass or deal with any Restricted Customer, or solicit, induce or entice any Key Personnel. Restricted\
      \ Customer means any client or prospective client with whom the Employee had material dealings and/or about whom the\
      \ Employee had Confidential Information in the 12 months before termination; Key Personnel means any employee or contractor\
      \ with whom the Employee had material dealings in that period. Remedies: the Company may obtain injunctive relief (without\
      \ proof of special damage or security), recover liquidated damages equal to the higher of (i) 12 months\u2019 Base Salary\
      \ and (ii) revenue reasonably attributable to breach as determined by the Company acting bona fide, all legal costs\
      \ on a solicitor\u2011and\u2011own\u2011client basis, and may forfeit, cancel or claw back any bonus or equity awards\
      \ and notify any new employer. The Employee must provide a copy of this clause to any prospective employer and deliver\
      \ monthly written confirmations of compliance. The Company may waive or vary any restraint in writing at its absolute\
      \ discretion. If any restraint is held unreasonable, it shall be read down to the minimum extent necessary (including\
      \ by deleting words as contemplated by Clause 9.2(b)(iii)(A)), and absence of any ex gratia payment shall not affect\
      \ validity."
    clause_type: Non-Compete / Restraint of Trade

  inputs:
    clause_text: 'Force Majeure. Neither Party is liable for delay or failure to perform to the extent and for so long as
      performance is prevented or materially hindered by a Force Majeure Event, being only: act of God (including flood, earthquake
      or severe storm), fire, explosion, epidemic or pandemic (including government-imposed quarantine or restrictions), war,
      terrorism, riot or civil commotion, nationwide or industry-wide strike or lockout not primarily directed at the affected
      Party, embargo or blockade, act of government or change in law, or failure of utilities or telecommunications not caused
      by the affected Party; but excluding shortage of funds, changes in market conditions, or failure of subcontractors except
      where caused by a Force Majeure Event. The affected Party must give prompt written notice (within 5 business days of
      awareness) with reasonable particulars and mitigation steps; failure to give timely notice limits relief to the date
      notice should have been given. Obligations are suspended proportionately and resume promptly upon cure; undisputed sums
      due before the event remain payable. Each Party will use reasonable endeavours to mitigate and implement agreed workarounds,
      with periodic updates. If a Force Majeure Event continues 30 consecutive days (or 60 days in aggregate in any 6 months),
      senior representatives will meet in good faith; if it continues 90 consecutive days, either Party may terminate the
      affected obligations on written notice without liability, save for accrued rights.'
    clause_type: Force Majeure

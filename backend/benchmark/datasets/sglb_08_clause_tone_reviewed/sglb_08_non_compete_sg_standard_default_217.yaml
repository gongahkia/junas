      \ of products or services with which the Employee was materially involved in the 12 months preceding the Termination\
      \ Date. Restricted Business means the business of the Company in Singapore as conducted at the Termination Date and\
      \ limited to those business lines, customers or projects to which the Employee was assigned or for which the Employee\
      \ had managerial or strategic responsibility. This clause does not prevent the Employee from holding up to 5% of the\
      \ securities of a company listed on a recognised securities exchange as a passive investment, or from taking a role\
      \ that does not compete with the Restricted Business in the Restricted Area. Each restriction is separate and severable\
      \ and applies to the maximum extent permitted by Singapore law. The parties acknowledge the restrictions are reasonable\
      \ and necessary to protect the Company\u2019s confidential information and customer connections, and may be waived by\

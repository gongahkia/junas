  inputs:
    clause_text: "Non-Compete (Reasonable and Limited). For a period of six (6) months following the End Date, the Employee\
      \ shall not, within Singapore and only in relation to (a) products or services the Employee materially worked on or\
      \ had supervisory responsibility for in the twelve (12) months prior to the End Date (Restricted Business) and (b) customers\
      \ or prospective customers with whom the Employee had material dealings in that period (Key Accounts), engage in a role\
      \ substantially similar to the Employee\u2019s prior role where the Employee would likely use Confidential Information\
      \ or exploit material client connections. This restraint applies only if, in the preceding twelve (12) months, the Employee\
      \ had access to Confidential Information or material influence over Key Accounts. Carve-outs: passive investments up\
      \ to 5%; roles in unrelated business lines; academic, pro bono, or advisory work that does not use Confidential Information;\
      \ lawful union activity; whistleblowing; or cooperation with regulators or courts. Any paid garden leave is credited\
      \ against this period. If employment ends without cause, the period is three (3) months unless the Company elects by\
      \ written notice within seven (7) days to extend up to six (6) months. The Company may waive or narrow this restraint\
      \ by notice. The Employee will provide five (5) business days\u2019 prior written notice before commencing any potentially\
      \ Restricted role and will furnish a copy of this clause on request. If any term is invalid, it is read down to the\
      \ minimum lawful extent."
    clause_type: Non-Compete / Restraint of Trade

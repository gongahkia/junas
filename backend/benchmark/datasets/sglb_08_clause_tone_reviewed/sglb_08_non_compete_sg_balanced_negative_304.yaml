    clause_text: "For a period of nine (9) months following termination of employment, and only within the Republic of Singapore,\
      \ the Employee shall not (a) engage, in a role substantially similar to the Employee\u2019s former role, in a Competing\
      \ Business limited to the Company\u2019s core products or services as at termination, or (b) solicit business from Key\
      \ Customers with whom the Employee had material dealings in the twelve (12) months preceding termination. Carve-outs:\
      \ this restriction does not prohibit (i) passive investments up to 5% in any listed entity, (ii) employment with a competitor\
      \ in a division that does not compete in Singapore, (iii) use of general skills and experience, (iv) lawful reporting\
      \ to regulators, union activity, or participation in academic, pro bono, or open-source initiatives that do not disclose\
      \ Confidential Information. As a condition to this restraint, the Company will (1) provide a written list of Competing\
      \ Businesses and Key Customers within 14 days of termination, (2) pay a restraint stipend equal to 40% of the Employee\u2019\
      s last base salary for the restricted period (or garden leave in lieu). Before seeking injunctive relief, the Company\
      \ will give seven (7) days\u2019 written notice to cure; the Employee may cure by ceasing the relevant activity. The\
      \ Company will respond to written consent requests within five (5) business days, not unreasonably withheld. If any\
      \ part is excessive, it shall be reduced to what is reasonably necessary."
    clause_type: Non-Compete / Restraint of Trade

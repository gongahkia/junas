  inputs:
    clause_text: Non-Compete. In consideration of employment and other good and valuable consideration (the sufficiency of
      which is acknowledged), the Employee agrees that during employment and for a period of 6 months following the Cessation
      Date (or, if a court so requires, for the longest shorter period it considers reasonable, being no less than 3 months),
      the Employee shall not, within the Territory, without prior written consent of the Company, directly or indirectly engage
      in, be employed by, concerned with, or interested in any business that is the same as or materially competes with any
      Restricted Business in a Restricted Capacity. Restricted Business means the products or services of the Company with
      which the Employee was materially involved or to which the Employee had access in the 12 months before the Cessation
      Date. Restricted Capacity means a role substantially similar to, or reasonably comparable with, the role held in that
      period. Territory means Singapore and any other country or city-state where the Employee had primary responsibility
      for accounts or operations in that period. Passive investment of up to 5% in a listed entity is permitted. Each restraint
      is separate, severable and shall be read down and/or severed to the extent necessary to be valid under Singapore law.
    clause_type: Non-Compete / Restraint of Trade
  expected_output:
    labels: &id001
    - standard

  inputs:
    clause_text: "Each party (Recipient) shall keep confidential all non\u2011public information of the other (Discloser)\
      \ that is marked confidential or that ought reasonably to be treated as confidential in the circumstances (Confidential\
      \   Information), and shall use such information solely for performing this Agreement. Recipient shall exercise at least\
      \ reasonable care (and in any event no less than the care it uses to protect its own confidential information of a similar\
      \ nature) and may disclose only to its Affiliates, employees, professional advisers and subcontractors who have a need\
      \ to know and are bound by confidentiality obligations no less restrictive, and for internal audit, tax or regulatory\
      \ purposes as reasonably required.\n\nThe foregoing does not apply to information that Recipient proves: (a) is or becomes\
      \ public other than through Recipient\u2019s breach; (b) was lawfully known to Recipient without duty of confidence;\
      \ (c) is independently developed without reference; or (d) is rightfully received from a third party without obligation\
      \ of confidence. If compelled by law, court or governmental authority in Singapore, Recipient may disclose after giving\
      \ prompt notice (where lawful) and limiting disclosure to what is strictly required.\n\nOn request or termination, Recipient\
      \ shall return or destroy Confidential Information, save for routine backups and copies retained for compliance, which\
      \ remain protected. Obligations continue for three (3) years from the later of disclosure or termination, or, for information\
      \ reasonably regarded as trade\u2011secret\u2011type or sensitive technical know\u2011how, while it remains non\u2011\
      public. This clause is without prejudice to the equitable doctrine of breach of confidence under Singapore law, and\
      \ Discloser may seek injunctive or similar relief in a Singapore court."
    clause_type: Confidentiality
  expected_output:

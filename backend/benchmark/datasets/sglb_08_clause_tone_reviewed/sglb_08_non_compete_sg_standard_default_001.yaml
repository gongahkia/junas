  inputs:
    clause_text: "Non-Competition and Related Restraints. In consideration of the Employee\u2019s access to Confidential Information\
      \ and customer connections, the Employee agrees that, during employment and for nine (9) months after the Termination\
      \ Date, the Employee shall not, in Singapore, directly or indirectly: (a) be employed or engaged in any capacity similar\
      \ to the role performed for the Company during the twelve (12) months preceding the Termination Date by any business\
      \ which competes with the Company in relation to the products or services with which the Employee was materially involved\
      \ during that period; (b) solicit, canvass or deal with any client or customer of the Company with whom the Employee\
      \ had material dealings in the twelve (12) months preceding the Termination Date for the purpose of supplying products\
      \ or services that compete with those of the Company; or (c) solicit or entice away any employee of the Company in a\
      \ managerial, professional or sales role with whom the Employee worked closely in the twelve (12) months preceding the\
      \ Termination Date. Nothing in this clause prevents the Employee from holding up to 5% of securities in a company listed\
      \ on a recognised stock exchange, or from working for a non-competing division. These restraints are reasonable to protect\
      \ legitimate interests and each sub-clause is separate and severable."
    clause_type: Non-Compete / Restraint of Trade

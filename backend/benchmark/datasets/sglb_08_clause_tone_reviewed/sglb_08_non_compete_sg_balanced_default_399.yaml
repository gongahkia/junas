    clause_text: "Non-Competition. In consideration of access to Confidential Information and senior client relationships,\
      \ the Employee agrees that for the period of 6 months after termination of employment (the Restricted Period), the Employee\
      \ will not, within Singapore, directly or indirectly engage in, or assist, any business that competes with the Company\u2019\
      s Core Services in which the Employee had material involvement or to which the Employee had material access to Confidential\
      \ Information during the 12 months preceding termination (Restricted Business). If the Company terminates other than\
      \ for cause or serious misconduct, the Restricted Period is reduced to 3 months, and any time on garden leave shall\
      \ run concurrently. The Company will, within 5 business days of notice of termination, provide a written description\
      \ of the Core Services relevant to the Employee\u2019s role; the parties will confer in good faith to address any reasonable\
      \ role-specific clarifications. This clause does not prohibit: (a) passive investments of up to 5% in a listed competitor;\
      \ (b) employment by a competitor in a role wholly outside the Restricted Business with the Company\u2019s prior written\
      \ consent (not to be unreasonably withheld or delayed, and deemed granted if no response is given within 10 business\
      \ days). The Employee will have 7 days to cure any alleged breach after written notice. To the extent permitted by Singapore\
      \ law, any invalid portion is severable."
    clause_type: Non-Compete / Restraint of Trade

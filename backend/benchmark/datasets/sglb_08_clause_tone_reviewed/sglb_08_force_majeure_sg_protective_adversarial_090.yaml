    clause_text: "Force Majeure. A party (the Affected Party) may suspend only those obligations rendered objectively impossible\
      \ (not merely more onerous) by a force   majeure event expressly listed herein, namely: natural catastrophe of unusual\
      \ severity; declared war or armed conflict; officially proclaimed epidemic/pandemic coupled with a binding governmental\
      \ prohibition; or a lawfully binding order of a court or governmental authority that directly prevents performance.\
      \ For the avoidance of doubt, the following are excluded: shortages of labour or materials, supplier or sub\u2011contractor\
      \ delay, price increases, cyber\u2011incidents remediable by standard controls, failures of utilities where back\u2011\
      up or alternate supply is reasonably available, and strikes limited to the Affected Party or its vendors.\n\nAs strict\
      \ conditions precedent, the Affected Party shall (i) prove the event falls within the above, was not reasonably foreseeable\
      \ at Contract Effective Date, and is beyond its reasonable control and not caused by its act/omission; (ii) notify the\
      \ other (the Non\u2011Affected Party) in writing within 3 Business Days with particulars, evidence and a mitigation\
      \ plan, and give rolling updates; and (iii) use all reasonable (and where commercially prudent, alternative\u2011sourcing)\
      \ efforts to overcome, including disaster\u2011recovery workarounds. Payment and confidentiality obli\xADgations are\
      \ never excused.\n\nSuspension lasts only while and to the extent of direct impact. If exceeding 20 consecutive days,\
      \ the Non\u2011Affected Party may terminate for convenience, or procure alternative performance at the Affected Party\u2019\
      s cost (where re-medy is reasonably available), without liability."
    clause_type: Force Majeure

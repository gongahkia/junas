  inputs:
    clause_text: "Confidential Information means information disclosed by one party (Disclosing Party) to the other (Receiving\
      \ Party) that is (a) marked \u201Cconfidential\u201D at the time of disclosure, or (b) if disclosed orally, identified\
      \ as confidential at disclosure and confirmed in writing within 10 Business Days. It excludes information that the Receiving\
      \ Party proves: is or becomes public through no fault of the Receiving Party; was lawfully known to it without duty\
      \ of confidence; is independently developed without use of Confidential Information; or is rightfully received from\
      \ a third party without duty of confidence. The Receiving Party shall use Confidential Information solely to perform\
      \ this Agreement, protect it with at least reasonable care, and disclose it only to its directors, employees, Affiliates,\
      \ and professional advisers who have a need to know and are bound by confidentiality obligations; the Receiving Party\
      \ remains responsible for their compliance. If legally compelled to disclose, the Receiving Party may do so, but shall\
      \ (where lawful) give prompt written notice and limit disclosure to what is required, seeking protective treatment.\
      \ On written request, the Receiving Party will return or destroy Confidential Information, except for archival copies\
      \ retained for compliance or backup that remain protected. Obligations last 3 years from disclosure, except for information\
      \ expressly identified in writing as \u201CTrade Secret,\u201D which lasts while it remains secret. The Disclosing Party\
      \ provides Confidential Information \u201Cas is.\u201D The Receiving Party\u2019s liability under this clause is limited\
      \ to direct losses reasonably foreseeable; indirect or consequential losses are excluded."
    clause_type: Confidentiality

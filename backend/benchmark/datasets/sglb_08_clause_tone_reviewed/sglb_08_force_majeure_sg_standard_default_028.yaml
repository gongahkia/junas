    clause_text: "Neither Party is liable for any delay in or failure to perform any non-monetary obligation to the extent\
      \ caused by a Force Majeure Event. A \u201CForce Majeure Event\u201D means: (a) act of God, including flood, storm,\
      \ lightning or earthquake; (b) fire or explosion; (c) epidemic or pandemic and any related governmental restriction,\
      \ quarantine or directive; (d) war, armed conflict, act of terrorism, riot or civil commotion; (e) strike, lockout or\
      \ other industrial action affecting third parties; (f) failure or interruption of utilities, transportation, telecommunications\
      \ or networks not caused by the affected Party; (g) any act of government, court or regulatory authority, including\
      \ embargo, sanction or change in law; or (h) any similar event beyond the affected Party\u2019s reasonable control.\
      \ Force Majeure does not include lack of funds, inability to pay, changes in market conditions, or events caused by\
      \ the affected Party\u2019s negligence, wilful default, or strikes by its own employees. The affected Party must notify\
      \ the other promptly and in any event within 7 days, giving reasonable particulars and updates, and must use reasonable\
      \ endeavours to mitigate and resume performance. Time for performance is extended accordingly. If a Force Majeure Event\
      \ continues for 60 consecutive days, either Party may terminate on 7 days\u2019 notice without liability, save for accrued\
      \ rights. Obligations to pay money are not excused."
    clause_type: Force Majeure

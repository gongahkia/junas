  inputs:
    clause_text: "Each Party shall keep confidential and not disclose to any third party any non\u2011public information disclosed\
      \ by or on behalf of the other Party that is marked or reasonably understood to be confidential, including the terms\
      \ of this Agreement, business plans, pricing, financial data, customer and supplier information (including personal\
      \ data as defined under the Personal Data Protection Act 2012), product roadmaps, designs, source code, algorithms,\
      \ security test results, access credentials (such as passwords and encryption keys), and other technical or operational\
      \ materials (Confidential Information). A Party may use Confidential Information solely to perform this Agreement and\
      \ may disclose it to its employees, professional advisers and subcontractors with a need to know who are bound by obligations\
      \ no less protective; the disclosing Party remains responsible for their compliance. The foregoing does not apply to\
      \ information that is or becomes public through no fault of the recipient, was lawfully known to the recipient, is independently\
      \ developed, or is rightfully received from a third party without duty of confidence. If legally required to disclose,\
      \ the recipient will (where lawful) give prompt notice and cooperate to seek protective treatment. On request, Confidential\
      \ Information will be returned or securely destroyed, except for archival copies retained for legal, regulatory or routine\
      \ backup purposes. Obligations survive for three years, save that trade secrets and personal data remain protected for\
      \ so long as they remain confidential. Equitable and contractual remedies under Singapore law (including breach of confidence)\
      \ apply."
    clause_type: Confidentiality

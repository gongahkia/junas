  inputs:
    clause_text: "Non-Compete (Balanced). For the purpose of protecting the Employer\u2019s confidential information and customer\
      \ connections, the Employee agrees that, during the Restricted Period (six months from termination), the Employee will\
      \ not, without prior written consent, engage in Similar Duties for a Restricted Competitor within the Restricted Area.\
      \ \u201CSimilar Duties\u201D means duties substantially similar to those performed by the Employee in the 12 months\
      \ prior to termination for the business lines in which the Employee had material involvement (the \u201CRestricted Business\u201D\
      ). \u201CRestricted Competitor\u201D means any entity that, within the Republic of Singapore, competes in the Restricted\
      \ Business. \u201CRestricted Area\u201D means Singapore and any location within 5 km of any office or site for which\
      \ the Employee had managerial or revenue responsibility in the last 12 months.\n\nCarve-outs: passive investments under\
      \ 5%; roles in non-competing divisions; general advertising; and academic, pro bono or governmental service. If the\
      \ Employer terminates the Employee other than for serious misconduct, the Employer will pay a restraint allowance equal\
      \ to 20% of Base Salary during the Restricted Period; any paid garden leave will reduce the Restricted Period day-for-day.\n\
      \nProcess and cure: The Employee may seek consent for a proposed role; the Employer will respond within 10 business\
      \ days, failing which consent is deemed granted subject to reasonable confidentiality undertakings. If the Employer\
      \ reasonably alleges breach, it will notify the Employee and allow seven days to cure by ceasing or adjusting the conflicting\
      \ activity."
    clause_type: Non-Compete / Restraint of Trade
  expected_output:

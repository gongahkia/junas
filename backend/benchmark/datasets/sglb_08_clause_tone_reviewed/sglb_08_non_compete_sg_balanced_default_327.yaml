  inputs:
    clause_text: "Non-Compete (Balanced). For a period of 6 months after the Employee\u2019s termination of employment (the\
      \ Restricted Period), within the Republic of Singapore (the Restricted Territory), the Employee shall not, without the\
      \ Employer\u2019s prior written consent (not to be unreasonably withheld), undertake a role (as employee, consultant\
      \ or otherwise) with any business that competes with the Employer in respect of any line of business in which the Employee\
      \ had material involvement in the 12 months before termination (Restricted Business), where the role would involve substantially\
      \ similar functions and a material risk of use of the Employer\u2019s confidential information or trade connections.\
      \ Carve-outs: passive investments up to 5%, roles outside the Restricted Territory, purely academic/research roles,\
      \ and roles in compliance, legal, finance or back-office support that do not use such information. Process: the Employee\
      \ may seek consent by providing a job description; the Employer shall respond within 7 business days, failing which\
      \ consent is deemed granted. Consideration: for each month of the Restricted Period not spent on paid garden leave,\
      \ the Employer shall pay a non-compete allowance equal to 50% of the Employee\u2019s last monthly base salary; non-payment\
      \ not remedied within 14 days suspends this covenant until cured. Before injunctive relief (save for wilful breach),\
      \ the Employer shall give 7 days\u2019 written notice to cure. The parties agree to severance or narrowing to specific\
      \ clients, functions or geography if required for reasonableness."
    clause_type: Non-Compete / Restraint of Trade

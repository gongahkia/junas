  inputs:
    clause_text: "Each Party (Recipient) shall hold in confidence any non\u2011public information disclosed by the other (Discloser)\
      \ that is marked or, by its nature and context, ought reasonably to be treated as confidential (Confidential Information),\
      \ and shall use it solely for the Permitted Purpose agreed between the Parties, applying at least the degree of care\
      \ it uses for its own information of like sensitivity (which standard may reasonably vary by category and context).\
      \ The foregoing is mutual and subject to carve\u2011outs where the information: (a) is or becomes public through no\
      \ breach; (b) was lawfully known to Recipient without restriction; (c) is independently developed; or (d) is rightfully\
      \ received from a third party. If disclosure is compelled by law, regulator, or court in Singapore, Recipient shall,\
      \ to the extent practicable, give prompt notice and co\u2011operate to seek protective measures. Inadvertent disclosure\
      \ shall not constitute a breach if remedied within 10 Business Days of notice. Except for wilful default, fraud, or\
      \ misuse intended to compete, each Party\u2019s aggregate liability under this clause shall not exceed fees paid or\
      \ payable in the 12 months preceding the claim; indirect and exemplary damages are excluded. This clause is without\
      \ prejudice to, and cumulative of, rights under Singapore\u2019s equitable doctrine of breach of confidence."
    clause_type: Confidentiality

    clause_text: "Force Majeure. Neither Party is liable for delay or non\u2011performance to the extent directly caused by\
      \ a Force Majeure Event that renders performance illegal, impossible, or (acting reasonably) commer cially impracticable.\
      \ A \u201CForce Majeure Event\u201D means, including only the following (without limitation as to sub\u2011categories):\
      \ act of God (earthquake, flood, storm, lightning), fire not caused by negligence, epidemic/pandemic or officially declared\
      \ outbreak, govt. order or change in law, war, riot, civil commotion, terrorism, embargo or sanctioned export restriction,\
      \ national\u2011scale utility failure, or third\u2011party carrier outage, and verified cyber\u2011attack not attributable\
      \ to the affected Party\u2019s inadequate safeguards. Payment obligations are not excused; nor are delays due to lack\
      \ of funds, ordinary supply fluctuations, or labor disputes of the affected Party\u2019s own workforce.\n\nThe affected\
      \ Party shall give written notice within five (5) Business Days (late notice limits relief to the period after notice)\
      \ and use reasonable efforts to mitigate, implement work\u2011arounds, and allocate available per\u2011for mance pro\u2011\
      rata. Time for performance is extended for the duration of impact plus a reasonable restart period not exceeding ten\
      \ (10) Business Days.\n\nIf the Force Majeure Event continues for forty\u2011five (45) consecutive days or sixty (60)\
      \ days in any ninety (90) day period, either Party may terminate the affected Order after an escalation meeting and\
      \ a seven (7) day cure/alternative\u2011source window. Each Party bears its own mitigation costs."

    clause_text: "Force   Majeure. The Company shall not be liable for, and its obligations shall be deemed suspended and/or\
      \ extended, to the extent any Force Majeure Event prevents, hinders or renders commercially impracticable performance.\
      \ \u201CForce Majeure Event\u201D means, and is agreed to specifically include: acts of God (including typhoon, flood,\
      \ lightning, earthquake), fire or explosion; epidemic, pandemic, endemic disease, quarantine or public\u2011health measures;\
      \ war, terrorism, riot or civil commotion; strikes, lock\u2011outs or other industrial disputes (including at the Company\u2019\
      s or its sub\u2011contractors\u2019 facilities); embargo, sanctions or currency restriction; breakdown of plant, machinery\
      \ or essential systems; failure or outage of power, utilities, telecommunication, Internet backbone, DNS or cloud platforms;\
      \ cyber\u2011attack (incl. ransomware); shortage of raw materials, freight or transport; supply\u2011chain disruption;\
      \ changes in, or compliance with, any law, directive or order of any Governmental Authority (including in Singapore);\
      \ and any failure or delay of third\u2011party suppliers. For clarity, a Force Majeure Event affecting a Company sub\u2011\
      contractor shall be treated as an Event affecting the Company.\n\nUpon notice (which the Company m ay give within a\
      \ commercially reasonable time), time for performance shall be extended for the Event\u2019s duration plus ninety (90)\
      \ days, or such longer period as the Company reasonably determines, and the Company may allocate capacity, vary service\
      \ levels, substitute performance, suspend in whole or part, and/or recover schedule thereafter. Fees remain payable;\
      \ the Customer shall, on demand (within 7 days), reimburse incremental costs. The Customer may not claim Force Majeure\
      \ for cash\u2011flow or financing issues and must promptly implement contingency measures; failure to deliver a compliant\
      \ notice within 24 hours of awareness disentitles the Customer. If an Event persists > 10 Business Days, the Company\
      \ may terminate without liability on 24 hours\u2019 notice, without prejudice to accrued rights."

  inputs:
    clause_text: "Confidentiality. Each Party (the Receiving Party) shall keep confidential all non\u2011public information\
      \ disclosed by the other Party (the Disclosing Party), whether oral, visual or in   writing, and use it only for the\
      \ agreed Purpose, applying at least the care it uses for its own similar information (but no less than reasonable care).\
      \ Disclosure is limited to personnel and advisers on a need\u2011to\u2011know basis under obligations no less protective.\
      \ \u201CConfidential Information\u201D excludes information that the Receiving Party can show: (a) is or becomes public\
      \ through no breach; (b) was lawfully known without duty of confidence; (c) is independently developed; or (d) is received\
      \ from a third party free of duty. If disclosure is compelled by law or a Regulator, the Receiving Party shall, where\
      \ lawful, give prompt notice and cooperate to seek a protective order, disclosing only the minimum required.\n\nInadvertent\
      \ disclosure shall be notified promptly (and in any event within 5 Business Days) and the Parties will implement a jointly\u2011\
      agreed mitigation plan; a reasonable cure opportunity shall be afforded, without prejudice to equitable relief. Residuals\
      \ retained in unaided memory may be used, provided no intentional memorisation or copying occurred and no source code\
      \ or personal data is implicated.\n\nUpon request or termination, Confidential Information will be returned or destroyed\
      \ (one archival copy permitted for legal compliance). Aggregate liability for breach of this clause is capped at the\
      \ greater of S$350,000 or amounts paid or payable in the prior 12 months, except for wilful misconduct; injunctive and\
      \ equitable remedies (including breach of confidence) remain available."
    clause_type: Confidentiality
  expected_output:

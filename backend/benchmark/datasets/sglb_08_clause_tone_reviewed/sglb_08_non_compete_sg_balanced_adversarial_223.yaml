  inputs:
    clause_text: "Non\u2011Compete (Balanced and Conditional). For a period of six (6) months following termination of employment\
      \ (the Restrictive Period), the Employee shall not, within Singapore and only with respect to products or services in\
      \ which the Employee had material involvement during the 12 months preceding termination (the Restricted Business),\
      \ engage (whether as employee, consultant or owner) in a competing role that is reasonably likely to compete with the\
      \ Restricted Business. This restraint applies only if the Company elects in writing within seven (7) days of termination\
      \ and pays a monthly restraint payment equal to twenty\u2011five percent (25%) of the Employee\u2019s last drawn Base\
      \ Salary for each month of the Restrictive Period; if payment is late and not cured within five (5) business days after\
      \ notice, the restraint shall be suspended pro tanto. Carve\u2011outs: (i) passive investments <5% in a listed entity;\
      \ (ii) roles not involving the Restricted Business; (iii) academic or standards\u2011setting work not using Confidential\
      \ Information; and (iv) any role consented to by the Company (consent not to be unreasonably withheld or delayed; deemed\
      \ given if no written response within ten (10) business days of full particulars). Before accepting any proposed role,\
      \ the Employee shall give reasonable details to enable assessment. Breach: injunctive relief and damages capped at three\
      \ (3) months\u2019 Base Salary (save for deliberate misappropriation). Nothing herein prevents lawful competition beyond\
      \ the foregoing limits, which shall be construed no wider than reasonably necessary under Singapore law."
    clause_type: Non-Compete / Restraint of Trade

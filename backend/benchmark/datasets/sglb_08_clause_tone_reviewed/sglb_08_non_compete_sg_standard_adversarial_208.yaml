      \ partner, employee, consultant or otherwise) in any business which competes with the Re\xADstricted Business, but only\
      \ to the extent the role or activities are similar to those performed by the Em\xADployee and relate to customers and/or\
      \ prospects or projects with whom the Em\xADployee had material dealings, or about whom the Em\xADployee possessed Confidential\
      \ Information, in that 12\u2011month period. \u201CRe\xADstricted Business\u201D means the business of supplying [describe\
      \ Company\u2019s core services/products] carried on by the Company as at the Termination Date.\n\nFor the avoidance\
      \ of doubt, nothing herein prevents (a) passive investment of up to 5% in a listed entity, (b) general advertising not\
      \ targeted at such customers, or (c) employment by a diversified group where the Em\xADployee is effectively ring\u2011\
      fenced from the Re\xADstricted Business, and this is without prejudice to any duty of confidentiality.\n\nIf any part\
      \ is invalid, it shall be read down or severed to the extent reasonably necessary to be valid under Singapore law."

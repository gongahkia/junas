- name: sglb_08_confidentiality_sg_standard_default_094
  inputs:
    clause_text: "Each party, as recipient (Recipient), shall keep confidential all non-public information disclosed by the\
      \ other party (Discloser), whether oral, written or in any form, including business, technical, financial and customer\
      \ information (Confidential Information). Recipient shall use Confidential Information solely to perform this Agreement,\
      \ apply at least reasonable care to protect it, and disclose it only to its and its Affiliates\u2019 officers, employees\
      \ and professional advisers on a need-to-know basis, provided such persons are bound by confidentiality obligations\
      \ no less protective. Recipient shall promptly notify Discloser of any unauthorised use or disclosure.\n\nConfidential\
      \ Information does not include information that Recipient can demonstrate: (a) is or becomes public other than through\
      \ breach; (b) was lawfully received from a third party without duty of confidence; (c) was independently developed without\
      \ use of Confidential Information; or (d) is required to be disclosed by law, court, governmental or regulatory authority\
      \ (including any stock exchange), provided Recipient gives prompt notice (to the extent lawful) and discloses only what\
      \ is necessary.\n\nUpon request or termination, Recipient shall return or destroy Confidential Information, save that\
      \ one archival copy may be retained for legal or compliance purposes subject to this clause. No licence is granted.\
      \ These obligations are in addition to duties at law or in equity and survive for three years from last disclosure,\
      \ and indefinitely for trade secrets while they remain confidential. Discloser may seek injunctive or other equitable\
      \ relief."
    clause_type: Confidentiality

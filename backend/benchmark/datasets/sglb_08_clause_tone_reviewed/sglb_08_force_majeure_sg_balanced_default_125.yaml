  inputs:
    clause_text: "Force Majeure\n\n(a) Force Majeure Event means, to the extent beyond the affected party\u2019s reasonable\
      \ control and despite reasonable prevention and contingency planning: act of God (including flood, earthquake or typhoon),\
      \ fire or explosion; epidemic or pandemic and related governmental measures; war, terrorism, riot or civil commotion;\
      \ lawful strike or lock\u2011out not limited to the affected party\u2019s workforce; material utility, transport, telecommunications\
      \ or internet backbone outage; government embargo, sanctions, change in law or order of court. Shortage of funds, changes\
      \ in market prices, or failure of a subcontractor (except where caused by a Force Majeure Event) are excluded.\n\n(b)\
      \ On a Force Majeure Event, the affected obligations are suspended to the extent prevented; unaffected obligations must\
      \ continue. The affected party shall: notify within 5 business days with particulars and a mitigation plan, update at\
      \ reasonable intervals, use reasonable endeavours to mitigate (including alternate sourcing), and allocate available\
      \ capacity pro rata among customers. The other party shall reasonably cooperate. Payment obligations remain due, except\
      \ that amounts solely impeded by a Force Majeure Event affecting payment systems are deferred and cured within 10 business\
      \ days after restoration.\n\n(c) If suspension lasts 60 consecutive days or 90 days in any 180\u2011day period, either\
      \ party may terminate the impacted order on 10 business days\u2019 notice. Prepaid amounts for undelivered services\
      \ are refunded pro rata; accrued rights survive."
    clause_type: Force Majeure

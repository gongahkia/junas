    clause_text: "Confidentiality. The Recipient shall keep in strictest confidence all information, data, know\u2011how and\
      \ materials of or relating to the Discloser (and its Affiliates) disclosed, observed, derived or otherwise obtained\
      \ (\u201CConf idential Inf ormation\u201D), and shall: (i) use it solely for the Purpose as unilaterally specified or\
      \ updated by the Discloser from time to time; (ii) implement not less than ISO/IEC 27001\u2011equivalent safeguards\
      \ or stricter measures notified by the Discloser; (iii) promptly (and in any event within 12 hours) notify the Discloser\
      \ of any suspected or actual breach, cooperate in full forensic investigation, and permit on\u2011site audit/access\
      \ upon demand. No \u201Cresiduals\u201D use, reverse engineering, parsing or decompilation is permitted. Carve\u2011\
      outs apply only to information the Recipient proves by pre\u2011existing written records to be public (through no unauthorised\
      \ act) or lawfully known before receipt; compelled disclosure is permitted only to the minimum extent required after\
      \ prior notice and Discloser\u2011directed protective steps. On request (or automatically upon termination), Recipient\
      \ shall immediately cease use, return all media, and securely destroy all copies and certify such destruction (format\
      \ acceptable to the Discloser). The Discloser may seek interim, injunctive, search\u2011order or specific performance\
      \ relief without bond, and additionally recover damages, equitable compensation and an account of profits; the Recipient\
      \ shall indemnify the Discloser for all Losses (including indirect/ consequential losses). Obligations survive perpetually\
      \ (and, for trade secrets, indefinitely) unless expressly waived in a signed writing by the Discloser. Nothing herein\
      \ limits remedies under Singapore\u2019s equitable doctrine of breach of confidence."

    clause_text: "Subject to any applicable limitations of liability in this Agreement, each party (Indemnifying Party) shall\
      \ indemnify, defend and hold harmless the other party, its Affiliates and their officers, employees and agents (Indemnified\
      \ Parties) from and against any third-party claim, demand, action or proceeding, and all related losses, damages, liabilities,\
      \ costs and reasonable legal fees, arising from: (a) the Indemnifying Party\u2019s breach of this Agreement; (b) the\
      \ Indemnifying Party\u2019s negligence or wilful misconduct; or (c) any allegation that materials, technology or data\
      \ provided by the Indemnifying Party infringe a third party\u2019s intellectual property rights, except to the extent\
      \ the claim arises from combination or use not contemplated by this Agreement, or from modifications not made by the\
      \ Indemnifying Party. The Indemnified Party shall promptly notify the Indemnifying Party of any claim; failure to do\
      \ so shall not relieve the Indemnifying Party of its obligations except to the extent prejudiced. The Indemnifying Party\
      \ shall control the defence and settlement (with counsel reasonably acceptable to the Indemnified Party), but may not\
      \ settle any claim that imposes non-monetary obligations or admissions on the Indemnified Party without its prior written\
      \ consent. The Indemnified Party may participate at its own cost and shall reasonably cooperate. The indemnities in\
      \ this clause survive termination and do not limit liabilities that cannot be limited at law."

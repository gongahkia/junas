  inputs:
    clause_text: "Indemnification. The Indemnifying Party shall indemnify, defend and hold harmless the Indemnified Party,\
      \ its Affiliates and their officers, employees and agents from and against all losses, liabilities, damages, fines,\
      \ penalties, costs and expenses (including reasonable legal fees and disbursements) arising out of any claim, demand,\
      \ action or proceeding by a third party to the extent such claim arises from (a) the Indemnifying Party\u2019s breach\
      \ of this Agreement, (b) infringement or misappropriation by any deliverable or service supplied by the Indemnifying\
      \ Party, (c) violation of applicable law by the Indemnifying Party, or (d) bodily injury, death or property damage caused\
      \ by the Indemnifying Party\u2019s negligence or wilful misconduct. The Indemnified Party shall give prompt written\
      \ notice; failure to notify shall not relieve the Indemnifying Party except to the extent of actual prejudice. The Indemnifying\
      \ Party shall control the defence and settlement with counsel reasonably acceptable to the Indemnified Party, keep the\
      \ Indemnified Party informed, and not settle any claim imposing non-monetary obligations, admissions, injunctive relief,\
      \ or reputational harm on the Indemnified Party without its prior written consent. The Indemnified Party may participate\
      \ with its own counsel; if there is a conflict of interest or failure to defend diligently, it may assume the defence\
      \ at the Indemnifying Party\u2019s cost. This indemnity excludes claims to the extent caused by the Indemnified Party\u2019\
      s breach or wilful misconduct, is primary, payable on demand, survives termination, and applies notwithstanding any\
      \ limitation of liability."
    clause_type: Indemnification

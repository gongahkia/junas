      \ independently outside the Services (collectively, \u201CBackground IP\u201D).  (b) Subject to clause (a) and to the\
      \ Singapore Copyright Act 2021 (as amended) (the \u201CAct\u201D), all copyright and other intellectual property rights\
      \ in any deliverables, specifications or other materials first created specifically for the Project in the course of\
      \ performing the Services (\u201CProject IP\u201D) shall vest in the Client on creation to the extent permitted by law;\
      \ otherwise, the Service Provider hereby assigns (and agrees to assign) such rights to the Client with effect upon receipt\
      \ of full payment.  To the extent the Act provides that authorship ownership would otherwise subsist (save where created\
      \ in the course of employment), the Parties agree that a written assignment shall be executed (by deed if required)\
      \ to give effect to the foregoing.  (c) The Service Provider retains ownership of its Background IP and grants to the\
      \ Client a non\u2011exclusive, worldwide, perpetual, royalty\u2011free licence to use such Background IP as embedded\
      \ in, and solely as necessary to exploit, the Project IP/Deliverables.  (d) Each Party shall, so far as practicable,\
      \ procure moral rights consents and provide reasonable further assurances (at the Client\u2019s cost where unusual effort\
      \ is required).  No other licences are granted or implied."

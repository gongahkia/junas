    clause_text: "Non\u2011Competition; Non\u2011Dealing (Restraint). For the period of twelve (12) months following Termination\
      \ (however arising) \u2014 or, if a court so requires, the longest lesser period enforceable (failing which nine (9)\
      \ months; failing which six (6) months) \u2014 the Employee shall not, in (i) Singapore and (ii) any territory in which\
      \ the Employer or any Affiliate had operations, sales, tenders, or material Customers in the twelve (12) months prior\
      \ to Termination, directly or indirectly: (a) engage in, be employed by, advise, invest in (other than strictly passive\
      \ holdings <3%), or otherwise be concerned with any business the same as, similar to, or competitive with the Restricted\
      \ Business; (b) solicit, canvass, accept, or otherwise deal with any Customer, Prospective Customer, or Key Contact;\
      \ or (c) solicit, induce, employ or engage any Restricted Person. \u201CRestricted Business\u201D means the research,\
      \ design, marketing, distribution, or support of solutions, products or services within the Field as carried on by the\
      \ Employer at any time in the 12 months pre\u2011Termination (as may be notified from time to time), or any material\
      \ part thereof.\n\nTime on Garden Leave shall not erode the Restraint; any breach tolls the Restraint until cured. The\
      \ Employer may waive or vary any restraint only by express written notice in its sole and absolute discretion. Without\
      \ prejudice, the Employer is entitled to injunctive relief, an account of profits and/or liquidated damages equal to\
      \ twelve (12) months\u2019 last\u2011drawn gross remuneration, plus full legal costs. Each restriction is separate and\
      \ severable; if any term is void/over\u2011broad, it shall be read down to the minimum extent necessary and enforced\
      \ accordingly."

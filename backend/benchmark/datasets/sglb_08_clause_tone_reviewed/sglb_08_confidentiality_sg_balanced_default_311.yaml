  inputs:
    clause_text: "Each party, as recipient, shall keep confidential all information disclosed by the other that is marked\
      \ or reasonably understood to be confidential, and shall: (a) use it solely for the agreed purpose; (b) protect it with\
      \ at least the same degree of care as its own similar information (and not less than reasonable care); and (c) disclose\
      \ it only to personnel and advisers on a need\u2011to\u2011know basis who are bound by obligations no less protective.\
      \ This does not apply to information that is public (through no breach), already known, independently developed without\
      \ reference, or rightfully received from a third party without duty of confidence. If disclosure is required by law,\
      \ regulator or court, the recipient shall (to the extent lawful) give prompt notice, cooperate to seek protective measures,\
      \ and disclose only what is necessary.\n\nOn request, recipient shall return or destroy Confidential Information, save\
      \ that archival or back\u2011up copies may be retained as required by law or for audit, subject to ongoing confidentiality.\
      \ The recipient shall promptly notify of any unauthorised access and take remedial steps; for inadvertent breaches,\
      \ the discloser will allow 10 business days to cure before seeking injunctive relief (urgent relief excepted). Except\
      \ for fraud or wilful default, each party\u2019s liability for breach of this clause is capped at 125% of fees paid\
      \ or payable in the preceding 12 months. Remedies include contract and equitable relief under Singapore law, including\
      \ the doctrine of breach of confidence. Obligations survive for three years from disclosure, and indefinitely for trade\
      \ secrets while they remain confidential."
    clause_type: Confidentiality

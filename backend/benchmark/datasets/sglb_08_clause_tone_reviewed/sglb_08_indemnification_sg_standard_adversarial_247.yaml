    clause_text: "Indemnity.  Subject to Clause [Limitation of Liability], each Party (the Indemnifying Party) shall indemnify,\
      \ defend and hold harmless the other Party, its Affiliates and their respective officers, employees and agents (each,\
      \ an Indemnified Party) from and against any third\u2011party claim, demand, suit or action, and all losses, liabilities,\
      \ damages, penalties and reasonably incurred costs and expenses (including reasonable legal fees on a solicitor\u2011\
      and\u2011client basis) arising out of: (a) the Indemnifying Party\u2019s breach of this Agreement; (b) its negligence\
      \ or wilful misconduct; or (c) alleged infringement of Intellectual Property Rights by materials, data or technology\
      \ supplied by the Indemnifying Party, save that no indemnity shall apply to the extent a claim arises from the Indemnified\
      \ Party\u2019s acts, omissions, instructions and/ or combinations not provided by the Indemnifying Party. The Indemnifying\
      \ Party shall have the right to assume sole conduct, control and defence  of any claim (with counsel reasonably acceptable),\
      \ provided it: (i) receives prompt written notice (failure to notify relieving it only to the extent prejudiced); (ii)\
      \ keeps the Indemnified Party reasonably informed; and (iii) does not settle any claim imposing non\u2011monetary obligations\
      \ or admissions on, or failing to grant a full release to, the Indemnified Party without prior  written consent (not\
      \ to be unreasonably withheld). The Indemnified Party may participate at its own cost and shall provide reasonable cooperation.\
      \ This Clause shall survive expiry or termination for so long as any claim may be made thereunder."
    clause_type: Indemnification

    clause_text: "Force  Majeure. A \u201CForce\u2011Majeure Event\u201D means any event or circumstance beyond the reasonable\
      \ control of the affected Party that prevents or materially delays performance, and which could not reasonably have\
      \ been foreseen or avoided, including: (a) acts of God (typhoon, flood, earthquake, lightning, fire not caused by negligence);\
      \ (b) war, terrorism, riot or civil commotion; (c) strikes, lock\u2011outs or other industrial disturbances not limited\
      \ to the affected Party\u2019s own workforce; (d) epidemic or pandemic (including government quarantine, border closures,\
      \ \u201Cstay\u2011home\u201D or analogous measures); (e) failure of utilities, telecommunications or transport systems\
      \ not caused by the affected Party; and (f) acts of government, court orders, embargoes or export/import restrictions.\
      \ Non\u2011performance due to lack of funds is ex cluded, and failures of subcontractors are excluded except to the\
      \ extent directly caused by a Force\u2011Majeure Event. The affected Party shall notify the other as soon as practicable,\
      \ and in any event within 10 Business Days (or such longer period as is reasonably justifiable), giving reasonable particulars\
      \ and updates. Obligations shall be suspended to the extent affected, with time for performance extended for the period\
      \ of impact plus reasonable recovery. Each Party shall use commercially reasonable efforts to mitigate. Payment obligations\
      \ for amounts already due and confidentiality remain unaffected. If a Force\u2011Majeure Event continues for 90 consecutive\
      \ days, either Party may terminate by notice without liability, save for acc rued sums and reasonable, evidenced demobilisation\
      \ costs."
    clause_type: Force Majeure

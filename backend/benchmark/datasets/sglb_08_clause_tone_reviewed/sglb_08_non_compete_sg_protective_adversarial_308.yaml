      \ country in which the Employee had primary responsibility for the Company\u2019s Restricted Business in the 12 months\
      \ before Termination (if any), engage in any capacity substantially similar to the role performed in that period in\
      \ any Restricted Business that competes for the same customers, as to: (A) services/products the Employee materially\
      \ worked on; and/or (B) Restricted Customers or Prospects with whom the Employee had material dealings or about whom\
      \ the Employee had Confidential Information. This clause does not prohibit: passive investments <5%; non\u2011commercial\
      \ academic or public\u2011interest work not directed at Restricted Customers; or any role consented to in writing by\
      \ the Company (consent may be granted or withheld at the Company\u2019s discretion; silence is not consent). The Employee\
      \ must give at least ten (10) Business Days\u2019 prior written notice of any intended new role, with reasonable particulars.\
      \ Without prejudice, equitable relief, tolling during any period of breach, and severability apply to preserve enforceability."

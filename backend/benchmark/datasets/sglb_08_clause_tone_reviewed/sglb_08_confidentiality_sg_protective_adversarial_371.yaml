    clause_text: "Confidential Information means information disclosed by Discloser that is (a) clearly marked \u201CConfidential\u201D\
      \ at disclosure or, if disclosed orally/visually, is identified as confidential at the time and summarised in writing\
      \ within ten (10) days; provided always that information is excluded to the extent it is or becomes public (other than\
      \ through Recipient\u2019s breach), was lawfully known to Recipient without duty, is independently developed without\
      \ use of Discloser\u2019s information, is rightfully received from a third party without duty, is trivial, or is apparent\
      \ on reasonable inspection. Recipient shall use such information solely for the agreed Purpose and protect it with at\
      \ least reasonable care (not less than it uses for its own like information). Recipient may disclose to its affiliates,\
      \ contractors and professional advisers having a need\u2011to\u2011know under written duties no less protective; Recipient\
      \ remains responsible. If legally compelled, Recipient may disclose to the minimum extent required, giving prompt notice\
      \ where lawful and reasonable cooperation at Discloser\u2019s cost. Residuals in unaided memory may be used, without\
      \ intent to circumvent. On request, Recipient will return or destroy, save for routine archival/backup copies and records\
      \ retained to comply with law, which remain subject hereto for two (2) years (or, only to the extent protectable in\
      \ equity under Singapore law). Information is provided \u201Cas is\u201D; no warranty is given. Remedies (including\
      \ any equitable relief) are subject to applicable proof, notice and cure of fifteen (15) Business Days, and any liability\
      \ caps/exclusions in this Agreement. Nothing herein admits that any particular information is confidential."

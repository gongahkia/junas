  inputs:
    clause_text: "Non\u2011Compete (Balanced Restraint). For a period of nine (9) months following termination (the Restricted\
      \ Period), the Employee shall not, in the Republic of Singapore and only in respect of business lines in which the Employee\
      \ had material involvement in the last twelve (12) months, directly engage in the Restricted Business for, or solicit\
      \ business from, (a) clients or prospective clients with whom the Employee had material dealings, or (b) any named competitor\
      \ notified under this clause (together, Restricted Targets). The Employer shall within fourteen (14) days of notice\
      \ of termination provide a written schedule identifying up to thirty (30) Restricted Targets and the specific business\
      \ lines; failure to do so limits enforcement to those identified, and consent to any proposed engagement shall not be\
      \ unreasonably   withheld, deemed granted if not refused within 10 Business Days. As consideration, the Employer shall\
      \ pay a monthly Restraint   Allowance equal to 30% of base salary during any month of enforcement; if unpaid, the Employee\
      \ may suspend compliance after 7 days\u2019 written cure notice. Carve\u2011outs: passive investments \u22645% in listed\
      \ entities; roles outside the Restricted Business; compliance with law; and services outside Singapore. The Employer\
      \ shall provide written notice and a 5 Business Day cure period before seeking injunctive relief (save for manifest,\
      \ ongoing misuse of Confidential Information). If any term is void, it shall be read down to the minimum extent reasonably\
      \ necessary."
    clause_type: Non-Compete / Restraint of Trade

  inputs:
    clause_text: "Force Majeure. (a) A Force Majeure Event means only: natural catastrophes (earthquake, flood, severe storm),\
      \ war, terrorism, riot, nationwide industrial action not directed at a Party, epidemic or pandemic formally declared\
      \ by a competent public authority, or government-imposed restrictions, in each case unforeseeable at the Effective Date,\
      \ beyond the affected Party\u2019s reasonable control, not caused or contributed to by its negligence or breach, and\
      \ not avoidable by reasonable contingency planning. Failures of suppliers or subcontractors, shortages, price changes,\
      \ loss of financing, cyber incidents, equipment failure, or utility outages are excluded unless arising from a qualifying\
      \ Force Majeure Event that is widespread and externally caused. (b) The affected Party must give written notice with\
      \ particulars and supporting evidence within 3 days and provide updates; failure to notify relieves the other Party\
      \ to the extent of prejudice. (c) Obligations are suspended only to the extent impacted; payment, confidentiality, data\
      \ protection, security, and business continuity commitments are not excused. (d) The affected Party shall use diligent\
      \ efforts to mitigate, continue partial performance, and allocate available capacity to the other Party at least proportionately.\
      \ (e) If a Force Majeure Event continues for 15 days, the non-affected Party may suspend performance and procure alternatives;\
      \ the affected Party shall reimburse reasonable incremental costs. (f) If it continues for 30 days, the non-affected\
      \ Party may terminate the affected part on notice without liability (save for amounts due for goods/services delivered)."
    clause_type: Force Majeure

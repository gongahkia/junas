  inputs:
    clause_text: "Confidentiality. Recipient shall keep strictly confidential all non-public information disclosed by Discloser\
      \ in any form, including the existence and terms of this Agreement, the fact and content of discussions, business methods,\
      \ pricing and margin strategies, customer/supplier and employee identities, process flows, data schemas, algorithms,\
      \ roadmaps, internal metrics, meeting agendas and timings, IT architecture, access credentials, and any notes, analyses,\
      \ models, or metadata derived therefrom, whether or not marked confidential (collectively, Confidential Information).\
      \ Drafts and materials labeled \u201Cinternal\u201D are Confidential Information regardless of markings. Exclusions\
      \ are limited to information that Recipient demonstrates by written records: (i) is or becomes public without breach;\
      \ (ii) is independently developed without use of Confidential Information; (iii) was lawfully known free of restriction;\
      \ or (iv) is approved in writing by Discloser. Generic industry knowledge, publicly available marketing brochures, and\
      \ high-level market statistics fall within (i). Recipient shall: use Confidential Information solely for the agreed\
      \ purpose; restrict disclosure to individuals with a strict need-to-know bound by written terms no less protective;\
      \ implement safeguards at least equal to its highest internal classification and industry best practice; notify Discloser\
      \ within 24 hours of any breach; and on demand within 24 hours cease use and return or destroy all Confidential Information,\
      \ certifying destruction by an officer. Discloser may audit compliance on two business days\u2019 notice. Recipient\
      \ shall seek protective orders for compelled disclosures and disclose only what is legally required. Without prejudice\
      \ to Singapore\u2019s equitable doctrine of breach of confidence, Discloser is entitled to immediate injunctive relief\
      \ without proof of loss and full indemnity (including solicitor-and-client costs). Obligations survive indefinitely."
    clause_type: Confidentiality

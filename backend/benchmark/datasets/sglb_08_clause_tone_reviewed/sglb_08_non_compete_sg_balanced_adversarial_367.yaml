    clause_text: "Non\u2011Compete (Reciprocal; Reasonableness). For the 6\u2011month period following termination of employment\
      \ (the Restricted Period), and only within the Republic of Singapore or in relation to customers materially located\
      \ in Singapore, the Employee shall not, in a role substantially similar to the role held in the last 12 months, engage\
      \ in, or advise, any business that competes with the specific products/services or business unit on which the Employee\
      \ last materially worked (the Protected Business). The Company shall (i) pay a restraint allowance equal to 30% of Base\
      \ Salary (pro\u2011rated monthly) during the Restricted Period, save where termination is for Gross Misconduct, and\
      \ (ii) within 7 days of termination, provide a good\u2011faith list of Core Competitors and Protected Customers to guide\
      \ compliance; absent timely provision, the restriction shall be limited to non\u2011solicitation of Protected Customers\
      \ only. Carve\u2011outs: passive investments <5%, academic/charitable work, purely regional roles not directed at Singapore\
      \ customers, and any position pre\u2011cleared in writing. The Employee may seek consent; the Company will respond within\
      \ 10 Business Days, failing which consent is deemed granted. Cure: upon written notice of a suspected breach, the Employee\
      \ has 10 Business Days to cease/modify activities; if cured, equitable relief will not be pursued for that cured event.\
      \ Garden leave runs concurrent and offsets day\u2011for\u2011day. If any part is overbroad, it shall be read\u2011down\
      \ to the minimum extent reasonably necessary."
    clause_type: Non-Compete / Restraint of Trade

      \ The Receiving Party shall use Confidential Information solely for the agreed purpose and disclose it only to its and\
      \ its Affiliates\u2019 employees, officers, professional advisers, insurers, auditors, and contractors with a need to\
      \ know and who are bound by duties of confidence no less protective. The obligations do not apply to information that:\
      \ (a) is or becomes public through no breach; (b) was lawfully known to the Receiving Party without restriction; (c)\
      \ is independently developed without use of Confidential Information; (d) is rightfully received from a third party;\
      \ or (e) must be disclosed by law, regulation, court, regulator or stock exchange, provided reasonable prior notice\
      \ is given and protective measures are sought. Use of residual, unaided memory is not restricted. On request or termination,\
      \ the Receiving Party shall return or destroy Confidential Information, save for routine backups or records retained\
      \ to comply with law or internal compliance, subject to ongoing confidentiality. Information is provided \u201Cas is\u201D\
      . To the extent permitted by law, no indirect or consequential loss is recoverable and any agreed liability caps apply.\

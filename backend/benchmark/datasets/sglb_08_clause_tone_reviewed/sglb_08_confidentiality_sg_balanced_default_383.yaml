  inputs:
    clause_text: "Confidentiality. Each party (Recipient) shall keep confidential and use only for the agreed purpose the\
      \ non-public information of the other (Discloser) that is marked or reasonably understood to be confidential (Confidential\
      \ Information). Recipient shall apply no less than reasonable and industry-appropriate safeguards, disclose only to\
      \ its personnel and professional advisers with a need to know who are bound by similar obligations, and remain responsible\
      \ for their compliance. The obligations do not apply to information that: (a) is or becomes publicly available through\
      \ no breach by Recipient; (b) was lawfully known to Recipient without restriction before receipt; (c) is independently\
      \ developed without use of Confidential Information; or (d) is rightfully received from a third party without duty of\
      \ confidence. If legally required to disclose, Recipient will give prompt notice (where lawful) and cooperate to seek\
      \ protective measures. Recipient shall notify Discloser of any unauthorised access or disclosure within 48 hours and\
      \ mitigate; a non-material breach cured within 10 business days of notice will not be a material breach. On request\
      \ or termination, Recipient will return or destroy Confidential Information, retaining one archival copy for legal or\
      \ compliance purposes. Either party may seek injunctive relief, and monetary liability for breach of this clause is\
      \ limited to direct losses and subject to the Agreement\u2019s liability cap, except in cases of fraud or wilful misconduct.\
      \ Each party acknowledges that these obligations are in addition to rights and remedies available under Singapore law,\
      \ including the equitable doctrine of breach of confidence."
    clause_type: Confidentiality

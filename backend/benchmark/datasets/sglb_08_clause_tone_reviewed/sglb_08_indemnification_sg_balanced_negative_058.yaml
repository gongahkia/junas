      \ acceptable to the indemnified party. The Indemnifying Party shall not settle any claim imposing non\u2011monetary\
      \ obligations or admissions of fault on the indemnified party without prior written consent (not to be unreasonably\
      \ withheld). Each party must mitigate loss and allow a 10 Business Day cure period for remediable breaches. Exclusions:\
      \ no indemnity for fines, penalties or taxes (other than properly invoiced GST), or losses to the extent caused by the\
      \ indemnified party. Caps: each party\u2019s aggregate liability under this clause is capped at 100% of fees paid or\
      \ payable in the 12 months preceding the claim, except for IP claims, fraud, or wilful misconduct. This clause is not\
      \ a penalty and survives termination for 24 months (claims noticed within that period survive until resolved). For clarity,\
      \ \u201CBusiness Day\u201D excludes Saturdays, Sundays and Singapore gazetted public holidays."

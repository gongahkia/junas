  inputs:
    clause_text: "Non-Compete and Non-Solicitation. For a period of 6 months after the Employee\u2019s last day of employment\
      \ (Restricted Period), the Employee shall not, within Singapore (Restricted Area), directly engage in, or be employed\
      \ in a role substantially similar to the role last held with the Employer, by any business that competes with the specific\
      \ business unit, products or services on which the Employee worked and to which the Employee had material access in\
      \ the 12 months prior to termination (Competitive Business), in each case only insofar as such activities relate to\
      \ customers, projects or markets with which the Employee had material dealings (Restricted Scope). The Employee shall\
      \ not solicit (i) customers with whom the Employee had material contact in the prior 12 months, or (ii) employees senior\
      \ to, at the same level as, or directly reporting to the Employee in that period. Carve-outs: passive investments up\
      \ to 5%, roles in different divisions with effective firewalls, participation in professional or academic activities,\
      \ and responding to general advertisements. If the Employer terminates without cause or due to redundancy, the Restricted\
      \ Period reduces to 3 months, and the Employer shall pay 50% of base salary for the remaining Restricted Period not\
      \ covered by garden leave. The Employer will provide a written list of Restricted Customers within 14 days post-termination,\
      \ respond to consent requests within 10 business days (deemed consent if no response), and issue a 7-day cure notice\
      \ before claiming damages (urgent injunctive relief excepted). If any part is overbroad, it shall be read down to the\
      \ minimum necessary to be enforceable."
    clause_type: Non-Compete / Restraint of Trade
  expected_output:

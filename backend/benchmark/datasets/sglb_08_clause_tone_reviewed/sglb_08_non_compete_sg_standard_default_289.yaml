  inputs:
    clause_text: "Non-Compete. To protect the Company\u2019s legitimate proprietary interests (including Confidential Information\
      \ and trade connections), the Employee shall not, without the Company\u2019s prior written consent, for a period of\
      \ six (6) months from the Termination Date, within (a) Singapore; and (b) any other jurisdiction in which, during the\
      \ twelve (12) months immediately preceding the Termination Date, the Employee worked for or had managerial or client-facing\
      \ responsibility on behalf of the Company, directly or indirectly engage, be employed or be concerned in any capacity\
      \ with any Competing Business in relation to goods or services of the same or a materially similar kind to those with\
      \ which the Employee was materially involved during that period. \u201CCompeting Business\u201D means a business which,\
      \ as at the Termination Date, competes with the Business of the Company in the Relevant Market. \u201CBusiness\u201D\
      \ and \u201CRelevant Market\u201D shall be construed by reference to the Company\u2019s activities and customers with\
      \ which the Employee had material dealings in the twelve (12) months prior to the Termination Date. This clause does\
      \ not prevent a passive investment of up to 5% in a listed entity. Each restriction is separate and severable, and if\
      \ any part is void but would be valid if words were deleted, such deletion shall be made to the extent permitted by\
      \ law."
    clause_type: Non-Compete / Restraint of Trade

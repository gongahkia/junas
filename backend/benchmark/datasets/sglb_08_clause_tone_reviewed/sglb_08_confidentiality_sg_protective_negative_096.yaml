  inputs:
    clause_text: "Confidential Information means non-public information disclosed by the Discloser to the Recipient that is\
      \ (a) conspicuously marked \u201CConfidential\u201D at the time of disclosure, or (b) if disclosed orally, identified\
      \ as confidential then and confirmed in writing within 10 Business Days; information not so designated, or designated\
      \ only by automated classification tools, blanket email footers, or generic metadata, is not Confidential Information.\
      \ Confidential Information excludes information that is or becomes public without breach; was known to the Recipient\
      \ before disclosure; is independently developed; is lawfully obtained from a third party; is trivial, obvious, or generally\
      \ known (including website content, catalogues, public price lists, press releases, office locations, or aggregated,\
      \ anonymised metrics). Recipient will apply reasonable safeguards no less protective than it uses for similar information;\
      \ absolute security is not guaranteed. If compelled by law, Recipient may disclose after prompt written notice and only\
      \ to the extent required. Recipient may challenge any designation and, if not confirmed by the Discloser within 5 Business\
      \ Days, the challenged material is deemed non-confidential. Upon request, Recipient will return or destroy Confidential\
      \ Information, except for routine backups, one archival copy for compliance, and residual information retained in unaided\
      \ memory. Subject to Singapore law (including the equitable doctrine of confidence), liability for breach is limited\
      \ to direct losses proved; consequential, special, or punitive damages are excluded."
    clause_type: Confidentiality

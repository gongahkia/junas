    clause_text: "Force Majeure. Save as expressly provided herein, only the following events, and no others, shall constitute\
      \ \u201CForce Majeure\u201D: (a) earthquake, fire or flood of catastrophic scale; (b) war, declared or undeclared, or\
      \ actual invasion; (c) a binding order of a Singapore governmental authority that makes performance illegal (but mere\
      \ advice, guidance, shortages, price\u2011increases, labour disputes, strikes, lock\u2011outs, pandemic absences, failure\
      \ of utilities, carriers, suppliers, subcontractors or internet providers shall not). Cyber\u2011incidents qualify only\
      \ where not caused, in whole or part, by the affected party\u2019s negligence and where that party maintained industry\u2011\
      standard safeguards. The affected party (usually, the Supplier) shall: give written notice with reasonable particulars\
      \ and supporting evidence within three (3) days of the first impact (time being of the essence), update daily thereafter,\
      \ and use best endeavours, including business continuity plans and commercially reasonable alternatives, to avoid, mitigate\
      \ and cure. Monetary obligations, data protection, confidentiality, and allocation of risk/ title are never excused.\
      \ Partial performance must continue; failure to re\u2011perform by workaround or subcontract (subject to Customer\u2019\
      s prior written consent [not to be unreasonably withheld]) disentitles relief ab initio. If a Force Majeure persists\
      \ beyond 10 consecutive days, or if Customer\u2019s operations are materially prejudiced, Customer may, forthwith and\
      \ without liability, procure alternatives at Supplier\u2019s cost and/or terminate for convenience. This clause shall\
      \ be construed narrowly and strictly, and any ambiguity shall operate to the benefit of the Customer."
    clause_type: Force Majeure

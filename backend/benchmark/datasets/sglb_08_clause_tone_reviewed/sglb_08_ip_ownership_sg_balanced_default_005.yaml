      \ in an Order and created by Provider personnel for Client in the course of the Services, excluding Provider\u2019s\
      \ generic tools, libraries, frameworks and know\u2011how (\u201CProvider Tools\u201D). Provider Tools remain Provider\u2019\
      s property and are licensed to Client on a perpetual, worldwide, non\u2011exclusive, royalty\u2011free basis to use,\
      \ copy and modify as embedded in or necessary to use the Deliverables.\n(c) Joint/Undesignated Outputs. For jointly\
      \ created Deliverables not designated as Custom, the Parties will in good faith agree an ownership or cross\u2011licensing\
      \ arrangement within 30 days; failing agreement, each Party may use such Deliverables for internal purposes without\
      \ accounting to the other.\n(d) Formalities. The Parties will execute further documents reasonably required to perfect\
      \ any assignment. The Parties acknowledge that, unless created in the course of employment, the author owns copyright,\
      \ and that any assignment or waiver must be in writing and signed.\n(e) Claims and Cure. On notice of a third\u2011\
      party IP claim, the receiving Party has 30 days to cure by modify/replace; failing cure, the remedy is a refund of fees\
      \ paid for the affected Deliverable, capped at fees paid in the 12 months prior to the claim. This does not apply to\
      \ claims caused by the other Party\u2019s materials, combinations, or unauthorised modifications."

      \ Parties and their Affiliates, and their respective officers, employees, agents and successors, from and against all\
      \ Losses (including legal fees on a full indemnity basis, experts\u2019 fees, taxes, interest, penalties, investigation\
      \ and response costs, and settlement amounts) arising out of or in connection with: (a) this Agreement or its performance;\
      \ (b) any act, omission, breach, negligence or strict liability of the Indemnifying Party; (c) alleged or actual IP\
      \ infringement; (d) regulatory, tax, employment, data protection or third-party claims. This applies to claims that\
      \ are pending, threatened, informal, groundless, frivolous, mistakenly notified, or ultimately disproved, and includes\
      \ responding to audits, routine inquiries, inspections, notices and questionnaires that require time or cost. The Indemnified\
      \ Parties may assume exclusive control of the defence and settlement at their absolute discretion; the Indemnifying\
      \ Party shall cooperate fully and advance all costs within seven days of invoice, without set-off or counterclaim, and\
      \ gross-up for any withholding. No settlement or admission by the Indemnifying Party is permitted without the Indemnified\
      \ Parties\u2019 prior written consent. This indemnity is a separate and primary obligation, not subject to any duty\
      \ to mitigate, survives termination indefinitely, and is limited only to the extent finally determined by a court that\
      \ Losses were caused by the Indemnified Parties\u2019 fraud or wilful misconduct."

  inputs:
    clause_text: "Force Majeure. (a) As regards the Company only, a Force Majeure Event means any event beyond its reasonable\
      \ control, including: acts of God, fire, flood, earthquake, epidemic or pandemic, government act or omission, change\
      \ in law, import/export or port closures, embargo, war, terrorism, civil commotion, riot, nationwide general strike,\
      \ failure or curtailment of public utilities or telecommunications, cyber-attack not attributable to the Company\u2019\
      s negligence, and failure or delay of the Company\u2019s suppliers or carriers caused by any of the foregoing. (b) As\
      \ regards the Contractor, Force Majeure expressly excludes: strikes or disputes involving its workforce or subcontractors,\
      \ shortage of materials, transportation or logistics constraints, equipment failure, price increases, funding or cash\
      \ flow issues, and any event avoidable by prudent industry practice or a tested business continuity plan. (c) The Contractor\
      \ must give written notice within 24 hours with particulars, evidence and a mitigation plan; failure voids relief. The\
      \ Company may require further proof and may reject the claim in its sole discretion if not substantiated. (d) Affected\
      \ Company obligations are suspended without liability; time is extended and the Company may cancel impacted Deliverables\
      \ and withhold related payments. The Contractor\u2019s payment obligations and unaffected performance continue. (e)\
      \ During Contractor Force Majeure, the Company may source alternatives and the Contractor shall reimburse all excess\
      \ costs. (f) If Force Majeure affecting the Contractor lasts 10 consecutive days, the Company may terminate without\
      \ penalty."
    clause_type: Force Majeure

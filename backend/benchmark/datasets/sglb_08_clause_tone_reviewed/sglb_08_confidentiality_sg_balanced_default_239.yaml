  inputs:
    clause_text: "Confidentiality. Each party (Recipient) shall keep confidential all non\u2011public information disclosed\
      \ by the other (Discloser) that is marked confidential or would reasonably be understood as confidential, including\
      \ business, technical and pricing information and any personal data, and shall: (a) use it only to perform this Agreement;\
      \ (b) disclose it only to personnel and professional advisers with a strict need\u2011to\u2011know and subject to obligations\
      \ no less protective; and (c) implement safeguards commensurate with the sensitivity of the information and consistent\
      \ with reasonable industry practice and the Personal Data Protection Act 2012 (Singapore). Confidential Information\
      \ excludes information that is public, known to Recipient without duty, independently developed, or lawfully received\
      \ from a third party. If legally compelled to disclose, Recipient may do so after giving prompt notice and cooperating\
      \ to seek protective measures, and will disclose only what is required. On request or termination, Recipient will return\
      \ or securely destroy Confidential Information, save for archival copies required by law and routine backups, which\
      \ remain protected. Obligations survive for three years after termination, and for so long as information remains a\
      \ trade secret or comprises personal data. For inadvertent breaches, Recipient has 10 business days to cure after notice,\
      \ without limiting urgent injunctive relief. Direct liability for breach of this clause is capped at fees paid or payable\
      \ in the 12 months preceding the breach, except for wilful misconduct and breaches involving personal data. Rights are\
      \ without prejudice to remedies for breach of confidence under Singapore law."
    clause_type: Confidentiality

    clause_text: "The Indemnifying Party shall indemnify, defend (at its sole cost and as primary obligor) and hold harmless\
      \ the Protected Party, its Affiliates and their Personnel from and against any and all Losses, liabilities, fines, penalties,\
      \ Taxes, costs and expenses (including special, exemplary, incidental, indirect and consequential damages, loss of revenue\
      \ or profit, and legal fees on a full\u2011indemnity basis) arising out of, in connection with, or incidental to: the\
      \ Agreement; any Claim by any person; any breach, negligence, wilful misconduct, strict liability, IP infringement,\
      \ data protection incident, employment or third\u2011party demand, whether or not foreseeable.  The Indemnifying Party\
      \ shall have conduct of the defence and settlement of any Claim, provided it keeps the Protected Party promptly informed,\
      \ consults in good faith, and obtains the Protected Party\u2019s prior written consent to any settlement (consent not\
      \ to be unreasonably withheld or delayed, save that the Protected Party may withhold in its sole and unfettered discretion\
      \ where non\u2011monetary relief, admissions, or ongoing obligations are implicated).  If not assumed within 7 days,\
      \ the Protected Party may defend and recover on demand.  No duty to mitigate applies; no set\u2011off or counterclaim.\
      \  Amounts are payable within 5 Business Days, grossed\u2011up for Taxes; security for costs shall be provided on request.\
      \  This indemnity is separate, primary and uncapped (to the fullest extent permitted by law) and survives termination,\
      \ expiry or assignment until no Claim may lawfully subsist or be brought."

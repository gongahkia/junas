  inputs:
    clause_text: "Confidentiality. The Receiving Party shall hold in strict confidence all information (in any form, whether\
      \ or not marked \u201Cconfidential\u201D) disclosed by the Discloser, including derivatives, analyses and know\u2011\
      how inferred therefrom (Confidential Information), and shall use it solely for the expressly stated Purpose and for\
      \ no other purpose whatsoever. Access shall be limited to individuals pre\u2011approved in writing by the Discloser\
      \ on a need\u2011to\u2011know basis; the Receiving Party will implement security measures no less rigorous than its\
      \ highest internal standard and, upon demand, permit audit/inspection to verify compliance. Exceptions (e.g., public\
      \ domain, independently developed, rightfully obtained from a third party, or legally compelled disclosure) apply only\
      \ if the Receiving Party produces contemporaneous documentary evidence to the Discloser and, for compelled disclosures,\
      \ gives prior written notice (not less than 10 business days, where lawful) and pursues protective measures acceptable\
      \ to the Discloser. For the avoidance of doubt, any \u201Cpublic\u201D element combined with non\u2011public elements\
      \ remains protected. On demand or termination, the Receiving Party shall return or destroy all Confidential Information\
      \ within 2 days and certify completion, subject to forensic verification. The Discloser is entitled, without proof of\
      \ special damage, to interim, final, and springboard injunctions, delivery\u2011up, account of profits, equitable compensation\
      \ under the Singapore doctrine of breach of confidence, and full indemnity (including solicitor\u2011and\u2011client\
      \ costs). Obligations survive perpetually (and at least 7 years), notwithstanding any liability caps. Any ambiguity\
      \ shall be resolved in favour of the Discloser."
    clause_type: Confidentiality

  inputs:
    clause_text: "The Recipient shall keep strictly confidential all information (whether oral, written or in any form and\
      \ whether or not marked confidential) disclosed by or on behalf of the Disclosing Party, including all analyses, compilations\
      \ and derivatives thereof (\u201CConfidential Information\u201D). The Recipient shall use Confidential Information solely\
      \ to perform its obligations under this Agreement, shall disclose it only to its directors, officers, employees and\
      \ professional advisers with a strict need to know and who are bound by equivalent obligations, and shall be vicariously\
      \ liable for any breach by them. No licence is granted; reverse engineering, decompilation and disassembly are prohibited.\
      \ The Recipient shall implement industry\u2011standard technical and organisational measures, submit (on two Business\
      \ Days\u2019 notice) to reasonable audit by the Disclosing Party to verify compliance, and promptly remedy any deficiency\
      \ at its own cost. If legally compelled to disclose, the Recipient shall give prior written notice, cooperate to limit\
      \ disclosure, and disclose only under confidential treatment. Exceptions apply only to information that becomes public\
      \ through no fault of the Recipient, or is independently developed without reference. On request, the Recipient shall\
      \ cease use and return or destroy Confidential Information (including, where technically practicable, from backups)\
      \ and certify compliance. The Recipient acknowledges that damages may be inadequate; the Disclosing Party is entitled\
      \ to immediate injunctive relief, specific performance and an account of profits, without proof of special damage, in\
      \ addition to all other remedies. The Recipient shall indemnify the Disclosing Party for all losses, costs and expenses\
      \ (including legal fees on a full indemnity basis) arising from any breach. Obligations survive for five years, and\
      \ indefinitely for trade secrets."

      \ and their officers, employees, and agents from any third\u2011party claims, actions, demands, liabilities, penalties,\
      \ fines, losses, damages, and reasonable legal fees arising out of (a) the Indemnifying Party\u2019s breach of this\
      \ Agreement, (b) its negligence or wilful misconduct, or (c) alleged infringement or misappropriation by any Deliverables.\
      \ The Indemnified Party must provide prompt written notice of a claim within 20 days of becoming aware; failure to notify\
      \ timely relieves the Indemnifying Party only to the extent of actual material prejudice. The Indemnifying Party shall\
      \ assume and control the defence with counsel reasonably acceptable to the Indemnified Party, keep the Indemnified Party\
      \ informed, and advance defence costs; it shall not settle any matter imposing non\u2011monetary obligations, injunctive\
      \ relief, admissions, or lacking an unconditional release without the Indemnified Party\u2019s prior written consent.\
      \ This indemnity does not extend to the extent a claim is caused by the Indemnified Party\u2019s gross negligence or\
      \ wilful misconduct. Notices under this clause may be sent by email to the contact designated in Schedule 2 and are\
      \ deemed received on confirmation. This indemnity is a primary, separate obligation, is not insurance, survives termination,\
      \ and any limitation of liability shall not restrict recovery here for third\u2011party claims."

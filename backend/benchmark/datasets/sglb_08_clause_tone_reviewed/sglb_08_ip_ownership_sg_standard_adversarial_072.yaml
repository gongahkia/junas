      \ assignments must be in writing and signed by the assignor. For Deliverables not so identified, Provider grants Client\
      \ a non\u2011exclusive, royalty\u2011free licence to use them for internal purposes only, subject to any third\u2011\
      party terms. Jointly created Deliverables shall be owned jointly unless agreed otherwise; each Party may use such Deliverables\
      \ without accounting, subject to Background IP. Parties shall reasonably cooperate (at the requesting Party\u2019s cost)\
      \ in registrations, further assurances, and moral rights waivers insofar as permitted by law."

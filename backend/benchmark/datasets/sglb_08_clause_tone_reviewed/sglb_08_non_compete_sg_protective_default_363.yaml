  inputs:
    clause_text: "Non-Compete. For six (6) months after the Termination Date (Restricted Period), within Singapore (Restricted\
      \ Area), the Employee shall not, whether directly or indirectly, engage in, be employed by, or have any material financial\
      \ interest in any business that offers goods or services that are the same as or materially similar to those within\
      \ the Company\u2019s lines of business in which the Employee had material responsibility or involvement during the 12\
      \ months preceding termination (Restricted Business). This restraint applies only to roles in which the Employee would\
      \ perform duties of a kind that could reasonably be expected to compete materially with the Restricted Business. It\
      \ does not prohibit (a) passive investments of up to 5% in securities of a publicly listed entity, (b) employment or\
      \ services outside the Restricted Area, or (c) roles in non-competing divisions or functions unrelated to the Restricted\
      \ Business. At least ten (10) Business Days before accepting any post-termination role, the Employee must provide written\
      \ details sufficient for assessment; the Company will respond reasonably and in good faith, and silence is not consent.\
      \ Breach entitles the Company to injunctive relief and extension of the Restricted Period by the duration of breach.\
      \ If any part of this clause is unenforceable, it shall be read down to the extent necessary to be valid and enforceable."
    clause_type: Non-Compete / Restraint of Trade

  inputs:
    clause_text: "The Recipient shall keep strictly confidential all information disclosed by the Discloser or obtained through\
      \ access provided by the Discloser, whether oral, visual, written, machine\u2011readable or otherwise, including the\
      \ existence and terms of this Agreement, and any data, analyses, source code, algorithms, roadmaps, customer and vendor\
      \ information, pricing, security protocols, and any non\u2011public, proprietary, trade secret, classified, restricted\
      \ or export\u2011controlled materials. Carve\u2011outs apply only where the Recipient proves with contemporaneous written\
      \ records that the information: (a) was publicly available through no act or omission of the Recipient (redacted, leaked,\
      \ or partial availability does not qualify); (b) was rightfully known to the Recipient without duty of confidence; (c)\
      \ was independently developed without use of Confidential Information; or (d) was received from a third party not in\
      \ breach of any obligation. The Recipient shall use the highest industry standard of care, restrict access to need\u2011\
      to\u2011know bound persons, prohibit reverse engineering, decompilation, or benchmarking disclosure, and within two\
      \ business days of request return or securely destroy all materials and certify compliance; the Discloser may audit\
      \ systems and logs and conduct reasonable forensic verification. Compelled disclosure requires immediate notice and\
      \ cooperation to limit scope. The Recipient acknowledges Singapore\u2019s equitable doctrine of breach of confidence\
      \ and agrees that injunctive relief, specific performance, account of profits, and, at the Discloser\u2019s election,\
      \ liquidated damages of S$500,000 per breach or actual loss (whichever is greater) shall be available without proof\
      \ of special damage. No publicity or announcements without prior written approval."

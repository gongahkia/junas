  inputs:
    clause_text: "Non-Compete. For the 6 months immediately following termination (net of any period of paid garden leave),\
      \ the Employee shall not, within Singapore and any other country for which the Employee had direct responsibility in\
      \ the 12 months prior to termination (the Restricted Area), perform Competing Services in a Similar Capacity for the\
      \ portion of the Employer\u2019s business unit(s) to which the Employee was assigned during that period (the Restricted\
      \ Business), in relation to customers or active prospects with whom the Employee had material dealings (Restricted Customers).\
      \ Competing Services means services or products substantially similar to those the Employee performed or managed; Similar\
      \ Capacity means a role materially similar in function (e.g., sales, product, strategy) enabling use of confidential\
      \ information. This clause does not restrict: (a) passive investments under 5% in listed entities; (b) roles in unrelated\
      \ divisions of diversified groups; (c) academic teaching, community service, pro-bono work, or personal hobbies (including\
      \ gardening, blogging, or amateur sports); (d) work outside the Restricted Area; (e) responding to open, public tenders\
      \ of general applicability; or (f) use of general skills and experience. The Employee shall give 14 days\u2019 prior\
      \ written notice of any proposed role; the Employer will act in good faith and respond within 7 days indicating permitted\
      \ scope or waiver (not to be unreasonably withheld). Each restriction is separate; if any part is invalid, it shall\
      \ be modified to the minimum extent permitted by law to be enforceable."
    clause_type: Non-Compete / Restraint of Trade

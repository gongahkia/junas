    clause_text: "Force Majeure. The Company shall not be liable for, nor deemed in breach by reason of, any failure or delay\
      \ in performance caused by events beyond its reasonable control, including: acts of God (flood, earthquake, lightning),\
      \ epidemic or pandemic (including government\u2011mandated quarantine, lockdowns, or movement restrictions), war, terrorism,\
      \ insurrection, civil commotion, governmental acts or omissions, sanctions, embargoes, export or import restrictions,\
      \ changes in law or regulatory directives, industry\u2011wide shortages, failure or curtailment of utilities, transport\
      \ or telecommunications, widespread cyberattacks, or material outages at critical third\u2011party suppliers. The Counterparty\
      \ may claim force majeure only where performance has become unlawful due to a binding governmental prohibition or where\
      \ a natural disaster destroys the specific site of performance; economic hardship, price increases, failure of subcontractors,\
      \ and internal strikes do not constitute force majeure for the Counterparty. The Counterparty must give written notice\
      \ with reasonable particulars and supporting evidence within 24 hours of awareness and must, at its own cost, implement\
      \ commercially reasonable contingency measures and procure alternative sources. Payment for goods/services delivered,\
      \ standby charges, and the Company\u2019s reasonable mitigation costs remain due. The Company may reallocate supply,\
      \ adjust delivery schedules and pricing to reflect demonstrable incremental costs, or suspend performance. If a force\
      \ majeure event affecting the Company persists for 10 days, the Company may terminate or cancel without liability. The\
      \ Counterparty\u2019s sole relief is a schedule extension subject to the Company\u2019s discretion. The parties acknowledge\
      \ the events above are specifically and exhaustively identified for these purposes under Singapore law."
    clause_type: Force Majeure

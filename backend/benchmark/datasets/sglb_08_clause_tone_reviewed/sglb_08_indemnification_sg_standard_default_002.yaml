    clause_text: "Each party (Indemnifying Party) shall indemnify, defend and hold harmless the other party, its Affiliates,\
      \ and their respective officers, employees and agents (Indemnified Parties) from and against any third\u2011party claim,\
      \ demand, action or proceeding, and all resulting losses, liabilities, damages, costs and expenses (including reasonable\
      \ legal fees) arising out of or in connection with: (a) the Indemnifying Party\u2019s breach of this Agreement; (b)\
      \ the Indemnifying Party\u2019s negligence or wilful misconduct; or (c) any allegation that materials, data or deliverables\
      \ provided by the Indemnifying Party infringe any intellectual property right.\n\nThe Indemnified Party shall promptly\
      \ notify the Indemnifying Party of any claim; failure to give prompt notice shall relieve the Indemnifying Party only\
      \ to the extent prejudiced. The Indemnifying Party shall have sole control of the defence and settlement, provided that\
      \ it shall not settle any claim in a manner that imposes any admission of liability or non\u2011monetary obligation\
      \ on the Indemnified Party without its prior written consent (not to be unreasonably withheld). The Indemnified Party\
      \ may participate with its own counsel at its own cost and shall provide reasonable assistance.\n\nThis indemnity does\
      \ not apply to the extent the claim arises from the Indemnified Party\u2019s breach, negligence or misuse, and is subject\
      \ to the limitations of liability in this Agreement. This clause survives termination or expiry."

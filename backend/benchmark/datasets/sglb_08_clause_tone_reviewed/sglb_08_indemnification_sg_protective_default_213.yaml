  inputs:
    clause_text: "To the fullest extent permitted under Singapore law, the Indemnifying Party shall indemnify, defend and\
      \ hold harmless the Indemnified Party and its Affiliates, officers and employees from and against all losses, liabilities,\
      \ damages, penalties, interest, costs and expenses (including reasonable legal fees) arising out of any third-party\
      \ claim to the extent caused by the Indemnifying Party\u2019s breach of this Agreement, negligence, wilful misconduct,\
      \ violation of law, or alleged infringement or misappropriation by materials supplied by the Indemnifying Party. The\
      \ indemnity shall not apply to the extent a claim arises from the Indemnified Party\u2019s gross negligence, wilful\
      \ misconduct or breach of this Agreement. The Indemnified Party shall give prompt written notice of a claim; failure\
      \ to give prompt notice shall not relieve the Indemnifying Party except to the extent of actual prejudice. The Indemnifying\
      \ Party shall have sole control of the defence and settlement, shall keep the Indemnified Party reasonably informed,\
      \ and shall not settle any claim imposing admissions of liability, non-monetary obligations or injunctive relief on\
      \ the Indemnified Party without its prior written consent. The Indemnified Party may participate with counsel at its\
      \ own cost and shall reasonably cooperate at the Indemnifying Party\u2019s expense. This clause survives termination\
      \ and, for third-party claims, is not subject to any contractual cap or exclusion, except to the extent prohibited by\
      \ law."

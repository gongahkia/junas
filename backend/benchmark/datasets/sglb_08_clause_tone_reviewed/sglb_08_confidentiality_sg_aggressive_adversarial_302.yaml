  inputs:
    clause_text: "Confidentiality. The Recipient shall keep in strict confidence all information disclosed by or on behalf\
      \ of the Disclosing Party (Confidential Information) whether oral, written , electronic or otherwise (including notes,\
      \ analyses, models and any materials derived therefrom) and shall use it solely for the Permitted Purpose as notified\
      \ by the Disclosing Party from time to time (acting in its sole and unfettered discretion). No disclosure is permitted\
      \ except to Permitted Recipients who are bound by obligations no less onerous; the Recipient remains liable for each\
      \ such person as if it were the Recipient. Carve\u2011outs are narrowly construed: information is not Confidential Information\
      \ only where the Recipient proves to the Disclosing Party\u2019s reasonable satisfaction, with contemporaneous documentary\
      \ evidence, that it is public other than through breach, or is required to be disclosed by law after prompt notice and\
      \ only to the minimum extent (and, where lawful, with the Disclosing Party\u2019s prior written consent). No \u201C\
      residuals\u201D use. The Recipient shall implement security controls at least equivalent to those the Disclosing Party\
      \ may specify; notify any suspected breach within 12 hours; permit audits and forensic inspection on demand. On request\
      \ or termination (or earlier), cease use and return or destroy (certified by statutory declaration). The Recipient acknowledges\
      \ damages may be inadequate; the Disclosing Party is entitled to interim and permanent injunctive relief, specific performance,\
      \ account of profits and equitable compensation (including under the doctrine of breach of confidence), together with\
      \ full indemnity costs on a solicitor\u2011and\u2011client basis. This Clause survives for so long as any Confidential\
      \ Information remains confidential (presumed indefinite)."
    clause_type: Confidentiality

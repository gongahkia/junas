    clause_text: "Intellectual Property Ownership and Licences. Without prejudice to the default position under Singapore\
      \ law, each Party retains all right, title and interest in its pre\u2011existing works, know\u2011how, tools and data\
      \ (\u201CBackground IP\u201D). Each Party grants the other a limited, non\u2011exclusive, royalty\u2011free licence\
      \ to use Background IP solely as necessary to perform the Project, revocable only for material breach not cured within\
      \ 15   Business Days after written notice.\n\nSubject to full and final payment and formal acceptance, all copyright\
      \ in Deliverables expressly commissioned under this Agreement (\u201CForeground IP\u201D) is hereby assigned to Client,\
      \ save that Provider\u2019s Background IP and generic toolsets are not assigned; Provider instead grants Client a perpetual,\
      \ non\u2011exclusive licence to such embedded elements to the extent necessary to use the Deliverables. Where Foreground\
      \ IP is jointly developed and not reasonably severable, ownership shall be joint, without duty to account, provided\
      \ each Party\u2019s use complies with any confidentiality and third\u2011party licence terms.\n\nAssignments shall be\
      \ in writing and signed; each Party will execute further documents to perfect title and procure subcontractor/employee\
      \ assignments, failing which a temporary, non\u2011transferable licence will apply until cure. Inclusion of Open\u2011\
      Source components requires prior written notice and Client\u2019s consent (not to be unreasonably withheld and/or delayed).\
      \ Provider may showcase non\u2011confidential Deliverables for portfolio purposes on 30 days\u2019 notice unless Client\
      \ objects for bona fide regulatory or security reasons. Each Party will defend IP claims it controls, with shared settlement\
      \ approval; liability is capped at fees paid for the affected Deliverable, excluding wilful infringement."

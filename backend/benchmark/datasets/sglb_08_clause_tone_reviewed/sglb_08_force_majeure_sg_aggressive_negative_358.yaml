    clause_text: "Force Majeure. For the sole benefit of Company, a Force Majeure Event includes: act of God, fire, flood,\
      \ lightning, storm, haze episodes, epidemic or pandemic (including quarantines and public health emergencies), governmental\
      \ act, change of law, export restriction or sanctions, strikes or industrial action (whether or not involving Company\u2019\
      s workforce), lockouts, civil commotion, riot, terrorism, war, sabotage, explosion, nuclear/chemical/biological contamination,\
      \ failure of utilities, transport shutdowns, supply chain embargoes, material shortages, or material cyber incidents\
      \ (including ransomware, zero-day exploits and denial-of-service). If such event prevents, hinders, delays, or renders\
      \ performance commercially impracticable, Company may suspend, vary, or terminate affected obligations in its sole discretion\
      \ without liability, and all time and LDs stand waived.\n\nContractor may claim Force Majeure only for (i) a Singapore-wide\
      \ power outage exceeding 72 hours, or (ii) a written lawful order expressly prohibiting performance, and only if Contractor\
      \ gives notice within 24 hours, provides daily updates, documentary evidence, and continuous mitigation. Payment, indemnity\
      \ and confidentiality obligations are never excused. Foreseeable cost increases, subcontractor failures, equipment breakdowns,\
      \ routine maintenance, holidays, or normal weather do not constitute Force Majeure.\n\nIf Company\u2019s Force Majeure\
      \ continues 10 days, Company may terminate for convenience. If Contractor\u2019s event exceeds 72 hours, Company may\
      \ procure substitutes and recover all incremental costs from Contractor."

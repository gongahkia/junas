    clause_text: "Without prejudice to any other rights or remedies, the Indemnifying Party shall indemnify, defend and hold\
      \ harmless the Indemnified   Party and its Affiliates, directors, officers and employees from and against any and all\
      \ third\u2011party claims, actions, demands, proceedings and liabilities, and any related damages, fines, penalties,\
      \ settlement amounts and reasonable legal costs (on a solicitor\u2011and\u2011client basis) to the extent arising out\
      \ of (a) breach of this Agreement by the Indemnifying Party; (b) infringement or alleged infringement of any third\u2011\
      party IPR by the Deliverables; and/or (c) death, personal injury or tangible property damage caused by the Indemnifying\
      \ Party\u2019s acts or omissions, except to the extent caused by the Indemnified   Party\u2019s negligence or wilful\
      \ misconduct.\n\nThe Indemnifying Party shall assume and maintain control of the defence (including selection of counsel\
      \ reasonably acceptable to the Indemnified   Party), provided that the Indemnified   Party may participate at its own\
      \ cost and may, upon reasonable notice, take over the conduct where there is a material conflict of interest or failure\
      \ to diligently defend. No settlement imposing admissions, ongoing obligations, injunctive relief or payment by the\
      \ Indemnified   Party may be entered without its prior written consent (not to be unreasonably withheld or delayed).\n\
      \nPrompt written notice shall be given within 10 Business  Days; failure to notify shall not relieve indemnity obligations\
      \ except to the extent of actual prejudice. This clause survives termination or expiry for 6 years and is in addition\
      \ to, and not limited by, any insurance or other remedy."

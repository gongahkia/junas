    clause_text: "Force Majeure. Neither Party shall be liable for any failure or delay in performing a non\u2011payment obligation\
      \ to the extent (and only so long as) performance is prevented or materially delayed by a Force Majeure Event, being:\
      \ act of God (including earthquake, flood, typhoon), fire or explosion, epidemic or pandemic declared by the Singapore\
      \ Government or WHO, war, terrorism, riot or civil commotion, general industry\u2011wide strikes (but not strikes confined\
      \ to a Party\u2019s own workforce), governmental embargo or change in law rendering performance illegal, or nationwide\
      \ utility or internet outages not caused by the affected Party; excluding (for the avoidance of doubt) shortage of funds,\
      \ failure of subcontractors not attributable to a Force Majeure Event, or cyber incidents arising from the affected\
      \ Party\u2019s inadequate security. The affected Party shall notify the other within 5 Business Days (or as soon as\
      \ reasonably practicable, but in any event no later than 7 days), give particulars, and use commercially reasonable\
      \ endeavours (including its business continuity plan) to mitigate. The Parties shall confer via a joint review within\
      \ 10 days and may agree equitable timetable or fee adjustments (capped at 15% of the impacted monthly charges). Payment,\
      \ confidentiality, and IP obligations continue. If the Event endures 45 consecutive days (or 75 days cumulative in 6\
      \ months), either Party may terminate on 7 days\u2019 notice, provided always that the other Party may cure by resuming\
      \ substantial performance."

  inputs:
    clause_text: "Non-Compete. In order to protect the Company\u2019s legitimate business interests, including its Confidential\
      \ Information and client connections, the Employee shall not, during employment and for 6 months after the Termination\
      \ Date, within Singapore, directly or indirectly engage, be employed or otherwise concerned in any business which is\
      \ in competition with the business of the Company with which the Employee was materially involved in the 12 months prior\
      \ to the Termination Date, in a role substantially similar to the role performed by the Employee in that period or in\
      \ any role in which the Employee could reasonably be expected to use Confidential Information or influence clients,\
      \ suppliers or employees of the Company. This clause does not prohibit the holding, for investment only, of up to 5%\
      \ of the securities of a company listed on a recognised stock exchange. Each restriction is intended to be no wider\
      \ than reasonably necessary to protect the Company\u2019s legitimate interests and to be separate and severable. If\
      \ any restriction is found invalid, it shall apply with such deletions as are necessary to make it enforceable to the\
      \ maximum extent permitted by Singapore law. For these purposes, Termination Date means the last day of the Employee\u2019\
      s employment, whether terminated by either party and for any reason."
    clause_type: Non-Compete / Restraint of Trade

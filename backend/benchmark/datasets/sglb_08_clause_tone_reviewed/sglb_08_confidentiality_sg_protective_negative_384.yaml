  inputs:
    clause_text: "Confidential Information means information disclosed by the Disclosing Party that is (a) marked confidential\
      \ or (b) identified as confidential at disclosure and confirmed in writing within 10 days; it excludes information that\
      \ is public or becomes public through no fault of the Receiving Party; already known to the Receiving Party without\
      \ duty of confidence; independently developed without use of the Disclosing Party\u2019s information; rightfully received\
      \ from a third party; obvious, trivial or widely known (for example, public holiday dates, generic marketing claims,\
      \ or job postings); general skills, knowledge, and experience; aggregated, non-identifying usage statistics; or information\
      \ available from public corporate registries. The Receiving Party will use at least reasonable care (not less than for\
      \ its own similar information), limit access to need-to-know recipients bound by obligations no less protective, and\
      \ not reverse engineer except as permitted by applicable law. If legally compelled to disclose, the Receiving Party\
      \ will give prompt written notice (where lawful), seek to narrow disclosure, and cooperate to obtain protective treatment.\
      \ Residual Information retained in unaided memory may be used, provided no source documents are disclosed. Upon request,\
      \ the Receiving Party will return or destroy Confidential Information, except for archival/back-up copies and records\
      \ retained to comply with law, which remain confidential. Equitable relief for breach of confidence may be sought to\
      \ the extent not inconsistent with agreed limitations, caps, and defenses."
    clause_type: Confidentiality

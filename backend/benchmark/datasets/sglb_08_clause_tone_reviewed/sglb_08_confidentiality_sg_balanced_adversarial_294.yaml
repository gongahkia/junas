      \ notice (to the extent lawful), disclose only what is necessary, and seek protective relief, with the disclosing party\u2019\
      s reasonable cooperation.\n\nIf an inadvertent disclosure occurs, the receiving party shall notify within 2 Business\
      \ Days and cure within 10 Business Days; during such cure, the disclosing party will not terminate solely for that breach\
      \ unless material harm is reasonably demonstrated. Liability for accidental breach is capped at the lower of S$250,000\

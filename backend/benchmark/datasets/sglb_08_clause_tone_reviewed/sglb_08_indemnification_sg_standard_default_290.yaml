    clause_text: "Each Party (Indemnifying Party) shall indemnify and hold harmless the other Party, its Affiliates, and their\
      \ respective directors, officers, employees and agents (each an Indemnified Party) from and against all losses, damages,\
      \ liabilities, penalties, fines, and reasonable costs and expenses (including reasonable legal fees) arising out of\
      \ any claim, demand, action or proceeding brought by a third party to the extent caused by: (a) the Indemnifying Party\u2019\
      s breach of this Agreement; (b) the negligence, wilful default or misconduct of the Indemnifying Party; or (c) the alleged\
      \ infringement of intellectual property rights by materials provided by the Indemnifying Party. The Indemnified Party\
      \ shall promptly notify the Indemnifying Party of any such claim; failure to do so shall relieve the Indemnifying Party\
      \ only to the extent it is materially prejudiced. The Indemnifying Party shall have the right to assume and conduct\
      \ the defence and settlement, provided it does so promptly; the Indemnified Party may participate at its own cost. The\
      \ Indemnifying Party shall not settle any claim that imposes non-monetary obligations on, admits fault of, or fails\
      \ to secure an unconditional release for, the Indemnified Party without its prior written consent (not to be unreasonably\
      \ withheld). The Indemnified Party shall reasonably mitigate and provide assistance at the Indemnifying Party\u2019\
      s cost. This clause survives termination or expiry. Nothing in this clause limits liability that cannot be limited under\
      \ applicable law."

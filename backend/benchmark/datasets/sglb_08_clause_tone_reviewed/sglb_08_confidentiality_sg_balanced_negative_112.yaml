  inputs:
    clause_text: "Confidentiality. Each Party (Recipient) shall keep confidential all non-public information disclosed by\
      \ the other Party (Discloser) that is marked confidential or would reasonably be understood to be confidential, including\
      \ business plans, pricing, product roadmaps, security controls, and customer or supplier information. The Recipient\
      \ will use such information only to perform this Agreement, restrict access to need-to-know personnel and contractors\
      \ under similar obligations, and apply protections no less stringent than it uses for its own similar information. Information\
      \ is not Confidential to the extent it: (a) is or becomes public through no breach; (b) was known to the Recipient without\
      \ duty of confidence; (c) is independently developed; or (d) is rightfully received from a third party. For clarity,\
      \ publicly available marketing brochures, website product summaries, press releases, standard terms published online,\
      \ and business-card contact details are not Confidential. If disclosure is compelled by law, the Recipient will give\
      \ prompt notice (where lawful) and cooperate to seek protective measures. Inadvertent disclosures may be cured by immediate\
      \ retrieval or containment within five Business Days. Obligations last three years from disclosure, except for information\
      \ expressly labelled \u201Ctrade secret,\u201D which endures while so qualifying. Direct damages for breach are capped\
      \ at the Fees paid in the 12 months preceding the claim; this cap does not apply to wilful misconduct. Without prejudice\
      \ to contract remedies, either Party may seek equitable relief under Singapore law, including for breach of confidence."
    clause_type: Confidentiality

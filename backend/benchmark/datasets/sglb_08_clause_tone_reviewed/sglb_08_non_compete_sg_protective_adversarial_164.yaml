    clause_text: "Non\u2011Compete (Protective). For a period of 6 months after the Termination Date (the \u201CRestricted\
      \ Period\u201D), within the Republic of Singapore (or, if and to the extent a narrower area is required, any district,\
      \ zone or vicinity reasonably corresponding to sites where the Employee had material client or product responsibility\
      \ in the 12 months prior) (the \u201CRestricted Territory\u201D), the Employee shall not, in a Similar Capacity, engage\
      \ with any business offering products or services substantially similar to, and competing in, the segments for which\
      \ the Employee had material involvement in that 12\u2011month look\u2011back (each, a \u201CCompeting Business\u201D\
      ). \u201CSimilar Capacity\u201D means any role where the Employee would reasonably be expected to use Confidential Information\
      \ or relationships obtained here. This does not prohibit: (i) purely administrative/support functions not reasonably\
      \ likely to lead to competitive harm; (ii) passive holdings <5% equity; or (iii) any role expressly released by the\
      \ Company in writing (which release the Company may give or withhold in its discretion, subject only to applicable law).\
      \ The Employee shall give at least 14 Business Days\u2019 prior written notice of any prospective role, with sufficient\
      \ particulars; time in paid garden leave shall be set off against the Restricted Period. If a court finds any part over\u2011\
      broad, it shall be enforced to the maximum lawful extent (e.g., 3 months; narrower segments; Re\u2011stricted Territory\
      \ limited accordingly). The Company may seek injunctive and other equitable relief without bond, as permitted."

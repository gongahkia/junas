      \ impose non\u2011monetary obligations, admissions, or ongoing monitoring on the Indemnified Party without its prior\
      \ written consent. The Indemnified Party may participate at its own cost and must provide reasonable cooperation. Mere\
      \ audit inquiries, customer feedback, or routine security alerts (e.g., failed logins) do not constitute a \u201CClaim.\u201D\
      \ Indemnity excludes indirect or punitive damages, regulatory fines attributable to the Indemnified Party, and taxes\
      \ on the Indemnified Party\u2019s income. This clause survives termination for claims notified before termination or\

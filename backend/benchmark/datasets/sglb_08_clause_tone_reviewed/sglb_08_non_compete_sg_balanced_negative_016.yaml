    clause_text: "Non-Compete and Non-Solicitation (Balanced). For a period of 6 months following the Termination Date, the\
      \ Employee shall not, within the Republic of Singapore and within a 10-kilometre radius of any facility to which the\
      \ Employee had material operational responsibility in the 12 months prior to termination, engage (whether as employee,\
      \ contractor or owner) in a Competing Business in a role substantially similar to the Employee\u2019s last role. \u201C\
      Competing Business\u201D means the supply of goods or services the Company offered in the 12 months prior to termination\
      \ in respect of which the Employee had material involvement. The Employee shall not solicit business from, or knowingly\
      \ interfere with, customers or prospective customers with whom the Employee had material dealings in that 12\u2011month\
      \ period, nor solicit key employees. Carve-outs: passive investments up to 5% in a listed entity; general advertisements\
      \ not targeted at Restricted Persons; roles in functions that do not compete; activity outside Singapore; and use of\
      \ general skills and knowledge. Process and Allowance: the Employee will disclose proposed roles; the Company will respond\
      \ within 10 Business Days (silence deemed consent). If the Company reasonably objects, the Employee shall have 7 days\
      \ to cure. The Company will pay a restraint allowance equal to 30% of base salary during the Restricted Period unless\
      \ termination was for Cause or the Company grants written waiver. If any restriction is overbroad, it shall be read\
      \ down to the minimum enforceable extent."
    clause_type: Non-Compete / Restraint of Trade

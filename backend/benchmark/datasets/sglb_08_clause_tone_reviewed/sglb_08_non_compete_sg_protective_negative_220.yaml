  inputs:
    clause_text: "Non-Compete (Protective). For six (6) months following termination for any reason (the Restricted Period)\
      \ and within the Republic of Singapore (the Territory), the Employee shall not, without the Company\u2019s prior written\
      \ consent, engage (whether as employee, contractor, partner or owner) in any business segment of a Competing Undertaking\
      \ that is the same as, or materially similar to, those lines of business (the Restricted Business) in which the Employee\
      \ materially participated during the twelve (12) months prior to termination and that targets customers with whom the\
      \ Employee had material dealings (Restricted Customers), or operate within five (5) kilometres of any Company office\
      \ at which the Employee regularly worked. Carve-outs: passive holdings of up to 5% of a publicly listed entity; activities\
      \ approved in writing by the Company; civic, charitable, academic, or union activities unrelated to the Restricted Business;\
      \ lawful communications with regulators; and personal, non-solicitative social media. Notice: the Employee shall give\
      \ the Company written details of any prospective engagement during the Restricted Period; if the Company does not object\
      \ within ten (10) business days, no objection is deemed. Garden leave and paid notice offset the Restricted Period day-for-day.\
      \ Nothing restricts use of general skill and experience (excluding Confidential Information). Step-down: if any part\
      \ is overbroad, it shall be enforced to the maximum extent permitted (including reduction to three (3) months and/or\
      \ a two (2) kilometre radius or to direct Restricted Customers only). The Company may waive or vary this clause by written\
      \ notice."
    clause_type: Non-Compete / Restraint of Trade

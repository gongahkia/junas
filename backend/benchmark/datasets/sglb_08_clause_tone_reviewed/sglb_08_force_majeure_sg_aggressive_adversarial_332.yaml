  inputs:
    clause_text: "Force Majeure (strict application).  Without prejudice to any other rights, a \u201CForce Majeure Event\u201D\
      \ for the Company shall mean any event beyond or not solely within the Company\u2019s reasonable control, expressly\
      \ including: acts of God (storm, flood, haze episodes, lightning), epidemic, quarantine or public\u2011health emergency;\
      \ governmental act, omission or directive (including changes in law or permit conditions), port/airspace closure, embargo\
      \ or sanctions; strikes, lockouts or other labour disputes (including those affecting subcontractors, carriers or upstream\
      \ suppliers); failure, outage or material degradation of utilities, power, data\u2011centres, cloud or telecommunications;\
      \ cyber\u2011incidents; fire, explosion; shortage or curtailment of raw materials, transport or capacity; industry\u2011\
      wide shortages; or vendor/default or delay; and any analogous or causally connected circumstance, whether or not fore\u2011\
      seeable. Upon such event, the Company\u2019s affected obligations are suspended and/or re\u2011sequenced; the Other\
      \ Party shall continue to: (i) perform unaffected obligations; and (ii) make all payments when due (time being of the\
      \ essence). The Company may reallocate supply, substitute performance, or cancel affected orders in its sole discretion.\
      \ Notice: Company to notify as soon as practicable; the Other Party must notify within 24 hours with full particulars\
      \ and corroboration, failing which relief is deemed waived. Mitigation: the Other Party shall implement contingency/BCP\
      \ at its cost as directed by the Company. If the event persists >7 consecutive days, the Company may terminate (part\
      \ or whole) immediately, without liability, retaining sums paid and recovering standby or demobilisation costs; the\
      \ Other Party shall have no termination right, and financial inability, price increases, staff attrition or internal\
      \ system faults shall not constitute force majeure. This clause prevails notwithstanding any contrary term."
    clause_type: Force Majeure

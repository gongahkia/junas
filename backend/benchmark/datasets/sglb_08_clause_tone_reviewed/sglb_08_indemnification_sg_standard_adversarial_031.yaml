      \ materials provided by the Indemnifying Party infringe a third party\u2019s intellectual property right. The Indemnified\
      \ Party shall promptly (and in any event within such time as does not materially prejudice the defen ce) notify the\
      \ Indemnifying Party and shall reasonably cooperate at the Indemnifying Party\u2019s cost. The Indemnifying Party shall\
      \ have sole control of the defence and/ or settlement, provided it may not settle any claim that imposes any admission\
      \ of liability or non\u2011monetary obligation on the Indemnified Party without prior written consent (not to be unreasonably\
      \ withheld or delayed). No indemnity applies to the extent a claim arises from the Indemnified Party\u2019s breach,\
      \ negligence or unauthorised modifications. This Clause is a primary obligation, independent of damages, and shall survive\
      \ termination or expiry. Nothing herein limits a party\u2019s right to seek urgent injunctive or similar relief."

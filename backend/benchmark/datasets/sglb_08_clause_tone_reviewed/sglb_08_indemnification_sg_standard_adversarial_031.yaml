      \ law, each party (the Indemnifying Party) shall indemnify, defend and hold harmless the other party, its Affiliates\
      \ and their respective officers, employees and agents (each an Indemnified Party) from and against any third\u2011party\
      \ claim, demand, action or proceeding, and all losses, damages, liabilities, fines, penalties, cost s and expenses (including\

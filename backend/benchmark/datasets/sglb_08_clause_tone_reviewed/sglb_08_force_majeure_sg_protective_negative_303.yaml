      \ rendering performance illegal; or (d) a binding order of a governmental authority that makes performance unlawful\
      \ (not merely more burdensome). Excluded are: changes in market conditions or cost, shortages of labor or materials,\
      \ failures of subcontractors or utilities limited to the Affected Party\u2019s facilities, cyber incidents not causing\
      \ widespread national disruption, and strikes confined to the Affected Party or its contractors. The Affected Party\
      \ must give detailed written notice within five Business Days (Business Day excludes Saturdays, Sundays, and public\
      \ holidays in Singapore), with evidence and a mitigation plan; failure to do so waives relief until notice. Relief applies\
      \ only to the prevented obligations, for the minimum period necessary, and does not excuse payment, confidentiality,\
      \ data protection, or pre-existing breaches; time is of the essence. The Non-Affected Party may suspend corresponding\
      \ obligations (including payment for unperformed Services), procure alternatives and offset reasonable incremental costs,\
      \ and terminate affected Services on 30 days\u2019 continuous impact (or 45 days aggregate in any 90-day period). Rights\
      \ are cumulative and without prejudice."

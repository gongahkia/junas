    clause_text: "Neither Party shall be liable for any failure or delay in performing its obligations (other than any obligation\
      \ to pay money when due) to the extent prevented, hindered or delayed by a Force   Majeure Event, being any of the following\
      \ occurring after the Effective Date and not reasonably foreseeable, and not caused by the affected Party\u2019s fault\
      \ or negligence: acts of God (including flood, earthquake, storm or lightning); fire or explosion; war, terrorism, riot\
      \ or civil commotion; epidemic or pandemic (including government\u2011imposed quarantine, movement control or safe\u2011\
      distancing requirements); act of any government or regulator (including change in Law, embargo or expropriation); strike,\
      \ lock\u2011out or other industrial action not limited to the affected Party\u2019s own workforce; failure of public\
      \ utilities, transportation, or telecommunications not within the affected Party\u2019s reasonable control; or shortage\
      \ of key materials arising directly from any of the foregoing. The affected Party shall notify the other as soon as\
      \ practicable (and in any event within 5 Business Days, or such longer period as reasonably necessary in the circumstances)\
      \ giving reasonable particulars, and shall use reasonable endeavours to mitigate and resume performance. Obligations\
      \ are suspended only to the extent affected. If a Force   Majeure Event continues for 60 consecutive days, either Party\
      \ may terminate on written notice without liability, save for accrued rights and sums properly due. Lack of funds alone\
      \ is not a Force   Majeure Event."

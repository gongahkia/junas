  inputs:
    clause_text: "Non-Compete. For a period of six (6) months following the termination of the Employee\u2019s employment\
      \ for any reason, the Employee shall not, in Singapore, whether as employee, consultant, partner, shareholder, director\
      \ or otherwise, engage in, be employed by, provide services to, or otherwise be involved in any business which competes\
      \ with the Restricted Business in a capacity similar to that in which the Employee worked for the Employer and in which\
      \ the Employee could reasonably be expected to use or disclose the Employer\u2019s Confidential Information or influence\
      \ the Employer\u2019s customers. \u201CRestricted Business\u201D means those parts of the Employer\u2019s business with\
      \ which the Employee was materially involved in the twelve (12) months prior to termination. This clause does not prevent\
      \ the Employee from holding, for investment only, not more than 5% of the issued shares of a company listed on a recognised\
      \ stock exchange. Time spent on garden leave shall count towards the above period. The parties agree that this restraint\
      \ is reasonable and no wider than necessary to protect the Employer\u2019s legitimate business interests, including\
      \ its Confidential Information and customer connections. If any part of this clause is unenforceable, it shall be severed\
      \ to the minimum extent necessary."
    clause_type: Non-Compete / Restraint of Trade

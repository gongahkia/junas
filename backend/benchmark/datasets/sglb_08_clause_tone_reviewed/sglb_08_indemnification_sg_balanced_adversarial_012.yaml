    clause_text: "Indemnification. Subject to this Clause, each Party (the Indemnifying Party) shall indemnify, defend and\
      \ hold harmless the other Party, its Affiliates and Personnel (together, the Indemnified Parties) from third\u2011party\
      \ claims, demands, and associated court\u2011awarded damages, fines and Reasonable Costs arising out of: (a) alleged\
      \ IP infringement by Indemnifying Party Materials as provided; (b) death, personal injury, or tangible property damage\
      \ caused by the Indemnifying Party\u2019s negligence; or (c) breach of Applicable Law by the Indemnifying Party. Exclusions:\
      \ no indemnity to the extent a claim arises from combinations not contemplated, modifications not made by the Indemnifying\
      \ Party, the Indemnified Party\u2019s data/instructions, or the Indemnified Party\u2019s negligence or wilful default.\
      \ Procedure: the Indemnified Party shall give prompt written notice (within 10 Business Days; delay relieves obligations\
      \ only to the extent prejudiced). The Indemnifying Party may assume sole conduct of the de\u2011fence and settlement,\
      \ consulting in good faith; no admission of liability or non\u2011monetary obligation shall bind the Indemnified Party\
      \ without its prior written consent (not to be unreasonably withheld or delayed, and deemed given after 5 Business Days\
      \ of no response). For IP claims, the Indemnifying Party may, within a commercially reasonable cure window (not less\
      \ than 30 days), procure rights, modify or replace; failing which, the affected portion may be suspended and, after\
      \ 30 days, terminated for a pro\u2011rata refund. Caps: aggregate indemnity in any Contract Year is limited to 125%\
      \ of Fees paid/payable for the affected Services in the prior 12 months, save to the extent liability cannot lawfully\
      \ be limited, and only to the proportion of loss finally determined attributable to the Indemnifying Party. Consequential\
      \ damages are excluded except to the extent payable to a third\u2011party as part of a settlement or award approved\
      \ under this Clause. The Parties shall mitigate loss. This Clause survives termination/expiry for 24 months (claims\
      \ noticed within that period survive until resolved)."

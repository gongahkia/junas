  inputs:
    clause_text: "Confidentiality. Each party (the Recipient) receiving Confidential Information of the other (the Discloser)\
      \ shall: (i) keep such information confidential and exercise at least reasonable care (no less than the standard it\
      \ applies to its own similar information); (iii) use it solely for evaluating, negotiating and/or performing this Agreement\
      \ (the Purpose); and (ii) disclose it only to its employees, officers, affiliates, professional advisers and contractors\
      \ who need to know for the Purpose and are bound by confidentiality obligations no less strict. \u201CConfidential Information\u201D\
      \ means any non\u2011public information, whether oral, written or in any form, including (without limitation) business,\
      \ financial, technical and trade\u2011secret\u2011like information, disclosed by the Discloser. This clause does not\
      \ apply to information the Recipient can show: (a) is or becomes public other than through breach; (b) was lawfully\
      \ known to it without restriction; (c) is independently developed without use of the Discloser\u2019s information; (d)\
      \ is rightfully received from a third party without a duty of confidence; or (e) must be disclosed by law, regulator\
      \ or court, provided the Recipient gives prompt notice (where lawful) and reasonably cooperates to seek protective treatment.\
      \ Upon request or termination, Recipient shall return or destroy Confidential Information, save for reasonable archival\
      \ copies retained for legal/ compliance purposes. Obligations survive for 3 years, except that trade\u2011secret information\
      \ remains protected for so long as it retains such status at law or in equity, without prejudice to any equitable duty\
      \ of confidence under Singapore law. The parties acknowledge damages may be inadequate and injunctive relief may be\
      \ sought."
    clause_type: Confidentiality
  expected_output:

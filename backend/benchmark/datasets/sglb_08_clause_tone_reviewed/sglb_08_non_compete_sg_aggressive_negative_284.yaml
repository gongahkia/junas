      \ role and procure the prospective employer\u2019s written acknowledgement of this clause. Any breach shall toll the\
      \ restraint for the duration of the breach. Garden leave counts toward the restraint only if the Employee fully complies.\
      \ The Company is entitled to injunctive relief, account of profits and indemnity costs without proof of special damage.\

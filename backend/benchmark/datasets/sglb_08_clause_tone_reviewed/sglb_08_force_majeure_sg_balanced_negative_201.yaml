    clause_text: "Force Majeure. Neither Party is liable for delay or failure to perform to the extent directly caused by\
      \ an event beyond its reasonable control and not reasonably avoidable by prudent industry practice, including: acts\
      \ of God (such as flood, earthquake, or storms of exceptional severity), epidemic or pandemic and related quarantine\
      \ measures, war, terrorism or civil commotion, embargo or sanctions, governmental order or change in law, industry-wide\
      \ strike or lockout (but not a strike limited to the affected Party\u2019s own workforce), fire or explosion, nuclear,\
      \ chemical or biological contamination, failure of utilities or transportation, widespread internet backbone or major\
      \ cloud provider outage, or material cyberattacks (including malware or DDoS) not attributable to the affected Party\u2019\
      s failure to maintain industry-standard security. Relief is limited to the events listed and only to the proportion\
      \ of obligations actually affected. The affected Party must: (a) give written notice within 5 Business Days with reasonable\
      \ particulars and an estimated duration; (b) use all reasonable efforts to mitigate and implement documented continuity\
      \ plans; (c) provide weekly status updates; and (d) reallocate available capacity pro rata. Payment and confidentiality\
      \ obligations are not excused; inability to pay or foreseeable resource shortages are excluded. If the event continues\
      \ for 30 consecutive days, senior representatives will meet to agree mitigations; after 90 days, either Party may terminate\
      \ the affected order on 10 days\u2019 notice, with pro rata refunds of prepaid fees and payment for services delivered."
    clause_type: Force Majeure

  inputs:
    clause_text: "Confidentiality. The Recipient shall keep strictly confidential all non-public information of the Discloser,\
      \ whether oral, written, electronic or otherwise, including all analyses, notes and derivatives, whether or not marked\
      \ confidential, and shall use it solely for the agreed Purpose. The Recipient shall protect such information with at\
      \ least the same degree of care it applies to its own most sensitive information and in any event no less than a strict\
      \ standard, shall restrict access to need-to-know persons bound by written obligations no less protective, and shall\
      \ not reverse engineer, text/data mine, or derive metadata from it. The Recipient is strictly liable for breaches by\
      \ its affiliates, personnel and advisers, must report any suspected compromise within six (6) hours, and upon demand\
      \ within two (2) days return or certify destruction. The Discloser may audit compliance and require written certifications.\
      \ Notwithstanding anything, the Discloser may obtain immediate injunctive relief (including interlocutory and ex parte\
      \ orders), account of profits and damages without proof of actual loss, without prejudice to Singapore law and equity\
      \ on breach of confidence. Carve-outs apply only where proven by the Recipient: information in the public domain (e.g.,\
      \ the Discloser\u2019s registered office at 88 Harbour Loop #15-01, Apex Tower, Singapore 048888, UEN 202612345Z, press\
      \ releases, job postings), independently developed without use of Discloser information, or rightfully received from\
      \ a third party. Obligations survive perpetually until information lawfully becomes public."
    clause_type: Confidentiality

  inputs:
    clause_text: "Confidentiality. For purposes of this Agreement, Discloser\u2019s \u201CConfidential Information\u201D means\
      \ information disclosed to Recipient that is (i) conspicuously marked \u201CConfidential\u201D at the time of disclosure,\
      \ or (ii) disclosed orally and, within ten (10) business days, reduced to a writing marked \u201CConfidential\u201D\
      ; information not so identified is not confidential unless, by its nature and the circumstances importing confidence,\
      \ it is plainly confidential and Discloser issues written notice identifying it with reasonable particularity within\
      \ five (5) business days of Recipient\u2019s request (if any). Recipient shall use such information solely to perform\
      \ hereunder, applying safeguards no less stringent than those it uses for its own similar confidential information,\
      \ and disclosing only to personnel or advisers with a need\u2011to\u2011know under obligations no less protective. The\
      \ foregoing excludes information that is public, already known, independently developed, or rightfully received; compelled\
      \ disclosures are permitted after notice (where lawful) and limited to the minimum required. Residuals retained in unaided\
      \ memory are not restricted. Return/destruction will be on request, subject to routine archival/back\u2011up media.\
      \ Obligations continue for two (2) years from disclosure, or, for information qualifying as a trade secret under Singapore\u2019\
      s law of confidence (if demonstrably so), until it ceases to so qualify. Without prejudice to\u2014but not expanding\u2014\
      equitable rights, remedies shall be proportionate; indirect or consequential losses are excluded."
    clause_type: Confidentiality

    clause_text: "Non-Compete / Restraint of Trade. For 12 months after the Termination Date, the Employee shall not, in Singapore,\
      \ directly or indirectly (whether as employee, consultant, partner, shareholder, director or otherwise) engage in, be\
      \ concerned with, or provide services to any business which competes with any product or service of the Company with\
      \ which the Employee was materially involved in the 12 months prior to the Termination Date (Restricted Business), in\
      \ any capacity similar to, or reasonably capable of being performed by reference to, the Employee\u2019s last 12 months\u2019\
      \ duties. During the same period, the Employee shall not (a) solicit, canvass or deal with any client or prospective\
      \ client of the Company with whom the Employee had material contact in the 12 months prior to termination, or (b) solicit\
      \ or induce any employee or contractor of the Company to leave. The Restricted Period shall be extended by any period\
      \ of breach, and any garden leave shall not reduce it. The Company may grant written consent to specific engagements\
      \ in its sole discretion. The Employee acknowledges the reasonableness of this clause, agrees that monetary damages\
      \ are inadequate, and that the Company is entitled to injunctive relief. Passive holdings of up to 5% in a publicly\
      \ traded competitor are permitted. If any provision is void, it shall be severed to preserve enforceability."
    clause_type: Non-Compete / Restraint of Trade

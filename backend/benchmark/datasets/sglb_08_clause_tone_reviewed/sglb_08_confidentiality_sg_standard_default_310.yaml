  inputs:
    clause_text: 'Confidential Information means all non-public information disclosed by one party (Disclosing Party) to the
      other (Recipient) in connection with this Agreement, whether oral, written or in any other form, and includes business,
      technical, financial and customer information. The Recipient shall keep Confidential Information strictly confidential,
      use it only for performing this Agreement, and disclose it only to its employees, officers, affiliates and professional
      advisers who have a need to know and are bound by obligations of confidentiality no less restrictive than this clause.
      The foregoing does not apply to information that the Recipient can demonstrate: (a) is or becomes public other than
      through a breach; (b) was lawfully known to the Recipient before disclosure; (c) is independently developed without
      use of Confidential Information; or (d) is rightfully received from a third party without duty of confidence. If disclosure
      is required by law, regulation or a competent authority in Singapore, the Recipient shall give prompt written notice
      (to the extent lawful) and cooperate to seek protective measures. Upon request or termination, the Recipient shall promptly
      return or securely destroy Confidential Information. Obligations survive for five years from disclosure, save that trade
      secrets survive while they remain confidential. This clause is additional to duties arising under Singapore law, including
      the equitable doctrine of breach of confidence, and without prejudice to injunctive relief.'
    clause_type: Confidentiality

      \ the Republic of Singapore (limited to a five\u2011kilometre radius of any office at which the Employee had a substantial\
      \ presence in the preceding 12 months) (the Restricted   Area), engage or be concerned in a capacity materially similar\
      \ to the Employee\u2019s last role with the Employer in any business that competes with the Employer\u2019s primary\
      \ service lines as reasonably described in Schedule A or, if not updated within the prior quarter, by reference to the\
      \ last circulated list of Named   Competitors. This restraint is further limited to customers or prospects with whom\
      \ the Employee had material dealings in the 12 months prior to termination. Carve\u2011outs: passive investments <5%;\
      \ academic or pro bono work; roles insulated from sales/product strategy; pre\u2011disclosed side businesses. The Employer\
      \ shall pay a restraint payment equal to 30% of Average Monthly Base Salary for each month of the Restricted   Period\
      \ (net of any Garden Leave), and shall consider in good faith any written request to waive or narrow the restraint,\
      \ responding within 10 Business Days (silence deemed consent). Alleged breaches may be cured by cessation within seven\
      \ (7) days. The Parties agree this clause shall be read\u2011down to what is reasonably necessary under Singapore law."

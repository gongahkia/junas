    clause_text: "Non-Compete / Restraint of Trade. The Employee must not, during employment and for 12 months after termination\
      \ for any reason, directly or indirectly engage in, be employed by, concerned with, or interested in any business whatsoever\
      \ that competes with the Company; for the avoidance of doubt, this restriction applies only to a \u201CCompeting Business\u201D\
      , being any person that offers goods or services substantially similar to, or substitutable for, those product lines,\
      \ accounts, or projects in respect of which the Employee (a) had material responsibility, dealings, or (b) received\
      \ or had access to Confidential Information, in the 12 months before termination. The restraint applies within the Republic\
      \ of Singapore and any other country or territory where the Employee had material responsibility or dealings for the\
      \ Company in that period (and is not worldwide). The Employee must not solicit, canvass, or deal with any customer or\
      \ prospective customer with whom the Employee had material contact, nor induce any Key Employee to leave. The Company\
      \ may waive or narrow this clause by written notice. Breach entitles the Company to injunctive relief, an account of\
      \ profits, and full indemnity legal costs, and the restraint period is extended by any period of breach. Nothing prevents\
      \ passive investments under 5% in a listed entity or the use of general skill and knowledge. If any part is invalid,\
      \ the minimum modification needed to render it enforceable shall apply."
    clause_type: Non-Compete / Restraint of Trade

    clause_text: "To the extent permitted by applicable law (including the Unfair Contract Terms Act (Cap. 396)), neither\
      \ Party shall be liable to the other for any loss of profit, revenue, business, goodwill, or anticipated savings, or\
      \ for any indirect or consequential loss or damage, in each case whether arising in contract, tort (including negligence),\
      \ breach of statutory duty, or otherwise. Subject to the foregoing, each Party\u2019s total aggregate liability to the\

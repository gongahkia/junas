      \ or payable by the Customer to the Supplier under this Agreement in the twelve (12) months immediately preceding the\
      \ event giving rise to the relevant claim (and, where the Agreement has not been in force for twelve months, the average\
      \ monthly Charges multiplied by twelve). The cap and exclusions in this clause do not apply to liability for: (a) death\
      \ or personal injury caused by a Party\u2019s negligence; (b) fraud or fraudulent misrepresentation; (c) wilful misconduct;\
      \ (d) the Customer\u2019s obligation to pay the Charges; or (e) any liability that cannot be excluded or limited under\

      s clients; lawful union membership; protected disclosures to competent authorities; academic or pro bono activities\
      \ unrelated to the Restricted Business. The Employee must give prior written notice of any proposed role, with sufficient\
      \ details; the Company\u2019s non-response is not consent, but the Company may waive any restriction by written notice.\

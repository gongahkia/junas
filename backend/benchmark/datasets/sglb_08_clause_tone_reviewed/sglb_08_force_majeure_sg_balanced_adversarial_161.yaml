    clause_text: "Force\u2011 Majeure. Each Party shall be excused from delay or non\u2011performance (other than for payment\
      \ of undisputed sums, confidentiality, or data\u2011integrity obligations) to the extent directly caused by a Force\
      \ Majeure Event, being only: (i) acts of God (flood, earthquake, lightning); (ii) war, terrorism, riot or civil commotion;\
      \ (iii) epidemic/pandemic, quarantine, or binding governmental or court order rendering performance unlawful; (iv) nationwide\
      \ strikes or lock\u2011outs not directed by the affected Party; (v) fire destroying essential facilities; (vi) embargoes\
      \ or sanctions prohibiting the relevant supply; and (vii) failure of public utilities not arising from non\u2011payment.\
      \ External cyber\u2011incidents qualify only where originating outside the Party\u2019s systems despite reasonable security.\
      \ This clause is to be construed narrowly.\n\nThe affected Party shall give notice within five (5) business days (or\
      \ as soon as reasonably practicable, with reasons), use commercially reasonable endeavours (and, for critical services,\
      \ best efforts where practicable) to mitigate, and resume performance promptly. Performance is suspended for the duration;\
      \ fees and service levels adjust pro\u2011rata. The maximum extension for any obligation is 60 days in aggregate in\
      \ any rolling 12\u2011month period.\n\nIf the event continues beyond 30 Business Days, senior representatives will confer\
      \ to agree workarounds, fair\u2011and\u2011reasonable capacity allocation, and/or terminate impacted Purchase Order(s)\
      \ on 10 days\u2019 notice without fault. Foreseeable market/price movements, intra\u2011group supplier insolvency, or\
      \ avoidable subcontractor failures are excluded."

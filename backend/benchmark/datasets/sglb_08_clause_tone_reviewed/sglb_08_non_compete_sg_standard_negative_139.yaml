    clause_text: "During employment and for 9 months after termination howsoever caused, the Employee shall not, within Singapore\
      \ and any other country in which the Employee had material responsibilities for the Company in the 12 months prior to\
      \ termination, be engaged, concerned or interested in any business which competes with the Restricted Business, being\
      \ that part of the Company\u2019s business with which the Employee was materially involved during that period. This\
      \ does not prohibit: (a) holding up to 5% of the shares in a publicly listed company; (b) employment by a diversified\
      \ group provided the Employee has no involvement with a competing division; (c) use of general skills and experience\
      \ not constituting Confidential Information; (d) bona fide whistleblowing or reporting to a governmental or regulatory\
      \ authority; or (e) general, non-targeted advertising. Each covenant in this clause is separate and severable; if any\
      \ provision is unenforceable, it shall be severed by deleting the offending words to the extent permitted by law, without\
      \ affecting the remainder. The parties acknowledge the restraints are intended to be no wider than reasonably necessary\
      \ to protect the Company\u2019s legitimate business interests. The Company may seek injunctive or other equitable relief\
      \ for breach, without prejudice to other remedies."

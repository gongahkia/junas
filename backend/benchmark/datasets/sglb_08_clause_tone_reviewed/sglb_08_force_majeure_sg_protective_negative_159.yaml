  inputs:
    clause_text: "Force Majeure. A party is excused from the specific obligation directly prevented by a Force Majeure Event\
      \ only for the period of actual prevention, provided it: (i) gives written notice with reasonable particulars and supporting\
      \ documents to the Contract Notices Email in Schedule 3 within 3 Singapore business days, and weekly updates thereafter;\
      \ and (ii) uses all commercially reasonable efforts, including business continuity measures, alternative sourcing and\
      \ reallocation, to mitigate. Force Majeure Events are limited to: (a) earthquake, flood, or typhoon of extraordinary\
      \ severity; (b) war, terrorism, or civil commotion of general public impact; (c) binding Singapore governmental prohibition\
      \ making performance illegal; (d) epidemic or pandemic only to the extent performance is prohibited by law; and (e)\
      \ nationwide power or carrier outages not caused by the affected party. For clarity, \u201Cacts of God,\u201D \u201C\
      unforeseen circumstances,\u201D supplier failure, labour shortages or strikes limited to the affected party or its contractors,\
      \ routine maintenance windows, public holidays, regulatory inspections, cyber incidents arising from inadequate security\
      \ controls, financing failure, and changes in costs, demand, exchange rates, or market conditions are not Force Majeure.\
      \ Payment obligations are never excused. The non-affected party may procure alternatives and set off reasonable incremental\
      \ costs. If prevention continues for 30 consecutive days, the non-affected party may terminate the affected portion\
      \ on 5 business days\u2019 notice without liability. Unaffected obligations must continue."
    clause_type: Force Majeure

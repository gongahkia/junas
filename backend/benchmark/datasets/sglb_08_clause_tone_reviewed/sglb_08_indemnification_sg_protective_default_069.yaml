    clause_text: "The Indemnifying Party shall indemnify, defend and hold harmless the Beneficiary and its Affiliates, directors,\
      \ officers, employees and agents from and against all losses, liabilities, damages, costs and expenses (including legal\
      \ fees on a full indemnity basis) arising out of any third-party claim to the extent caused by the Indemnifying Party\u2019\
      s breach of this Contract, negligence, wilful misconduct, infringement of intellectual property, or violation of law.\
      \ The Beneficiary shall promptly notify the Indemnifying Party of any claim; failure to notify shall not relieve indemnity\
      \ obligations except to the extent of actual prejudice. The Indemnifying Party may assume and control the defence at\
      \ its cost with counsel reasonably acceptable to the Beneficiary, shall keep the Beneficiary informed, and shall advance\
      \ defence costs as incurred. The Beneficiary may participate at its own cost and may assume the defence (with costs\
      \ reimbursed) if the Indemnifying Party fails to diligently defend or disputes coverage. No settlement shall be entered\
      \ without the Beneficiary\u2019s prior written consent if it imposes non-monetary obligations, admissions, injunctive\
      \ relief, or fails to provide a full release. This indemnity is a primary obligation, without set-off, and survives\
      \ termination for claims arising from pre-termination events. It does not cover losses to the extent caused by the Beneficiary\u2019\
      s gross negligence, wilful misconduct, or breach."

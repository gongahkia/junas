    clause_text: "Indemnity.  To the fullest extent permitted under the laws of Singapore, and subject always to any aggregate\
      \ liability caps in this Agreement (including Clause 9, if applicable), the Party identified as the indemnifying party\
      \ in the Order Form (Indemnifying Party) shall defend, indemnify and hold harmless the other Party and its Affiliates,\
      \ and their respective officers, employees and agents (each, an Indemnified Party), from and against any and all claims,\
      \ demands, actions, losses, damages, liabilities, penalties, costs and expenses (including reasonable legal fees on\
      \ a solicitor\u2011and\u2011client basis) arising out of: (a) any third\u2011party claim alleging death, personal injury,\
      \ or tangible property damage to the extent caused by the Indemnifying Party\u2019s negligence or wilful misconduct;\
      \ (b) the Indemnifying Party\u2019s breach of this Agreement; and (c) third\u2011party claims that the Deliverables,\
      \ as provided by the Indemnifying Party, infringe Intellectual Property Rights in Singapore, except to the extent such\
      \ claim arises from Indemnified Party\u2019s specifications, combinations not contemplated, modifications not authorised,\
      \ or the Indemnified Party\u2019s breach or negligence.  The Indemnifying Party shall have sole control of the defence\
      \ and settlement (provided no admission of liability or non\u2011monetary obligation is imposed on the Indemnified Party\
      \ without its prior written consent, not to be unreasonably withheld).  Prompt written notice is required (failure not\
      \ relieving liability except to the extent prejudiced); reasonable cooperation will be provided at the Indemnifying\
      \ Party\u2019s cost.  Indemnities are several, proportionate to fault, and survive expiry or termination."

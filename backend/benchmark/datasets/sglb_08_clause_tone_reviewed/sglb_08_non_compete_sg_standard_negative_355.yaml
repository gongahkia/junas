  inputs:
    clause_text: "Non-Compete. During Employment and for six (6) months after termination for any reason, within Singapore,\
      \ the Employee shall not, without the Employer\u2019s prior written consent: (a) carry on, be employed or engaged in,\
      \ or provide services (in a role similar to that held with the Employer) to, any business that competes with the Restricted\
      \ Business; or (b) solicit, divert or accept business from any customer or prospective customer of the Restricted Business\
      \ with whom the Employee had material dealings in the twelve (12) months prior to termination, for the purpose of competition.\
      \ \u201CRestricted Business\u201D means those parts of the Employer\u2019s business in which the Employee was materially\
      \ involved in the twelve (12) months prior to termination. Nothing in this clause prohibits: holding up to 5% of the\
      \ securities of a listed company; employment by an entity whose business unit is not a competing unit in Singapore;\
      \ use of general skills; lawful whistleblowing; or use of publicly available information. The parties acknowledge this\
      \ clause is no wider than reasonably necessary to protect legitimate interests and is not intended to create any monopoly\
      \ or exclusive dealing. If any part is unenforceable under Singapore restraint of trade principles, it is severable\
      \ and shall be enforced to the maximum extent permitted by law."
    clause_type: Non-Compete / Restraint of Trade

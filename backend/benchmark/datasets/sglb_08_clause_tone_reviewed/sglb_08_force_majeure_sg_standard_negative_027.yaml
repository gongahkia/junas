  inputs:
    clause_text: "Force Majeure. (a) A Force Majeure Event is an event beyond the reasonable control of the affected Party\
      \ that prevents or materially delays performance, including: acts of God (such as storm, flood, or earthquake); fire\
      \ or explosion; epidemic or pandemic; war, armed conflict, terrorism, riot or civil commotion; national or industry-wide\
      \ strikes or lockouts not limited to the affected Party\u2019s workforce; acts of any governmental authority (including\
      \ changes in law, sanctions, embargoes, or mandatory quarantine); and failure of power, transport, or telecommunications\
      \ arising from a widespread outage not limited to the affected Party\u2019s facilities or direct suppliers. (b) The\
      \ affected Party shall promptly notify the other Party within five Business Days in Singapore, provide reasonable particulars,\
      \ and use reasonable efforts to mitigate and resume performance; the time for performance shall be extended for the\
      \ duration of the Force Majeure Event. (c) Payment obligations and obligations capable of performance by reasonable\
      \ alternative means are not excused. (d) Delay or failure arising from lack of funds, back-office processing errors,\
      \ ordinary equipment breakdown, supply chain congestion absent a listed event, or internet outages confined to the affected\
      \ Party\u2019s premises does not constitute Force Majeure. (e) If a Force Majeure Event continues for more than sixty\
      \ consecutive days, either Party may terminate the affected obligations on written notice without liability, save for\
      \ accrued rights."
    clause_type: Force Majeure

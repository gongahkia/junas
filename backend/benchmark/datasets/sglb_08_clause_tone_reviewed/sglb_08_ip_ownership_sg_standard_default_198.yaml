      \ all such rights with full title guarantee, effective upon creation and conditional upon receipt of the applicable\
      \ fees. This clause is intended to constitute a written assignment for the purposes of the Copyright Act 2021 (Singapore).\
      \ The Supplier retains ownership of its Background IPR, tools, methods and templates and grants the Client a non\u2011\
      exclusive, royalty\u2011free licence to use them to the extent embedded in the Deliverables solely to enjoy the benefit\
      \ of the Deliverables for its internal business purposes. The Supplier shall procure written assignments and moral rights\

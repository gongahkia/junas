      \ and shall, at its own cost, implement mitigation, alternate sourcing, and expedited recovery as directed by Company.\
      \ For the avoidance of doubt, the following shall not constitute Force Majeure for Supplier: labour disputes involving\
      \ Supplier or its subcontractors, shortage of funds or credit, price increases, ordinary public holidays in Singapore,\
      \ scheduled maintenance, foreseeable logistics constraints, or failures of Supplier\u2019s vendors. Supplier must notify\
      \ Company within 24 hours of any claimed Force Majeure with full supporting evidence; failure to do so waives relief.\
      \ Company may reject any claim in its sole and absolute discretion. If a Force Majeure Event continues for more than\
      \ 10 days, Company may terminate for convenience without penalty and procure alternatives at Supplier\u2019s cost."

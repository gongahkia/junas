      \ may reasonably request to perfect the foregoing, and the Supplier procures that its Personnel waive (so far as permitted\
      \ under Singapore\u2019s Copyright Act 2021) moral rights in the Deliverables.\n\n(d) For the avoidance of doubt, works\
      \ created by the Customer\u2019s employees in the course of employment shall vest in the Customer by operation of law,\

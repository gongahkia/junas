    clause_text: "Non-Compete and Non-Solicitation. The Employee acknowledges that restrictions are necessary to protect the\
      \ Company\u2019s confidential information, trade connections and goodwill. For 6 months after termination for any reason\
      \ (Restricted Period), the Employee shall not in Singapore be employed or engaged in any capacity in a business which\
      \ competes with the segments of the Company\u2019s business in which the Employee had material involvement in the 12\
      \ months prior to termination (Restricted Business). For 12 months after termination, the Employee shall not (a) solicit,\
      \ canvass or deal with any customer or prospective customer of the Restricted Business with whom the Employee had material\
      \ dealings in the 12 months prior to termination, or (b) solicit or hire any employee, consultant or contractor of the\
      \ Company. The Company may, in its sole discretion, place the Employee on garden leave (credited against the Restricted\
      \ Period) and/or pay a monthly restraint payment; any such payment is without admission that payment is required. If\
      \ the Employee breaches this clause, the Restricted Period is extended by the period of breach. The Company is entitled\
      \ to injunctive relief, damages and/or an account of profits, together with legal costs on an indemnity basis. If any\
      \ restriction is unenforceable, it shall be enforced to the maximum extent permitted (12 months, or failing which 9\
      \ months, or failing which 6 months). Nothing prevents holding <5% of a listed company."
    clause_type: Non-Compete / Restraint of Trade

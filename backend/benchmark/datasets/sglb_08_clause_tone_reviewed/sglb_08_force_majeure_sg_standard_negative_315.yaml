    clause_text: "Force Majeure. Neither Party shall be liable for any delay or failure in performing its obligations (other\
      \ than payment obligations) to the extent caused by a Force Majeure Event, being an event beyond the reasonable control\
      \ of the affected Party that could not reasonably be prevented or overcome by reasonable diligence. Force Majeure Events\
      \ include: acts of God; fire, flood, earthquake, storm or severe haze; epidemic or pandemic, including any government-mandated\
      \ quarantine, closure or restriction; war, riot, civil commotion or terrorism; embargo, sanctions, export or import\
      \ restrictions; change in law or governmental order; national or regional power outage; failure of telecommunications\
      \ or internet backbone, or a widespread cyberattack on public infrastructure; strikes, lockouts or other industrial\
      \ disputes not limited to the affected Party\u2019s workforce; destruction of essential facilities; and shortages of\
      \ materials or transportation arising from the foregoing. Financial inability, market fluctuations, or a subcontractor\u2019\
      s default (unless caused by a Force Majeure Event) are not Force Majeure Events. The affected Party shall notify the\
      \ other Party without undue delay, provide reasonable particulars and an estimated duration, and use reasonable endeavours\
      \ to mitigate and resume performance promptly. Time for performance is extended accordingly. If a Force Majeure Event\
      \ continues for 60 consecutive days, either Party may terminate on 10 days\u2019 notice without liability, save for\
      \ accrued amounts and surviving provisions."

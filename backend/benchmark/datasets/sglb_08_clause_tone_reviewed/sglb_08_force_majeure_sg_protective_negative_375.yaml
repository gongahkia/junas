    clause_text: "Force Majeure. A party (Non-Performing Party) shall be excused from performance only to the extent prevented\
      \ by an event beyond its reasonable control that is specifically identified herein: acts of God (earthquake, flood),\
      \ war, declared state of emergency, pandemic or epidemic formally declared by the WHO or Singapore\u2019s MOH, mandatory\
      \ government orders of general application that render performance illegal, or a nationwide failure of core utilities\
      \ (power, fixed-line telecommunications). For the avoidance of doubt, the following do not constitute force majeure:\
      \ changes in market conditions, price increases, unavailability of funds or credit, loss of personnel, supplier or subcontractor\
      \ failure, delays in permits, cyber incidents or malware affecting the Non-Performing Party\u2019s systems (unless caused\
      \ by a nationwide backbone outage), haze or PSI fluctuations, or advisory (non-binding) notices. The Non-Performing\
      \ Party must give written notice with particulars and supporting evidence within 3 Business Days and provide weekly\
      \ updates; failure to do so forfeits relief. Payment and confidentiality obligations are never excused. The Non-Performing\
      \ Party shall implement documented mitigation and disaster-recovery measures and promptly resume performance. If the\
      \ event continues for 20 consecutive days, the other party may suspend its obligations, procure alternatives at the\
      \ Non-Performing Party\u2019s reasonable cost, or terminate the affected Order without penalty. The parties acknowledge\
      \ Singapore law construes force majeure narrowly."
    clause_type: Force Majeure

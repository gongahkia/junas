  inputs:
    clause_text: "Non-Compete. The Employee shall not, during employment and for 12 months after termination for any reason,\
      \ directly or indirectly (whether as employee, consultant, partner, shareholder, financier, or otherwise) engage in,\
      \ be concerned with, or be interested in any business that competes with the Restricted Business in the Restricted Territory.\
      \ Restricted Business means any product or service of the Company or its Affiliates in which the Employee was materially\
      \ involved, to which the Employee had access to Confidential Information, or that is substitutable therefor. Restricted\
      \ Territory means (a) Singapore; and (b) any country in which, in the 12 months before termination, the Employee had\
      \ material responsibility for the Company\u2019s customers, prospects, suppliers, or projects. The Company may identify\
      \ the scope of the Restricted Business and Restricted Territory by written notice, and its determination shall be conclusive\
      \ absent manifest error. The parties agree this restraint is reasonable and necessary to protect Confidential Information\
      \ and customer connections. Breach will entitle the Company to injunctive relief (without bond), an account of profits,\
      \ indemnity for losses, legal fees on an indemnity basis, and tolling of the Restricted Period for any period of breach.\
      \ This clause does not prohibit passive holdings of up to 3% in a listed competitor, bona fide charitable or academic\
      \ activities, lawful union activities, whistleblowing to regulators, or use of general skills not derived from Confidential\
      \ Information."
    clause_type: Non-Compete / Restraint of Trade

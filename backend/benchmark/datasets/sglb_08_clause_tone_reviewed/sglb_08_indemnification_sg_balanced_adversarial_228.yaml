    clause_text: "Indemnification. Each Party (as Indemnifying Party) shall indemnify, defend and hold harmless the other\
      \ Party, its Affiliates and personnel (each an Indemnified Party) from third\u2011party claims, demands, suits, fines\
      \ or proceedings (Claims) to the extent arising from: (a) personal injury or tangible property damage caused by the\
      \ Indemnifying Party\u2019s negligence; (b) alleged infringement in Singapore of Intellectual Property Rights by Deliverables\
      \ supplied by the Indemnifying Party, excluding combinations not provided by it; or (c) breach of Applicable Law by\
      \ the Indemnifying Party. The Indemnified Party shall give prompt written notice (within 10 Business Days, where practicable;\
      \ failure not fatal except to the extent prejudiced), and the Indemnifying party shall have primary control of the defense\
      \ and settlement, subject to good\u2011faith consultation; no settlement imposing admission or non\u2011monetary obligations\
      \ on the Indemnified Party is permitted without its prior consent (not to be unreasonably withheld or delayed). If the\
      \ Indemnifying Party does not assume conduct within 10 Business Days after notice, the Indemnified Party may defend\
      \ and recover reasonable costs.\n\nExclusions: no indemnity to the extent the Claim results from the Indemnified Party\u2019\
      s instructions, materials, or wilful misconduct; no indirect, special or punitive damages, save to the extent payable\
      \ to a third\u2011party. Cure: for Claims solely from remediable breach, a 15\u2011day cure period applies.\n\nCaps:\
      \ aggregate liability under this Clause is limited to the greater of S $500,000 or 125% of Fees paid in the prior 12\
      \ months, except for (i) IP Claims or (ii) death/ bodily injury, where the cap is 200%. This Clause survives termination\
      \ for 24 months (36 months for IP Claims)."

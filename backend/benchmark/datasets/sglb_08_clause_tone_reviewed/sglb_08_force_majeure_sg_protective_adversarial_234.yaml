  inputs:
    clause_text: "Force Majeure. The Parties agree that relief is available only to the extent strictly necessitated by a\
      \ Force Majeure Event, being solely: (i) earthquake, flood, or cyclone of abnormal severity; (ii) declared war or terrorism\
      \ that renders performance illegal; (iii) epidemic/pandemic solely to the extent performance is prohibited by binding\
      \ written order of a Governmental Authority; (iv) nationwide telecommunications blackout or power outage evidenced by\
      \ an official notice; and (v) change in law making performance unlawful. Exclusions (without limitation): increases\
      \ in cost, unavailability of funds, labour disputes involving the Affected Party or its subcontractors, failure of vendors\
      \ or carriers, cyber incidents preventable by reasonable security, or foreseeable supply constraints. Payment, confidentiality,\
      \ and data\u2011protection obligations are not excused. The Affected Party must give written notice with particulars,\
      \ evidence, and a mitigation plan promptly (and in any case within 3 Business Days) and provide weekly updates; late,\
      \ incomplete, or unsupported notice shall (to the extent of prejudice) bar relief. Relief applies only for the period\
      \ and extent of direct prevention (not mere delay) despite diligent, commercially reasonable efforts. The Non\u2011\
      Affected Party may suspend affected obligations, procure alternatives, and/or terminate on 20 consecutive Business Days\u2019\
      \ disruption (Clause 14.3(b)(iii) mutatis mutandis), without liability. No catch\u2011all \u201Cbeyond control\u201D\
      \ wording shall expand this clause; ejusdem generis is disapplied."
    clause_type: Force Majeure

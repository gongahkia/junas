    act_full_name: Penal Code 1871
  expected_output:
    citation: s 115 of the Penal Code 1871
    answer_span: Whoever abets the commission of an offence punishable with death or imprisonment for life, shall, if that
      offence is not committed in consequence of the abetment, and no express provision is made by this Code or by any other

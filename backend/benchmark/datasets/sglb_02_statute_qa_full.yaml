  expected_output:
    citation: s 22 of the Rules of Court 2021
    answer_span: (1) The Court may order, on its own accord, a person not named as a witness for any party to give evidence
      orally or by way of affidavit as an independent witness. (2) The Court may give directions for the cross‑examination
      of an independent witness. (3) The Court may invite any natural person or entity who has an interest or is able to assist
      in the issues in the case to give the person’s or entity’s views in writing on specific issues. (4) The interested person
      or entity is not subject to cross‑examination and need not attend the hearing.

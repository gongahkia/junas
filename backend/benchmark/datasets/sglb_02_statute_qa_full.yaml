    act_full_name: Rules of Court 2021
  expected_output:
    citation: s 16 of the Rules of Court 2021
    answer_span: (1) The Court may order any or part of any pleading to be struck out or amended, on the ground that — ( a
      ) it discloses no reasonable cause of action or defence; ( b ) it is an abuse of process of the Court; or ( c ) it is
      in the interests of justice to do so, and may order the action to be stayed or dismissed or judgment to be entered accordingly.
      (2) No evidence is admissible on an application under paragraph (1)( a ). (3) This Rule applies to an originating application
      as if it were a pleading.

  expected_output:
    citation: s 107 of the Penal Code 1871
    answer_span: (1) A person abets the doing of a thing who — ( a ) instigates any person to do that thing; ( b ) engages
      with one or more other person or persons in any conspiracy for the doing of that thing, if an act or illegal omission

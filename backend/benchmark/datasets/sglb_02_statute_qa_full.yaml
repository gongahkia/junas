    act_full_name: Penal Code 1871
  expected_output:
    citation: s 113 of the Penal Code 1871
    answer_span: When an act is abetted with the intention on the part of the abettor of causing a particular effect, and
      an act for which the abettor is liable in consequence of the abetment causes a different effect from that intended by
      the abettor, the abettor is liable for the effect caused, in the same manner, and to the same extent, as if he had abetted

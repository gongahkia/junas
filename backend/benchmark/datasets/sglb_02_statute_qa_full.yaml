  expected_output:
    citation: s 23 of the Penal Code 1871
    answer_span: (1) A “wrongful gain” is gain by unlawful means of property to which the person gaining it is not legally
      entitled or avoidance by unlawful means of a loss of property to which the person avoiding it is not legally entitled
      to avoid. [15/2019] (2) A “wrongful loss” is loss or exposure of risk to a loss by unlawful means of property to which
      the person losing it or exposed to the risk of losing it is legally entitled. Explanation 1.—A person is said to gain
      wrongfully when the person retains wrongfully, as well as when the person acquires wrongfully.

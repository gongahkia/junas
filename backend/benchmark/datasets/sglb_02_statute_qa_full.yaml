  inputs:
    question: Under the Rules of Court 2021, what does the section on "Security for costs (O. 18, r. 30)" provide?
    act_short_name: Rules of Court 2021
    act_full_name: Rules of Court 2021
  expected_output:
    citation: s 30 of the Rules of Court 2021
    answer_span: (1) The appellant must provide security for the respondent’s costs of the appeal and file a certificate for
      security for costs in Form 36 at the time the appellant files the notice of appeal. (2) Where there is more than one
      appellant in the same appeal, all the appellants need to provide only one set of security for the appeal. (3) Where
      there is more than one respondent, the appellant must provide security for the costs of the appeal for each respondent
      (or for the costs of the appeal of each set of the respondents where the respondents are represented by the same firm
      of solicitors).

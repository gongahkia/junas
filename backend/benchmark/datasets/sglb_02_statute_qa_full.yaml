    act_full_name: Rules of Court 2021
  expected_output:
    citation: s 25 of the Rules of Court 2021
    answer_span: (1) Subject to these Rules, at the appropriate stage, the Court must give directions for the case to proceed
      to trial or hearing. (2) The Court may order a bifurcated hearing in that the issues concerning liability are to be
      heard by a Judge before the issues concerning the amount of damages or the taking of accounts are heard by a Judge or
      the Registrar. (3) The Court may order any issue of fact to be heard and decided separately. (4) In an action commenced
      by an originating claim, the Court must fix a period within which the claimant is to set down the action for trial.

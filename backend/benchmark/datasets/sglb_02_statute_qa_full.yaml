  expected_output:
    citation: s 27 of the Rules of Court 2021
    answer_span: (1) Where an affidavit refers to a document, a copy of that document must be annexed to the affidavit. (2)
      If it is necessary to refer to the whole document, a copy of the document must be annexed. (3) If it is necessary to
      refer to only certain portions of the document, a copy of only those portions need to be annexed. (4) Where an affidavit
      refers to a person or object and it is necessary to identify that person or object, the identification may be done by
      annexing a picture of that person or object to the affidavit.

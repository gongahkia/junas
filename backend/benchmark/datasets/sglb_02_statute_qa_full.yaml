    answer_span: (1) Costs are in the discretion of the Court and the Court has the power to determine all issues relating
      to the costs of or incidental to all proceedings at any stage of the proceedings or after the conclusion of the proceedings.
      (2) The Court which heard a matter must fix the costs of the matter, unless the Court thinks fit to direct an assessment
      of the costs. (3) In the cases to which fixed costs apply under these Rules, the amount of costs allowed are as set
      out in these Rules, unless the Court otherwise orders.

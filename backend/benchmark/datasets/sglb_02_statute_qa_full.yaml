  inputs:
    question: Under the Penal Code, what does the section on "Abettor" provide?
    act_short_name: Penal Code
    act_full_name: Penal Code 1871
  expected_output:
    citation: s 108 of the Penal Code 1871
    answer_span: A person abets an offence who abets either the commission of an offence, or the commission of an act which
      would be an offence, if committed by a person capable by law of committing an offence with the same intention or knowledge
      as that of the abettor. Explanation 1.—The abetment of the illegal omission of an act may amount to an offence, although
      the abettor may not himself be bound to do that act. Explanation 2.—To constitute the offence of abetment, it is not
      necessary that the act abetted should be committed, or that the effect requisite to constitute the offence should be
      caused.

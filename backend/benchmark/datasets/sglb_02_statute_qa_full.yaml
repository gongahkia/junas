    answer_span: Whoever abets any offence shall, if the act abetted is committed in consequence of the abetment, and no express
      provision is made by this Code for the punishment of such abetment, be punished with the punishment provided for the
      offence. Explanation .—An act or offence is said to be committed in consequence of abetment, when it is committed in
      consequence of the instigation, or in pursuance of the conspiracy, or with the aid which constitutes the abetment.

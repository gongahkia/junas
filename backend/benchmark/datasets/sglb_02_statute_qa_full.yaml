    answer_span: (1) Upon a party’s application or on the Court’s own accord, the Court may decide any question of law or
      the construction of any document arising in any action without a trial or hearing on the facts, whether or not such
      decision will fully determine the action. (2) Where the Court’s decision in paragraph (1) fully determines (subject
      only to any appeal) the entire matter or any claim or issue therein, the Court may give judgment or dismiss the action
      or make any order that is appropriate.

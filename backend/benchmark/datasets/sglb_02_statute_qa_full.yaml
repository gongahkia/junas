    citation: s 35 of the Rules of Court 2021
    answer_span: (1) Every application to the appellate Court must be made either by originating application or, in an appeal
      which is pending before the appellate Court, by summons. (2) Whenever under these Rules an application may be made either
      to the lower Court or to the appellate Court, it must not be made in the first instance to the appellate Court, except
      where there are special circumstances which make it impossible or impracticable to apply to the lower Court. (3) No
      oral arguments are to be made in an application to the appellate Court unless the appellate Court otherwise orders.

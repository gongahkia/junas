[pipeline]
# Empty by default: /review and /classify use the deterministic engine directly.
# Optional audit-grade helpers can be enabled with public_evidence,llm_adjudicator.
layers = []
optional_layers = []

[api]
allowed_origins = ["http://localhost", "http://127.0.0.1"]

[local_daemon]
acl_enabled = false
allowed_origins = ["chrome-extension://*", "https://chatgpt.com", "https://claude.ai", "https://gemini.google.com"]

[public_evidence]
enabled = false
# Supported providers: exa, tinyfish, serper, serpapi, none.
provider = "exa"
max_results = 5
timeout_seconds = 8.0

[llm]
enabled = false
provider = "vllm"
base_url = "http://127.0.0.1:8001/v1"
model = "gpt-oss-20b"
timeout_seconds = 20.0
allow_remote_base_url = false
allow_remote_raw_text = false
tenant_opt_in_openai = false

[llm_helpers]
enabled = false
defined_terms_enabled = false
coverage_audit_enabled = false

[privacy]
external_query_policy = "sanitized_only"
max_query_chars = 180
redact_exact_numbers = true

[document_ingest]
fail_closed = true
min_pdf_text_chars = 20
min_pdf_chars_per_page = 20
max_empty_pdf_page_ratio = 0.2
reject_image_only_pdf = true

[tenancy]
enabled = false
auth_modes = ["api_key", "jwt"]
jwt_tenant_claim = "tenant_id"
jwt_subject_claim = "sub"
jwt_roles_claim = "roles"

[siem]
enabled = false
sink = "syslog"
syslog_address = "/var/run/syslog"
facility = "local4"
app_name = "kaypoh"

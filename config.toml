[pipeline]
layers = [
    "lexicon",
    "embedding",
    "clustering",
    "model1",
    "model2",
    "mosaic",
    "regression"
]
optional_layers = ["mosaic"]

[api]
allowed_origins = ["http://localhost", "http://127.0.0.1"]

[thresholds]
mnpi_abs = 1000000.0
mnpi_pct = 5.0
model1 = 0.5
model2 = 0.5
lock_path = "configs/thresholds.lock.json"

[isolation_forest]
contamination = 0.05
max_features = 0.3
n_estimators = 100

[embeddings]
model_name = "all-mpnet-base-v2"
cache_size = 512

[mosaic]
ttl_hours = 24.0
threshold = 10
redis_host = "localhost"
redis_port = 6379
connect_timeout_seconds = 0.5
socket_timeout_seconds = 0.5
retry_attempts = 3
retry_backoff_ms = 100

[lexicon]
score_threshold = 10.0

[lexicon_weights]
money_threshold = 2.0
pct_threshold = 1.0
restricted_list = 5.0
ner_event_entity_correlation = 4.0
ner_org_money_correlation = 1.0
ner_org = 0.5
ner_person = 0.5
ner_money = 0.5
ner_gpe = 0.5
ner_law = 0.5
presidio_financial_id = 5.0
presidio_credit_card = 5.0
presidio_iban_code = 5.0
presidio_phone_number = 1.0
presidio_email_address = 1.0
default_high = 3.0
default_info = 0.5

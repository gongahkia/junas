name: kilter_together_mobile
description: Mobile client for Kilter Together.
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  app_links: ^6.4.0
  dio: ^5.8.0+1
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  go_router: ^14.8.1
  http: ^1.3.0
  mobile_scanner: ^6.0.7
  path: ^1.9.1
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  share_plus: ^10.1.4
  shared_preferences: ^2.5.2
  sqflite: ^2.4.2
  flutter_local_notifications: ^18.0.1
  wakelock_plus: ^1.2.10
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  sqflite_common_ffi: ^2.3.4+4
  wakelock_plus_platform_interface: ^1.3.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: ../asset/logo/logo.png
  min_sdk_android: 21
  remove_alpha_ios: true

templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  receiver: default-blackhole
  group_by: ["alertname", "severity", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: pagerduty-critical
      continue: true
    - matchers:
        - severity=~"warning|critical"
      receiver: slack-ops
    - matchers:
        - alertname=~"KilterTogetherCreateRoomConversionDrop|KilterTogetherJoinRoomConversionDrop"
      receiver: product-webhook

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "job"]

receivers:
  - name: default-blackhole

  - name: slack-ops
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE/THIS/WITH/YOUR/WEBHOOK"
        channel: "#kilter-together-ops"
        send_resolved: true
        title: '{{ template "kilter_together.title" . }}'
        text: '{{ template "kilter_together.body" . }}'

  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: "REPLACE_WITH_PAGERDUTY_ROUTING_KEY"
        severity: '{{ .CommonLabels.severity }}'
        send_resolved: true
        description: '{{ template "kilter_together.title" . }}'
        details:
          summary: '{{ .CommonAnnotations.summary }}'
          description: '{{ .CommonAnnotations.description }}'

  - name: product-webhook
    webhook_configs:
      - url: "https://ops.example.com/hooks/kilter-together-product"
        send_resolved: true

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noupe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
</head>

<body>
    <div id="main-layout">
        <div id="analyzer-container">
            <header>
                <h1>Noupe</h1>
                <div id="connection-status" title="API Status">
                    <div class="status-dot"></div>
                </div>
            </header>

            <main>
                <div class="input-section">
                    <textarea id="analyze-input" placeholder="Enter text to classify sensitivity..."></textarea>
                    <button id="classify-btn">Classify Text</button>
                </div>

                <div id="results-display" class="hidden">
                    <!-- Results will be injected here -->
                </div>
            </main>
        </div>

        <div id="debug-sidebar">
            <header>
                <h2>Request log</h2>
            </header>
            <div id="debug-content">
                <!-- Debug logs appended here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>

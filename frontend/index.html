<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noupe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="main-layout">
        <div id="app-container">
            <header>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <h1>Noupe</h1>
                </div>
                <div style="display: flex; align-items: center; gap: 16px;">
                    <button id="debug-toggle" title="Toggle API Debugger">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16 18 22 12 16 6"></polyline>
                            <polyline points="8 6 2 12 8 18"></polyline>
                        </svg></button>
                    <div id="connection-status" title="API Status">
                        <div class="status-dot"></div>
                    </div>
                </div>
            </header>

            <div id="chat-history">
            </div>

            <div id="input-area">
                <input type="text" id="message-input" placeholder="Say something..." autocomplete="off">
                <button id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <div id="debug-sidebar" class="hidden">
            <header>
                <h2>Request log</h2>
            </header>
            <div id="debug-content">
                <!-- Debug logs appended here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noupe Channel Guard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="slack-shell">
        <aside class="workspace-rail">
            <div class="window-dots" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <button class="workspace-pill workspace-pill-brand" type="button" aria-label="Workspace home">📸</button>
            <button class="workspace-pill workspace-pill-active" type="button" aria-label="Current workspace">M</button>
            <button class="workspace-pill" type="button" aria-label="Secondary workspace">S</button>
            <button class="workspace-pill" type="button" aria-label="Add workspace">+</button>
            <div class="workspace-spacer"></div>
            <button class="workspace-pill workspace-pill-mini" type="button" aria-label="Notifications">1</button>
        </aside>

        <aside class="channel-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title-row">
                    <h1>Acme Inc</h1>
                    <button class="sidebar-icon-button" type="button" aria-label="Sidebar filters">≡</button>
                </div>
                <div class="status-pill" id="backend-status">
                    <span class="status-dot"></span>
                    <span id="backend-status-text">Checking backend readiness...</span>
                </div>
            </div>

            <div class="sidebar-section">
                <button class="sidebar-link" type="button">Unread</button>
                <button class="sidebar-link" type="button">Threads</button>
                <button class="sidebar-link" type="button">Drafts and sent</button>
            </div>

            <div class="sidebar-section">
                <p class="section-title">Channels</p>
                <button class="channel-link" type="button">announcements</button>
                <button class="channel-link" type="button">design-crit</button>
                <button class="channel-link" type="button">media-and-pr <span>1</span></button>
                <button class="channel-link channel-link-active" type="button">social-media</button>
                <button class="channel-link" type="button">team-marketing</button>
            </div>

            <div class="sidebar-section">
                <p class="section-title">Direct messages</p>
                <button class="sidebar-link" type="button">Lee Hao <span class="sidebar-badge">2</span></button>
                <button class="sidebar-link" type="button">Zoe Maxwell</button>
                <button class="sidebar-link" type="button">Lisa Dawson</button>
            </div>
        </aside>

        <section class="slack-main">
            <header class="slack-topbar">
                <div class="topbar-nav">
                    <span class="topbar-icon">←</span>
                    <span class="topbar-icon">→</span>
                </div>
                <div class="topbar-search">Search Acme Inc</div>
                <div class="topbar-nav topbar-nav-right">
                    <span class="topbar-icon">?</span>
                    <span class="topbar-icon">−</span>
                    <span class="topbar-icon">□</span>
                    <span class="topbar-icon">×</span>
                </div>
            </header>

            <main class="channel-stage">
                <section class="guard-popup hidden" id="guard-popup" role="alertdialog" aria-labelledby="guard-title"
                    aria-live="assertive">
                    <div class="guard-popup-card">
                        <button class="guard-dismiss" id="guard-dismiss" type="button" aria-label="Dismiss guardrail notice">×</button>
                        <p class="eyebrow">MNPI guardrail</p>
                        <h3 id="guard-title">Review required</h3>
                        <p class="guard-summary" id="guard-summary"></p>
                        <div class="guard-classification" id="guard-classification"></div>
                        <div class="guard-details" id="guard-details"></div>
                        <div class="guard-actions hidden" id="guard-actions">
                            <button class="primary-action" id="guard-confirm" type="button">Proceed anyway</button>
                        </div>
                    </div>
                </section>

                <header class="channel-header">
                    <div class="channel-header-main">
                        <p class="channel-title"># social-media</p>
                        <p class="channel-copy">Track and coordinate social media</p>
                    </div>
                    <div class="channel-header-actions">
                        <span class="channel-avatar-stack">👩🏽 👨🏻 👩🏼</span>
                        <span class="channel-meta">58</span>
                    </div>
                </header>

                <section class="error-banner hidden" id="error-banner" role="alert"></section>
                <section class="notice-banner hidden" id="notice-banner"></section>

                <section class="message-stream" id="message-stream" aria-live="polite"></section>

                <section class="composer-shell">
                    <input id="upload-input" type="file"
                        accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" hidden>

                    <label class="sr-only" for="message-input">Message</label>
                    <div class="composer-card">
                        <textarea id="message-input" placeholder="Message #social-media"></textarea>
                        <div class="composer-toolbar">
                            <div class="composer-ornaments">
                                <span class="composer-icon">＋</span>
                                <span class="composer-icon">☺</span>
                                <span class="composer-icon">@</span>
                                <span class="composer-icon">Aa</span>
                                <span class="composer-icon">🎥</span>
                            </div>
                            <span id="composer-status">Cmd/Ctrl + Enter sends after screening.</span>
                            <div class="composer-actions">
                                <button class="toolbar-button" id="upload-button" type="button">Attach DOCX</button>
                                <button class="toolbar-button toolbar-button-primary" id="send-button" type="button">Send</button>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.7.2/mammoth.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>

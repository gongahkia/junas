basePath: /api
definitions:
  handlers.connectProviderRequest:
    properties:
      secret:
        additionalProperties:
          type: string
        type: object
    type: object
  handlers.createRoomRequest:
    properties:
      display_name:
        type: string
      fist_bumps_enabled:
        type: boolean
      provider_id:
        type: string
      room_name:
        type: string
      secret:
        additionalProperties:
          type: string
        type: object
    type: object
  handlers.joinRoomRequest:
    properties:
      display_name:
        type: string
    type: object
  handlers.listSurfacesResponse:
    properties:
      surfaces:
        items:
          $ref: '#/definitions/providers.ProviderSurface'
        type: array
    type: object
  handlers.pickRandomRequest:
    properties:
      source:
        type: string
    type: object
  handlers.randomPickResponse:
    properties:
      climb:
        $ref: '#/definitions/providers.ProviderClimb'
    type: object
  handlers.recentSessionsResponse:
    properties:
      sessions:
        items:
          $ref: '#/definitions/rooms.SessionSummaryView'
        type: array
    type: object
  handlers.roomSessionEnvelope:
    properties:
      room:
        $ref: '#/definitions/rooms.RoomSnapshot'
      session:
        $ref: '#/definitions/handlers.roomSessionView'
    type: object
  handlers.roomSessionView:
    properties:
      expires_at:
        type: string
      role:
        type: string
      token:
        type: string
    type: object
  handlers.setSurfaceRequest:
    properties:
      context:
        additionalProperties:
          type: string
        type: object
      surface_id:
        type: string
    type: object
  handlers.updateFistBumpsRequest:
    properties:
      enabled:
        type: boolean
    type: object
  handlers.updateRoomRequest:
    properties:
      room_name:
        type: string
    type: object
  models.BoardOption:
    properties:
      climb_count:
        example: 12453
        type: integer
      id:
        example: 14
        type: integer
      kilter_name:
        example: Kilter Board Original
        type: string
      name:
        example: 7 x 10
        type: string
      preview_image_filename:
        example: product_sizes_layouts_sets/original-16x12-bolt-ons-v2.png
        type: string
    type: object
  models.Climb:
    properties:
      ascends:
        example: 42
        type: integer
      climb_name:
        example: swooped
        type: string
      created_at:
        example: "2018-12-06 21:15:01.127371"
        type: string
      description:
        example: A challenging overhang problem
        type: string
      frames:
        example: p1080r15p1110r15p1131r12
        type: string
      grades:
        additionalProperties:
          $ref: '#/definitions/models.GradeInfo'
        type: object
      highlighted_holds:
        items:
          $ref: '#/definitions/models.HighlightedHold'
        type: array
      image_filenames:
        items:
          type: string
        type: array
      product_size_id:
        example: 14
        type: integer
      setter_name:
        example: jwebxl
        type: string
      uuid:
        example: F01419E12672459396CA62E3655ABC46
        type: string
    type: object
  models.CursorPaginatedClimbsResponse:
    properties:
      climbs:
        items:
          $ref: '#/definitions/models.Climb'
        type: array
      has_more:
        example: true
        type: boolean
      next_cursor:
        example: eyJzb3J0IjoicG9wdWxhciIsImFzY2VuZHMiOjQyLCJjcmVhdGVkX2F0IjoiMjAyNi0wMS0wMSAwMDowMDowMC4wMDAwMDAiLCJ1dWlkIjoidXVpZC0xIiwicHJvZHVjdF9zaXplX2lkIjoxNH0=
        type: string
      page_size:
        example: 10
        type: integer
    type: object
  models.GradeInfo:
    properties:
      boulder:
        example: 7a/V6
        type: string
      route:
        example: 7c/5.12d
        type: string
    type: object
  models.HighlightedHold:
    properties:
      color:
        example: '#00DD00'
        type: string
      position:
        example: 1096
        type: integer
      role:
        example: start
        type: string
      x:
        example: 77.3
        type: number
      "y":
        example: 42.1
        type: number
    type: object
  providers.ClimbMedia:
    properties:
      kind:
        type: string
      url:
        type: string
    type: object
  providers.HighlightedHold:
    properties:
      color:
        type: string
      position:
        type: integer
      role:
        type: string
      x:
        type: number
      "y":
        type: number
    type: object
  providers.ProviderClimb:
    properties:
      created_at:
        type: string
      description:
        type: string
      external_id:
        type: string
      highlighted_holds:
        items:
          $ref: '#/definitions/providers.HighlightedHold'
        type: array
      id:
        type: string
      media:
        items:
          $ref: '#/definitions/providers.ClimbMedia'
        type: array
      meta:
        additionalProperties:
          type: string
        type: object
      name:
        type: string
      popularity:
        type: integer
      primary_grade:
        type: string
      provider_id:
        $ref: '#/definitions/providers.ProviderID'
      secondary_grade:
        type: string
      setter_name:
        type: string
      surface_id:
        type: string
    type: object
  providers.ProviderConnectionState:
    properties:
      connected:
        type: boolean
      metadata:
        additionalProperties:
          type: string
        type: object
      provider_id:
        $ref: '#/definitions/providers.ProviderID'
    type: object
  providers.ProviderID:
    enum:
    - kilter
    - crux
    - test
    - moonboard
    - tension
    - grasshopper
    type: string
    x-enum-varnames:
    - ProviderKilter
    - ProviderCrux
    - ProviderTest
    - ProviderMoonboard
    - ProviderTension
    - ProviderGrasshopper
  providers.ProviderSurface:
    properties:
      description:
        type: string
      id:
        type: string
      kind:
        type: string
      meta:
        additionalProperties:
          type: string
        type: object
      name:
        type: string
      parent_id:
        type: string
    type: object
  rooms.AssistantStateView:
    properties:
      message:
        type: string
      mode:
        type: string
      suggestion:
        $ref: '#/definitions/rooms.AssistantSuggestionView'
    type: object
  rooms.AssistantSuggestionView:
    properties:
      climb:
        $ref: '#/definitions/providers.ProviderClimb'
      ready_count:
        type: integer
      source:
        type: string
    type: object
  rooms.CatalogClimbResponse:
    properties:
      climb:
        $ref: '#/definitions/providers.ProviderClimb'
      is_queued:
        type: boolean
      my_vote:
        type: boolean
      vote_count:
        type: integer
    type: object
  rooms.CatalogClimbsResponse:
    properties:
      climbs:
        items:
          $ref: '#/definitions/providers.ProviderClimb'
        type: array
      has_more:
        type: boolean
      my_votes:
        items:
          type: string
        type: array
      next_cursor:
        type: string
      page_size:
        type: integer
      vote_counts:
        additionalProperties:
          type: integer
        type: object
    type: object
  rooms.FinalistEntryView:
    properties:
      added_by:
        type: string
      climb:
        $ref: '#/definitions/providers.ProviderClimb'
      id:
        type: integer
      position:
        type: integer
    type: object
  rooms.ParticipantView:
    properties:
      display_name:
        type: string
      id:
        type: integer
      is_online:
        type: boolean
      role:
        type: string
      status:
        type: string
    type: object
  rooms.PermissionView:
    properties:
      assign_co_hosts:
        type: boolean
      close_room:
        type: boolean
      edit_room_settings:
        type: boolean
      manage_finalists:
        type: boolean
      manage_participants:
        type: boolean
      manage_queue:
        type: boolean
      manage_session:
        type: boolean
      manage_surface:
        type: boolean
    type: object
  rooms.QueueEntryView:
    properties:
      added_by:
        type: string
      climb:
        $ref: '#/definitions/providers.ProviderClimb'
      id:
        type: integer
      position:
        type: integer
      status:
        type: string
    type: object
  rooms.RoomSnapshot:
    properties:
      assistant:
        $ref: '#/definitions/rooms.AssistantStateView'
      can_manage:
        type: boolean
      connection:
        $ref: '#/definitions/providers.ProviderConnectionState'
      current_climb:
        $ref: '#/definitions/providers.ProviderClimb'
      display_name:
        type: string
      finalists:
        items:
          $ref: '#/definitions/rooms.FinalistEntryView'
        type: array
      fist_bumps_enabled:
        type: boolean
      my_votes:
        items:
          type: string
        type: array
      participants:
        items:
          $ref: '#/definitions/rooms.ParticipantView'
        type: array
      permissions:
        $ref: '#/definitions/rooms.PermissionView'
      provider_id:
        $ref: '#/definitions/providers.ProviderID'
      queue:
        items:
          $ref: '#/definitions/rooms.QueueEntryView'
        type: array
      room_name:
        type: string
      slug:
        type: string
      status:
        type: string
      surface:
        $ref: '#/definitions/providers.ProviderSurface'
      version:
        type: integer
      vote_counts:
        additionalProperties:
          type: integer
        type: object
    type: object
  rooms.SessionSummaryClimbView:
    properties:
      added_by:
        type: string
      climb:
        $ref: '#/definitions/providers.ProviderClimb'
      position:
        type: integer
      status:
        type: string
      vote_count:
        type: integer
    type: object
  rooms.SessionSummaryView:
    properties:
      closed_at:
        type: string
      final_queue:
        items:
          $ref: '#/definitions/rooms.SessionSummaryClimbView'
        type: array
      finalists:
        items:
          $ref: '#/definitions/rooms.SessionSummaryClimbView'
        type: array
      participant_count:
        type: integer
      provider_id:
        $ref: '#/definitions/providers.ProviderID'
      recap_share_id:
        type: string
      room_name:
        type: string
      room_slug:
        type: string
      surface_kind:
        type: string
      surface_name:
        type: string
      top_voted:
        items:
          $ref: '#/definitions/rooms.SessionSummaryClimbView'
        type: array
    type: object
externalDocs:
  description: Kilter Together API Documentation
  url: https://github.com/lczm/kilter-together/blob/main/api/README.md
host: localhost:8082
info:
  contact:
    email: opensource@lczm.me
    name: API Support
    url: https://github.com/lczm/kilter-together
  description: API for solo Kilter browsing plus collaborative room sessions with
    Kilter and Crux provider adapters.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Kilter Together API
  version: "1.0"
paths:
  /boards:
    get:
      consumes:
      - application/json
      description: Retrieve all available board/product size options for filtering
        climbs. Returns a list of board configurations with their IDs and human-readable
        names.
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved board options
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/models.BoardOption'
              type: array
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get available board options
      tags:
      - boards
  /climbs:
    get:
      consumes:
      - application/json
      description: Retrieve a paginated list of listed Kilter Board climbs with filtering,
        sorting, and cursor-based pagination.
      parameters:
      - description: Pagination cursor returned by the previous page
        example: eyJzb3J0IjoicG9wdWxhciIsImFzY2VuZHMiOjQyLCJjcmVhdGVkX2F0IjoiMjAyNi0wMS0wMSAwMDowMDowMC4wMDAwMDAiLCJ1dWlkIjoidXVpZC0xIiwicHJvZHVjdF9zaXplX2lkIjoxNH0=
        in: query
        name: cursor
        type: string
      - default: 10
        description: Number of items per page (1-100)
        example: 10
        in: query
        maximum: 100
        minimum: 1
        name: page_size
        type: integer
      - description: Filter climbs by climb name (partial match)
        example: swooped
        in: query
        name: name
        type: string
      - description: Filter climbs by setter username (partial match)
        example: jwebxl
        in: query
        name: setter
        type: string
      - description: Filter climbs by the current-angle grade (matches boulder or
          route grade)
        example: 7a/V6
        in: query
        name: grade
        type: string
      - description: Filter climbs by board/product size ID
        example: 14
        in: query
        name: board_id
        type: integer
      - description: 'Filter climbs by board angle (supported angles: 5-70)'
        example: 40
        in: query
        name: angle
        required: true
        type: integer
      - default: popular
        description: Sort order for the result set
        enum:
        - popular
        - newest
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved climbs
          schema:
            $ref: '#/definitions/models.CursorPaginatedClimbsResponse'
        "400":
          description: Bad request - invalid parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get paginated climbs
      tags:
      - climbs
  /images/{filename}:
    get:
      consumes:
      - application/json
      description: Serve static image files for board layouts and holds. Images are
        used to display the physical board layout with hold positions for each climb.
      parameters:
      - description: Image filename
        example: original-16x12-bolt-ons-v2.png
        in: path
        name: filename
        required: true
        type: string
      produces:
      - image/png
      - image/jpeg
      - image/gif
      responses:
        "200":
          description: Successfully served image file
          schema:
            type: file
        "400":
          description: Bad request - invalid filename
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not found - image file does not exist
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Serve board layout images
      tags:
      - images
  /rooms:
    post:
      consumes:
      - application/json
      description: Create a room, validate the provider secret, persist the host session,
        and return the initial room snapshot with the host bearer session.
      parameters:
      - description: Create room payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.createRoomRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.roomSessionEnvelope'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a collaborative room
      tags:
      - rooms
  /rooms/{slug}:
    get:
      description: Return the current collaborative room snapshot for the authenticated
        viewer.
      parameters:
      - description: Room slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rooms.RoomSnapshot'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a room snapshot
      tags:
      - rooms
    patch:
      consumes:
      - application/json
      description: Update the room name for the host-managed collaborative room.
      parameters:
      - description: Room slug
        in: path
        name: slug
        required: true
        type: string
      - description: Room update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.updateRoomRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rooms.RoomSnapshot'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update room metadata
      tags:
      - rooms
  /rooms/{slug}/catalog/climbs:
    get:
      description: Return provider climbs for the room surface along with room vote
        metadata.
      parameters:
      - description: Room slug
        in: path
        name: slug
        required: true
        type: string
      - description: Search query
        in: query
        name: q
        type: string
      - description: Sort order
        in: query
        name: sort
        type: string
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rooms.CatalogClimbsResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List room catalog climbs
      tags:
      - rooms
  /rooms/{slug}/catalog/climbs/{climbId}:
    get:
      description: Return a single provider climb for the room surface along with
        room vote metadata.
      parameters:
      - description: Room slug
        in: path
        name: slug
        required: true
        type: string
      - description: Provider climb id
        in: path
        name: climbId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rooms.CatalogClimbResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a room catalog climb
      tags:
      - rooms
  /rooms/{slug}/catalog/surfaces:
    get:
      description: Return provider-specific selectable surfaces for the room, optionally
        filtered by parent id.
      parameters:
      - description: Room slug
        in: path
        name: slug
        required: true
        type: string
      - description: Parent surface id
        in: query
        name: parent_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.listSurfacesResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List provider surfaces for the room
      tags:
      - rooms
  /rooms/{slug}/fist-bumps/settings:
    put:
      consumes:
      - application/json
      description: Enable or disable room fist bumps for the host-managed collaborative
        room.
      parameters:
      - description: Room slug
        in: path
        name: slug
        required: true
        type: string
      - description: Fist bump settings payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.updateFistBumpsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rooms.RoomSnapshot'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update room fist bump settings
      tags:
      - rooms
  /rooms/{slug}/join:
    post:
      consumes:
      - application/json
      description: Create a participant session for the room and return the room snapshot
        with the joining guest bearer session.
      parameters:
      - description: Room slug
        in: path
        name: slug
        required: true
        type: string
      - description: Join room payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.joinRoomRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.roomSessionEnvelope'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Join an existing room
      tags:
      - rooms
  /rooms/{slug}/pick-random:
    post:
      consumes:
      - application/json
      description: Pick a random climb from finalists or top-voted climbs for the
        room.
      parameters:
      - description: Room slug
        in: path
        name: slug
        required: true
        type: string
      - description: Random pick payload
        in: body
        name: request
        schema:
          $ref: '#/definitions/handlers.pickRandomRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.randomPickResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Pick a random room climb
      tags:
      - rooms
  /rooms/{slug}/provider/connect:
    post:
      consumes:
      - application/json
      description: Validate and persist provider credentials for the host-managed
        collaborative room.
      parameters:
      - description: Room slug
        in: path
        name: slug
        required: true
        type: string
      - description: Provider connect payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.connectProviderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/providers.ProviderConnectionState'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Connect or refresh a room provider
      tags:
      - rooms
  /rooms/{slug}/surface:
    post:
      consumes:
      - application/json
      description: Persist the provider-specific board, gym, or wall selection for
        the room.
      parameters:
      - description: Room slug
        in: path
        name: slug
        required: true
        type: string
      - description: Surface selection payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.setSurfaceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/providers.ProviderSurface'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Select the shared room surface
      tags:
      - rooms
  /sessions/recent:
    get:
      description: Return recent closed-room summaries for the landing page and operator
        review.
      parameters:
      - description: Number of sessions to return
        in: query

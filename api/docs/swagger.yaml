basePath: /api
definitions:
  models.BoardOption:
    properties:
      id:
        example: 14
        type: integer
      kilter_name:
        example: Kilter Board Original
        type: string
      name:
        example: 7 x 10
        type: string
    type: object
  models.Climb:
    properties:
      ascends:
        example: 42
        type: integer
      climb_name:
        example: swooped
        type: string
      created_at:
        example: "2018-12-06 21:15:01.127371"
        type: string
      description:
        example: A challenging overhang problem
        type: string
      frames:
        example: p1080r15p1110r15p1131r12
        type: string
      grades:
        additionalProperties:
          $ref: '#/definitions/models.GradeInfo'
        type: object
      image_filenames:
        items:
          type: string
        type: array
      product_size_id:
        example: 14
        type: integer
      setter_name:
        example: jwebxl
        type: string
      uuid:
        example: F01419E12672459396CA62E3655ABC46
        type: string
    type: object
  models.CursorPaginatedClimbsResponse:
    properties:
      climbs:
        items:
          $ref: '#/definitions/models.Climb'
        type: array
      has_more:
        example: true
        type: boolean
      next_cursor:
        example: eyJzb3J0IjoicG9wdWxhciIsImFzY2VuZHMiOjQyLCJjcmVhdGVkX2F0IjoiMjAyNi0wMS0wMSAwMDowMDowMC4wMDAwMDAiLCJ1dWlkIjoidXVpZC0xIiwicHJvZHVjdF9zaXplX2lkIjoxNH0=
        type: string
      page_size:
        example: 10
        type: integer
    type: object
  models.GradeInfo:
    properties:
      boulder:
        example: 7a/V6
        type: string
      route:
        example: 7c/5.12d
        type: string
    type: object
externalDocs:
  description: Kilter Together API Documentation
  url: https://github.com/lczm/kilter-together/blob/main/api/README.md
host: localhost:8082
info:
  contact:
    email: opensource@lczm.me
    name: API Support
    url: https://github.com/lczm/kilter-together
  description: API for solo Kilter browsing plus collaborative room sessions with
    Kilter and Crux provider adapters.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Kilter Together API
  version: "1.0"
paths:
  /boards:
    get:
      consumes:
      - application/json
      description: Retrieve all available board/product size options for filtering
        climbs. Returns a list of board configurations with their IDs and human-readable
        names.
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved board options
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/models.BoardOption'
              type: array
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get available board options
      tags:
      - boards
  /climbs:
    get:
      consumes:
      - application/json
      description: Retrieve a paginated list of listed Kilter Board climbs with filtering,
        sorting, and cursor-based pagination.
      parameters:
      - description: Pagination cursor returned by the previous page
        example: eyJzb3J0IjoicG9wdWxhciIsImFzY2VuZHMiOjQyLCJjcmVhdGVkX2F0IjoiMjAyNi0wMS0wMSAwMDowMDowMC4wMDAwMDAiLCJ1dWlkIjoidXVpZC0xIiwicHJvZHVjdF9zaXplX2lkIjoxNH0=
        in: query
        name: cursor
        type: string
      - default: 10
        description: Number of items per page (1-100)
        example: 10
        in: query
        maximum: 100
        minimum: 1
        name: page_size
        type: integer
      - description: Filter climbs by climb name (partial match)
        example: swooped
        in: query
        name: name
        type: string
      - description: Filter climbs by setter username (partial match)
        example: jwebxl
        in: query
        name: setter
        type: string
      - description: Filter climbs by board/product size ID
        example: 14
        in: query
        name: board_id
        type: integer
      - description: 'Filter climbs by board angle (supported angles: 5-70)'
        example: 40
        in: query
        name: angle
        required: true
        type: integer
      - default: popular
        description: Sort order for the result set
        enum:
        - popular
        - newest
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved climbs
          schema:
            $ref: '#/definitions/models.CursorPaginatedClimbsResponse'
        "400":
          description: Bad request - invalid parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get paginated climbs
      tags:
      - climbs
  /images/{filename}:
    get:
      consumes:
      - application/json
      description: Serve static image files for board layouts and holds. Images are
        used to display the physical board layout with hold positions for each climb.
      parameters:
      - description: Image filename
        example: original-16x12-bolt-ons-v2.png
        in: path
        name: filename
        required: true
        type: string
      produces:
      - image/png
      - image/jpeg
      - image/gif
      responses:
        "200":
          description: Successfully served image file
          schema:
            type: file
        "400":
          description: Bad request - invalid filename
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not found - image file does not exist
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Serve board layout images
      tags:
      - images
schemes:
- http
- https
swagger: "2.0"

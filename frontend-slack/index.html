<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noupe Channel Guard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="slack-shell">
        <aside class="workspace-rail">
            <div class="window-dots" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <button class="workspace-pill workspace-pill-brand" type="button" aria-label="Workspace home">N</button>
            <button class="workspace-pill workspace-pill-active" type="button" aria-label="Current workspace">P</button>
            <button class="workspace-pill" type="button" aria-label="Secondary workspace">Q</button>
            <button class="workspace-pill" type="button" aria-label="Add workspace">+</button>
        </aside>

        <aside class="channel-sidebar">
            <div class="sidebar-header">
                <div>
                    <p class="eyebrow">Noupe Demo</p>
                    <h1>Acme Inc.</h1>
                </div>
                <div class="status-pill" id="backend-status">
                    <span class="status-dot"></span>
                    <span id="backend-status-text">Checking backend readiness...</span>
                </div>
            </div>

            <div class="sidebar-section">
                <p class="section-title">Threads</p>
                <button class="sidebar-link" type="button">All DMs</button>
                <button class="sidebar-link" type="button">Mentions and reactions</button>
                <button class="sidebar-link" type="button">File browser</button>
            </div>

            <div class="sidebar-section">
                <p class="section-title">Starred</p>
                <button class="sidebar-link" type="button">triage-pr</button>
                <button class="sidebar-link" type="button">sales-approvals</button>
            </div>

            <div class="sidebar-section">
                <p class="section-title">Channels</p>
                <button class="channel-link" type="button">announcements <span>1</span></button>
                <button class="channel-link channel-link-active" type="button">proj-new-website</button>
                <button class="channel-link" type="button">quarterly-planning</button>
            </div>
        </aside>

        <main class="channel-stage">
            <header class="channel-header">
                <div>
                    <p class="channel-title">#proj-new-website</p>
                    <p class="channel-copy">Mock team channel where every message and DOCX upload is screened before it is posted.</p>
                </div>
                <div class="channel-meta">25 members</div>
            </header>

            <section class="error-banner hidden" id="error-banner" role="alert"></section>
            <section class="notice-banner hidden" id="notice-banner"></section>

            <section class="message-stream" id="message-stream" aria-live="polite"></section>

            <section class="composer-shell">
                <input id="upload-input" type="file"
                    accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" hidden>

                <section class="guard-popup hidden" id="guard-popup" role="alertdialog" aria-labelledby="guard-title"
                    aria-live="assertive">
                    <div class="guard-popup-card">
                        <button class="guard-dismiss" id="guard-dismiss" type="button" aria-label="Dismiss guardrail notice">x</button>
                        <p class="eyebrow">MNPI guardrail</p>
                        <h3 id="guard-title">Review required</h3>
                        <p class="guard-summary" id="guard-summary"></p>
                        <div class="guard-classification" id="guard-classification"></div>
                        <div class="guard-details" id="guard-details"></div>
                        <div class="guard-actions hidden" id="guard-actions">
                            <button class="primary-action" id="guard-confirm" type="button">Proceed anyway</button>
                        </div>
                    </div>
                </section>

                <label class="sr-only" for="message-input">Message</label>
                <textarea id="message-input" placeholder="Message #proj-new-website"></textarea>
                <div class="composer-toolbar">
                    <span id="composer-status">Cmd/Ctrl + Enter sends after screening.</span>
                    <div class="composer-actions">
                        <button class="toolbar-button" id="upload-button" type="button">Attach DOCX</button>
                        <button class="toolbar-button toolbar-button-primary" id="send-button" type="button">Send</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.7.2/mammoth.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: validate-training-json
        name: Validate training JSON schema
        entry: python3 scripts/validate_training_data.py
        language: system
        files: ^docs/json/.*\.json$

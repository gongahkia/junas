version: "3.9"

services:
  noupe-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noupe-api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: noupe-redis
    ports:
      - "6379:6379"

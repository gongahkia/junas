services:
  junas:
    build:
      context: .
    image: junas:local
    ports:
      - "${JUNAS_PORT:-8000}:8000"
    environment:
      JUNAS_HOST: 0.0.0.0
      JUNAS_PORT: 8000
      PIPELINE_LAYERS: ""
      JUNAS_PUBLIC_EVIDENCE_ENABLED: "${JUNAS_PUBLIC_EVIDENCE_ENABLED:-0}"
      JUNAS_PUBLIC_EVIDENCE_PROVIDER: "${JUNAS_PUBLIC_EVIDENCE_PROVIDER:-none}"
      JUNAS_PUBLIC_EVIDENCE_ENDPOINT: "${JUNAS_PUBLIC_EVIDENCE_ENDPOINT:-}"
      JUNAS_PUBLIC_EVIDENCE_MAX_RESULTS: "${JUNAS_PUBLIC_EVIDENCE_MAX_RESULTS:-5}"
      JUNAS_PUBLIC_EVIDENCE_TIMEOUT_SECONDS: "${JUNAS_PUBLIC_EVIDENCE_TIMEOUT_SECONDS:-8}"
      JUNAS_LLM_ENABLED: "${JUNAS_LLM_ENABLED:-0}"
      JUNAS_LLM_PROVIDER: "${JUNAS_LLM_PROVIDER:-none}"
      JUNAS_LLM_BASE_URL: "${JUNAS_LLM_BASE_URL:-http://127.0.0.1:8001/v1}"
      JUNAS_LLM_ALLOW_REMOTE_BASE_URL: "${JUNAS_LLM_ALLOW_REMOTE_BASE_URL:-0}"
      JUNAS_LLM_ALLOW_REMOTE_RAW_TEXT: "${JUNAS_LLM_ALLOW_REMOTE_RAW_TEXT:-0}"
      JUNAS_LLM_INPUT_MODE: "${JUNAS_LLM_INPUT_MODE:-structured_tokens}"
      JUNAS_LLM_MODEL: "${JUNAS_LLM_MODEL:-gpt-oss-20b}"
      JUNAS_LLM_TIMEOUT_SECONDS: "${JUNAS_LLM_TIMEOUT_SECONDS:-20}"
      JUNAS_LLM_TENANT_OPT_IN_OPENAI: "${JUNAS_LLM_TENANT_OPT_IN_OPENAI:-0}"
      JUNAS_LLM_API_KEY: "${JUNAS_LLM_API_KEY:-}"
      JUNAS_LLM_HELPERS_ENABLED: "${JUNAS_LLM_HELPERS_ENABLED:-0}"
      JUNAS_LLM_DEFINED_TERMS_ENABLED: "${JUNAS_LLM_DEFINED_TERMS_ENABLED:-0}"
      JUNAS_LLM_COVERAGE_AUDIT_ENABLED: "${JUNAS_LLM_COVERAGE_AUDIT_ENABLED:-0}"
      EXA_API_KEY: "${EXA_API_KEY:-}"
      TINYFISH_API_KEY: "${TINYFISH_API_KEY:-}"
      SERPER_API_KEY: "${SERPER_API_KEY:-}"
      SERPAPI_KEY_PRIMARY: "${SERPAPI_KEY_PRIMARY:-}"
      SERPAPI_KEY_BACKUP: "${SERPAPI_KEY_BACKUP:-}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

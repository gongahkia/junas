services:
  kilter-together-api:
    build:
      context: ./api
      dockerfile: ./Dockerfile
    container_name: kilter-together-api
    environment:
      KILTER_TOGETHER_APP_SECRET: development-room-secret
      KILTER_TOGETHER_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    expose:
      - "8082"
    volumes:
      - kilter-together-data:/data
    restart: unless-stopped

  kilter-together-web:
    build:
      context: ./kilter-together-app
      dockerfile: ./Dockerfile
    container_name: kilter-together-web
    depends_on:
      - kilter-together-api
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  kilter-together-data:

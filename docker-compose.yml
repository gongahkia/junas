services:
  kaypoh:
    build:
      context: .
    image: kaypoh:local
    ports:
      - "${KAYPOH_PORT:-8000}:8000"
    environment:
      KAYPOH_HOST: 0.0.0.0
      KAYPOH_PORT: 8000
      PIPELINE_LAYERS: ""
      KAYPOH_PUBLIC_EVIDENCE_ENABLED: "${KAYPOH_PUBLIC_EVIDENCE_ENABLED:-0}"
      KAYPOH_PUBLIC_EVIDENCE_PROVIDER: "${KAYPOH_PUBLIC_EVIDENCE_PROVIDER:-none}"
      KAYPOH_PUBLIC_EVIDENCE_ENDPOINT: "${KAYPOH_PUBLIC_EVIDENCE_ENDPOINT:-}"
      KAYPOH_PUBLIC_EVIDENCE_MAX_RESULTS: "${KAYPOH_PUBLIC_EVIDENCE_MAX_RESULTS:-5}"
      KAYPOH_PUBLIC_EVIDENCE_TIMEOUT_SECONDS: "${KAYPOH_PUBLIC_EVIDENCE_TIMEOUT_SECONDS:-8}"
      KAYPOH_LLM_ENABLED: "${KAYPOH_LLM_ENABLED:-0}"
      KAYPOH_LLM_PROVIDER: "${KAYPOH_LLM_PROVIDER:-none}"
      KAYPOH_LLM_BASE_URL: "${KAYPOH_LLM_BASE_URL:-http://127.0.0.1:8001/v1}"
      KAYPOH_LLM_ALLOW_REMOTE_BASE_URL: "${KAYPOH_LLM_ALLOW_REMOTE_BASE_URL:-0}"
      KAYPOH_LLM_ALLOW_REMOTE_RAW_TEXT: "${KAYPOH_LLM_ALLOW_REMOTE_RAW_TEXT:-0}"
      KAYPOH_LLM_INPUT_MODE: "${KAYPOH_LLM_INPUT_MODE:-structured_tokens}"
      KAYPOH_LLM_MODEL: "${KAYPOH_LLM_MODEL:-gpt-oss-20b}"
      KAYPOH_LLM_TIMEOUT_SECONDS: "${KAYPOH_LLM_TIMEOUT_SECONDS:-20}"
      KAYPOH_LLM_TENANT_OPT_IN_OPENAI: "${KAYPOH_LLM_TENANT_OPT_IN_OPENAI:-0}"
      KAYPOH_LLM_API_KEY: "${KAYPOH_LLM_API_KEY:-}"
      EXA_API_KEY: "${EXA_API_KEY:-}"
      TINYFISH_API_KEY: "${TINYFISH_API_KEY:-}"
      SERPER_API_KEY: "${SERPER_API_KEY:-}"
      SERPAPI_KEY_PRIMARY: "${SERPAPI_KEY_PRIMARY:-}"
      SERPAPI_KEY_BACKUP: "${SERPAPI_KEY_BACKUP:-}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

services:
  junas:
    environment:
      PIPELINE_LAYERS: "${PIPELINE_LAYERS:-public_evidence,llm_adjudicator}"
      JUNAS_PUBLIC_EVIDENCE_ENABLED: "${JUNAS_PUBLIC_EVIDENCE_ENABLED:-1}"
      JUNAS_PUBLIC_EVIDENCE_PROVIDER: "${JUNAS_PUBLIC_EVIDENCE_PROVIDER:-serper}"
      JUNAS_LLM_ENABLED: "1"
      JUNAS_LLM_PROVIDER: "${JUNAS_LLM_PROVIDER:-openai}"
      JUNAS_LLM_BASE_URL: "${JUNAS_LLM_BASE_URL:-https://api.openai.com/v1}"
      JUNAS_LLM_INPUT_MODE: "${JUNAS_LLM_INPUT_MODE:-structured_tokens}"
      JUNAS_LLM_ALLOW_REMOTE_BASE_URL: "1"
      JUNAS_LLM_ALLOW_REMOTE_RAW_TEXT: "${JUNAS_LLM_ALLOW_REMOTE_RAW_TEXT:-0}"
      JUNAS_LLM_TENANT_OPT_IN_OPENAI: "${JUNAS_LLM_TENANT_OPT_IN_OPENAI:?set to 1 only after tenant opt-in}"
      JUNAS_LLM_API_KEY: "${JUNAS_LLM_API_KEY:?managed LLM API key is required}"
      JUNAS_LLM_HELPERS_ENABLED: "${JUNAS_LLM_HELPERS_ENABLED:-0}"
      JUNAS_LLM_DEFINED_TERMS_ENABLED: "${JUNAS_LLM_DEFINED_TERMS_ENABLED:-0}"
      JUNAS_LLM_COVERAGE_AUDIT_ENABLED: "${JUNAS_LLM_COVERAGE_AUDIT_ENABLED:-0}"

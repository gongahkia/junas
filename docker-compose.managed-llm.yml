services:
  kaypoh:
    environment:
      PIPELINE_LAYERS: "${PIPELINE_LAYERS:-public_evidence,llm_adjudicator}"
      KAYPOH_PUBLIC_EVIDENCE_ENABLED: "${KAYPOH_PUBLIC_EVIDENCE_ENABLED:-1}"
      KAYPOH_PUBLIC_EVIDENCE_PROVIDER: "${KAYPOH_PUBLIC_EVIDENCE_PROVIDER:-serper}"
      KAYPOH_LLM_ENABLED: "1"
      KAYPOH_LLM_PROVIDER: "${KAYPOH_LLM_PROVIDER:-openai}"
      KAYPOH_LLM_BASE_URL: "${KAYPOH_LLM_BASE_URL:-https://api.openai.com/v1}"
      KAYPOH_LLM_INPUT_MODE: "${KAYPOH_LLM_INPUT_MODE:-structured_tokens}"
      KAYPOH_LLM_ALLOW_REMOTE_BASE_URL: "1"
      KAYPOH_LLM_ALLOW_REMOTE_RAW_TEXT: "${KAYPOH_LLM_ALLOW_REMOTE_RAW_TEXT:-0}"
      KAYPOH_LLM_TENANT_OPT_IN_OPENAI: "${KAYPOH_LLM_TENANT_OPT_IN_OPENAI:?set to 1 only after tenant opt-in}"
      KAYPOH_LLM_API_KEY: "${KAYPOH_LLM_API_KEY:?managed LLM API key is required}"

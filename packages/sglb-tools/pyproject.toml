[build-system]
requires = ["hatchling>=1.24.2"]
build-backend = "hatchling.build"

[project]
name = "sglb-tools"
version = "0.1.0"
description = "Reusable SG-LegalBench citation, normalisation, and adapter primitives"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
  { name = "Gabriel Ong Zhe Mian" },
]
keywords = ["singapore", "legaltech", "legal-nlp", "citations", "benchmarks"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Text Processing :: Linguistic",
]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.urls]
Homepage = "https://github.com/gongahkia/junas"
Repository = "https://github.com/gongahkia/junas"
Issues = "https://github.com/gongahkia/junas/issues"

[tool.hatch.build.targets.wheel]
packages = ["sglb_tools"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
ignore = ["E501"]

name: cAIpng Release on push 

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.12'

jobs:
  # Check if we should create a release
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version_check.outputs.changed }}
      version: ${{ steps.get_version.outputs.version }}
      frontend_version: ${{ steps.get_version.outputs.frontend_version }}
      backend_version: ${{ steps.get_version.outputs.backend_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get current versions
        id: get_version
        run: |
          BACKEND_VERSION=$(node -p "require('./backend/package.json').version")
          FRONTEND_VERSION=$(node -p "require('./frontend/package.json').version")
          echo "backend_version=$BACKEND_VERSION" >> $GITHUB_OUTPUT
          echo "frontend_version=$FRONTEND_VERSION" >> $GITHUB_OUTPUT
          # Use backend version as main version
          echo "version=$BACKEND_VERSION" >> $GITHUB_OUTPUT

      - name: Check if version changed
        id: version_check
        run: |
          git diff HEAD^ HEAD -- backend/package.json frontend/package.json > /tmp/version_diff.txt
          if grep -q '"version"' /tmp/version_diff.txt; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Version changed - will create release"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  Version unchanged - skipping release"
          fi

  # Build and test backend
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint || true

      - name: Run tests
        run: npm test

      - name: Check build readiness
        run: |
          echo "✅ Backend is ready for deployment"
          node -e "console.log('Node version:', process.version)"

  # Build and test frontend
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint || true

      - name: Build frontend
        run: npm run build

      - name: Check build output
        run: |
          ls -lh dist/
          echo "✅ Frontend build successful"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # Test training scripts
  training:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: training
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check . || true

      - name: Run tests
        run: python -m pytest tests/ -v || echo "⚠️  No tests found"

  # Create GitHub release
  release:
    needs: [check-version, backend, frontend, training]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"
          echo "Generating changelog for $VERSION"
          
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Create changelog content
          cat > CHANGELOG.tmp <<EOF
          ## 🎉 cAIpng $VERSION
          
          ### 📦 Versions
          - Backend: v${{ needs.check-version.outputs.backend_version }}
          - Frontend: v${{ needs.check-version.outputs.frontend_version }}
          
          ### 🚀 What's New
          
          $COMMITS
          
          ### 📥 Installation
          
          \`\`\`bash
          git clone https://github.com/\${{ github.repository }}.git
          cd caipng
          # Follow README.md for setup instructions
          \`\`\`
          
          ### 🔧 Quick Start
          
          \`\`\`bash
          # Setup backend
          cd backend
          npm install
          cp .env.example .env
          # Edit .env with your configuration
          npm run dev
          
          # Setup frontend (in new terminal)
          cd frontend
          npm install
          cp .env.example .env
          npm run dev
          \`\`\`
          
          ### 📚 Documentation
          - [Frontend Features](https://github.com/\${{ github.repository }}/blob/main/docs/FRONTEND_FEATURES.md)
          - [Quick Reference](https://github.com/\${{ github.repository }}/blob/main/docs/QUICK_REFERENCE.md)
          - [Training Guide](https://github.com/\${{ github.repository }}/blob/main/docs/TRAINING.md)
          
          ### 🐛 Bug Reports
          Please report issues at: https://github.com/\${{ github.repository }}/issues
          EOF
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.tmp >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release Archive
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"
          
          # Create release directory
          mkdir -p release
          
          # Copy source files (excluding node_modules, dist, etc.)
          rsync -av \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.git' \
            --exclude='logs' \
            --exclude='uploads' \
            --exclude='*.log' \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            . release/caipng-${VERSION}/
          
          # Copy frontend build
          mkdir -p release/caipng-${VERSION}/frontend/dist
          cp -r frontend-dist/* release/caipng-${VERSION}/frontend/dist/
          
          # Create source archive
          cd release
          tar -czf caipng-${VERSION}-source.tar.gz caipng-${VERSION}/
          zip -r caipng-${VERSION}-source.zip caipng-${VERSION}/
          
          # Create frontend-only build
          cd caipng-${VERSION}/frontend/dist
          tar -czf ../../../../caipng-${VERSION}-frontend-build.tar.gz .
          cd ../../../..
          
          ls -lh *.tar.gz *.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: cAIpng v${{ needs.check-version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: |
            release/caipng-v${{ needs.check-version.outputs.version }}-source.tar.gz
            release/caipng-v${{ needs.check-version.outputs.version }}-source.zip
            release/caipng-v${{ needs.check-version.outputs.version }}-frontend-build.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release badges
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"
          echo "🎉 Release $VERSION created successfully!"
          echo "📦 Artifacts uploaded"
          echo "🔗 Release URL: https://github.com/${{ github.repository }}/releases/tag/$VERSION"

  # Notify on completion
  notify:
    needs: [check-version, release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          if [ "${{ needs.check-version.outputs.should_release }}" == "true" ]; then
            if [ "${{ needs.release.result }}" == "success" ]; then
              echo "✅ Release v${{ needs.check-version.outputs.version }} created successfully!"
              echo "🔗 https://github.com/${{ github.repository }}/releases/tag/v${{ needs.check-version.outputs.version }}"
            else
              echo "❌ Release creation failed"
              exit 1
            fi
          else
            echo "ℹ️  No version change detected - skipped release"
          fi

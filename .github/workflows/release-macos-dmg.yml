name: Release macOS DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Artifact version, e.g. 0.1.0"
        required: true
        default: "0.1.0"
        type: string
      release_tag:
        description: "Existing GitHub release tag for optional upload, e.g. v0.1.0"
        required: true
        default: "v0.1.0"
        type: string
      upload_to_release:
        description: "Upload signed DMG and sha256 file to release_tag"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  signed-notarized-dmg:
    name: Signed notarized DMG
    runs-on: macos-latest
    environment: macos-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Verify release secrets
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          for name in CERTIFICATE_BASE64 CERTIFICATE_PASSWORD CODESIGN_IDENTITY APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "missing required macOS release secret: ${name}" >&2
              exit 78
            fi
          done
      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/junas-release.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "JUNAS_RELEASE_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
      - name: Store notarytool profile
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials junas-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"
      - name: Install packaging dependencies
        run: uv sync --extra packaging --extra dev
      - name: Build signed notarized DMG
        env:
          JUNAS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          JUNAS_NOTARYTOOL_PROFILE: junas-notary
          JUNAS_RELEASE_SIGNING_REQUIRED: "1"
          JUNAS_DMG_OUTPUT: dist/JunasMenuBar-${{ inputs.version }}.dmg
        run: ./scripts/package_macos_dmg.sh
      - name: Verify signed artifact
        run: |
          set -euo pipefail
          DMG="dist/JunasMenuBar-${{ inputs.version }}.dmg"
          shasum -a 256 "$DMG" | tee "${DMG}.sha256"
          JUNAS_VERIFY_INSTALL_DIR="$RUNNER_TEMP" \
            JUNAS_VERIFY_OVERWRITE=1 \
            ./scripts/verify_macos_dmg_release.sh "$DMG"
      - uses: actions/upload-artifact@v4
        with:
          name: JunasMenuBar-${{ inputs.version }}-signed-notarized-macos
          path: |
            dist/JunasMenuBar-${{ inputs.version }}.dmg
            dist/JunasMenuBar-${{ inputs.version }}.dmg.sha256
          if-no-files-found: error
      - name: Upload to GitHub release
        if: inputs.upload_to_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DMG="dist/JunasMenuBar-${{ inputs.version }}.dmg"
          gh release view "${{ inputs.release_tag }}"
          gh release upload "${{ inputs.release_tag }}" "$DMG" "${DMG}.sha256" --clobber
      - name: Delete temporary keychain
        if: always()
        run: |
          if [ -n "${JUNAS_RELEASE_KEYCHAIN:-}" ]; then
            security delete-keychain "$JUNAS_RELEASE_KEYCHAIN" || true
          fi

name: Noupe CI/CD on workflows

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Check Merge Markers
        run: |
          if grep -R -nE '^(<<<<<<<|=======|>>>>>>>)' . --exclude-dir=.git; then
            echo "Merge conflict markers found."
            exit 1
          fi

      - name: Compile Python
        run: |
          python -m compileall -q .

      - name: Validate Training JSON
        run: |
          python scripts/validate_training_data.py docs/json/*.json
          python scripts/data_quality_report.py

      - name: Backend Smoke Test
        env:
          PIPELINE_LAYERS: lexicon
        run: |
          python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 > /tmp/noupe-ci.log 2>&1 &
          PID=$!
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/health > /tmp/health.json; then
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8000/ready > /tmp/ready.json
          curl -sf -X POST http://127.0.0.1:8000/classify \
            -H "Content-Type: application/json" \
            -d '{"text":"Acme confidential acquisition memo"}' > /tmp/classify.json
          kill $PID
          wait $PID || true

      - name: Eval Metrics Snapshot
        run: |
          mkdir -p reports
          python test/run_eval.py --config config.toml --data test/eval.json --timeout 60 > reports/ci_eval.txt
          grep -q "accuracy:" reports/ci_eval.txt
          grep -q "macro" reports/ci_eval.txt
          grep -q "micro" reports/ci_eval.txt
          grep -q "confusion_matrix" reports/ci_eval.txt
          grep -q "layer-load-state" reports/ci_eval.txt

      - name: Upload Eval Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-eval-report
          path: reports/ci_eval.txt

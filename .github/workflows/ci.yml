name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
      - name: Verify legacy name is gone
        working-directory: .
        run: |
          legacy_pattern='board'"buddy"
          if rg -n "$legacy_pattern" --hidden --glob '!.git' --glob '!kilter-together-app/node_modules' --glob '!kilter-together-app/dist'; then
            echo "Legacy repository references remain."
            exit 1
          fi
      - name: Run Go tests
        run: go test ./...
      - name: Build Go API
        run: go build ./...
      - name: Verify generated Swagger docs are up to date
        run: |
          go run github.com/swaggo/swag/cmd/swag@v1.16.4 init -g main.go -o docs
          git diff --exit-code docs

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kilter-together-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kilter-together-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Test frontend
        run: npm run test
      - name: Build frontend
        run: npm run build

name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check backend/cache.py backend/observability.py configs/runtime.py

      - name: Mypy
        run: python -m mypy backend/cache.py backend/observability.py configs/runtime.py

      - name: Unit and contract tests
        run: python -m unittest discover -s test -p "test*.py"

  integration-artifacts:
    if: ${{ hashFiles('artifacts/manifest.json') != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Conditional real-artifact integration tests
        run: python -m unittest discover -s test -p "test*_integration.py"

name: Kilter Together CI/CD on push

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
      - name: Verify legacy name is gone
        working-directory: .
        run: |
          legacy_pattern='board'"buddy"
          if rg -n "$legacy_pattern" --hidden --glob '!.git' --glob '!kilter-together-app/node_modules' --glob '!kilter-together-app/dist'; then
            echo "Legacy repository references remain."
            exit 1
          fi
      - name: Run go vet
        run: go vet ./...
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Run staticcheck
        run: |
          "$(go env GOPATH)/bin/staticcheck" ./...
      - name: Run Go tests
        run: go test ./...
      - name: Build Go API
        run: go build ./...
      - name: Verify generated Swagger docs are up to date
        run: |
          go run github.com/swaggo/swag/cmd/swag@v1.16.4 init -g main.go -o docs
          git diff --exit-code docs

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kilter-together-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kilter-together-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Verify generated OpenAPI types are up to date
        run: |
          npm run generate:api
          git diff --exit-code src/generated/api.ts
      - name: Lint frontend
        run: npm run lint
      - name: Test frontend
        run: npm run test
      - name: Build frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kilter-together-app/package-lock.json
      - name: Install frontend dependencies
        working-directory: kilter-together-app
        run: npm ci
      - name: Install Playwright browsers
        working-directory: kilter-together-app
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke test
        working-directory: kilter-together-app
        run: npm run test:e2e -- --project=chromium tests/room-smoke.spec.ts

  deployment-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render Caddyfile from production env example
        run: ./scripts/render-caddyfile.sh compose.production.env.example /tmp/Caddyfile
      - name: Render Alertmanager config from env example
        run: ./scripts/render-alertmanager-config.sh observability/alertmanager/alertmanager.env.example /tmp/alertmanager.production.yml
      - name: Validate base compose config
        run: docker compose --env-file compose.env.example -f docker-compose.yml config >/tmp/base-compose.yml
      - name: Validate production compose config
        run: docker compose --env-file compose.production.env.example -f docker-compose.production.yml config >/tmp/production-compose.yml
      - name: Validate observability compose config
        run: docker compose -f docker-compose.observability.yml -f docker-compose.observability.production.yml config >/tmp/observability-compose.yml
